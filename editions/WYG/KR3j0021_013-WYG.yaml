body:
  text: 習學記言卷十三宋葉適撰論語何晏集解序語簡而文古數百年講論之大意頼以有存經晏說者皆異於諸家盖後世講理之學以晏及王弼為祖始破經生專門之陋矣范甯以為幽沉仁義罪過桀紂若甯亦知其所知而已學而時習之不亦說乎有朋自逺方來不亦樂乎人不知而不慍不亦君子乎前乎孔子聖賢之所以自脩者無所登載故莫知其止泊處若孔子成聖之功在此三語而已盖終其身而不息也常疑後人只作初學領㑹既無恱樂之實又迷不慍之趣正能好學無倦死生以之皆血氣所為也有子雖不為放言而卑弱如此孔子之傳失矣古人言仁不離巧言令色然則學者之求仁與仁道之既成其淺深多寡不同耶君子食無求飽居無求安敏於事而慎於言就有道而正焉此功用亦不易致孔子不以許未成之材也觀子貢子夏所以言詩孔子所以許之其大指可見矣然雖意在言外終須理與事協故惟孔孟子稱者得之如左氏記禮雖子思所稱猶未能暢其義也為政以徳譬如北辰居其所而衆星共之孔子不得自為政故其言如此然為者有盡言者無窮使雖有羣聖人之政而無孔子之言則終莫知所考矣詩三百孔子舉其在者也後人矜誇謂孔子自删為三百篇大妄也思無邪指示最切如傳者言風人所為詩是思有邪也詩人以無邪之思正其邪之思也耳順從心孔子安得以最後之年自言之又其所為限節者非所以為進徳之序疑非孔子之言也學而不思思而不學孔子之時其言必有所指由後世言之其粗習訓詁淺陋相承者不思之類也其穿宂性命空虚自喜者不學之類也士不越此二塗也古之為學者斷絶不繼子張問十世可知自以為逺矣然則百世可知之學自孔子而始也後之人豈可忽哉季氏積三世之柄既擅其國與民遂移禮樂於其家所謂禮樂者非魯所得有周實有之豈惟僣魯盖僣周也然當時士大夫不以為非自非孔子明言之則舉世無復知矣孔子既斥其不可忍又稱奚取於三家又以責冉有又以林放比泰山其於當時國事是非明白未有大於此弟子所記必以為絶特駭俗之論若使不待孔子而能知則亦不至如此詳録也邪正臧否之間惟孔子為盡之固非臧文仲栁下惠所及矣然三代世臣專上人君主祭僅擁虚器故雖取其實猶不改其名也秦漢以後則併其名挈之而去士大夫安其習而不知與畏其禍而不敢此猶未足病也其或止以權利小小操􅀼未至有名實廢興之異而恐懼惕息反有甚焉然則冉有季路以下波蕩風靡者何足計也周召為政禮樂征伐自天子出管仲為政禮樂征伐自諸侯出自是至孔子百五十年天下惟管仲之聽周召之功泯矣推孔子之志將率天下以復周召之功其道之順時之易無如管仲所以不能者視聽言動不由於禮敗撓其力削損其器大道之䘮由此其始孔子之所深恨也按子貢子路及孟子所稱曽西羞比管仲其實不知孔子之意至孟子以管仲曽西所不為安得為我願之而自謂以齊王猶反手則不知孔子之意又甚矣孔子言擇不處仁為不知言君子無終食之間違仁言囘也其心三月不違仁是仁之於人相為依憑如影隨嚮答今若體孔子之言要須有用力處克己復禮為仁由己其具體也出門如賓使民如祭其操術也己欲立而立人己欲達而達人又術之降殺者常以此用力而一念一食無不在仁庶可以言知矣舜言精一而不詳伊尹言一徳詳矣至孔子於道及學始皆言一以貫之夫行之於身必待施之於人措之於治是一將有時而𨼆孔子不必待其人與治也道者自古以為㣲眇難見學者自古以為纎息難統今得其所謂一貫通上下萬變逢原故不必其人之可化不必其治之有立雖極亂大壊絶滅蠧朽之餘而道固常存學固常明不以身歿而遂𨼆也然余嘗疑孔子既以一貫語曽子直唯而止無所問質若素知之者以其告孟敬子者考之乃有麤細之異貴賤之别未知於一貫之指果合否曽子又自轉為忠恕忠以盡己恕以盡人雖曰内外合一而自古聖人經緯天地之妙用固不止於是疑此語未經孔子是正恐亦不可便以為凖也子貢雖分截文章性命自絶於其大者而不敢近孔子丁寧告之使決知此道雖未嘗離學而不在於學其所以識之者一以貫之而已是曽子之易聽反不若子貢之難曉至於近世之學但夸大曽子一貫之說而子貢所聞者殆置而不言此又余所不能測也徳不孤必有隣古今為高絶無隣之徳衆矣故曰中庸民鮮久矣臧文仲居蔡山節藻梲何如其知也孔子所以過臧文仲者以其非不知而猶為之病固有所在與論管仲同也然則童子言大夫之簀固不足以疵曽子要之克己復禮乃孔顔事日月至者未能也伯夷叔齊不念舊惡怨是用希又曰求仁而得仁又何怨孔子之稱夷齊者其怨與常情同其能自樂而無所怨與常情異也至孟子乃謂目不視惡色耳不聽惡聲與鄉人處如以朝衣朝冠坐於塗炭既自品其為聖之清又自不與其為隘嗟乎豈其未聞孔子之言歟盖夷齊者利欲所不能塵垢世俗畏之以為去人羣而獨立也孟子豈亦以世俗之所畏者而遂加去取於其間乎定百世之是非夫豈易哉或人不足以得醯㣲生高為之乞人情之所不免也然既以直名則委曲以濟民行者世共禁之矣孔子之志老者安之朋友信之少者懐之少抑於二子矣夫高其所願者終或不能從也而近世之學者乃以為如是則與天地同量且天地雖大也亦烏能安老而懐少哉見其過而内自訟足以入徳矣人能見其善而内自譽爾哀公問弟子孰為好學孔子對曰有顔囘者好學不遷怒不貳過易稱遷善書云貳過不幸短命死矣今也則亡未聞好學者也此亦孔氏品量後進人材大節目也其稱雍仁求藝賜達由不恥緼袍餘無見焉若夫前軰則固多矣夫孔子聚天下之材教於一門最衆也顔子最寡也其間多長老顔子少也又追痛於已死不顧其生存也若是乎好學之難哉哀公本庸君不足以知此而顔子特新為標字上方古人豈其告君者不疑其所不能知抑當時君臣之智皆可以知而獨以不能行為患也凡此皆後人所未講也乃獨以為學者不當移此怒於彼知不善未嘗復行而已嗟乎豈以是為顔子之所獨能而凡孔氏之門者皆輕愠頻復之流歟是孔子誣天下以無人固余之所不敢從也按孔子自稱皆損於人之所既與其稱顔子皆進於人之所未聞未嘗不欲垂世教也盖置身於喜怒是非之外者始可以言好學而一世之人常區區乎求免於喜怒是非之内而不獲如搰泥而揚其波也嗚呼必若是則惟顔子爾囘也其心三月不違仁其餘則日月至焉而已矣其餘則曷為日月至焉而已矣利欲之念忽動於中則與仁有間斷也猶言不遷怒不貳過也賢哉囘也一簞食一瓢飲在陋巷人不堪其憂囘也不改其樂賢哉囘也不以口腹䘮道雖古聖賢皆然然自孔子始發之不發之於餘人而獨發之於顔子者以顔子有其實也由求與賜不可以言仁而可以從政古未有此論也自臯陶言九徳至周文武成康未嘗分别孔子時益降矣不存乎仁則材遂滅徳不取乎政則與材兼失之矣故此論與臯陶異而實同冉求曰非不說子之道力不足也子曰力不足者中道而廢今女畫以孔子之言攷之則當時之學不志於道者多矣以子夏之為儒猶戒其小人也而況餘人乎夫儒者不攷於徳而徇於學則以其學為道之病矣出必由户既知户矣行不由道未知道也道者所當行之路也雖鄉人茍知路未有須臾離者不然雖君子左右顧而迷矣然則中庸所謂不可須臾離者真未可以名道而可離者亦未可以名非道也人之生也直此一語所闗極重易所謂聖功也還觀古初以至於今載籍所傳生其直者甚難而以幸而免者皆是也宰我問井有仁焉孔子答之嚴如此而孟子以乍見孺子將入於井為足以發其􅇶惕惻𨼆之心同是井也其閉者無自而發也然則未經孔孟講畫以前不仁者可勝諱哉如有博施於民而能濟衆何如可謂仁乎人之所以為仁者心也非利之也宰我不能明其心固無其功子貢亦未明其心也而遽欲有其功是交病仁也以孔子語考之子貢之心未離乎衆人也豈其欲之者固將以同其利於人乎述而不作信而好古孔子之道所以載於後世者在此盖自堯舜至於周公有作矣而未有述也天下之事變雖無窮天下之義理固有止故後世患於不能述而無所為作也信而好古所以能述也雖然學者不述乎孔子而述其所述不信孔子而信其所信則堯舜周孔之道終以不明慎之哉黙而識之學而不厭誨人不倦孔子自陳盡力處以告後人如火燎闇㝠桴濟不通可謂至切至近無㣲妙不可知之秘學者但苦聽受剽略爾徳之不脩學之不講聞義不能徙不善不能改以上三章相屬聨似若有意次第者盖初言功用中言所以功用末言功之所以不得成而廢雖未必一時之言而其言正相發明學者不待他求也徙義猶遷怒也義則必徙以就之怒則不遷以就之其機一也後世於不遷怒有異指疑其倫類未通也志於道據於徳依於仁游於藝孔子之言固已甚明而後世未能行者以其莫知孰為道孰為徳孰為仁故也士姑各以其私於己者講之人莫不有志也特其志之非爾誠知其非則所志志道矣據也依也亦莫不然志者人之主也如射之的也據者其地也依者因地而立也嗟夫人孰肯自以為汎然旅於斯世者曷不即其所志與其所據依者明辨而詳擇之哉使其果能則中庸所謂人十之己千之者不足進矣不憤不啓不悱不發舉一隅不以三隅反則不復也又曰自行束脩以上吾未嘗無誨焉又曰二三子以我為𨼆乎吾無𨼆乎爾吾無行而不與二三子者是丘也又曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉孔子教人淺深次第略具於此數端今其汎然而誨之與示以行事而不待於誨與其人凡鄙而不知所誨者皆不可見矣其可見者孰為一隅孰為三隅理無不貫而言不可以若是其幾也學者誠有以知之則百世之後如一日矣不然徒尋文索句而已子謂顔淵曰用之則行舍之則藏惟我與爾有是夫孔子顔淵皆不求用者也故曰用之則行直不必言𨼆爾其答陽虎必不仕者也故曰吾將仕矣亦謾諾之爾古之聖賢用舍固有定義雖孔子不得獨異也而後世學者以為惟孔子能不係吝於用舍之間而謂顔子亦能之若是則沉浮進退聽物所為不用而猶行見舍而不藏而出處之大節䘮矣暴虎馮河死而無悔者吾不與也言勇至不懼而止子路之勇可以言無懼矣然必兼仁與智故臨事而懼好謀而成雖伊尹太公不能易不然則以獨勇為子路之死矣富而可求也雖執鞭之士吾亦為之世亦有可以富而無至於執鞭者矣而孔子以為不可為然則崇高莫大乎富貴者亂徳之言也冉有子路謂夫子當為衛君子貢不能決也是時顔子已亡矣義理之是非在目前者常人不能守而每以利害為去就盖自古而然而又有庸人執以為義理之所在非聖人不能擇者亦自古而然二端學者不可不謹察也子曰飯疏食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲孔子發明此義詩書所未有盖是時道徳在上而不能在下也若在下而無以自樂終日戚戚何異於栢舟加我數年五十以學易可以無大過矣是時周易已去上一字必有所從始不可得而知孔子亦因之而已後人便謂易者變易隨時變易以從道則連山歸藏何以言之葉公問孔子於子路子路不對葉公諸梁當時能言者左氏載之異於以甲兵要功利者其問子路而孔子之言如此豈以其亦足以語上乎雖然發憤忘食樂以忘憂不知老之將至淡乎其無味至今未有能明之者也記稱獨學而無友則孤陋而寡聞誠是然擇友最難有通國曠世而不獲者矣孔子曰三人行必有我師焉擇其善者而從之不善者而改之故造次顛沛皆道所在而無難求難得之患聖人所以能終其身於學而不厭由此也孔子曰聖人吾不得而見之矣得見君子斯可矣按堯舜禹湯雖古今所共尊而仁聖文武之徳猶皆通稱雜舉文武周召之後聖賢不作孔子攷論其故於是始各有品目而聖人之名不復濫與矣盖為脩徳進道者之驗也洪範言九疇天所錫而作聖實本於思其他哲謀肅乂隨類而應則思之所通誠一身之主宰非他徳可並而云也然傅說謂惟學遜志道積于厥躬孔子謂學而不思則罔思而不學則殆是思學兼進者為聖又稱初筮告再三瀆瀆則不告瀆蒙也蒙以養正聖功也是則學者聖之所出思者聖之所存而孔子教人以求聖者其門固在是矣子曰善人吾不得而見之矣得見有恒者斯可矣善人天資粹美不以統紀倫類而自成者也孔子謂教民七年亦可以即戎為邦百年亦可以勝殘去殺盖指周之先君也又謂恒亨无咎利貞乆於其道而其象曰君子以立不易方夫得其方而不變此其所以次於善人也亡而為有虚而為盈約而為泰無徳而用智巧以求勝其窮遂為奸賊矣是固指世之妄人歟非也正謂立功成名如舅犯狐偃之流又其窮也為伍員范蠡爾如閭巷之庸倐成忽敗者何述焉子曰盖有不知而作之者我無是也多聞擇其善者而從之多見而識之知之次也六經之外孔子之前作者於今尚在其知與不知皆可驗也世方相競於作則不知而妄為固亦無怪自孔子因作為述以開天下然後堯舜三伐之事不至泯絶性命道徳有所統紀如使作而未巳捨舊求新無復存者則人道廢壊散為鬼蜮又如羲黄之時矣百聖之歸非心之同者不能㑹衆言之長非知之至者不能悟故孔子教人以多聞多見而得之又著於大畜之象曰多識前言往行以畜其徳子曰仁逺乎哉我欲仁斯仁至矣孔子自見此仁如耳目口鼻百骸四體之在其身扣之即應運之即從其言健㨗無所疑貳自顔淵以下皆未明也學者能以孔子之告諸子者識仁之體狀擬論深熟然後以孔子之自言者知仁之指歸造詣徑直則顛沛造次可以弗違不但日月之至而已若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣按孟子言孔子自謂聖則吾不能我學不厭而教不倦也此兩言正相似則所謂為之者學而已自學不厭又以此誨人不倦豈顧以聖仁之名為在已哉然而即夫世之所名者則聖仁不外是矣泰伯三以天下讓當時必有其實世所謂斷髪文身躶以為飾殆近之矣然漢闕帝謂文帝能讓天下乃過於泰伯流傳之謬而以古人為戲論則堯舜禹湯之徳皆空言也恭而無禮則勞慎而無禮則葸勇而無禮則亂直而無禮則絞按堯舜命䕫教胄子臯陶以九徳觀人必因天質之自然而能補其所不足其間節文亦不盡同今孔子獨一之於禮似與古人稍異者盖禮教至周而大備道盛仁熟之士固已揖讓周旋於中初徳偏善亦皆有所依據外不失人内不失已故孔子深惜禮之廢而欲其復行也如恭慎勇直得於天者非不美然有禮則以其質成無禮則以其質壊矣人非下愚未有無可成之質使皆一於禮則病盡而材全官人之哲雖過堯舜可也曽子有疾孟敬子問之近世以曽子為親傳孔子之道死復傳之於人在此一章按曽子末後語不及正於孔子以為曽子自傳其所得之道則可以為得孔子之道而傳之則不可也自堯舜禹湯文武周公孔子所傳皆一道孔子以教其徒而所受各不同以為雖不同而皆受之於孔子則可以為堯舜禹湯文武周公孔子之所以一者而曽子獨受而傳之人大不可也孔子嘗告曽子吾道一以貫之曽子既唯之而自以為忠恕按孔子告顔子一日克己復禮天下歸仁焉盖己不必是人不必非克己以盡物可也若動容貎而逺暴慢正顔色而近信出辭氣而逺鄙倍則專以已為是以人為非而克與未克歸與不歸皆不可知但以已形物而已且其言謂君子所貴乎道者三而籩豆之事則有司存尊其所貴忽其所賤又與一貫之指不合故曰非得孔子之道而傳之也夫堯舜禹湯文武周公孔子之所以一者非特以身傳也存之於書所以考其徳得之於言所以知其心故孔子稱天之未䘮斯文為己之責獨顔淵謂博我以文約我以禮欲罷不能既竭吾才餘無見焉夫託孤寄命雖曰必全其節任重道逺可惜止於其身然則繼周之損益為難知六藝之統紀為難識故曰非得堯舜禹湯文武周公孔子所以一者受而傳之也傳之有無道之事也世以曽子為能傳而余以為不能余豈與曽子辨哉不本諸古人之源流而以淺心狹志自為窺測者學者之患也興於詩立於禮成於樂三者周之所以教其盛時成材多矣孔子當其衰缺雖有詠歌俯仰於其中者備故事飾文為而已故其言如此惜三者可以成天下之材而當時未能也按臯陶典稱天叙禮稱天秩大雅民之秉彛好是懿徳孟子言禮之實節文斯二者樂之實樂斯二者而序詩者又以為詩者志之所之皆與此論異然則三者皆自中出而不由外入學而不知其統則隨語為說而不足以明道尚何望其能行此學之大患也民可使由之不可使知之疑與上語若相次第然由者上之所教令民不敢不能也知者其自知不待教令而能也如詩禮樂上所以教民雖由之而不知知者孔子而已後世頼孔子之知故亦有能知其髣髴者然則不在乎由而在乎知也學如不及猶恐失之傅說終始典于學周頌學有緝熈于光明言學之功用大矣然未有如此其急如此其急自孔子始也時習節也如不及節之梭疾者也非如不及不足以得之也巍巍乎舜禹之有天下也而不與焉至是而舜禹之事始為學者並言矣堯則曷為其不並言堯不以匹夫舉君道其本有也舜禹盡人道天下雖大而不得與乎其間孔子獨以教天下曰若是可也堯盡君道孔子以天比不敢示教焉序書者無所差降此孔子之言也達巷黨人曰大哉孔子博學而無所成名達巷之所與而孔子謙抑不敢當然則固時之聞人歟鄉遂州黨之制自周而徧於諸侯雖其衰㣲亦不異也僻陋如秦楚吳越者王制不能行始各以其國自為爾後世讀周官直謂是其盛時不知自東遷至於滅亡何嘗不如此不然安得傳數百年乎麻冕禮也今也純儉吾從衆拜下禮也今拜乎上泰也雖違衆吾從下孔子言古今異同有所捐益從違於其間一本乎理而已若記禮及他書之言不能判其是非而但以變古為貶者非也子路使門人為臣以是觀之世俗之榮人情所同顏閔而下不能免也孔子亦非辭而不居者但言無臣不當為有臣爾此又何足以不居乎然則子路子貢之流其心志大略可見矣沽之哉沽之哉我待賈者也孔子此言其不求用審矣非堯舜安能用孔子辨士諸子妄言孔子歴聘七十餘君無所鈞用而儒者因之以為東西南北之人蓋孔子特不為𨼆爾自衛反魯然後樂正雅頌各得其所葢其所涉歴多矣殆成於樂者歟非謂能正其當時所用之樂然茍有以求正於孔子亦不拒也語之而不惰孔子所稱唯顔子而已不以及曽子也先進於禮樂野人也孔子别語專稱當以禮樂治者甚多然周道既衰上下馳騁於兵刑功利之末故先進於禮樂世所謂野人先之以兵刑功利而後之以禮樂世所謂君子也雖然猶有禮樂則猶可言也若秦晉吳楚夷越之人遂無禮樂而見稱於當時以為君子不特當時稱以為君子而後世亦稱以為君子者不可言也從我於陳蔡者皆不及門也從孔子者皆以父母兄弟妻子周旋於天下而不得安於其家陳蔡之難則又甚焉盖其倉猝奔廹不相收主無所棲宿欲自比於尋常懐土力田之人而不可得也惟其至是而不變故徳行有顔淵閔子騫冉伯牛仲弓言語有宰我子貢政事有冉有季路文學有子游子夏卓然成材沒世而名立也禹自言子創若時娶于塗山辛壬癸甲啓呱呱而泣予弗子惟荒度土功此聖賢出處之要也小子鳴鼔而攻之可也孔子晩而歸魯雖不能用而弟子實任季氏之事言行計從矣而孔子之論嚴如此得非以田賦之急乎又言由與求可謂具臣季氏以為從之孔子曰弑父與君亦不從也逆折亂臣之萌士之法孔子者不此之法而妄言當與天地同量萬物一體耶孔子之所以為天下後世師者道進而心退其設語以驗諸子者非在乎材之所宜也曽晳雖未聞道而其心庻幾焉故孔子喟然與之且浴沂風雩詠歌而歸通國皆然但不狎邪所以至道而後世之論紛紛不已無實而妄意可哀也克己復禮為仁舉全體以告顔淵也孔子固未嘗以全體示人非吝之也未有能受之者也顏子曷為能受之得全體而能問其目故也全體因目而後明凡孔子之言仁凡弟子之問仁未有的切明白廣大周徧如此者世謂孔子語曽子一貫曽子唯之不復重問以為心悟神領不在口耳嗚呼豈有是哉一貫之指因子貢而粗明因曽子而大迷有若對哀公以盍徹豈謂履畆而徹乎哀公折以二猶不足亦豈謂履畆而二乎盖自宣公已稅畆故有子欲因畆計徹為公私便且正哀公之失不然對饑而論古徹非救事之宜也然哀公為此語可謂生於深宫之中長於婦人之手與晉君怪不食肉糜差不甚異治道何由而興也按子張學干祿問行問達問崇徳脩慝辨惑皆以徇外為是而孔子約之於内子張雖有浮淺之病而為後世學者立法其功甚大所謂他山之石可以攻玉也居之無倦盡已也行之以忠盡人也其事也如有政雖不吾以吾其與聞之孔子非欲必聞其政也有廢有興當為後世法為此欲聞之也善人為邦百年不教者也故亦可以勝殘去殺教則七年亦可以即戎皆周之先君已行者也見善如不及見不善如探湯吾見其人矣吾聞其語矣隠居以求其志行義以達其道吾聞其語矣未見其人也齊景公有馬千駟死之日民無徳而稱焉伯夷叔齊餓於首陽之下民到於今稱之其斯之謂與文義貫聨無不可通者自程氏以來乃謂錯簡宜在亦祗以異之下按誠不以富亦祗以異甚言愛之欲其生惡之欲其死為惑亦非錯簡也朱氏又言後七篇多錯簡按先進以後諸篇言厲而義峻皆成徳以上之事當時門人不能盡識謂之錯簡非也我則異於是無可無不可可則有降有辱不可則無降無辱貞則失人裕則失已故孔子不為非欲以無可無不可為聖人也聖人堯舜文王也何可不可之間哉習學記言卷十三
