body:
  text: 習學記言卷八宋葉適撰禮記曲禮中三百餘條人情物理的然不違餘篇如此要切言語可併集為上下篇使初學者由之而入豈惟初入固當終其身守而不畔蓋一言行則有一事之益如鑑覩像不得相離也古人治儀因儀以知事曾子所謂籩豆之事今儀禮所遺與周官戴氏雜記者是也然孔子教顔淵非禮勿視非禮勿聽非禮勿言非禮勿動蓋必欲此身常行於度數折旋之中而曾子告孟敬子乃以為所貴者動容貌出辭氣正顔色三事而已是則度數折旋皆可忽畧而不省有司徒具其文而禮因以廢矣故余以為一貫之語雖唯而不悟也今世度數折旋既已無復可考則曾子之告孟敬子者宜若可以遵用然必有致於中有格於外使人情物理不相踰越而後其道庶幾可存若他無所用力而惟三者之求則厚者以株守為固而薄者以揵出為偽矣按臧孫紇為季氏廢公鉏坐以出亡仲尼謂作不順施不恕叔孫婼言婼有家禍殺適立庶誅竪牛與季氏訟仲尼稱其不勞不可能皆有本末後世可以考信檀弓記公儀仲子舍孫立子乃不叙所由又記子游問孔子孔子亦直云立孫而已辭簡而事畧經傳體雜義類不通恐不足以詔後學也季武子夷人之墓以成寢而許其葬又許其哭由前則不應有後由後則不應有前殆若狂者使其妄聞自不當記就其果然亦不足記合葬非古也以人墓為宫古乎徒欲記古不墳而謂孔子自稱為東西南北之人将教人以捨其國而游豈聖人之言乎士而懐居不足以為士矣謂不懐居則可謂東西南北之人則不可無有司而用門人可也徒欲記古不脩墓甫窆而崩門人之慢且不材至此乎先反而虞禮也知墓崩而不言其徃視可乎疑此亦非也喪服四制苴壊不補墳墓不培若雨甚至漂流棺槨不問豈通義哉左氏載子路之死甚詳孔子聞衞亂曰噫柴也其来由也其死矣如是足矣言醢之無義言遂命覆醢尤無義申生之死或以為檀弓叙載簡嚴非左氏可及此余所不曉只如檀弓之言何足以周事情立世教也朝祥而暮歌野人之事也子路何必笑孔子何必辯又謂踰月則其善亦非也易簀一義極當商量據本曾子之學堅定明篤雖神已離形而不變異死生若一致然且改過甚勇以正為終是後學鑒照凖程處也然君子所貴乎道者燭分審義緝熈積實雖不以此身為諱過之地亦不止一生為改過之用季氏之行於魯國垂三百年自孔子事之敢亡而不敢絶也彼之有賜未知應受與否若童子以為大夫之簀而曾子不能知若童子以為不冝居而曾子居之至死曾子之智曾童子之不如則奚取於學若曾子疾不暇察而曾元以非所當養者養其親使殁不得其正則奚取於子然則師友分義之論未定緝熈積實之功不加而以隅坐過人之識為足以斷曾子将亡之是非必有傳聞之誤後學未可從也能執干戈衞社稷而不生可以勿殤畏厭溺而死不可以勿弔曾子執親之喪水漿不入於口者七日自言之乎曾子方以朋友之義吊子夏之喪明俄奮而名之數其三罪皆人理之所不容者其暴至此乎夢奠之言是時孔子七十三嵗猶歎天下之莫已宗耶公羊又以為反袂拭面涕泣沾袍蓋陋儒多若是矣問喪亦大節自曾子遽言喪欲速貧有子又言夫子失魯司㓂将之荆蓋先之以子夏又申之以冉有鄙俚若此蓋未嘗接聞魯人師友辯論也孟子謂三月無君則吊而以不待父母媒妁為賤者之所為以此處喪其庶幾蟜固不知何如人乃能以齊衰問疾於季氏記者要當有警於後世雖然國有命役非君賜則無以喪服得免而士居喪則亦無以問疾於人徃嵗與楊氏遇於執政私第服大功服坐客皆怪訝楊問余此義且言執政私第又非公門比衰功雖於今法不廢從政然若以公事召服而徃可也非公事而為謁而曰不捨服以為禮無怪乎人之不己安也左氏於韓之戰載秦穆公多雅言則愛義逺利之語宜若有之然夷吾重耳入國先後各有死黨卒相殘戮而後快則天下固皆知之而此篇所記則似文公君臣真無意於得晉者於事殊為闊逺或者以禹益伊尹皆簒弑與今言重耳能遜國畧同蓋毁譽過實常出於儒生之浮文持是以入徳難矣惟祭祀之禮主人自盡其敬焉爾豈知神之所饗今世亦多有此論虞練之主其親猶在而未神也其為神矣祭必尸以安之尸之所饗神之所饗也詩曰神具醉止皇尸載起皷鐘送尸神保聿歸焉有饗而不知者乎使其果然則主人有時而不敬矣按書稱克明俊徳以親九族九族既睦平章百姓百姓昭明恊和萬邦黎民於變時雍濬哲文明温恭允塞𤣥徳升聞乃命以位后克艱厥后臣克艱厥臣政乃乂黎民敏徳皆先自身始而施之於民然後其民以和報之周豐乃言墟墓之間未施哀於民而民哀社稷宗廟之中未施敬於民而民敬夫墟墓則固己施哀而社稷宗廟則因己施敬不啻諄諄然矣豈為末哉書又稱克寛克仁彰信兆民而諸誥言文王之徳為尤詳然則豐謂無忠信誠慤之心以涖之可乎聖人之道一也謂虞夏有餘而殷周不足俗儒之淺説也余記陸氏兄弟從朱吕氏於鵝湖寺爭此甚切其詩云墟墓生哀宗廟欽斯人千古最明心大抵有基方作室未聞無址可成岑噫徇末以病本而自謂知本不明乎徳而欲議徳誤後生深矣虞人致百祀之木可以為棺槨者斬之不至者廢其祀刎其人此語甚害理既稱即位而已為椑安得既崩而方斬木所斬不已多乎不然所廢幾祀所刎幾人其禍若是烈耶仲尼之畜狗死使子貢埋以席孔子雖貧何至於無蓋而師友所講亦何必在狗馬之間學者因是謂聖人之道微賤不遺而傳襲訛謬至使人主近臣而以狗馬自比乞憐惟蓋之餘希恩簮履之敝孟子所謂妾婦之道又其下者蓋從昔鄙夫皆若是也君在諸臣之家非其所從而欲以客弔不辟非禮也閽人為君在弗内禮也入廏脩容以外飾求勝非禮也使卿大夫皆辟位禮歟使君降等揖己非禮也且容當何脩飾當何盡進趍不當偽衣冠不當改也子貢方人曾子三省非如戰國之士卑屈其君以為名者其非二子所為決也按論語原壌夷俟孔子繩之甚嚴使其喪母而歌乃為弗聞而過之可乎且壌何至逆人理若此亦傳者過也曾子既以七日不入水漿自言而樂正子春又以五日不食為悔師弟子之學矯情而求名若此使其果然則禮之壊必自是始其不然也世之學者於檀弓有三好古明變推三代有虞一也本其義理與中庸大學相出入二也習於文詞謂他書筆墨皆不足進三也以余考之則多妄意於古初膚率於義理而謇縮於文詞後有君子必能辨之王制一篇當時蓋欲施用而博士諸生考論之所成異於各以見聞記録者故比諸篇頗為斟酌亦有次第然孔子時周衰而未亡聖人之力尚能合一以接唐虞夏殷之統故其所述皆三代之舊至孟子時六國並雄則周已亡但未滅耳其所欲行於當世與孔子已稍異不惟孟子雖孔子復出亦不得同矣秦滅漢興酈食其請立六國後而張良以為非及文帝初賈誼所言者正朔官名色上黄數用五而已中年誼已死新垣平得用始有作王制封禪巡狩之説夫堯舜三代以禮譲守天下而類禋封禪巡狩皆為實治漢以兵取以力守而儒生學士欲以虚文追還帝王之道耶然則治後世之天下而求無失於古人之意蓋必有説非區區陳迹所能干也以五帝五神五行十日分配四時不知何所起蓋吕不韋之妄也土無所見而附於夏秋之中尤無義夫天地之功用見於五行微而性命粗而事物無所不在若四時各得其一機緘不運塊然窮獨何名造化其謬無足言者而䜟緯隂陽轉相資佐異説滋章道降政龎因以下及矣以曾子問禮及雜記諸禮與儀禮考之益知其所謂籩豆之事則有司存者蓋曾子之所厭而不講也雖然籩豆數也數所以出義也古稱孔子與其徒未嘗不習禮雖逆旅茇舍猶不忘是時禮文猶班班然行於上下知者将棄之矣貫而為一孔氏之所守也執精畧粗得末失本皆其所懼也又據禮運稱仲尼言偃所論與孔子在時言禮全不合孔子之言甚簡直下不立冐子治亂只在目前何嘗有道行道隱之别大同小康之辨蓋後學不能以身行禮浮辭汎説而已犂彌謂孔丘知禮而無勇請以兵刼之末俗之病禮者皆如此又曰魯人之臯數年不覺使我髙蹈唯其儒書以為二國憂後世之病儒者皆如此要是禮一日不行即一日壊惟義數之在書册者尚可傳義禮之在人心者猶不泯故顔曾欲反而求之於心子貢游夏之徒欲求之於書孔子皆指其偏失處至明至切然終以分散而不可復合者禮已壊而不行行之又無所因故也鄭𤣥解經禮三百謂周官三百六十曲禮三千謂今禮𤣥所謂今禮者指言禮之時非漢時也然則周官安得皆以經禮言而著禮器者安得别稱今禮經禮者五禮之條目也曲禮者條目中之曲折也孔子嘗言誦詩三百使於四方不能專對雖多亦奚以為而此篇乃稱誦詩三百不足以一獻孔子告伯魚學詩與禮各有時其學各有業責專對於詩則可責一獻於詩非所責也後人失孔子之意又以傳聞言之在記禮中如此類極多學者不能察誦説既深自成障礙於道難矣禮樂刑政其極一也所以同民心而出治道也按孔子言安上治民莫善於禮移風易俗莫善於樂初不及政刑然言道之以政齊之以刑民免而無耻則前於孔子固已純任政刑矣今以禮樂刑政融㑹並稱而謂其不二則論治之淺莫甚於此其舍禮樂不用而以刑政為極功儒者之過也人生而靜天之性也感於物而動性之欲也但不生耳生即動何有於靜以性為靜以物為欲尊性而賤欲相去幾何大學言致知在格物物格而後知至而此言物至知知然後好惡形焉好惡無節於内知誘於外不能反躬天理滅矣則是知與物均為不善此躬何自而反天理烏得而存甚矣儒者忲於言道而不知道之所從也宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必死死必歸土此之謂鬼骨肉斃于下陰為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也因物之精制為之極明命鬼神以為黔首則百衆以治萬民以服聖人以為未足也築為宫室設為宗祧以别親疏逺近教民反古復始不忘其所由生也衆之服自此故聽且速也按子路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死學者之記以為孔子絶神怪而不言然周官宗伯掌建天神人鬼地􅅘之禮以佐王建保邦國大司樂以樂九變八變致神示而禮之蓋自有天地即有人與鬼神人與鬼神異道各不相知而為國家者必尊事之以自建保子路欲以一己之智慮求鬼神死生之説窮其所從以為辨而已冝孔子之不告也而此篇乃載宰我孔子之問答尤為誕淺而不經且生生而死死人道相續冥冥而昭昭神道常存焉有待人生之氣而後為神待人死之魄而後為鬼者乎骨肉為土氣為昭明使神道之狹果如此豈足以流通於無窮乎古之為國家者凡天地山川之神靈崇祀嚴祭罔敢怠忽若祖禰宗廟特以子孫相為依慿然其享之有數立之有紀近則死道未純逺則恩所不及固與世之神明有間矣烏得雜而並稱哉儒者見理不明而好言其不可知者季札稱骨肉歸復于土魂氣無所不之謂不以反葬勞人也子産稱用物精多則魂魄强故有精爽以至於神明不謂神明待魂魄而後為也禮運稱體魄則降知氣在上謂復在上葬在下也猶不直以魂魄為神鬼而易傳稱精氣為物遊魂為變是故知鬼神之情状則直以魂魄為鬼神而此篇骨肉斃于下陰為野土其氣發揚於上為昭明焄蒿悽愴此百物之精神之著也因物之精制為之極明命鬼神以為黔首則又因前人之言而轉失之則鬼神遂止於魂魄而鬼神之常道隱矣孔子既於易言鬼神害盈而福謙明示天下以人神感通之理而答子路以未能事人焉能事鬼未知生焉知死則人道立而鬼神可安人職盡而生死為一非故絶而不言也觀經解所言當時讀書之人甚陋已如此固難以責後人也然則周召既亡大道釐析六藝之文惟孔子能盡得其意使上世聖賢之統可合自子思孟子猶有所憾則如經解所言亦其常情但後學縁此墮處不少爾師爾過而商也不及子産衆人之毋能食之不能教語全没交涉但令子産受抑爾又言敢問将何以為此中愈疎闊矣按詩稱禮樂未嘗不兼玉帛鐘皷孔子言禮云禮云玉帛云乎哉樂云樂云鐘皷云乎哉未有後語其意則嘆當時之禮樂具文而實不至爾然禮非玉帛所云而終不可以離玉帛樂非鐘皷所云而終不可以捨鐘皷也仲尼燕居乃以几筵升降酌獻酧酢不必謂之禮而以言履之為禮是則離玉帛而言禮矣以綴兆羽籥鐘皷不必謂之樂而以行而樂之為樂是則捨鐘皷而言樂矣按孔子稱先行其言而後從之則言而履之未知其果能行也言與行如形影不可相違也離言以為履離行以為樂言與行不相待而寄之以禮樂之虚名不惟禮樂無所據而言行先失其統然後世之言禮樂者未嘗不出於此則天下遂無復禮樂矣孔子閒居又有五至三無五起之論按孔子子張問士何如斯可以從政矣子曰尊五美屏四惡則可以從政矣論治立標目莫切於此矣若五至三無五起則浮立而無用又以樂為無聲禮為無體喪為無服既不自明其所言而所稱於詩亦非也古人之於道一二言而止禮至禮運禮器樂記祭法祭義仲尼燕居孔子閒居坊記諸篇鋪叙始末多踰數百千言然使言而無間則讀者易知知者易行行者不倍矣如其有間而强牽合之黒白易位以無為有則所誤大矣天命之謂性率性之謂道脩道之謂教道也者不可須㬰離也可離非道也此章為近世言性命之總㑹按書稱惟皇上帝降衷于下民即天命之謂性也然可以言降𠂻而不可以言天命蓋物與人生於天地之間同謂之命若降𠂻則人固獨得之矣降命而人獨受則遺物與物同受命則物何以不能率而人能率之哉蓋人之所受者𠂻而非止於命也書又稱若有恒性即率性之謂道也然可以言若有恒性而不可以言率性蓋已受其𠂻矣故能得其當然者若而有恒則可以為性若止受於命不可知其當然也而以意之所謂當然者率之又加道焉則道離於性而非率也書又稱克綏厥猷惟后即脩道之謂教也然可以言綏而不可以言脩蓋民若其恒性而君能綏之無加損焉爾脩則有所損益而道非其真道非其真則教者强民以從已矣且古人言道順而下之率性之謂道是逆而上之也夫性與道合可也率而謂之道則以道合性将各徇乎人之所安而大公至正之路不得而共由矣孔子曰誰能出不由户何莫由斯道也夫由戸而出雖無目者亦知之况有目乎以此喻道可謂明而切矣而此章曰道也者不可須臾離可離非道也人自户而出則非其户有不出者矣今曰不可須臾離則是無徃而非户也無徃而非戸則不可須臾離者有時而離之矣将以明道而反蔽之必自此言始故君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微故君子慎其獨也按子張問行孔子曰立則見其參於前也在輿則見其倚於衡也夫然後行夫以為我之所必見則參前倚衡微孰甚焉以為人之所不見則不睹不聞著孰甚焉其義互相發明記禮中與聖人不抵牾如此類者甚少雖中庸大學亦不過三四爾但繫於天命一章之後功用牽綴不能𢎞通學者若專一致力於此以慎獨為入徳之方則雖未至於道而忠信篤敬所立堅定矣喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也致中和天地位焉萬物育焉按書稱人心惟危道心惟微惟精惟一允執厥中道之統紀體用卓然百聖所同而此章顯示開明尤為精的蓋於未發之際能見其未發則道心可以常存而不微於将發之際能使其發而皆中節則人心可以常行而不危不微不危則中和之道致於我而天地萬物之理遂於彼矣自舜禹孔顔相授最切其後惟此言能繼之中庸之書過是不外求矣然患學者涵玩未熟提持未審自私其説以近為逺而天下之人不得共由之非其言之過而不知言者之過也此道常在無階級之異無聖狂賢不肖之殊皆具於此章但不加察爾子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也人莫不飲食鮮能知味也按孔子稱師也過商也不及然則師愈歟曰過猶不及夫師之過商之不及皆知者賢者也其有過不及者質之偏學之不能化也若夫愚不肖則安取此道之不明與不行豈愚不肖者致之哉此害猶小不過涉道寡淺而已今将號於天下曰知者過愚者不及是以道不行然則欲道之行必處智愚之間矣賢者過不肖者不及是以道不明然則欲道之明必處賢不肖之間矣且任道者賢與智之責也安其質而流於偏故道廢盡其性而歸於中故道興不肖者何為哉合二者而並言使賢智聽役於愚不肖而其害大矣飲食知味自為一章猶足以教世也若繫此章之下是以賢智愚不肖同為不知味者害尤大矣此中庸之賊非所以訓也仲尼曰君子中庸小人反中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也子曰中庸其至矣乎民鮮能久矣詳孔子稱中庸至徳民鮮能之意凡當時所謂君子蓋不以中庸許之矣而此章乃言君子中庸小人反中庸則是凡當時所謂君子者舉皆以中庸許之而非鮮能也夫許君子以中庸而時中濫於善猶可也小人為惡何所不至而必以反中庸言之亦将濫於惡乎且其言至於天下可均爵禄可辭白刃可蹈中庸不可能若是言則凡所謂君子者固亦不以中庸許之矣天下将輕棄難能之中庸而樂從易能之無忌憚者此言為之也雖然孔子不許其當時君子之中庸何也孔子於善惡是非之反固皆以君子小人對稱之中庸而獨無對者其徳至矣聖人盡心焉爾嗚呼儒者失孔子之意不擇而易言之後世學者又過信之輕重失倫虚實無統而中庸之道卒無所明矣漢人雖稱中庸子思所著今以書考之疑不專出子思也舜好問而好察邇言隱惡而揚善執其兩端用其中於民按書稱舜告禹人心惟危道心惟微惟精惟一允執厥中無稽之言勿聽弗詢之謀勿庸此章因其言而失之且使兩端執而後可用中則洪範所謂建皇極者豈其銖舉而寸量之哉孔子於堯舜獨賛君道至記禮及孟子始與學者同辭疑亦非孔氏本指也君子素其位而行不願乎其外素貧賤行乎貧賤可也素富貴行乎富貴不可也在下位不援上可也在上位止於不陵下未盡其義也論語稱君子無所爭必也射乎揖譲而升下而飲其爭也君子孟子稱仁者如射射者正己而後發發而不中不怨勝己者反求諸己而已矣中庸乃言射有似乎君子失諸正鵠反求諸其身雖若不異然以人為主則有得於物以物為主則無得於人故君子可以似射而射不可以似君子若果子思之言恐其義亦未精也九經雖與八統畧同然周召知其所以一而用之於八故為平治中庸未知其所以一而用之於九則為弱政矣孔子自言學不厭教不倦發憤忘食樂以忘憂中庸自祖述堯舜至故曰配天其言宏大崇尚大抵賛頌之極辭也後世賛頌聖人自無所害然近世乃以聖人之學為當如此却無下手處孔子言能近取譬最當商量孔子雖曰中庸之為徳其至矣乎民鮮能久矣及其與顔閔之徒問荅講習乃無所考又庸字古稱弗詢之謀勿庸自我五禮有庸哉生生自庸庸庸祗祗民功曰庸左氏無辭有庸孟子利之而弗庸喪服四制此喪之中庸大抵為用為利為實為常之義周官以樂徳教國子中和祗庸孝友然則中庸之為徳豈其此類也歟古人之教徳必先立其義教成則徳成矣故曰直而温寛而栗剛而無虐簡而無傲教立於此而徳成於彼非以義理為空言也子思之疏釋曰君子之中庸也君子而時中又曰擇乎中庸而不能期月守也又曰回之為人也擇乎中庸又曰中庸不可能也又曰庸徳之行庸言之謹夫以為時中則不待庸也以為庸徳庸行則不待中也然則中庸之為徳果一乎果二乎後世無所據執而以意言之雖服膺拳拳不敢失墜而以義理為空言之患未忘也此亦學者之所當思也治天下國家唐虞三代皆一體也脩身以致治堯舜禹湯文武皆一道周豐表記所言乃有髙下後世相因遂為忠質文之論漢以後循環救敝之説盛行於世譬如五穀絮帛飢寒者不能衣食方且坐而評量美惡之寧其身之死亡而不悟亦足悲也按堯典已稱恊和萬邦舜典萬邦黎獻傳説已稱王人求多聞時惟建事學于古訓乃有獲然則堯舜禹湯之前道固常行而學固常明也鴻荒太古上徳下徳老荘之徒始為放言而後世亦有風氣始開先天後天十三卦開物成務之論夫所貴乎儒者得古人之意續統紀以貽後人奈何效諸子隱士轉相增飾重為斯道蔽乎雖孔子盡力補綴由周以前尚多缺遺然則堯舜以前無孔子其為鴻荒太古何足怪也天下有道則行有枝葉天下無道則辭有枝葉對㸔雖甚好然孔子稱斯民也三代之所以直道而行也春秋戰國以來言之害道者固多而行之害義者亦不少枝葉之行恐亦後學以意言之更須細考按經傳諸書往往因事該理多前後㫁絶或彼此不相顧而大學自心意及身發明功用至於國家天下貫穿通徹本末全具故程氏指為學者趨詣簡捷之地近世講習尤詳其間極有當論堯典克明俊徳而此篇以為自明其徳其脩身齊家治國平天下之條目略皆依倣而云也然此篇以致知格物為大學之要在誠意正心之先最合審辨樂記言知誘於外好惡無節於内物至而人化物知與物皆天理之害也余固以為非此篇言誠意必先致知則知者心意之師非害也若是則物宜何從以為物欲而害道宜格而絶之耶以為物備而助道宜格而通之耶然則物之是非固未可定而雖為大學之書者亦不能明也程氏言格物者窮理也按此篇心未正當正意未誠當誠知未至當致而君臣父子之道各有所止是亦入徳之門爾未至於能窮理也若窮盡物理矩矱不踰天下國家之道已自無復遺藴安得意未誠心未正知未至者而先能之詩曰民之靡盈誰夙知而莫成疑程氏之言亦非也若以為未能窮理則未正之心未誠之意未致之知安能求之又非也然所以若是者正謂為大學之書者自不能明故疑誤後學爾以此知趍詣簡捷之地未求而徒易惑也按舜人心惟危道心惟微孔子非禮勿視非禮勿聽非禮勿言非禮勿動皆不論有物無物子思喜怒哀樂之未發非無物發而皆中節非有物三章真學者趍詣簡捷之地也其他未有繼者也今欲以大學之語繼之當由致知為始更不論知以上有物無物物為是物為非格為絶格為通也若是則所知靈悟心意端一雖未至於趍詣簡捷之地而身與天下國家之理貫串通徹於此諸書之言前後斷絶彼此不相顧者功用之相去逺矣坐一物字或絶或通自知不審意迷心誤而身與國家天下之理滯窒而不閎大為學者之害非余所敢從也所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙自謙字誤不知本書當用何字大學之端莫先於致知所知既審則意之所形與心之所發直至於善不待好惡為佐使矣正心亦然身有所忿懥身當作心字孟子言君子所性仁義禮智根於心其生色也晬然見於面盎於背施於四體不言而喻不更開截分段蓋根心生色則本厚枝葉自然無不備矣若致知之道既已卓然而猶懼意之有欺心之有妄顧步畏影怵􅅥不暇而天下國家之理孰從而明之是必其知未致而然也故知致而意誠者不期誠而誠也不曰某道能誠之也意誠而心正者不期正而正也不曰某道能正之也心誠求之雖不中不逺矣未有學養子而後嫁者也此言至切施於當事者對病之神藥照形之明鏡也自不以首尾次第論知必待齊家治國而後用之則有所繫縳效反不得專矣所謂大學者以其學而大成異於小學處可以脩身齊家出可以治國平天下也然其書開截箋解彼此不相顧而貫串通徹之義終以不明學者逐逐焉章分句析隨文為説名為習大學而未離於小學此其可惜者也習學記言卷八
