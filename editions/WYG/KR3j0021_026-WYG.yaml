body:
  text: 習學記言卷二十六宋葉適撰後漢書列傳黄叔度為後世顔子其論已成不可改東漢人材本有程品繩墨在身如影答形汙潔判然至憲能不踰矩而融明深厚無異人之操此其所以能伏一世而陳蕃郭泰之流自以為不及也然觀孔子所以許顔子者皆言其學不專以質曽子亦曰以能問於不能以多問於寡有若無實若虚犯而不校昔者吾友嘗徔事於斯矣漢人不知學而叔度以質為道遂使老莊之説與孔顔並行後世學者方步趨以求之重道而輕學未見其得所徔也范曄序閔仲叔荀恁魏桓周燮黄憲徐穉姜肱申屠蟠皆必於退者也以其事考之則桓得退之義蟠得退之時方漢人以名相髙故避名為難名不可避而退之所得多於進矣然當時知此者甚少兩漢之衰大臣與小人爭不勝而死亡者蕭望之王商王嘉袁安楊震李固陳蕃七人皆其國之所以存亡也孔子曰天子有爭臣七人雖無道不失其天下又曰所謂大臣者以道事君不可則止又曰無求生以害仁有殺身以成仁又曰民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者參以數端大節可見葢殺身以存國與殺身以亡國極當審處若人主聞此惕然知懼則雖無道者可以就其有道矣至於履危蹈難其職當死則更無改移又不與此並論王暢疾惡有發屋伐樹堙井夷竈之事其功曹張敞以為懇懇用刑不如行恩孶孶求姦未若禮賢暢徔之更崇寛政教化遂行東漢中世以後名士之患大率如此又不知當時所謂豪强者何如而疾之已甚若以今世所見則極有可議葢以善養惡自是義理中偏側之累故孟子亦謂以善養人然後能服天下孔孟在春秋戰國其亂豈不愈於順桓之世然善既不可屈於惡又不能勝惡其道只得出此而東漢儒者欲以不平之意加於敞法之上求以勝天下之不肖宜其屢發而屢挫也悲夫永初中羌胡殘破并凉鄧隲欲棄凉救并㑹公卿集議隲謂譬若衣敗壊以一相補猶有所完若不如此將兩無所保議者咸同虞詡説李脩辟凉土豪傑為掾屬拜吏子弟為郎議與隲異而隲以此怨詡隲鄧禹子孫約畏亷儉辟用賢俊亦有可稱而既為外戚所見卑下故其謀謨於上者如此所謂衣服附在吾身我知而慎之真棟撓之凶斗筲之算也漢業由此遂隳大臣為國家盛衰其效豈不著明乎後崔烈欲棄凉州傅燮論亦同圖䜟事至張衡論始定桓譚雖極言䜟之非經而𫝊不載其所以極言之説班固父子以折􅇆古今自任而於䜟特多所附合非其智不足以知之也葢以時主好尚方盛遂不敢攖其鋒亦理勢之常至於雷同趨和比之經典則希世太甚矣張衡適值其衰故得展布言之然後世亦有當其已衰而猶諱避不敢論者此又在衡之下也董卓族滅而蔡邕不智大抵事機之際厚薄淺深便有榮悴自春秋時已然而况於不知者乎邕之取死自其宜也然王允戇愎如此觀其規為直以誅卓之外更無一事乃欲於㓜主賊臣之時任扶顛持危之責國雖欲不亡不可得矣左雄言漢至今三百餘載下飾其詐上肆其殘謂殺害不辜為威風聚斂整辦為賢能治已安民為劣弱奉法循理為不法末世風俗漸靡往往如此自雄在納言明逹政體脩察選法崇尚學校順桓以後多知名士雄之力也論者不考實但徇崔寔軰私意偏説為後世言治之害外彊中乾與食烏喙何異議褒梁冀黄瓊比之鄧禹霍光胡廣謂冝如周公當時稱廣者謂雖無謇諤之風屢有補闕之益如此等論議以為有補闕之益亦未可也夫正議而不能力爭故謂之無謇諤若自初回邪無復齊限則無可言矣瓊臨死之疏三代何逺如周舉黄瓊父子六二之動直以方矣范曄左雄論序順桓人材當詳看曄謂使時獲用武宣之軌豈其逺而武宣何足道哉未可並語也陳實以善下人為一世所伏而許劭以為太丘道廣廣則難周劭之言葢未可輕非故為裁量者也昔顔淵願無伐善無施勞若實隠身自約終不以世利為己益故可以蹈其行堯舜之道必將有取焉今夫燭已不盡照物不哲而借實之美以行於天下者未見其成徳也李固斟酌義理熟於世故深識根本始末順正無疎婞直前之氣然而不幸再當立君之際權不在已而聼命於姦兇欲以正道回之率公議以塞其衝此天下至危之舉萬無一成固與杜喬既以身嘗禍而漢由此亡此天命非人謀乃可痛哭流涕也學者或輕論固事幾於不識罪福也悲夫悲夫若固所謀任伊周之道而不得成伊周之功者歟吳祐延篤進不求名自行其志凡人於應物之材自當無不周徧至若所願於世者能澹薄而厚以自處則寡怨而逺罪矣如祐與篤未嘗不正其言行而卒免於亂世率是道也恃伐而求多計施而望報其全鮮矣傳載篤上李文徳書自當時傳誦葢士之為人者常多而為己者少故也與馬援所稱馬少游又不同學者能不以有用求必用庶幾云爾張奐見賣王甫已而病之山西士人土性固然歟段熲殺東羌幾盡以此為靖難之術固前代所無有至其言先零作難趙充國徙令居内地常亂邉馬援遷之三輔始服終叛至今為梗則為之有概於心然則人之慮患不在數百年之後者不可以處事葢始以為徳而不知其種性終不可合既而屢服屢叛馴弭無䇿而熲之術窮矣以周人化商猶厯三紀而况於羌乎今世學者論陳蕃只舉後一節更不記以前事有安社稷臣者社稷是為有事君人者容悦是為不愆不忘率由舊章臣不如太常胡廣齊七政訓王典臣不如議郎王暢聰明亮逹文武兼姿臣不如弛刑徒李膺若受爵不讓掩面就之使皇天震怒災流下民於臣之身亦何所寄惟陛下哀臣朽老戒之在得觀其正己正物終始以天下之重自任厯數二漢自李固之外更無人也然既有竇后父子天下在掌握自古得時未有如此却是蕃自蹙廹壊之哀哉夫以蕃終身自治尚不做得後一節茍不如蕃者豈復能有為事功難易人材品目真未易言有志於古人者其可不深淵薄冰日慎一日乎王允氣驕量狹慮挫謀乖前後麄魯非一事最不曉者臨死猶努力謝闗東諸公彼謂起兵誅卓者皆忠臣善類耶卓固當族若族卓而卒繼以亂如脱陷胷之匕首而飲腐腸之鴆毒爾何所損益允以為當是時天下所患者唯一董卓而已乎可謂愚矣黨錮之禍雖曰宦竪暴横桓靈昏虐然所以致此實由太學葢是時諸生三萬餘人矣唐虞三代之為學其君皆聖賢以身所行與士相長取材任官又與相治後世不然但立表置舍以存其名如賈誼董仲舒之流尚不知人主當自化而徒欲立學以化人如武宣固不足預此獨明帝始終能以學為重然褊察無𢎞裕之益其意謂不遷怒不貳過惟用之諸生而已此自漢以來知勸學而不知明義之過也况翟輔左雄止要葢千百間好屋使四方游士自來自去於人主好尚國家教養了無交涉師門徒者踵陋習希辟召者養虚聲賢否相䝉名實相冐激成大難皆太學為之及靈帝末年更為鴻都學以詞賦小技掩葢經術不逞趨利者爭從之士心益蠧而漢亡矣後世不深考歸咎於士大夫不知羣聚天下學者使之極盛而人主庸騃視為贅疣身外之物其勢固必至此齊語謂令士羣萃而州處故士之子恒為士詩曰攸介攸止烝我髦士人材何常而必欲羣萃州處之固余以為非管仲語若人主不自為學徒設學以教人欣厭不同忿心欻起小則為然明之毁大必為東漢之禁矣李膺一時士子所宗而指趣無聞但有荀君清識難尚鍾君至徳可師二語而已若魏晉以還則無可言矣亦史家之陋也至其他書不存無以參考豈不惜哉孔子謂泄冶民之多辟無自立辟然陳蔡之難師弟子去死如一髪出處之際聖賢難之如膺言中倫行中慮而能稍自降辱以免亂世意者或庶幾乎郭泰符融皆定聲名於一日東漢尚名之俗至是而極然至於久而不跲則固有其實也史稱李膺每見融輒絶他賓客聽其言論融幅巾奮褏談辭如雲膺每捧手歎息不知所道何語使人想見而不得殆欲飛動豈亦洙泗之流裔田子方段干木之後復有此耶許子將鄙曹操不肯為用而荀彧乃以其可存匡正遂託身焉彧雖有材謀然與劭相去何逺也劭之髙亮雅逹漢人僅以一二數光武亦能清言使劭生其時未知有所遇否竇武經生儒者為后父執朝權天下善士無非腹心萬世一時雖伊尹周公何以加此若雍容坐鎮何事不成雖還東漢於三代可也惜乎漢人忿毒宦官深久只有誅殺一路更無他門陳蕃以蕭望之李固為前鑒欲以殺止殺朝不及夕而受禍之酷乃更過之豈其制變之術不素講耶鄭太號有才畧其勸何進無召董卓是也至於用袁紹以發山東之謀使卓懼而西遷則何其明於前而暗於後豈與紹素厚且以其世胄所歸遂不悟其能為亂乎然扶興者易為策救亡者難為謀事之初基斷以獨智可矣及其崩壊扶左而失右東就而西傾葢未易工也孔融髙懐逸度與姦賊詭詐之人不並立自無可言然王莽董卓曹操與前世亂臣賊子差不同若􅆇文仲晏子孔子處廢興之際葢有成法未知融何所本其進不能持危而但足以殺身事已决矣儻以退免乎任意而行明墮禍機可悲也夫荀彧既佐曹操成霸業而復為漢死節若以匡佐為急則聽漢之自亡可也知不可廢漢而授操以柄可乎兩無所據以比管仲則非倫方之宗魯僅有成爾或謂才若張良道似伯夷伯夷中固無張良亦豈易擬此論恐誤學者皇甫嵩功髙一世處之若無為董卓所擠不敢愛死可謂恭上命盡臣節矣閻忠之説何足以介其慮乎世以郭子儀為難視此殊不足道漢末所置牧伯無不相延為大賊獨劉虞一人力守忠欵然仁而不智自毁翰垣宜漢室之遂亡也王景修汴渠徔滎陽東至千乗海口千餘里鑿山阜破砥磧直截溝澗防遏衝要疎决壅積十里一水門更相洄注無復潰漏自此終東漢不言有河患惟晉志稱河泛數千里乃桓帝永興初不言壊决也按司馬遷悲瓠子之歌作河渠書班固因之為溝洫志載王延世竹落及賈讓三策觀景成功知西京立事苟且不及後漢逺矣固復不記景能盡智備法沉慮獨成故其美掩鬱𫝊者不章然則遷固二史之華不如後漢書之實也郅都雖亷直而助殺臨江王故司馬遷以酷吏載之董宣以湖陽公主奴事激悟光武知天下不與白衣同有補治道多矣陽球始謝司𨽻即誅王甫遂報陳竇之怨自請一月令豺狼梟鴟各服其辜其壯烈如此豈應入酷吏𫝊也以球事考之漢世人臣茍得事柄無問髙卑專殺立斷以為常俗如蕃武及一時名士養懦蓄疑遲留不决自陷大禍曽不如一陽球軰也或者尚尤其猖狂寡慮殆讀漢事不詳爾呂强語可記者實願陛下損改既謬從此一止易曰悦以使民民忘其勞説以犯難民忘其死儲君副主宜諷誦斯言南面當國宜履行其事天下之財莫不生之隂陽歸之陛下豈有公私夫立言無顯過之咎明鏡無見玼之尤如惡立言以記過則不當學也不欲明鏡之見玼則不當照也果强所自筆則巷伯孟子立下風矣又舊典選舉委任三府若無可察然後付之尚書今但任尚書或復勅用乃見於强疏或謂如强與張承業人主豈可兾一二於千萬以徼必亡之禍此甚不然强在宦官中出類拔萃正不見容竟以讒死但可哀爾始皇漢宣雖英主至於簡棄賢哲任用閹􅆆豈於是間求呂强耶尹敏言臣見前人増損圖書敢不自量竊幸萬一可謂激諫矣而人主不悟盖蔽蠛蠓者不見日月也𫝊載其與班彪親善每相遇輒日旰忘食夜分不寢可以想見二人風致孔僖自訟辨而不憤激而不訐戮辱在前懼不失正與張俊歐刀在前棺絮在後為世所悲者異矣任末奔師喪道死曰必致我尸於師門古人事君以尸將事而事師之嚴至漢始然彼不過章句訓詁而已胡為兢兢於此哉若夫性命道徳其何以處之然則得之深未若守之固也杜篤論都賦於相如揚雄之外别出思致語峻而潔意切而明節短勢險無曼衍之病詞賦之傑班固方之弱矣衆作不能及也兩出淵囿字必誤崔琦禰衡異操同情揚已矜華終以殺身余每讀范式張邵事未嘗不澘然涕墮夫一至之善兩心相求通幽逹明不疾而速又王忳馬及繡被天之於物疎而不失監之在旁其驗如此聖賢論道徳何嘗不兼禍福報應而言然至於所謂小善小行者願使學者無溺焉何也豈以是數數然者為不足以彌滿充塞於其間耶李固駮發兵之議夫交趾九真反而欲以兖豫揚州人赴之不待智者而知其不可用矣然當時士大夫所見皆如此者盖有冦即發兵發近不能勝則發逺乃目前常行之事故也余頃在金陵考按建炎以來守江者皆用民兵鹿角戰船布列口岸分寨而禦敵至江北聲言欲涉我輒棄之而潰敵因以南渡遂至顛覆然前後施行無不如此余始疑昔人但守不定耳亦莫敢捨此策意欲激厲而用之比敵既至則己與之共水險地散心揺幾欲逃去余急别募兵渡江刼寨頗得俘馘而歸城郭問聞捷奏係踵人意始安敵亦北遁而向之民兵鹿角之類盡為無用然其耗動根本已不少矣觀固厯數利害毫髪無遺借箸而籌盖不足道信儒者之英傑也班彪奏酬答北匃奴事宜真西漢文章可接太史公今漢書文體大率類此盖班固所取法也若固所自作質弱而文靡為魏晉先驅失古意矣彪不特文字而策謀深沉明習故事應變有方可施廊廟雖光武漢業已成不以無彪而有所闕然如彪者不得盡其用光武不得無棄才之過也前漢雖有太史令司馬遷以為百年之間遺文古事靡不畢集紬石室金匱自成一家然朝廷之上本無史官可考班固亦不過緝綴所聞為書頼其時天下一家風俗稍質流𫝊不至甚謬要之兩書之不可盡信者亦多矣至後漢始有史官東觀著記前後相承范曄所以能述史於二百年之後由有諸家舊書也然東漢雖有著記而時當風俗之質則不如前漢而所載多溢詞又胡廣蔡邕父子竟不能成書故一代典章終以放失范曄類次齊整用律精深但見識有限體致局弱為可恨耳其序論欲於班固之上増華積靡縷貼綺繡以就篇帙而自謂筆勢縱放實天下之竒作盖宋齊以來文字自應如此不足怪也習學記言卷二十六
