body:
  text: 習學記言卷五十宋葉適撰吕氏文鑑歐陽氏朋黨論舊𫝊謂其能極小人之情状故姦邪忌惡尤深蘇氏為續論欲翦戮元惡而撫用其餘按自古小人害正比而仇君子人主必保䕶愛惜每加擊逐使君子無以自安小人為黨君子不為黨也如養鸚鵡孔鸞猫犬常伺其隙備豫稍不謹摶而食之無救矣孟子言魯穆公無人乎子思之側則不能安子思穆公猶然況舜文王乎此論乃言小人無朋其暫為朋者偽也必君子而後有朋欲人主退小人之偽朋用君子之真朋是則人主真以為有黨而不善退将愈重其蔽而安能解其惑哉且君子固未嘗能去小人安有戮其首惡而不用其餘以滋國患者至引州綽邢蒯為比則是方求免之不暇而預以得志自處蘇氏又過矣始終用元祐自無可憾用慶厯不終乃深可惜耳歐陽氏迫切之論失古人意徒使人悲傷而不足以為據也司馬范氏論鍾律按律止於寸固不能生尺度律異物其用各殊尺又安能生律也凡物度數必由分寸起自杪忽有形之可積十而成毫毫十而釐釐十而分寸尺尋丈皆已具焉乃自然之數也故宫繫於分分不繫於宫黄鍾繫於寸寸不繫於黄鍾也謂度量權衡皆生於鍾而以黍而起分者獨劉歆妄作新説爾古無是也古之制律自分而九之以為宫自寸而九之以為黄鍾樂或未和則反之數術以求於分寸必得其和而後止舜所謂欲聞六律五聲者聞此也今用千二百黍實之管因其所至遂以為律斷取其三以為空徑其說易至是乎此歆之妄作新説誤後世也㮚氏為量量之以為鬴深尺内方尺而圓其外其實一鬴其臋一寸其實一豆其耳三寸其實一升重一鈞聲中黄鍾之宫考工記雖非周官然歆以前書也王莽之量左耳為升右為合龠而重二鈞其說曰起於黄鍾之龠而又謂千二百黍重十二銖亦起於黄鍾之重亦歆之妄作新說誤後世也其他象類諸說怪妄尤甚而儒者信之過矣舜既考律知聲樂成而諧無相奪倫千有餘年之後其器尚存孔子聽之至於忘味豈惟聖人之盛徳亦足以知其制器之精也今司馬范氏不惟古意是求而諓諓焉相與論王莽劉歆之制作終其身而不已豈其徳與器俱有所未至哉蘇氏勸親睦欲復小宗古稱繼禰者為小宗其言不詳夫五世之服已遷而百年之家未散則宗道宜若可續矣必也豫儲其四使迭進而無窮則将不勝其宗而乖争凌犯之患方起葢少年銳於論事未暇深考也古者賦禄制田其權在上貧富貴賤無大踰越而為之宗以維之故長者不傲幼者不侮而和親雍睦之教可行後世崛起自致貧富貴賤各極其欲榮悴異門交相為病於是賢者謝宗以自逺不肖挾長以行私葢鬬鬩之不暇而安能善其俗哉夫宗者貴而賢者也富而義者也非是二者而擁虚器以臨之教令之所不行也故貴而賢富而義則上禮異之命為其宗爵不必親而疎者可畀也田不必子而貧者可共也施舍周惠惟族是與損歌童舞女之奉厚弔死恤孤之㤙族人依倚特為宗主無犯義無干刑相趨於實而不惟其名之徇此今日立宗之要也叙諸論舜禹臯陶辨析名理伊傅周召繼之典誥所載論事之始也至孔孟折衷大義無遺憾矣春秋時管仲晏子子産叔向左氏善為論漢人賈誼司馬遷劉向揚雄班固善為論後千餘年無有及者雖韓愈栁宗元歐陽修王安石曾鞏間起不能髣髴也葢道無偏倚惟精卓簡至者獨造詞必枝葉非衍暢條達者難工此後世所以不逮古人也獨蘇軾用一語立一意架虚行危縱横倐忽數百千言讀者皆如其所欲出推者莫知其所自来雖理有未精而辭之所至莫或過焉葢古今論議之傑也軾自以為如萬斛泉源不擇地而出在平地一日千里無難及其與山石曲折隨物賦形而不可知嗟夫古人豈必有此文而後能有此論哉以文為論自蘇氏始而科舉希世之學爛漫放逸無復實理不可收拾矣劉敞王回好援古義有深逺之思學者更試求之以形勢論天下春秋猶無之葢出於戰國辨士揣摩之學六國初尚擯夷狄秦孝公用商鞅變法致富强未嘗恃關為固也及秦亡而賈誼司馬遷乃罪子嬰不能守險以自安且天下方共起而滅秦就使閉關不出未知可保嵗月否何去非亦伸其說以為章邯李由不知以攻為守而以守為攻曰此兵家之事余觀苻堅既敗亦欲委關東於敵豈非知兵然秦地終不能有也夫形勝必視大勢所歸勢未離則可以攻可以守今雖極揣摩者之論曽不如孔子慎一言而孟子又稱教人以耕桑便能與殷周並興恐亦當細考蘇轍論古之英雄惟漢髙帝不可及英雄二字先秦無有乃流俗所稱也其論北狄言當養兵自重卓然獨立不聽外國之妄求而生吾中國之氣如此數十年間天下摧折之志復壮則契丹非吾所當畏孔子言善人為邦百年可以勝殘去殺或以為太緩孟子言深耕易耨之民可使制梃以撻秦楚之堅甲利兵或以為太速然則安能養兵數十年而後氣可生志可壮耶是氣不生而志不壮也此亦流俗所稱也夫有貴於儒者其所立所識非必髙出流俗要使不墮於流俗而後可以振俗矣孔文仲制䇿視漢不足視唐有餘矣然劉蕡䇿自較前代十數等蘇軾說春秋慶厯嘉祐時文也黄庭堅書義熈豊時文也王安石談經未至悖理然人情不順者盡罷詩賦故也辟雍太學既並設答義者日競於巧破題多用四句相為儷偶隆興初有對易義破題云天地有自然之文聖人法之以為出治之本隂陽有不息之用聖人體之以収必治之功主司大稱賛以為得太平文體擢為第一主司所謂太平則崇觀宣政時也乾道中主司欲革四句對偶之弊答者言聖人不求其臣之徇已故其臣無得而議已遂據上第淳熈初學者厭破題襯貼纎靡頗復釐改答者云以己體民而後尊卑之情通以國觀民而後安危之理顯學官不能奪卒寘首選然設科教學先已雜見春秋傳記其所訓釋猶未能盡合義理之中漢加甚焉今雖以題破分巧拙要未足病視義理當否耳以前三破題言之天地雖有自然之文隂陽雖有不息之用治道之本末或不在此則其言出治於先而必治於後者虚詞也聖人固不求臣之徇已然使其尚有可議固當議之豈以為無得而議乎又無得而議非聖賢事則其悖理甚矣至於以己體民以國觀民雖其辭甚巧而其理不謬則比前作為勝誠使知義理者常為主司學者不得以悖理之文希合於一時雖因今之時文不改自足以得士不然雖屢變其法而學者之趨向亦終不能一豈四句對偶一冐工拙可為損益哉俗有五道不如一道一道不如一冐之語宋祁祖宗配侑議太祖太宗真宗三廟不遷及親祠皆侑仁宗意已定有司即而言之爾按周公郊祀后稷以配天蓋前乎此周人未知所始周公特推崇之也武王雖克殷有天下周公以為徳莫盛於文王故宗祀於明堂以配上帝故孔子曰是以四海之内各以其職來祭夫必原其始而不私其功此周公之所以為孝可為萬世法也祁之議因人主之欲而為典禮可也故其言曰自爾有司不敢輕議又加多焉爾昔漢宣帝尊孝武而夏侯勝不從以為詔書不可用得罪幾死儒生守經有時而中專門之學未可一切以為陋也曾鞏救災議米百萬斛錢五十萬貫爾何至懇迫繁縷如此若大議論又将安出豈其時議者真庸奴耶鞏文雖工然此議及鑑湖序乃文人之累也吕大鈞世守邊郡議言在商時古公以皮幣犬馬珠玉事獯鬻而商王不知在周時晉國拜戎不暇而周室不與三代禦邊之略葢可知已雖非透底之論然既封建諸侯則勢固然矣今既自有其天下不以與人則守邉以衛百姓安得不自任其責徒曰是廣逺而不可守委民命於虎狼縱其摶食乎方周衰不能主令諸侯莫輔猶且伊川為戎荆蠻問鼎今邊不能禦坐視入内地将焉及矣范質戒兒姪詩向敏中留别知己序晏殊中園賦韓琦閲古堂記文彦博晁錯論富弼答陳推官書本朝名輔相飭已立志之方可槩見也王曽既中第或謂状元三場一生喫着不盡王正色拒之以為平生之志不在温飽後生學者𫝊以為口實歐陽修既執政人有賀之者答以惟不思而得與既得而不患失然余病其侵尋於官職矣而吕氏嫌此論太髙余亦不敢竟其說而止大抵自唐中世天下治體為宇文融李林甫王鉷之流剥壊皆盡大變於古後為相如李吉甫裴度李徳裕皆無救弊起廢之略獨一陸贄欲有所為未幾竄死至今數百年終無䇿以振起之賢愚同軌邪正並轍茍免其身而復以其敝遺後人然則雖不思得不患失而卒與庸衆人同歸於温飽者無異以盡民財為能以盡民命為功至其他刀筆毫末之巧拙而夸競不已也嗚呼此有志者之所當深思也劉奕與韓范論岐州中路修山城事以為關中之事所以多失者上輕之而不思下隨之而不言増少而為多積小以成大余嘗嘆天下不幸有倉猝之變起則舉世紛然争思其所不當為為其所不及思以病民盗賊姦雄未至甚害而執事不肖驟殘倐虐上下相驅以百姓為芻狗故其根本不日而蹙亡矣葢事決知其無益而不妄為者乃救敗扶傾之本雖賢智憂國之臣未能行也按程氏答張載論定性動亦定静亦定無将迎無内外當在外時何者為内天地普萬物而無心聖人順萬事而無情擴然而大公物來而順應有為為應迹明覺為自然内外兩忘無事則定定則明喜怒不繫於心而繫於物皆老佛莊列常語也程張攻斥老佛至深然盡用其學而不能知者以易大𫝊語之而又自於易誤解也子思雖漸失古人本統然猶未至此孟子稍萌芽其後儒者則無不然矣且佛老之學所以為不可入周孔聖人之道者葢周孔聖人以建徳為本以勞謙為用故其所立能與天地相終始而吾身之區區不預焉佛老者處身過髙而以徳業為應世其偶可為者則為之所立未毫髪而自夸甚於丘山至其壊敗喪失使中國胥為夷狄安存轉為淪亡而不能救而亦不以為己責也嗟夫未有自坐佛老病處而掲其號曰我固辨佛老以明聖人之道者也陳師道在同時四人中惟詩推敬黄庭堅若文學識尚自視非其輩倫言論未嘗及也所師獨曽鞏至與孔子同稱歐蘇皆不滿也與曽布書頗詳事情擬武舉䇿陳義尤髙誚賈誼無以自容安能容匈奴師道為此語數十年有靖康之禍此非不能容匈奴者所致乃自容而又容匈奴者致之也學欲至之揵而守之迂迂揵同軌則知徳者不貴也識欲覺之先而持之後後先一轍則知務者不許也惜乎師道見理未盡而執志甚堅上不能為王回孫侔下不能為石延年尹洙也因張舜民與石司理書載歐陽氏語文學止於潤身政事可以及物修猶為此言始悟人之窮力苦心於學問文詞者徒欲藻飾華澤其身而已聖賢之事業非所以責之也觀陳師錫答陳瓘書天下不知王安石之罪而尊其聖者皆是也天下安得不亡瓘之所知亦不過蔡京兄弟而已悲夫自古而然仲由不知衛輙揚雄不知王莽蔡邕不知董卓荀彧不知曹操王導不知王敦陷其身名敗其家國者衆矣安得許卲郭泰管寧之流而與之論乎歐陽氏䇿為三代禮樂井田而廢者五似若歎先王之道不得行於後世者其言則雖以三代為是而其意則不以漢唐為非豈特不以為非而直謂唐太宗之治能幾乎三代則三代固不必論矣故其制度紀綱儀物名數皆以唐為是而詳著之以余觀太宗之治曽不能望齊桓之十一也而何三王之可幾哉然則歐陽氏之學非能陋漢唐而復三代葢助漢唐而黜三代者也孔子曰名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足秦漢以来名不正言不順而急於事成故以刑罰持之使民無以措其手足而宛轉於鞭笞金鐵之中則禮樂安得而可興孔子又曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦將又不足夫三代之井田所以必行者謂其能度於禮也後世以貪冒無厭者賦其民則奚以井為而猶諄諄焉議其末乎歐陽氏又疑周禮六官之属五萬餘人不耕而賦何以給之按漢表宰相至佐吏十二萬餘人而千里之地為公田者數十餘萬井此皆淺事何足疑也其言天地萬物之統特綱舉罩論若夫周召道徳性命之要言經治揆物之成蹟詩書所不能備獨周官備之修固未能知也漢武何休何足以較是非而姑謂其祭祀衣服車旗似有可採者則尤淺矣劉敞貴和氏璧左氏楚燕魯侯好以大屈既而悔之椒舉以為齊與晉越欲此乆矣君其備禦三鄰魯侯懼而歸之葢設説者而敞信之其言和氏璧再刖足抱璞而號亦辨士設說也敞又信之遂按為的論矣知自貴而不輕用寳誠貴士之美意然忽寳不用自失股肱無與圖存乃人主之大諱也古人於此未嘗不競兢焉故曰翕受敷施九徳咸事旁招俊乂列于庶位人之好我示我周行子貢曰有美玊於斯韞櫝而藏諸求善賈而沽諸子曰沽之哉沽之哉我待賈者也然則謂和不哀其身而哀其玊以為和罪而吳起韓非非二君之過者偏說也夫敞豈以得於科目者為進退出處之正而遽輕天下士也哉栁開諸文及補亡先生𫝊邵雍諸詩及無名君𫝊雖深淺精粗所造各不同至於尊己陋物呌呼以自譽失古人為學之本意則其病一也且開以藩籬未涉之狂氣安得使人捨其自安之奥室以從我而雍固山林玩世之異迹也人亦胡為因其曠蕩無畛畦之見遂混而從之孔子謂不知而作我無是中庸至徳民鮮能學者審其所處而已曽鞏雜識孫甫狄青事又記余靖髙居簡事大抵於當時所謂善人君子多不與不知其意欲以何為狄青抜自卒伍為執政矣能勝儂智髙適當爾而鞏稱之勤勤且盡排孫沔諸人滕宗諒以過用公使錢為罪朝廷議罰意有輕重調和歸中亦常理也孫甫何遽憂憤至欲去諌列而鞏遂以為能不黨而知過獨於甫是賢乎鞏不附王安石流落外補汲汲自納於人主其詞皆諂而哀及叙漢髙帝十不及神宗以為優劣論非史家體行韓維詞忤上意坐罰金雖非其罪要之鞏文與識皆未達於大道而自許無敵後生随和亦於學有害王冕進珠表吕喬年云本録無有王友𫝊余亦疑之此書二千五百餘篇綱條大者十數義類百數其因文示義不徒以文余所謂必約而歸於正道者千餘數葢一代之統紀略具焉後有欲明吕氏之學者宜於此求之矣初吕氏沒龍川陳亮祭之曰孔氏之家法儒者世守之得其粗而遺其精則流而為度數刑名聖人之妙用英豪竊聞之徇其流而忘其源則變而為權譎闕忠信常不足以趨天下之變而材術辨智常不足以定天下之經雖髙明之獨見猶小智之自營雖篤厚而守正猶孤壘之易傾葢常欲正兩漢而下庶幾復見三代之英匪曰自我成之在兄方夜半之劇論歎古来之未曽凡獨疑其未通我引數而力争夫三代之英及孔氏豈於家法之外别有妙用使英豪竊聞之哉亮嘗言程氏易𫝊似桓𤣥起居注吕氏黽勉答之所謂夜半劇論者吕氏常笑以為自知非豪傑被同甫差排做葢難之也吕氏既𦵏明闕山亮與潘景愈使余嗣其學余顧從㳺晩吕氏俊賢衆辭不敢當然不幸不死後四十年舊人皆盡吕氏之學未知其孰𫝊也併追記於此習學記言卷五十
