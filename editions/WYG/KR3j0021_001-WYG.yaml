body:
  text: 習學記言卷一宋葉適撰易乾下乾上坤下坤上其為三陽也天也此易之始畫本一而三者非三則無以為八也其有隂則地也理未有不對立者也陽之一雷二水三山隂之一風二火三澤此卦也其為六也陽則乾震坎艮隂則坤兊離巽此義也以卦則三足矣以義必六而交錯往來所以行於事物也學者觀其一不觀其二此易道所以難明也乾文言詳矣學者玩文言而忘彖象且文言與上下繫説卦序卦之説嘐嘐焉皆非易之正也能自强不息厚德載物而天地之道在我矣知用九天德不可為首而知始矣知用六利永貞而知終矣道之示人未有切乎此者也違而他求則逺矣坤六爻隂之正也自履霜而至堅冰所以為隂也直方大不習無不利所以明坤也龍戰于野所以變隂也臣弑其君子弑其父駭矣甚矣非所以戒坤也且六十四卦皆無弑父與君之象而獨以戒坤何哉震下坎上坎下艮上卦之次序無繫乎易之損益然以序卦考之則易之先後如此久矣乾坤剛柔之未交者也及其始交也則陽在下而非其應在五而無其應是以難生而為屯屯者不能進而不能不進之時也其反是也則剛雖得中而無其君柔雖得位而不足以任其臣是以捨位而論卦則險而止者為蒙蒙者不能進而不能退之時也而序卦乃以屯者為物之始生物生必蒙者為物之穉且觀諸天地物何時生亦何時而蒙乎君子觀屯之象以經綸夫為屯者五也濟屯者初也有屯之才經其離散綸其難厄卒以建侯而定業焉大人之事也觀蒙之象以果行育徳夫以其義險而止則果行可也以其卦山下出泉則育徳可也山之為泉也必達於海即蒙而治蒙則養正者聖人之功也初九磐桓利居貞利建侯草昧之世民無定居置磐立桓底止於是而衆隂從之矣故曰利居貞利建侯然民猶未以為可止也則又為之彌綸委曲以盡其周旋闔闢之道然後昔之未可止者終於止而不能居者安其居矣故象以為雖磐桓而以志行為正而以貴下賤則無所不用其極而後大得民也嗚呼觀始交之難生而知君子之濟屯矣剛柔未交健者為乾順者為坤循於常徳而已及剛柔既交明者為屯昏者為蒙徳雖有常而交不可常以聖人之於易也不以一徳御衆變異書詩異指者自此以往諸卦皆然也此徳之應於物者也若其有諸己也則一而已矣𫝊曰易之為書也不可逺其為道也屢遷變動不居周流六虚上下無常剛柔相易不可為典要惟變所適其出入以度外内使知懼又明於憂患與故無有師保如臨父母嗚呼使其於卦必有稽也吾何間焉以其汎於言也則變動周流㣲者為象粗者為數而君子之實徳隠矣乾下坎上坎下乾上序卦物穉不可以不養也物之穉者養而壯者不養乎飲食必有訟飲食則曷為必有訟乾物之主也其進無不遂者故於坤為泰於離為大有大以畜徳小以懿文而兊以決隂皆道之亨者也而獨於坎也則不然待之以險而已故為需夫乾之遇坎也雖不足以成功然剛而不陷義不困窮則可須以待而無所失之謂也而其象曰君子以飲食宴樂孔子稱禹菲飲食書稱文王自朝至于日中昃不遑暇食夫飲食宴樂非聖人之所許也孔子曰飯疏食飲水曲肱而枕之樂亦在其中矣又曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂囘也不改其樂賢哉囘也夫進不過於富貴茍不足以行其道成其功則剛消而為柔陽靡而為隂失其所以乾矣不然則進而未遂需而未至雖飯疏飲水簞瓢陋巷皆足以樂也故曰飲食宴樂使其為泰為大有為夬為姤莫急於救時莫勤於成民則禹文王之食有不暇矣乾宜上者也然物為之下則乾受其攻未有得志者也故於坤為否於艮為遯同人于野履虎尾姤女壯无妄不利有攸往而於坎則為訟矣其彖曰上剛下險險而健訟嗚呼以乾居下無往而不利遇險猶為需以乾居上無往而不難遇險則為訟夫君子以乾為徳而用乾之難如此學易者之所宜盡心也其象曰君子以作事謀始乾道之行也首出庶物物咸賴之受事聽謀惟乾所命而已及其在外而無權違行而為訟窒惕終凶自咎於始深致其戒焉故其爻曰不永所事不克訟歸而逋復即命渝安貞鞶帶三褫之惟聽訟者為得吉焉夫豈以我直而物曲哉然則所謂明於憂患與故者将非若此類也歟坎下坤上坤下坎上序卦訟必有衆起故受之以師訟而有衆起乎衆起而後訟乎師必有所比師者不比之謂也比則安能師一陽而為衆隂所宗莫盛於二五故五為比而二為師師者自古稱之矣事在前而卦在後故其辭曰貞丈人吉無咎所以戒之明非二不可以師也六五為用師之主雖應於二而其質非剛故又戒之曰長子帥師弟子輿尸而於其成也又深致其戒曰小人勿用然則師雖不始於易而非易不足以言師也衆羣而必争當是時也伏尸流血茍赴其欲豈知有所謂丈人者哉誠知之則一舉而可以靖民舞干而可以郤敵夫象變其義不曰用師而曰君子以容民畜衆益贊于禹曰惟徳動天無逺弗届而禹拜昌言曰俞班師振旅嗚呼必若是者而後可以為師歟初六師出以律否臧凶雖盜奪暴强其出未有不以律者然則何為而律也孟子盖知之其稱湯曰為其殺是童子而征之稱武王曰一人横行於天下武王恥之又曰不教民而用之謂之殃民殃民者不容於堯舜之世一戰勝齊遂有南陽然且不可夫貞丈人而出以律惟堯舜湯武之師為然而後世不復見矣未可以易言也總羣隂而宗五之一陽於君子固無此義而雖君道亦難之故其象曰先王以建萬國親諸侯言先王則有是矣書曰協和萬邦黎民於變時雍又曰帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣惟帝時舉惟此庶幾當之雖湯武不得預焉若夫狎所近昵所從各私其私而以比為貴者世之邪徳而君子之所禁也原筮元永貞无咎當比輔順從之時非五之剛中則散而為朋植而為黨私情勝而大公滅矣是以不貴其位而貴其徳也乾下巽上兌下乾上乾進而遇巽之柔其位在四雖順以納陽不為己害而不足以行其道也雖然優緩而不迫於乾之自養有餘矣故其卦為畜非巽之畜乾而乾之自畜此其所以懿於文徳而不施制斷之剛布為宻雲而無解物之雨也夫功之在我也以一陽而攝衆隂勢之在人也以一隂而畜衆陽觀象不明則居受畜之地而猶自許以有行者君子之深戒也故初為復自道而二以牽復為不自失至於三逼畜之主則以說輻反目為大厲以明乾之不可畜而未嘗忘夫復也嗟夫主猶若此况於為客以兊之三上行不忌聽其蹈藉無所避之則安得不為虎尾而咥人哉雖然聖人不許也秉乾之徳明上之分剛中正履帝位而不疚光明者也故其象曰上天下澤履以辨上下以定民志則虎尾咥人之患不足憂而初之素履二之幽人上之視履安行徐步上下有序物我判然彼眇而能視固不足為之明跛而能履固不足為之行也孟子所謂不得志獨行其道者也且夫不安於受而以乾自畜不與其行而以乾自居者遇巽兊之時故也其視坎有間矣比必有所畜故受之以小畜按師卦為容民畜衆之義不以比為畜也物畜然後有禮按雷在天上大壯其物㪚而不畜則非畜而後有禮也乾下坤上坤下乾上以天而交地下地而上天剛柔之際隂陽之數内外均等未有如泰否之明者也觀象指事雷動風行壑反凍結敷榮潤條搖落糞本亦未有如泰否之著者也然而君子玩否之象至於儉徳避難不可榮以禄其六爻逆順興廢之間憂世扶國之義盖專指君子小人消長以辨之矣而於泰也則曰后以財成天地之道輔相天地之宜以左右民是春生而夏長南訛而東作隄防溝洫播種稼穡三事六府皆歸一氣消息之運而君子小人進退治亂之機特不以參焉何也學者之言治道至否泰而止而謂其說於易為最詳按泰之初拔茅茹以其彚征吉使有志於進者不以已而以人二包荒用馮河使居中得位者善惡容而不吾害至於三也則又或懼夫平者陂矣往者復矣若是乎君子盻盻焉求容於小人之不暇而何暇以治哉元凱之用舜自舉之亂臣十人武王有焉故舜謂朕堲䜛說殄行震驚朕師禹以驩兠有苗為堯之哲之病也然則以六五之君當交泰之日小人革面以避君子君子降心以納小人懐失身之懼而猶無善治之益也若夫乾之二為見龍三為夕惕四為躍淵五為飛龍其君以是道其臣亦以是道所别者位而已矣此唐虞三代之所以為盛也以泰否為治亂以君子小人消長為盛衰者後世之言易者也此否所以致君子之戒而泰獨以民為衆也履而泰然後安成履之道在於虎尾而咥人不得言泰泰者通也物不可以終通物之不能終通勢也若易之持泰則固欲其終通也離下乾上乾下離上乾居上而離下進二為主而應於五乾不能自固其剛而離之明足以配乎乾此其所以能合衆異而同之雖未至於成功而大同無私實有為之基本非若遯姤之消蝕否訟之結伏欲施而不可者也比者親而比也同人者踈而同也隂親而陽踈也當大同之時非有號召不待紹介翕合響應不約而自同者也不然則何以在郊野之逺而以宗黨為吝哉類族者異而同也辨物者同而異也君子不以茍同於我者為恱也故族之異者類而同之物之同者辨而異之深察於同異之故而後得其所謂誠同者由是而有行焉乃所以貴於同也天下之求同於君子者多矣君子之有所同於天下者亦多矣及其用之則以異而敗者衆以同而成者寡何也不類其族不辨其物平居樂乎人之茍同而不知其遇事之終以異也甚矣同人之難也何以知之由其爻而知之初无咎二吝三凶四弗克攻五號咷大師克六志未得彼汎焉同乎一世而茫焉莫知其所謂誠同皆以乾之居外故也若其在内也則異是以委心歸計而應於五五知其為至剛之徳俯以下之安其為用而不疑也凡乾之為世用未有盛於大有者乾不以離之有也為忌離不以乾之進也為逼故二為大車以載三為公用亨于天子四匪其彭以交如之孚獲威如之吉至於自天祐之而無不利者凡以乾之在内也嗚呼遏惡揚善順天休命乾之材也亦君子之志也夫豈易而得哉物不可以終否故受之以同人物不可以終否是也受之以同人非也與人同者物必歸焉不歸其善而歸其同亦非也艮下坤上坤下震上舜命於禹曰汝惟不矜天下莫與汝争能汝惟不伐天下莫與汝争功益贊於禹曰滿招損謙受益時乃天道謙之為義古矣而卦以坤艮之九三當之世之所謂謙者以位而言也夫謙雖無所不用用雖無所不利而非位不足以言謙三者位之不當而内卦之終也於是而明謙焉無其位而任其勞以此終其身而不敢怠也謙者不足於中也豫者有餘於外也此震坤之九四所以為豫也處己必以謙無豫可也處物必以豫豫之自處而忘其謙則凶之甚矣此二卦所以相因而立謙吉而豫凶也裒多益寡稱物平施非謙也以謙尸之衆之所服也以豫自處無時而可也故推其義曰先王以作樂崇徳殷薦之上帝以配祖考言惟此時為可也豫之義難明故獨明其順以動者雖天地之大聖人之崇高未有逆理而能動者也震下兊上巽下艮上剛下柔動乎險則為屯屯者我欲進而物不從也剛下柔動而說則為隨隨者物既行而我從之也剛下而柔上險而止則為蒙蒙者不可與有為也剛上而柔下巽而止則為蠱蠱者不可與無事也是故隨蠱者屯蒙之反何也以其有順說之道焉君子於其險也則經紀而彌綸之不困於屯也於其說也嚮晦以全其明入宴息以養其力不詭於隨也於其險也則果行而育徳成己也於其順也則振民而育徳成物也夫是以隨者不隨而蠱者不蠱此其義之所以為大而不可小用之也若夫淪溺敗壊安其自然何取於易哉山下有風振撼紛剥為蠱之象君子之治之也先甲三日後甲三日申重黽勉如子治其父母之事惕厲勤苦不得寧居亦以其異而可為耳如使動輒乖忤茍安卑陋不我能備復為敵讐則振民育德之功無與共之矣宜其不事王侯而髙尚其事也哉豫必有隨豫隨不相待也信如序卦之言則隨為豫之餘何以立卦義且隨者豫之靡故卦謂隨時可隨也豫其可隨乎隨於豫則陷矣習學記言卷一
