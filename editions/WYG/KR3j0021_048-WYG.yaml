body:
  text: 習學記言卷四十八宋葉適撰吕氏文鑑按孔安國稱典謨訓誥誓命之文典謨且置訓誥誓命三代至今通用三代時人主至公侯卿大夫皆得為之其文則必皆知道徳之實而後著見於行事乃出治之本經國之要也周衰五六百年命令不復行於天下雖齊晉迭霸文告亦不能施於諸侯至秦擅事貴人盡軍吏而丞史賤官執文墨之權於是所言非所用所用非所言而人主制詔朝廷命令為空文矣两漢紀只擿舉一二後世祖述以為不可及其視書所稱何啻涇渭之異流朱紫之殊色也蓋人主及公卿大夫不知道徳而丞史賤官徒耀文詞虚實各行體統分裂乃為治之大害不知者但以古今不同為解是可歎矣然余嘗考次自秦漢至唐及本朝景祐以前詞人雖工拙特殊而質實近情之意終猶未失惟歐陽修欲驅詔令復古始變舊體王安石思出修上未嘗直指正言但取經史見語錯重組綴有如自然謂之典雅而欲以此求合於三代之文何其謬也自是後進相率效之昔人所謂質實近情如髙皇帝側室之子即位三十年百姓怨氣滿腹吾誰欺欺天乎指笑鋤剔以為拙陋隠映旁出自謂竒巧至以獻公之子九人重耳尚在嵗星吳分鬭士晉師之類盡為警切矣因吕氏載詔誥訓詞略叙大指如此蓋大道既廢專為虚詞則今之號稱摸擬典雅以求配合復古者固未必是而昔之率然突出質實近情者亦未必非且盤誥皆君上與民庶家人父子之語而韓愈反以為佶屈聱牙則安石之謬又何怪也雍熈三年趙普請班師疏此本朝大議論也葢太祖平一諸國尚有太原未克未暇及幽州太宗既得太原便欲乗勝取幽州志既不就時太平興國四年也距今七年矣普疏云旬朔之間便涉秋序當在六月中而曹彬等以五月敗于岐溝奏入適相先後明年敵求報復河北山東取幽州豈有祕計而浪戰亦安能有獲必盡擇智勇㢘仁者為將尺寸守之敵來使不能得去勿追逐鬭敵而無鬭燕民不計嵗月待其自至然後築長城實塞下則夷夏分而漢敵安矣普既不足以知此王旦冦凖迄變為澶淵之和韓琦冨弼一一承用及國難梗棘河東河北盡委與之未聞以為非者堯舜三代禮義之區獨江淮而已其誤皆出於普然則雖以江淮為固守國制冦之道又未知其孰從或曰今姑憂不能守江淮逺指幽燕何益曰守淮堅而冦不可越所以安江南也用之山東河南猶是也用之河東河北關陜猶是也用之燕薊猶是也取天下不可有異說也守天下不可有異道也舜禹不能易也王禹偁言聖朝享國四十餘年邊鄙未甚寧人民未甚泰求利不已設官太多今陛下治之惟新救之在速此真宗初年也臣伏慮書生執言此奏陛下以為三年無改於父之道可謂孝矣此不知古今異制家國殊塗者也假如帝堯既殂帝舜在位堯時有八元未進四凶未除舜乃流放舉用善惡兩分未聞後之人曰堯不及于舜也舜不孝于堯也伏惟陛下遏老生之常談奮英主之獨斷則天下幸甚此設諭也按哲宗初司馬光将罷新法其時真有三年無改之論而光乃謂宣仁后以母改子非子改父卒為紹述之禍禹偁語簡直不回䕶光何不徑以為據依如魏相引賈誼晁錯者豈鄙其樸率故耶禹偁受知太宗夫世有直道自有直氣而為眞宗言此不疑眞宗亦未嘗以為謗者直道素明也自慶厯後議論浮雜直氣空多直道已散至治平熈寧紛事於言語之末而直道蕩滅無餘矣觀此兩節風俗之變可以考見今人欲景行前輩須是於明道景祐以前史接上去㸔方得禹偁言減冗兵併冗吏使山澤之饒稍流於下按朱台符以京東運使應詔亦言陛下即位肆赦臨朝聽政覃恩而宥罪施仁而及物未嘗蠲免殘租許行𣙜利山海之貨悉歸於上酒税之饒不流於下葢不欲盡山澤之利而與民共當時雖已無此事而猶有此論也其後則此論亦無矣事之已徃猶可追論之不存深可畏且使今日有欲言寛山澤之禁者人不嬉笑而怒罵乎至言太祖時東未得江浙漳泉南未得荆湖交廣朝廷財賦可謂未豐然而擊河東備北敵國用亦足兵威亦强其義安在所畜之兵銳而不衆所用之将專而不疑故也自後盡取東南數國又平河東土地財賦可謂廣矣而兵威不振國用轉急其義安在所畜之兵冗而不盡銳所用之将衆而不自專故也此事今日固不能行矣而此論則至今猶在尚可議也且太祖精揀兵以嚴教習專任将以責戰守其謀不為難知其效不為難繼而卒無能髣髴其一二以行之者何耶若其論則固己腐朽熟爛五尺童子皆能道之而以陳於夸新喜竒者之前雖不至於怒罵而嬉笑者皆是矣故余欲及此論之尚存使明良忠智之士久於其任悉力畢心汰疲冗之兵用㢘恥之将尺扞寸禦敵人無敢逸越以脩太祖之烈然後考尋已逺不存之論散利薄征遺澤餘潤民得資以衣食不至於餓窮流徙而無告以復前代之舊則豈惟伸禹偁台符之志而已哉雖孔孟不過是也揚億論棄靈州事宜由今而觀若曉邊事者然拓跋思恭以來世有五州中國不能問則固己棄地久矣太祖未暇討一因而撫之使為蔽扞内郡獲安亦時勢當然也太宗既取其地遂反毎戰輙敗兵窮力屈繼遷靈州孤外旦夕淪沒正復棄之已無及矣億乃逺引漢武置朔方公孫𢎞以為不便又以賈捐之棄珠厓為比乂謂地不過數千里為堯舜三代之盛而尤疎濶者至言燕薊亦舉而棄之自是主議論之臣遂以棄地為常而蹙國避冦外無餘術矣其言太祖用姚内斌董遵誨守環慶有功亦與當時不合太祖時李彛興父子尚為外臣故内斌等易於立功今繼遷猖獗清逺靈武皆喪失邊城沮氣自保不暇雖欲專任如内斌等豈能遽收前人之功哉禹貢東漸于海西被于流沙朔南暨聲教益之戒曰無怠無荒四夷來王自古聖賢雖曰尚徳而不務廣地然亦未有以地不足而為徳之有餘者况唐嘗以靈武復興矣億不此之思獨以公孫宏為辭然則見利害不盡設䇿畫不精汎濫綴緝以空言誤後人乃今世儒生學士大病也冦凖論澶淵事宜余舊聞長老重凖力賛親征且言其凢所規慮皆已先定非一時偶然而為者即此疏也自太宗世契丹冦邊未嘗寧息真宗甫終諒闇虜已大入親駕戎車亟用祖宗之舊而傅潛畏懦不戰范廷召康保裔敗死張齊賢向敏中吕端李沆吕蒙正畢士安不能為謀及王超李福王繼忠又敗上議復出群臣不敢唯諾至是母子傾國來冦其勢尤熾天下震動則陳堯叟王欽若避地南遷之請紛紛出矣冦凖初相倉猝奉上以行當時相𫝊畢士安有相公交取鶻崙官家髙􅀈有此處好喚宰相吟兩首詩之語其為䇿略可見矣况此疏正是擘移兵馬冦深則抽那大軍護駕爾了無竒計未知諸公何以夸艶如此前代人主在鞍馬間者固多然須必勝不勝則危亡隨之人主勇於自行則固不論若諸将不用命而大臣将以天子之威壓之則前傅潜今王超終皆不能効死必求和而後免辱無大者而凖猶可矜肆以為功伐乎嗚呼舉大将者蕭何也身督戰者裴度也克合晉楚之成者向戌也皆昔事之已驗者也君子之相其君視其義與時如何耳可戰則戰而馮道不敢必戰當和則和而桑維翰不敢必和又近事之當監者也凖既不能知人又不能臨兵至於委曲調䕶兩國之間為生靈請命又不能也而挾萬乗僥倖然後以和為功則余所不敢聞也孫奭論天書按此事王旦始終奉行夫人臣導人主以誣天而人主能自敬天此載籍異事也旦之所行如此而得為本朝賢相尤異事也奭言屈至尊以迎拜歸袐殿以奉安上自朝廷下及閭巷靡不痛心疾首反脣腹非而無敢議者葢指當時之實也恭惟真宗克自抑畏無愧古賢王東封徃反獨蔬食而輔臣皆不能望其以伊𫝊周召致君難矣哉范仲淹應詔十事是趙綰王臧蕭望之劉向以後一節次蓋李固陳蕃直以人命争消長而房魏值其君自定經制故不得為節次也余嘗疑儒者不得志於時非特道之難行蓋其間亦自有考論不審處如十事中自精貢舉以下其八皆國家所常行人情所同願縱有排沮易於消復非利害之要也惟明黜陟抑僥倖最為庸人重害而仲淹先行之古者官職不分自無職外遷叙之法唐初急於用人自小官預大政其後兵亂假内職以重外權流弊及於五代官職各行於是有職外之官叙遷逓進真宗推恩優幸三歳一磨勘彼以為此人主命令也固非斜封墨勅之比而聖節任子人所歆艶一朝革去愠忿自深故此二事既先行鬭庸人重害之病開邪諂䜛間之門此其所以非常行與同願者皆不得而伸也歐陽修云聖賢相遭萬世一遇而蘇洵以為當是之時毛髮絲粟之材紛紛然而起合而為一惜哉惜哉仲淹但言石介作頌為怪不知我為其形彼張其影何足怪也幸仁宗寛明且善人之類已衆故其遇禍不至如綰臧望之之酷韓琦繼之於前二事裁其太甚而人亦不以為過蓋勢必以漸也按歐陽修謂仲淹老練世故必知凡百難猛更張故其所陳志在逺大而多若迂緩然觀此二事不可謂不猛矣若仲淹先國家之常行後庸人之重害庻幾䜛間不大作而基本亦可立矣故審於考論者平居師友講習之急務孔子所謂如或知爾則何以哉若好行小慧則固無益也韓琦論時事謂西北二冦禍釁已成可晝夜泣血非直慟哭太息其憂懼迫切如此誠然矣然所條七事國家所常行未有可以制敵也若夫隂營洛邑以為逰幸之所則踈矣使敵果向汴而洛陽倉猝不得為播遷乎况奔潰之餘何由可守亦書生意貌之論耳大抵約和既定中外習安自無竒䇿可設其後王安石經理河北亦不過欲為先事之備而琦又以為不可行特静躁有不同耳富弼辭樞宻論流民辨邪正三疏又辨災異非人事皆天數文意大畧類趙普而加諄複丁寧反復儼如提耳而告人者舊傳韓琦與弼議事未合戯弼曰又絮耶弼愠曰絮是何言耶觀此三疏真絮也其言邪正和同君子小人之際學者皆以為至論蓋其主意端為王安石爾方神宗以首相命弼弼審安石不可用何不正言於上决其去就而設此影語蓋神宗必欲有所改作弼意不然而安石助之神宗去安石非難而責弼以必更張者弼之難也按歐陽修言弼明敏而果銳此初執政時也作相後則不然矣弼初執政更張之意過於范韓至作相乃以一切堅守無所施為為是雖如琦之微有改作亦不能從也古之賢相因憂患而益明周公是也弼因憂患益昬而猶欲自以為賢非余所知也賈昌朝論邊事言太祖得御将之道及善用将師精於覘候人所共知言削方鎮兵權太甚之弊則人所不知雖有知者亦不敢言也言訓營卒謂令諸軍毋食肉衣帛營門有鬻酒肴則逐去士卒有服繒帛則笞責自古用事得死力未有不先使之温衣飽食者如後世養兵衣食不足怨嗟憤欝何以効命恐此當别論也昌朝作相當范韓興廢之時而朋黨傾壊皆其力焉至於事業則未聞能踐此言何也包拯論宋庠且云無過則又不然執政大臣不能盡心竭節灼然樹立是之謂過及近嵗方乃摭拾細故託以為名併舉權徳輿事此一項論議雖非卓卓關繫然亦從古流通至其時未斷絶者自後無復有矣歐陽修謂拯素少學問觀此是其天資能近大體不待問學也余嘗謂堯舜禹臯陶君臣以來皆素有議論相𫝊雖漢唐褊狹而其流風餘烈猶未盡絶及後世以經術起之無不欲上繼堯舜而鄙陋漢唐然古人論議㫁絶皆盡而偏岐旁徑從横百起莫覺莫知而皆安之以為當然也豈不可歎哉歐陽修論日厯雖前引古史後言日厯時政記起居注並乞更不進本然不過督趣史院功程爾未暇論史法也唐人謂人主不觀史其說陋矣後世相因遂以人主不觀史為盛節謂必如是而後史官得其職此修所以有乞不進本之說也不知自古人主何嘗不觀史彼其所書善惡不隠顧省凜然觀其一日可以戒其終身矣若人主赧然諱避赫然誅戮則史官亦未嘗畏懦迴避身可殺而史不可改史法由此而備故可為治道之助惜乎修之所講未能及此止於記注而已韓愈最喜言史作順宗實録載韋執誼王叔文同飰乃云鄭餘慶珣瑜二公皆天下重望相次歸卧語類酸文嗟夫又在修下矣修論包拯昔嘗親見朝廷致諌之初甚難今又獲見朝廷用諌之効已著慶厯致諌事余於前章固論之按古所謂諌者以人主之身言之有責其臣以必諌已而自成其徳者舜予違汝弼是也有責其君以必受諫而後徳可成者傅説后克聖是也諫行則人主無過無過則明明則用人立政無不得其當而治道舉夫知人安民禹以堯為難者葢過不能盡無而明或有所蔽也今修所言用諫之効不於人主之身焉是求而區區於臣下争議之末節故其効有時而窮修葢親見之而不能救也濮邸之争豈修亦悔之而不敢言乎修之學未能及此而抗然為争議之主余懼後世之忘其本也故重述之余屢聞吕氏言宋祁請復唐䭾幕法歎其思慮精宻考騐深逺非當時所及後學所宜知䭾幕軍行所必用但因承茍且不為耳按左氏載晉楚逺征百物修備及六韜聚為七書軍用一篇習舉業者皆能誦之祁但近稱唐制豈其於二書偶未詳耶然出車東山六月諸詩叙師役勞苦意義閎博而鄭申侯謂齊桓師老遇敵懼不可用欲使陳鄭之間供其資糧屝屨則尚有彼此一家通有共無之意晉文楚荘所不能也至諸葛亮耕於敵境居民錯雜按堵無私葢古之善為將者無不皆然若漢唐窮追逺討常以萬里外為限用其民如禽獸雖欲必有䭾幕豈若居室枕席之安耶恐此祁所未知也張方平論國計在王安石未用前論免役錢在為安石所排後神宗始初明銳果於欲為而冗兵厚費一節最為慶厯以来大患若當時大臣公共為上别白言之圖其至當而決於必行事既廣逺非十數年功緒不就則人主之志已定而其他紛紛妄言改作者不復用矣惜乎韓富歐陽不能知方平雖知而言之不切就使切論而亦未有以處也及安石既用則紛更之禍已成當時如方平言者甚衆安能救乎吕氏言方平盡廢安石所為以還祖宗之舊法也獨光為侍從則與安石力辨又以私書勸之又以用捨去就之際決之安石於諸人無所畏獨畏光及蘇軾者畏其不止也宣仁初雖曰盡用不得志於新法者然諸人之論皆謂嵗逺而利害異事乆而節目多且虞父子之間報復之禍不敢改也獨光挽囬一世之力以還祖宗之舊雖竄逐滿天下而風流相接故元符末則已稍復宣和垂三十年矣欽宗内禪夷狄方熾横何暇及羣臣之邪正則又復而光實為贈主後人秦檜殄滅幾無遺類然檜死則又復凡此皆光獨争力挽之餘效而琦弼君子之澤所不能延也然則光為宋室守成之規模豈不甚逺哉故余謂今日之事姑無望其能盡正惟五六十萬之冗兵能使之各有衣食固扞邊圉能使虜不能凌暴又隂有以制之使彼請戰不獲而中原遺民有可復合之理若是足以助成前志之未遂矣若夫内治則因光之所以守成者補葺其闕損扶持顛仆而使之可以長乆焉則雖數百千年而存可也孫沔五事景祐以来三黜寵姬聞兩犯宸扆上元嘉節内庭出逰美人才人無不隨從飛葢蔽景流車激雙各崇華衛分道争行衆目共觀與后為並又内降斜封坦夷若道免刑要賞響應如神其辭有進無退似兩漢非後人語也又言其時内人請俸及取賜嵗千餘萬緡不獨用兵大費也其氣剛大其諍的切如此沔既受汙衊而實録遂具載之若信然者吕氏云此安石筆也沔又言范仲淹孤寒出身忠誠報國統兵邊鄙終嵗勤苦未嘗有臣僚乞賜與千百緡有助清貧之節可略見當時事意也本朝享國百年承平無事葢自仁宗末英宗時人臣數有此論其意本欲諷切人主因歸美以求警懼爾非以為國家必當有事而何為若是之無事也且太祖太宗為開基受命之君而三世繼承皆無失徳則安得不百年而無事然方平在諸人中名望甚輕暮年與安石不合衆方歸重按方平與善人離合之勢雖不及文彦􅀶趙抃而視夏竦賈昌朝有間矣然其着絹喫羊酒之氣終在而挾邪不直之意固亦不能無也蘇氏兄弟乃獨以知道推之而或又謂前生寫佛書猶未盡卷尤怪妄矣司馬光諸疏按本朝議論行事為三節慶厯也熈寧也元祐也光雖不及仲淹之開濟其灼知國家守成之規模極始盡末不増宴安有過之病王旦不起倉卒無益之患吕夷簡韓琦又能補葺其闕損扶持其顛仆使之可以長乆則琦與弼皆不及也且仲淹之志本欲變通琦與弼既協同其說雖羣小不容仲淹竟去未乆而死然琦弼相次為相終不能復伸仲淹之志安石初有盛名本琦弼所引用及其變更諸事琦嘗與争論弼與彦博修亦皆不附從然但知退挹自保終不敢力沮安石之成推此數人之行使其居安石勢衰之後當宣仁登進之時未必能及真宗初河北山東無嵗無契丹之患而李繼遷父子冦横北方若兵革不已勝負不分因之以饑饉加之以盜賊播遷之難何必靖康割裂之勢不待紹興人無愚智皆所共知也由此言之則渡江以前百六十餘年而無事者與二虜約和之力也兩漢及唐不待與虜和而亦能無事此其所以加於我一等也渡江以後亦且百年而亦無事者亦約和之力也一日不和則不勝其事矣安危之數何可預定存亡之機必為厲階安石所不能知也而必以紛更亂其俗以大有為要其君以祖宗百年無事為天幸而不足恃而不知其一旦有事而不可救者職安石為之也哀哉周公之詩曰迨天之未隂雨徹彼桑土綢繆牖户夫古人豈不居安而慮危哉特不喜危而惡安爾習學記言卷四十八
