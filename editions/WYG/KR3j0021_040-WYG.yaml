body:
  text: 習學記言卷四十宋葉適撰唐書列傳髙祖竇后太宗長孫后唐賢后獨此二人爾新史所載皆不如舊史詳實徐賢妃二十餘嵗作諫征伐䟽詞富理博王勃不能逮也新史但約載百餘言讀者不復成章掩其美矣至言韋后持權不如武后故敗而無成未知武􅅊何論成否憲宗郭后事新史記其為宣宗不禮欲自殞是夕暴崩及貶禮官王皥白敏中周墀皆詰怒甚詳而舊史乃言宣宗即后之諸子恩禮愈異於前朝無一語類新史豈唐故史文所諱遂承用之耶江夏王道宗以贓論太宗謂侍臣曰朕富有四海士馬如林欲使轍迹周宇内逰觀無休息絶域採竒玩海外訪珍羞豈不得耶勞萬姓而樂一人朕所不取也人心無厭惟當以理制之云云夫以其可為而不為太宗自見識實處也堯曰人心惟危道心惟㣲若夫堯舜禹湯皆以其不可為而不為者也如太宗所言皆决然不可為之事而太宗自以為可為則古之治主無此論然能以理制而不為則世之亂君無此識雖然欲在理先難乎其語上矣因太宗欲使功臣宗子世襲不行攪動論封建者蘇氏謂栁宗元之論出諸子之論皆廢雖聖人復起不能易然宗元言封建非聖人意也勢也觀易地上有水比先王以建萬國親諸侯書載萬邦義尤多聖人惟恐徳不足以有諸侯更分别甚意與勢而又謂其不得已乎方堯舜三代時所為建置其國家者皆天下之聖賢故臧文仲聞六蓼㓕謂臯陶庭堅不祀忽諸徳之不建民之無援豈如漢唐以腥臊劍挺之臣膏梁乳臭之子加諸億兆人之上哉自晉楚㓕國最多已自别為郡縣至秦始盡空之天地霍然一變宗元乃言公天下之端自秦始何也大要古無封建之論因李斯不主後世之説方角立宗元據末以抗本自應失其㫖也漢以後有國者不論地大小皆為置相王侯未嘗自專相與守何異哉然秦分三十六郡大於諸侯數十百倍綱目未繁粗得體統漢稍分至百餘猶不害其為踈簡比齊隋唐益以釐析至今愈甚長吏削弱代易促遽天下之貴聚於一人徳不能化力不能給而吏胥制其命其間藏無限弊事民何嘗受實惠若此者盖宗元與諸人之所未通直謂善制兵謹擇守則理平然則不習治道而强言之做成標的後學反受聾􅎩之患矣舊史載建成元吉謀宴太宗於昆明池率更丞王眰以告太宗召府僚定計盖房杜預焉其言舜焚廩浚井小杖受大杖走世俗引聖賢以自觧固多如此不足怪舜曾子可以免死而不可以屠戮其親也太伯至於斷髪文身然後已夫以盜竊之利欲借聖賢之名亦何所不至哉長孫無忌殺吳王恪為髙宗及身慮至矣及其身與家不保而君與國從之反不能慮焉何哉無忌晟之子以詐諼徼倖自其所長至於社稷安危存亡之地非其貴也陳平之智漢髙尚謂難獨任晟與房杜佐命猶較良平蕭曹多少而漢髙亦非太宗所能及漢人其未可輕視宋王憲之賢伯夷季札何逺使其得位有開元之治必無天寶之亂也而當時執政乃謂聖庻抗嫡非唐人何以發此論哉明皇於憲終始盡愛餘昆弟倂頼其寵盖志滿願足之所生油然而不自知也而唐人又謂之友悌天性使誠天性烏有悌於兄友於弟而不慈於子者乎李景儉善言王覇大畧髙自負王叔文比於管葛叔文成敗雖已徃然終未可定論景儉固俊偉人也前輕蕭俛段文昌後罵王播崔植杜元頴朝士信無侵辱宰相之理然如此軰人為百辟首何以服士大夫心不至於見陵者幸也史家踈畧不能記其語言行事無以考驗是非可恨爾前代亦多如此唐事差未逺或尚有逸書可求也方豆盧著誣告宋申錫甘露之禍已成文宗志雖立於此而聰明不加於彼坐失事㑹捨易求難悲夫徳宗始末無可道者惟有禮㑹院成婚一事而新史不收然則肅代之衰微可勝嘆哉漢光武得天下湖陽公主縱奴撓法㡬殺董宣諸劉姑嫂飲酒懽笑謂文叔直柔爾此固家人女子之常非責望所及也而髙祖柴氏女糾合羣賊有衆七萬遂與秦王㑹兵渭北分定闗中此古今所無其功多於楊𤣥感李宻逺矣然則唐安得不驟興豈亦天所命耶按馬三寶傳又歸功家僮未知孰是文宗問郭鏦公主所服何年法對以貞元時所賜未嘗敢變乃言元和用兵賞士内中纎麗散於人間南陽信有儉徳然衣製不齊隨時變改亦未可遽定文宗時比貞元為侈比神龍景雲天寳之間則陋矣自余省事五六十年中見昔之狹者方為廣短者方為長又記元祐以前冠髻簪履皆髙廣長大盖當時所尚者時過則以為棄故漢人有宫中好廣眉四方且半額宫中好大袖四方全匹帛之謡文宗不正其本而區區以一己好惡格物徒見其偪下未見其能化俗也詩稱何彼穠矣唐棣之華曷不肅雝王姬之車又云彼都人士狐裘黄黄其容不改出言有章行歸于周萬民所望人主茍知道而示人以禮則非奢儉所能奪而由於中行矣唐以義兵自名後世亦從而義之余固論其非矣如李宻竇建徳之流其勢力材能不足以合一而卒以敗亡然其是非善惡實與唐無以相絶而新史乃謂觸唐明徳折北不支又言偽辨易窮卒以誅死髙祖聖矣哉按司馬遷以漢人述史自陳勝項籍魏豹田儋兄弟皆極其稱譽盖廢興常理成敗偶然陳壽為晉論諸葛亮則聲價尤重矣今新史以異代之書所排毁如此不知何等見識且於後學有三大害直以勝負成敗為徳之有無一也據下而言無復語上二也近前虗謟今事何望三也世道益衰無足怪矣劉文靜初與太宗建謀及詐集兵伐遼告王威髙君雅反於坐囚執詣突厥借助皆與前代起事者指意同符自戰國以來一種智慮無不如此非有髙下而新史乃謂非有卓越之姿何也裴寂猶可文靜可乎此用司馬遷語而失之也又言應龍之翔雲霧滃然而從震風薄怒萬空不約而號尤不然易稱飛龍在天聖人事也道成徳熟居得尊位物無燥濕各以類從故有風雲龍虎之喻若漢唐淺廹茍用末術並希富貴暫為君臣猜阻在心獲全者少矣舊史載文靜獄詞云官賞不異衆人東西征討家口無託實有觖望之心因醉或有怨言不能自保故髙祖以為反而新史節畧其語但云官賞等衆人家無嬴誠不能無少望則失其實矣當從舊史為正然髙祖雖守地而不得有其財賦父子倉猝反粟帛甲兵皆寂所奉也又以美女滿其欲此功亦豈可忘耶審其清者不加恤疑其濁者罪所舉亦好善不篤矣此語魏晉以後人不能道也當改尋初語如何太宗智能及之加以信受遂致貞觀之治盖非偶然所可惜者􅄶忮常在先明豁常在後所以不及古人也太宗諸將惟尉遲恭勇畧異常急難得力雖粗暴而識事體克以令終近古名將新史恭傳刻畫反不若舊史之明揚頗著其功也新舊史皆言屈突通一心能事兩主自古降人背前向後不觀其昔安保其今彼此常情然安有一心兩事之理古人無如此立義者如通要於隋臣節不盡但其人品素卑非譏貶所及耳新史又言敬徳與太宗君臣相遇古人謂之千載果若此而為相遇則劉𤣥徳何以得諸葛亮而輕闗張又言張公謹抵龜事為投機之㑹不知兄弟相屠遂攘父位何名機㑹甚矣其無識也余於隋旣叙李宻事宻始輕歸唐俄又捨去遂敗世共笑之然無怪者亂離時英豪角逐迭相强弱直以幸不幸為得失爾劉備轉側諸雄間去來尤不常卒亦能有所就宻謂事變方無窮而不知唐興之勢悍急不可禦非前代比縱未值盛彦師終亦為擒然則負材而妄動易審時而不為難也歴觀前世崛起成事未有如唐髙祖之縱放自快者爭王競帝之人皆俘傫係頸陳於都市雖降者亦殺而無禍盖子依父而盡力父依子而受功其數有以致然非道勝也新史論蕭銑盜仁義詭臣亂俗聖人所必誅未知髙祖何以為聖賢哉杜如晦雖蚤死房𤣥齡比死太宗亦崩矣唐一代典章文物細大皆出二人之手其誰不知而新史反謂求所以致治之蹟逮不可見輔贊彌縫藏諸用使人由而不知如此閒言語流轉世間是懸日月而論夢寐也况後生學問日益訛陋如房杜已不能望管蕭又鼓動以此等無用見識銘刻心骨則人材何由可得増進又舊史言世傳太宗嘗與文昭圖事則曰非如晦莫能籌之及如晦至焉竟從𤣥齡䇿也盖房知杜之能斷大事杜知房之善建嘉謀云云然則所𫝊嘗與圖事者非必事事須得如晦其間盖有輕重緩急而新史乃改為每議事帝所又房知杜能斷大事杜知房善建嘉謀已全模冩不行然猶是分别輕重緩急而新史直謂如晦長於斷而𤣥齡善謀古今未有待人之斷而後得為善謀亦未有短於謀而自許以能斷者如新史所言則謀須是一人斷須是一人各出並行頺然死法是教後世以不能謀又不能斷也以余考之房杜近世名相固無改評之理所為恨者以其如是之專且久而做唐風俗不成死則墜地矣盖太宗英明果銳舉心動意不無輕失常須匡弼方從中道自𤣥齡以下隨事救正每患不給旣無餘力可以致逺然其建功立效亦止於目前雖欲致逺而非其徳器智慮之所及故也况于志寧李勣之徒乎髙士亷能敬禮朱桃椎當時以為美談士亷比一時士大夫差有逺韻也太宗令撰氏族志仍以崔幹居第一而太宗不許止取今日官職髙下作等級信如太宗之言世代衰㣲全無冠盖材識凡下偃仰自髙而重舊錄古之意固已失之况又未必盡然而今日以詐力相聚遂居顯位者豈便為賢與光武用卓茂為太𫝊何不同乎盖太宗止是據目前夸耀念未及逺爾余所謂做唐風俗不成者此類是也又按作氏族志時貞觀九十年間方國家新造本原風俗自有大者何暇至此許敬宗李義甫又損益其間人但以為勲格不復貴重則太宗褒貶進退之義亦何用也貞觀致治全在魏徵一傳最當詳看以諫諍事攷之如堯舜禹益臯陶湯伊尹武丁傅說皆是防虞警畏功用非有驕淫敗徳實亂於政也至詩言文王不顯亦臨無射亦保不聞亦式不諌亦入則尤精宻不惟本無敗徳亂政之畏而其身未嘗不先以有過自處古人所謂防虞鑒省者抑又其次矣近世乃謂漢髙祖唐太宗但以改過不吝從諫如流為秦漢以來百王之冠使堯舜文武之聽受禹益伊傅之進說精粗不辨㣲顯莫察學者隨和混然一科於治道之統紀所失多矣孔子曰智及之仁不能守之雖得之必失之太宗之於天下猶未能以智及也力而已矣若其驕奢淫佚强狠暴戾猜阻疑間動衆勞民如亂君敗國所為者色色皆有使其天資不幸而不能聴諫又不幸而無魏徵之切諫則所謂仁不能守危亡之禍及身而見矣然則實無過而諫不敢忘與實有過而諫不可緩豈得並日而語哉考證傳中提耳訓飭與察父嚴師之語無異而大抵以煬帝為戒舜非不戒丹朱成王非不戒紂然舜則無之而太宗則有之也或又謂太宗何不自置身於無過之地必待已形於言動而後以受規為美余觀太宗㒺念在先克念在後聖狂反手明白洞逹如使謂身無過耻於見攻處偏受之地墮愎諫之域則其所䘮又大矣此又學者所當知也王安石初對神宗言諸葛亮魏徵皆有道者所羞而舊史以為徵尤屬意縱横之說觀徵學問雖未足以進於孔孟若夫儒墨之流諸子所言靖民厚下之意知之有餘矣非為縱横者也安石以其未至於道而羞之豈自悟其悖謬壊亂而為徵所羞乎然則道固未昜知也新史稱徵面折封倫三代以後人漸澆訛之説倫不能對至貞觀四年帝謂羣臣曰此徵勸我行仁義旣效惜不令封徳彛見之後世謂太宗致治定於行仁義一言按舊史言惟有魏徵勸朕偃革興文布徳施惠中國旣安逺人自服朕從其語天下大寧絶域君長皆來朝貢九夷重譯相望於道皆魏徵之力盖舊史旣已着語而新史又轉昜之不知當時本說定云何也仁義固致治之標的然須有條目推行次第若只據此兩字便謂可致貞觀之治而以徵傳及諸書所載雜考則有不然者故戴胄稱闗中河外盡置軍團富室强丁並從軍旅重以九成作役餘丁向盡去京二千里内先配司農將作假有遺餘勢何足紀云云此貞觀五年也馬周傳稱供官徭役道路相繼兄去弟還首尾不絶逺者五六千里春冬畧無休時此貞觀十一年也又徵傳諫止封禪稱今自伊洛東暨海岱灌莽巨澤蒼茫千里人煙斷絶雞犬不聞道路蕭條進退艱阻此貞觀十二三年也安得為仁義之效哉昔賈誼謂仁義恩厚人主之芒刃權勢法制人主之斤斧今欲釋斤斧之用而嬰以芒刃不缺則折豈可罪誼禁漢文帝不得行仁義乎然則不求致治之實而姑被之以仁義之名則仁義無時而可行矣太宗初立謂侍臣正主御邪臣不能致治正臣事邪主不能致治惟君臣相遇有同魚水則海内可安於是有諫官隨中書門下及三品入閣之事此太宗自知治道所由不待人言而發者也然其幸九成宫以津川縣官吏改舍宫人欲并按王珪李靖則魚水之心又已忘之而威怒震於操制矣貞觀六年也太宗使王珪論房𤣥齡温彦博戴胄李靖魏徵𤣥齡等以為確論是時六人同輔政而君臣之間相知如此三代以後最盛節目也盖魚水之言驗矣漢髙自言三人張良不相韓信殺死光武但只評量士官所至而已權萬紀李仁發事太宗末世之度終不忘有識雖知其非然畏偪者惟自拘防短懦者不足開廣猜阻旣立忌克便成信不可一日無魏徵也又如權懐恩誚楊幹汴橋成立木止過車事學者亦鮮有不以為快孔子曰不敎而殺謂之虐不戒視成謂之暴慢令致期謂之賊新史何必收入傳也蕭鈞諫髙宗欲殺樂工宋四通等以其為官人通傳信物仍令附律盖鑒如姬盗取兵符其思慮通於千載之上可謂深逺矣然目前宗社為武后公取而乃不加省何耶時在永徽中豈清明於初而昏惑於後耶其實意外褊察者蔽之所生而度内虛朗者明之所集不可不知也蕭氏八宰相新史謂世家之盛與唐盛衰此論余固於世系表發之按瑀􅄶狹不足以共武徳貞觀之治俛潔清遘自負然反以致亂湛寘無傳嵩華碌碌惟倣粗可而復賢相也余觀本朝韓吕氏不過再世宰相皆自以為國家源流所繫况八葉乎其講明本末酙酌世變使盛有以致而衰有以扶所謂與唐盛衰也若唐盛亦盛唐衰亦衰隨時髙下卒以泯滅烏在其為世家哉貞觀十一年糓洛汛溢岑文本以中書侍郎上封事言古人譬之種樹年紀綿逺則枝葉扶踈若種之日淺根本未固一人摇之必致枯槁今之百姓頗類於此常加含養則日就蕃滋暫有征役則隨而凋耗可謂切於治理新史削而不載唐人議論雖淺短然如此見識新史本所不及故輕棄之也令狐徳棻在武徳初便已建明修史故貞觀中晉及南北諸書皆獲完具而李延壽又自為集史雖皆文字不足以望古人而成敗有考統紀不失其補益於世多矣自北齊至隋詞學彚興太宗又置文學館收拾時彦名章俊筆相繼而起後世乃謂東漢以來道䘮文弊房杜姚宋不能救而古文由韓愈始復振此論固不可易本朝繼之以歐王曽蘇然雖文詞為盛徃徃不過記叙銘論浮說閒語而着實處反不逮唐人逺甚學者不可但隨聲因時漫為唱和虚文無實終於斲䘮而已今唐五代姑因其舊勿論宋興二百五六十年尚未有成史諸經自孔頴逹等舊義旣廢而新書雜沓各不相一其他藝文流畧亦皆無所宗統夫皆囂然以無涯之知而肆其自私之辨則孰若知要而篤守降心而約言不然雖有髙材異能均為無用可長歎也習學記言卷四十
