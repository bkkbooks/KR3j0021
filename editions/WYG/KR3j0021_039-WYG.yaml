body:
  text: 習學記言卷三十九宋葉適撰唐書表志史稱高祖太宗之制兵列府以居外將列衛以居内有事則將以征伐事已各觧而去兵者將之事也使得以用而不得以有之此言府衛兵將可也而分畫内外為守國之常經則不在是太宗以征伐定四方督責人材不限内外皆使効力方其盛時不待分畫四夷遁亡所向如意高祖武后時猶有餘勇然其弊已見故自睿宗以來捍邊始别置統帥按秦分天下三十六郡漢因之邊逺外藩有兼隋唐數十州地者只以太守主之自無失馭唐人忽立節度使名字不重實勢先崇虚聲又有遥領兼領而安禄山至以採訪處置羣牧等使與之地望半天下禄山由此反雖然此猶是邊外分畫之失禍侵及内爾若肅宗止於治兵任將經理財用以順討逆而外患消弭天下無事矣無故割裂從都畿始亦為節度使相次徧滿海内真同戯劇唐遂不可復振蓋太宗恃其一身之力驅使内外不為長久分畫之法以遺子孫使愚謬者一旦匆匆至此正以始慮不深故也且已盡置方鎮一切事權皆歸節度使伸縮進退拱手聽之變極而亡固無如之何矣而謂收功弭亂常倚鎮兵亦非也叙宰相世系言唐為國久𫝊世多諸臣亦各修其家法務以門族相高其材子賢孫不隕其世德或父子相繼居相位或累數世而屢顯或終唐之世不絶按孟子稱故國在有世臣之謂推而上至於元凱人材之用必常與其國其民之命相關治亂興衰之所從出也故叔向以欒郤胥原狐續慶伯降在皂𨽻憂公室之卑矣若夫志不必慮國行不必及民但自修飾進取為門户計子孫相接世有顯寵如漢韋平袁楊晉宋王謝北方崔盧唐裴韋蕭鄭之流此叔孫豹所聞謂之世禄非不朽也豈惟終其國而不絶蓋有國雖亡而其家故存者矣隴畆賤士不暇自憂而憂人是以湯立賢無方武王不忘逺得一而用之足以定大事矣史家立義必守向上關捩庶㡬有補於世論俛而就下遂為李德裕只較臺閣儀範班行凖則而已與孟子叔向之意何其逺也唐宰相數百其實有地望者固當譜以見之然亦有庶人崛起者甚衆地與望不相須而必記其所來僅以姓纂又不相應領也按唐有貞觀禮顯慶禮開元禮禮閣新儀曲臺新禮續禮郊祀式皆行於當時其本起於梁新唐志以開元禮為正其儀物名數次序曲折已無不備盡而議論廢興亦具見之蓋自唐至今又三百年國家之禮悉在焉學者不必求之他熟於此志足矣自有志書以來未之有也王通謂史失自遷固始紀繁而志寡不知其指紀繁者謂漢事抑謂古事若謂漢事則正失於寡蓋一代之制不能備其本末而徒雜取他書使後無所考按此所謂失也儒者執空尺度以凖量當世行今而不可復古而不能宜元祐人有使程正叔山中讀通典之論也然通典固可讀耶藉田親蠶禮文極盛按詩載芟良耜祈報社稷葛覃為絺為綌皆所以供祭祀之粢盛衣服而天子后妃與其羣臣妾必親有事焉是則必卑約而後可行必簡質而後可久也王通言封禪非古也其秦漢之侈心乎然則藉田親蠶非古乎而後世之侈如此蓋其君臣内外特相與為戱而已先農者田祖也猶先蠶爾而以神農為祀主古聖人又可侮乎唐志雖具載而不著其非此禮須因儀改定示以反本蓋原於人情近而易知非若其他禮文齟齬而難通也新志言古之作樂者多為之法始求聲者以律而造律者以黍度量權衡皆自黍積之以為古之君子知物之終始而憂世之慮深按書周官左氏論語孟子論樂皆無此惟國語載泠州鳩答問律稱古之神瞽考中聲而量以制無所謂君子者歐陽氏所據蓋漢志王莽時鍾律家所定劉歆所典領工師相𫝊非君子之言也學者最患論世不明轉溺卑近由漢至今無不以制樂為極致尺律起深爭且璇璣玉衡舜實在之以齊七政後世尚不能傳其法而律度量衡自天地以來所同有乃必曰皆起於黍夫有律而後有黍耶有黍而後有律耶以聖人君子之學驅而求工師瞽人之所能又謂樂曠世而不可作宰我言三年不為樂樂必崩夫樂何嘗絶於天下而亦何時而不崩謂知器之必敝而聲不可以言傳亦非也祖孝孫張文收既定樂太宗乃謂聖人因人情以作樂人和則樂和隋末喪亂雖改音律而樂不和若百姓安樂金石自諧矣魏徴遂言樂在人和不在聲音便欲决了此論蓋太宗以治自矜言和則由已無預於樂徴不知其指殆淺率矣夫樂疑非以致人和而非人和則不足以制樂太宗不以時之治亂責効於樂可也而謂我能造治使樂隨以和雖聖人不敢當而太宗偃然當之非泰乎舜聞律音在治忽正恐樂有未諧則治有未至既以已致治復以樂察治此道之宻微非太宗與徴之所能知也又言將亡之政其民苦故聞樂而悲今玉樹伴侣之曲尚存為公奏之知必不悲此尤非也因政成樂政徃樂存人聽其音如在其時季札歴觀衆樂不問存亡孔子聞韶久而忘味安有奏亡國之音而不悲者太宗此言亦謂當我之時恱我之政無悲前代衰亂之心何其意之鄙近也充太宗之治力行不已冝若可以語樂而其見處卑下如此新志所謂時君褊迫不足以堪其事者正應太宗爾若隋文則又未論也張齊賢議凉武昭王為太祖舉傳稱欲知天上事問長人以其近之詩云謂天蓋高不敢不跼又云瞻仰昊天云如何里齊賢在當時亦名善議論而其語意率野至此武后中宗之間人材尤陋耶唐樂章三百三十餘篇其粗可傳者徹豆豋歌一章上笙磬徹豆籩廓無響杳入𤣥主在室神在天情餘慕禮罔愆喜黍稷屢豐年送神一章眇嘉樂授靈爽感若來思如徃休氣散迴風上返寂寞還惚恍懐靈駕結空想云劉晏之作也唐人以歌詞擅名一代者不少矣其偶不用耶抑郊廟雅頌之詞難為工耶舊史不志儀衛新史獨詳載之其羽葆華蓋旌旗罕畢車馬之盛人君舉動必以禮屬官百司必備物所以為慎重也慎重則尊嚴尊嚴則肅恭夫儀衛所以尊君而肅臣易澤上有地臨君子以教思無窮容保民無疆人主臨制天下茍無教思容保之心但多人徒盛文物自尊奢而恐脅臣下一朝散離何所不有蓋其驕華煩敝以徇區區之欲與始皇煬帝何異反謂之尊嚴肅恭非史氏家法也舊史但記三厯新史併記八厯一代所用誠不可不盡載而一行之論為尤詳然新史謂一行始專用大衍之䇿則厯術又本於易按書稱厯象有成法而無起數洪範九疇以凡舉之非數也初一曰五行至五為土亦以凡舉非數也四曰五紀亦以凡舉非數也厯有所起自然之數而書不言以為厯官之事非典訓所當知也孔子繫易辭不言數惟大𫝊稱大衍之數五十其用四十有九而大衍無所起不知何以為五十何以缺一而用四十九其下文即指五行生成之數不知此果天地之次第當然耶五行之物徧滿天下觸之即應求之必得而謂其生成之數必有次第蓋厯家立其所起以象天地之行不得不然也大傳既舉大衍之數乃以易之分揲象之蓋易亦有起法故也大傳本以易象厯而一行及新史反以為厯術本於易夫論易而必及於數非孔氏本㫖明矣而謂厯由易起然則天地國家之初有易而後有厯耶有厯而後有易耶易與厯果為一耶為二耶學者不究其始之所從而放乎末流之糾紛揠道以從數執數以害道此最當先論也新史言太初至麟德厯二十三家與天雖近而未宻也至一行宻矣其倚數立法固無以易也後世雖有改作者依倣而已然自麟德以前各自為術而效亦殊若謂一行之術已備則冝常用而不改謂改作為依倣則冝常效而不差然自一行以後三百餘年未嘗不改而亦未嘗不差何也豈後世之為厯者不足以知一行之術而然耶厯主於驗而已茍信其術而坐視其差固無益於救變也十二次分野昔人謂鬼神有所憑依而自天地以來各世其國歴夏商至周而尤著故占者徒以地象其星而星固不盡繫於地也及諸侯之國既亡而灾祥占測之術亦隨以廢惟水旱兵疫存其大略至於失行愆度彗孛流枉之異則皆在其時君不復以分野言矣李淳風以唐之州縣配昔分野無預於天變但欲正後人因循之失可也而一行乃以為天下山河之象存於兩戒觀兩河之象與雲漢之始終而分野可知以地規天以天繫地真若形影之不可違隂陽必計升降盡察豈有是哉孔子曰觀乎天文以察時變夫地近而可定天逺而難明區區乎以地規天則天文謬而無觀矣唐以來天象之異者上元二年七月癸未朔日有食之既大星皆見在張十四度貞觀初突厥五日並照元和二年十月壬午日旁有黒氣如人形跪手捧盤向日盤中氣如人頭乾符六年十一月丙寅朔有兩日並出而鬭三日乃不見廣明元年日暈如虹黄氣蔽日天祐二年正月甲申乙酉日有黄白暈暈上有青赤背暈中生白虹漸長向東百餘丈二月乙巳有蒼白雲夾日長各六尺餘既而雲變狀如人馬乃消貞觀初突厥三月並見儀鳯二年正月甲子朔月見西方武后時月過望不虧者二光宅元年九月丁丑有星如半月見西方開成二年二月有彗至三月遍指四方自是至㑹昌元年無歲不彗天復元年五月夕有星當箕下如炬火炎炎上衝人初以為燒火也高丈餘乃殞天祐元年四月有星狀如人首赤身黒在北斗下紫微中占曰天衝也天衝抱極泣帝前血濁霧下天下寃元和六年三月戊戌日晡天隂寒有流星大如一斛器墜于兖鄆間聲震數百里野雉皆雊所墜上有赤氣如立蛇長丈餘至夕乃滅咸通九年十一月丁酉有星出如匹練亘空化為雲而沒十三年春有二星從天際而上相從至中天狀如旌旗乃殞天祐元年五月戊寅乙夜雨晦暝有星長二十丈出東方西南向首黒尾赤中白按自春秋至隋日月星之變學者多能記之而唐以來鮮有言者故略具一二浮屠氏書至唐始盛行於中國然實與春秋僖文同時雖夷夏殊方然皆先秦古文也其叙二日兩月乃至暈適珮玦彗孛飛流負耳虹蜺之類以為同分妄見但此國見彼國本所不見亦復不聞殆其惡縁所感而致不然則突厥之五日三月使誠不謬而中國人莫之見何也今星厯家言盡西必占狼星極南必占斗牛又以聲教所不暨皆為狗國此為其國無人言之也若有聰明賢聖者出則其占不止如此故天竺能歴龜兹能樂皆與中國無異又安得專以狼星斗牛限之哉余益知山河兩戒分異之說為非的矣余既於漢志著五行𫝊之非而新史以為自漢以來未有非之者漢以來從之不暇何暇非之又謂祥眚禍疴之說自其數術之學故略存之此尤不然夫以數術占灾異自古已然惟不可出於洪範爾况其中者皆極於神明聖人亦未嘗廢也惟不可出於儒者爾洪範運道而絀術儒者任理而遺數故以洪範占灾異未有能中者也新史又謂孔子於春秋記灾異而不著其事應此亦非也桑榖共生雉雊鼎耳古人皆以事訓其君事不明則改為者無所據憑事明則德正而異消何應之有不然則禍至而應如響雖欲削之可得乎春秋以年紀事灾異即事也若灾異之所以為事與事之所以應蓋其體不可得而並著也然左氏則固著之矣新史用春秋法於紀年已皆紀其大者而不著事應可也志則紀年之箋傳爾安得復用春秋法削其事應而獨以灾異言哉冝其猥積煩多為學者所厭觀既不足以得其大又併小者失之矣新史特志羈縻州府八百餘以為雖貢賦版籍多不上户部然聲教所暨皆邊州都督都䕶所領以見其盛按太宗既勝㓕夷狄遂郡縣其地置都督都䕶以統之已著亂華之漸至𤣥宗創為十節度二十餘年而禄山破兩京終受分裂之禍與晉事大約不甚異然唐人無能悼痛其失而後世因之蓋徒見其盛而已夫務廣地而不務廣德謂力之不如德也兩漢是也若力不足以制外而反失其内則又力之不如去兩漢逺矣唐是也此太宗君臣貽謀之缺非所以為盛也唐取士二十餘條雖皆率意無典法然去魏晉未逺人主之權猶可以進退伸縮一世其後愈益降損則不然矣余毎思自臯陶立用人法三代莫之或改更戰國及秦壊㓕漢乃變為察亷辟署然亦相承七八百年至北齊及隋乃别為科舉銓注今又六七百年矣楊綰沈既濟所言皆漢魏以後事而綰謂之依古察孝亷綰蓋未知古也德宗在人主中不為有識然尚喜既濟之論李栖筠李廙賈至嚴武亦非名士便恊同綰議又衍暢其說以為依桑梓者鄉里舉在流寓者庠序推可見當時人心未至於難回風俗未至於難革若後日則豈可復發口權已在下人主拱手奉行知者羣笑不知者羣怒而亂矣嗚呼當太宗時去兩漢纔數百年爾人心不易回風俗不易革乎然其君臣不知長慮逺覽而甘心亂世之敝法不惟不能變又助成之益堅所以寂寞冺絶至今縱有卓識之君傑出之相而已成之俗安可驟反然則太宗君臣本以力征得天下稍用儒雅文飾之耳國家細宻如此二者既已斷棄而外之經制操防類多粗疎亦盡失古人大意而新史方以謂制度紀綱有以憑藉扶持此余所以屢歎而申言之不能已也新史稱唐之官制其名號祿秩雖因時増損而大抵皆沿隋故按宇文氏與蘇綽盧辨一用周六典更定官名行之已數十年隋簒宇文欲削滅其迹以一人心首易官制盡從魏晉之舊所謂唐沿隋故者隋非能自立一代之法蓋因循前事耳宇文所改雖未必是而隋之所因循者不待辨而知其為非矣今既以唐為沿隋故則固應漫漶紛錯莫知得失之所在然反以為其法則精而宻其施於事則簡而易行制度紀綱垂之萬世然則唐虞三代之治不可復行於後而必隋唐之法可也且秦變古漢不能復武宣以意妄作流及魏晉遂有三省以為政本所謂簡而易行者秦之餘漢之初也精而宻者武宣所創也蓋患秦之簡而以為疎且不便於人主是秦雖暴戾猶未至於全失古意及武宣斷壊之令盡耳况精宻亦何有賈誼云簿書期㑹不報之間以為大故至於俗流失世壊敗因恬而不知怪新史之所謂精宻者豈亦若是歟周官所建宏大深逺大冢宰言之尤詳此乃東周人追載猶未為周公自著書也而歐陽氏已疑之夫簡易精宻既歸於隋唐則煩重粗疎堯舜三代任其責矣漢有賈誼晁錯董仲舒頗能攻斥秦漢之短後人如魏相王吉劉向等尚有所執守唐乃無其人止一陸贄然贄所欲歩武者貞觀及武后時事耳歐陽氏為本朝議論之宗蘇氏專嚮陸贄所以數百年好惡從違無所統一而古人之道終於不可行此亦今世之大患有志於學者所冝知也舊史叙水部郎中之職天下水泉三億二萬五千五十九在遐荒絶域者不可知又言江泗為大川之外百三十五水是為中川千二百五十二水是為小川其具載名數零餘如此必有所考見蓋昔人之於事物無不用其勤矣新史言唐立府兵之制頗有足稱又言古之兵法起於井田又言此高祖太宗之所以盛按府兵成於周隋史非不知而謂之唐立何也每觀後世之論皆謂當寓兵於農故共稱府兵以為得先王之遺意然歴考戰國秦漢之後至未立府兵之前兵農本未嘗相離何待寓也惟其苦爭好戰屢鬭不息民失耕作無以轉餉則國貧而兵弱爾宇文蘇綽患其然也始令兵農各籍不相牽綴既𨽻府額長征莫返而居者晏然不知縁此國富兵强奮其至弱卒以㓕齊隋文因之平一宇内當其時無歲不征無戰不克而財貨充溢民無失業之怨者徒以兵農判而為二故也然則豈必高祖太宗所以盛哉乃遵其舊法行之耳兵農已分法久而壊齊民雲布孰可徴發以畏動之意求願從之名雖至百萬無不用募何足怪矣且井田丘乘所以人人為兵者天子不過千里大夫諸侯不過百里其勢無獨免之民也若以天下奉一君而人人不免為兵不復任養兵之責則聖人固所不為若以天下奉一君而養兵至於百萬獨任其責而不能供則人知其不可今自守其州縣者兵須地著給田力耕千里之内畨上宿衛已有諸衛前兵不可輕改因其地分募樂耕者以漸歸本邊關扞禦盡須耕作人自為戰三說參用由募還農大費既省守可以固戰可以克不必慨慕府兵追羨井田誤離為合徇空談而忘實用矣聖人復起不能易也新史叙節度之兵引兵猶火也弗戢將自焚太宗既得天下不能息兵以富民而用之不已延及高武𤣥宗未嘗創艾故杜甫兵車行言一從十五北防河便至四十西營田去時里正與裹頭歸來頭白還戍邊而史謂高宗武后時久不用兵府兵之法浸壊者非也蓋既以征戍耗亡而不復完補則自然無兵可交及其變為節度之法汲汲自救大權在下愈多愈弱而已然則弗戢自焚太宗𤣥宗之過也肅代節度之兵焚燎已迫雖欲戢之而不可爾非所以責之也舊史載楊烱駁孫茂道蘇知機冕服議識達通諒安於古今唐人本不善立論能如此者固少矣其有俊名不虚也但惜文字煩雜無以發之爾茂道知機何人世之凡鄙妄作徒費爬梳徃徃而是何足算哉新史凡授田者歲輸粟二斛稲三斛謂之租丁隨鄉所出歲輸絹二匹綾絁二丈舊史每丁歲入租粟二石調則隨鄉土所産綾絹絁各二丈稲不應多於粟一斛絹不應特二匹恐新史誤也舊史獨言嶺南諸州則稅米新史併記揚州以錢安南絲益州羅綢綾絹江南以布新史稱非蠶鄉則輸銀十四兩謂之調舊史亦不記也授田本起北齊後周而隋因之然古人用民力歲不過三日而隋唐相承以二十日乂征其庸古人不稅而藉今計田收輸矣唐令里具于實歲終為鄉帳鄉成於縣縣成於州州成於户部又有計帳具來嵗課役以報度支國有所須先奏而後斂易言王假有家交相慶也天下之大安用屑屑煩碎必親手付授而後足故李林甫以歲為㫖符遣使一告費紙五十餘萬條目既多覆問逾年雖古今制度不必盡同然自三代而下經常簡易之法皆不逮兩漢逺矣新史不深考直自高祖太宗截斷言之不知唐後事當安所處若以後者為是則兩稅係省鹽酒百名又唐初所不為若以為非則孟子謂斯速已矣何待來年竟於甚處著力而可蘇氏載司馬氏之言曰天地所生財貨百物止有此數不在民則在官雖然王氏之苛心欲取於無可取司馬之善意欲散於無可散空分邪正一種病民而古人逾逺後世逾迫真有志於民者其可不懼哉唐又有義倉畆二升即正稅也鹽酒茶麴雖皆出於天寳亂後自前代叔季未嘗無加賦至易姓輙廢省以新民如本朝累更治主賢臣然唐五代之末斂非惟不能廢省反因而增算之猶患不足新史不是之思徒備載以為事始何益政道詩云燎之方揚寧或㓕之蓋隋唐既為府衛之兵與民各行法壊不修復不能反遂至竭天下以養兵此受病本根所以因循末世之横斂有加而不可已也若君臣同心儆懼力求所以變易本征末利從而漸損唐以前事猶或可望不然上下相刼制茍且度日如以漏舟重載汎然波濤中孰知畔岸所在則其不亡者幸而已矣刑辟自古有叔向謂議事以制不為刑辟者堯舜禹湯特缺此一門雖有刑而無辟故也故曰象以典刑流宥五刑鞭作官刑扑作教刑金作贖刑眚灾肆赦怙終賊刑欽哉欽哉惟刑之恤哉縣刑以示民而不曰某罪必入某刑惟數聖人為然蓋純用父兄師友之道薰染而入而民亦自然樂從其麗於刑者少矣新史謂懼民知爭端故不為刑辟夫民淳漓誠偽豈有常質不為之法其爭愈多爾又謂後世作刑書無不備俾民知所避尤不然後世君上德薄設險以馭民微細動息皆有以待之使民不知所避卓茂謂一門之内小者可論大者可殺茂已能為此言而况聖賢安得為俾民知所避也又言其為法雖殊而用心則一嗚呼吾不知後人之心與古人之心為一也張藴古奏李好德病狂瞀法不當坐為權萬紀所劾太宗殺之後悔舊史載太宗曰吾嘗禁囚於獄内藴古與之奕棊今復阿縱好德是亂吾法也新史没之既失太宗蓄怒之由况藴古雖實平恕何必與罪人奕棊以慢獄激發人主哉不然則太宗遽斬藴古誠為暴矣六經之道簡嚴易直而天人備乍㸔此語似無病然謂其餘作者精深閎博各盡其術則是六經之外尚别有一理可以發明天下自然敺而從之安在其為備也世外之論惟浮屠氏蓋彼已自為異端殊域姑置之而已若共此世而精深閎博不質於聖人則法之所不許也故凡道理不經聖人所定皆麤淺而狹陋者也非精深閎博也習學記言卷三十九
