body:
  text: 習學記言卷九宋葉適撰春秋隠至莊孟子曰春秋魯史記之名孔子所作以代天子誅賞故曰知我者其惟春秋乎罪我者其惟春秋乎孟子去孔子纔百餘嵗見聞未逺固學者所取信而不疑也今以春秋未作以前諸書考詳乃有不然者古者載事之史皆名春秋載事必有書法有書法必有是非以功罪為賞罸者人主也以善惡為是非者史官也二者未嘗不並行其來乆矣史有書法而未至乎道書法有是非而不盡乎義故孔子修而正之所以示法戒垂統紀存舊章録世變也然則春秋非獨魯史記之名孔子之於春秋盖修而不作且善惡所在無間貴尊凡操義理之柄者皆得以是非之又况於聖人乎乃其職業當然非侵人主之權而代之也然則春秋者實孔子之事非天子之事也不知孟子何為有此言也意者以是書接禹周公有大功於世其道卓越又欲掲而異之乎雖然考索必歸於至實然後能使學者有守而不夸後世之所以紛紛乎春秋而莫知底麗者小則以公穀浮妄之說而大則以孟子卓越之論故也公穀按漢人以為末世口説流行之學見於其書者又有尸子魯子子文子之流自經術講於師傅而訓詁之説行書以義詩以物周官以名數易以象春秋以事以例大抵訓詁之類也口授指畫以淺𫝊淺而春秋必欲因事明義故其浮妄尤甚害實最大然則所謂口説流行者乃是書之蠧也至漢為學官後世相師空張虚義雖有聰明之士終不能髣髴而以科舉腐餘之説為聖人作經之極致矣哀哉左氏未出之前學者惟公穀之聽春秋盖蕪塞矣孟子雖曰天子之事司馬遷聞之董生雖曰禮義之大宗然本末未究而設義以行吾懼褒貶之濫及也既有左氏始有本末而簡書具存實事不沒雖學者或未之從而大義有歸矣故讀春秋者不可以無左氏二百四十二年明若畫一無訛缺者捨而他求焦心苦思多見其好異也若然則春秋非左氏不成書歟曰非也孔子謂夏殷禮吾能言之杞宋不足徵夫春秋非詩書比也某日某月某事某人皆從其實不可亂也今將以實事詔後世而學者無徵焉顧使公穀浮妄之説宛轉於其間乎故徵於左氏所以言春秋也始卒無舛先後有據而義在其中如影響之不違也嗟乎不降其心難矣哉周自昭穆之後君徳雖衰紀綱法度故在厲王大壊矣猶曰釋位共和而間王政未有以霸統者也及周室東遷平桓欲自振不能而齊莊僖稍已鳩諸侯荆亦始大遂有桓文之事而呉越起東南天下之變故繁矣故春秋因諸侯之史録世變述霸政續書詩之絶緒使東周有所係而未失盖世之治道之行而事之合乎道世之亂道之廢而事之悖乎道皆其理之固然書其悖謬以示後世皆森然具之豈待察其所以而後知也太史公自序察其所以皆失其本已此其大旨也以孔子之言考之管仲相桓公九合諸侯不以兵車一匡天下民到于今受其賜微管仲吾其被髪左袵矣如其仁如其仁所謂其事則齊桓晉文者此春秋之楨幹也又曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出蓋十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣天下有道則政不在大夫天下有道則庻人不議春秋書法備此數者因其出也見其失也反其在下遏其横議此春秋之繩墨也至於凡例條章或常或變區區乎衆人之所争者乃史家之常春秋之細爾學者不可不知也古者一正朔國自為年其月則天子之月也三代各有正左氏所謂周正月釋非天正也左氏之稱書不書不言不稱之類必其所疑也公穀所謂不言不書之類非其所疑也按左氏所言書法皆舊史文其經孔子特修者皆别異之孔子自言吾猶及史之闕文盖是時學者已浮於古矣所貴於孔子者貴其存古非貴其作古也於其義有所不盡者發之理有所害者更之則亦不得已而然不以此為功也既已修定則舊史之書法即孔子之書法故凡左氏所釋悉本舊文而時見新義後有君子當以是考之庶㡬不以實事為空文也以空文為實事其害淺易正也質之以實則信矣以實事為空文則其害深而難正以為離實猶弗信也凡左氏公穀叙事本皆同者皆當時之所謂大事天下所通知者也以隠公一書言之隠公攝位鄭伯克段是也隠公不終其為君當時共信之後世獨疑其不然故余以為害深難正者此類也左氏釋稱鄭伯譏失教最得書法之意段失弟之道已無可言如鄭莊公者亦能知殺弟之不可然志在於勝之故不稱其所命將而以親克為文盖即其所不為者責之以為猶可責也若曰知不可殺豈不可教云爾公榖皆言殺段盖當時相𫝊以為死矣君子以督為有無君之心而後動於惡故先書弑其君左氏釋先後之義精矣公穀亦自以為精義然皆不切事情之詞也故余以為浮妄多此類此桓公書叙事本皆同者蔡侯鄭伯㑹于鄧左氏以為始懼楚公穀弗知也文姜齊襄公未弑以前為齊而徃者六既弑如齊者一如莒者再盖自桓公固與之如齊以此見殺莊公之立生十四年矣春秋於其所悖謬而書未有如文姜之詳者也於莊之初立以孫絶之者父讐也因其出或饗或㑹别而著之者母恩也異義所以兼明子道也猗嗟之詩曰刺魯莊公嗚呼莊公可刺也以為失子之道則非也紀侯見滅公羊以為百世可以復讎此固妄也就如其言哀公雖紀侯所譛而周所誅是併讎周也天子在上而讎之曰無明天子且併讎周春秋又從而賢之賢其藉古怨讎今主而滅人國乎不修春秋曰雨星不及地尺而復君子修之曰星霣如雨不修春秋指魯春秋耶雖陋何至是楚始以荆見左氏無辭疑若始狄而後國之公穀或可以立義也商頌曰撻彼殷武奮伐荆楚鄭語荆子熊嚴楚蚡冒盖荆楚兼稱在春秋之前矣宋萬弑君三𫝊載事本皆同據左氏則弑君實在前也復㑹于鄄左氏謂齊始霸一語而已至叙晉文則事辭諄復又管夷吾治於髙徯亦不過一二言若狐偃趙衰書庸多矣盖齊桓管仲之行事暴著於天下當時無不知者故左氏不殫載也閔僖文季子来歸齊仲孫来齊髙子来盟當時魯難倚重此三人故特字而貴之此一時史法而孔子因之不待二百年後方復追字其人也凡悉本舊文明證皆如此但讀者不考耳鄭人所為賦清人故曰鄭棄其師亦當時書法也平王既亡岐豐至是山戎狄楚競起無齊桓㡬失中原矣書伐山戎書救邢書次書城皆羙事也城楚丘左氏以為魯諱於春秋之法宜若著齊及諸侯者然亦不改以為外美未重於國諱也侵蔡蔡潰遂伐楚古者善惡是非皆出於實其行一塗未有為之名以借於外使實惡而名善者也為是者則始於召陵自是道徳大壊百世不復以桀紂之實假湯武之名雖聖人復生不能救也悲夫孟子曰乆假而不歸惡知其非有也害徳莫甚於假愈乆則愈喪耳焉能有乎周封曲沃其柄已盡失及王世子為㑹綴君位於齊逆父子理而周不復有命令矣或曰襄王嫡也子帶亂也樹嫡黜亂非春秋法歟昔王季愛文王而太伯去之周是以興不能考古人之徳而欲用春秋之法宜王道之遂廢也救邢寗母管仲語可紀者三焉然召畢之風盡矣自是以後凡仗信秉禮以成其利心者皆假也處士諸生又别為隂謀之書於是申商韓非之術並興孟子屢言五霸按春秋無五霸若併數夏商則其名存其事軼當考君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列公羊以為雖文王之戰不過此語未可非也以宋襄公言考之當知古人行兵用師與後世絶異易所謂否臧凶於此騐之也晉文公譎而不正齊桓公正而不譎桓文之事以二字蔽之盖齊桓猶未至於用譎也晉文無不譎者矣仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地也且明徳也左氏特舉此見孔子改史之義明其他即用舊文也後世不知以為盡孔子作且不信左氏一一箋釋虚實皆失事義俱亂不惟不足以知聖人又不知古有史法矣殽之戰秦穆公作誓録其一時受責之義可也若其事則不過奪攘報復而已何足以興王者之治乎湛露彤弓之對寗俞婉而正矣是故禮不可以徒具也臯陶庭堅不祀忽諸姜嬴荆芊何以代姬暴强而已史伯之言過也公子遂魯之賊載事者所貶也衡雍之盟免於晉討三日之間又盟雒戎弭難消患見貴一時故再書以顯之此亦當時史法也求車求金但曰非禮不盡其義也天王之法無求愈踈闊矣雖不當事茍有禮焉書也當時書法之重如此也敗狄于鹹三傳載略同言特敗一人公穀誤也楚聘椒叔彭生譏其傲也呉季子則賢矣秦聘術而公子遂以為無陋於是而秦始能聘歟然則當時禮文之事至魯而後定也禮之定可也禮之具如之何郕降于齊師秋師還晉人納捷葘于邾弗克納還者能自還也弗克者能自克也捨惡反善春秋之道一而已矣盖善之而非貶也梁亡自亡也亦不待貶矣宣成趙盾趙穿之事當時天下共知三傳所載無異盖董狐特立此義與他史法不同舉世從之雖孔子不能易也然而聖人亦自以為太重而傷趙盾之慮不詳被以此名不得辭也故曰惜也越竟乃免盖舊史之所嚴者孔子之所寛也後世乃以盾為實弑其君妄説也嗚呼左氏之書不知有公穀者在前故也公穀在後不知有左氏者僻陋故也兼不相知其事同者天下之通見聞也今反以為妄而疑之非以實事為空文乎學者所患因書而為道書異而道異故書雖精於道猶離也以道為書書異而道同折衷其然與不然而後道可合也然則世之言春秋者因書而為道者也公及齊侯平莒及郯莒人不肯公伐莒取向操平人之心俄變而為伐取天下皆是也虞芮質厥成文王蹶厥生顧不敢當也今也平人不肯又伐取之文王其不可見乎公子友自閔之初魯人喜其來歸始執國柄行父繼之至宣之末歸父與君謀欲去三桓以張公室未成而逐七十年爾父子皆忠力而君威己卑私權已勝為上下所患苦於是箕子三徳之言騐矣至襄季年宿取卞㡬不敢歸國則魯亂已成距歸父之逐垂五十年又二十七年而昭公出亡盖百四五十年間日引月長化忠力而為僣簒則箕子所謂害于而家凶于而國者也雖然諸侯之無天子至是已乆則倒持之禍勢亦當然若夫家臣不足道也五體尋經傳以左氏言考之舊史法章大煩直志在懲惡而不足以勸善聖人之所修微晦婉美懲惡而能勸善者也後世説春秋正用舊史法耳以其不求諸左氏也孔子曰人而不仁疾之已甚亂也又曰予所否者天厭之天厭之聖人之志於此可見烏有以苛刻激嬈成書者乎襄雞澤之㑹大夫始盟溴梁之㑹大夫専盟自此諸侯失權霸統不可復合左氏但紀事實不論世變固失之矣然以其事考之髙厚歌詩不類輯睦威懐豈無道焉而荀偃遽使大夫盟喜怒自由誠偃之罪也若雞澤之㑹諸侯既盟陳始吿服不盟則非成再盟則為凟於是使大夫盟之一時之事不得不然雖知道者欲不為之變而其勢有自來矣禹㑹諸侯防風後至執而戮之成湯之慙仲虺雖賢不能釋也故孔子以為禮樂征伐自諸侯出十世希不失至是而諸侯不可以無大夫蓋由幽王以下何止雞澤溴梁之積也學者於一日求之失孔氏旨矣鄧之㑹蔡鄭始懼楚郯之伐季文子始懼呉呉楚均以夷狄病中國然楚之抗衡也乆更齊桓宋襄晉霸累世迭成敗狎主盟終於春秋欲絶之不得而絶也呉暴興一隅至夫差始爭霸其事尚淺故春秋終外之特書㑹書及書以國而不人不使與楚齒盖進其不可絶非曰予之至其猶可外則無為内之也此春秋之志也嗚呼孔子暮年疚心疾首於呉矣宋之盟以弭兵為事用極而鈍亂極而息也舜禹班師舞干羽君臣相戒兵猶不可用况可弭乎人紀壊道統滅皆始於宋之盟自是以來號為治世不過弭兵而已此又世變之大者賈誼所謂足反居上首顧居下倒懸者也至唐太宗窮追逺討乃云雪恥酬百王除凶報千古斯又悖矣昭定哀琴張聞宗魯死將徃弔之仲尼曰齊豹之盜而孟縶之賊汝何弔焉君子不食姦不受亂不為利疚於回不以回待人不盖不義不犯非禮自周衰上無道徳以一天下士各為私義矜其所善以害至公如琴張宗魯其初皆一種見識孔子所為明道教人正以開闡此義但患學者承接不去耳此又非止性分上工夫惟顔閔仲弓冉伯牛為孔子所同外此雖曾子知道亦未能盡其義子路之流固不論也故春秋書齊豹盜三叛人名獨此為改正舊史發明大義其他凡後世所言春秋之法千條萬端皆浮辭贅説也書王室亂居皇入王城立王子朝以王子朝奔楚其文核而不隠豈孔子意哉盖因史耳以濫來奔求名而為不義不求名而為貪後世之敝無不然害教之大者此道之所以喪也故曰微而顯婉而辨若亂臣賊子則其法素具矣不待聖人也古者君薨百官總已聽於冢宰三年踰年而即位者後世之變禮也雖舒疾異然必行即位之禮以左氏考之不行即位之禮者皆有故行其禮則史書之不行則不書此簡䇿之常文非立義也昭公之喪以六月癸亥至自乾侯而戊辰書即位即位不日者必其朔也稱戊辰者失朔而實其日也皆常文也齊豹為衛司冦守嗣大夫作而不義其書為盜盖以大夫應書黜而盜之也故孔子曰以吾從大夫之後明大夫之尊也孟子曰大夫有賜於士不得受於其家則往拜其門按陽虎雖執國命而家臣也所以臨士者以其勢爾不得稱大夫書曰盜竊寳玉大弓正應為盜非黜之也仲由為季氏宰將隳三都真若張公室者盖陽虎既亂因其欲也而孟氏弗從然孔子非能掃三桓而更之欲其循於禮而自服耳故季桓子受齊女廢朝謁而仲尼去魯矣左氏叙孔子及弟子事不如其他雜説之詳且子産晏子始末尚備載無遺安得於仲尼反更䟽略然則諸家𫝊聞之辭波流蕩溢或不可盡信也西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之左氏所載獲麟事不過如此使其果如師已之駭鸜鵒則安得缺而弗言况春秋之作於麟何預自七十子之徒未有稱者特經生陋儒故張大之非義理所止也習學記言卷九
