body:
  text: 習學記言卷四十三宋葉適撰唐書列𫝊牛李之黨蔓延可畏然罪在李吉甫如皇甫湜輩烏足以為訐而吉甫懐之子孫不忘宰相不平心國家安危存亡所由分也本朝范吕事亦然元稹本與白居易同稱然一隳節取卿相則不得齒於士類遂與裴延齡皇甫鎛等古今人受病䖏皆以身之材能外之官職對立一念既偏至於失其身而不能救是真可哀也白居易論詩謂周衰秦興六義始刓及江鮑則六義盡去按周官教六詩不言詩有六義主文譎諫蓋後人顛倒其説孔子教詩但言興觀羣怨而已居易專以諷為主固已失之自既以此致謗至本朝蘇蔡遂成詩禍矣李渤校宰相考當時議者以宰相曠官自宜上疏論列而越職釣名非盡事君之道夫以考功而考及宰相謂之乆不行可也謂之越職不可也余觀左氏載君子之論亦當時所謂議者其間不近理極多大抵古今風俗好惡不甚相逺其因循拘礙則謂之流俗而能自超越者則謂之賢但世愈降則超越者愈微而道義遂淪沒矣如何愧古人乎唐賢良䇿惟有劉蕡余嘗論唐人無識治亂者惟以文華進身以氣力任事隨其所至裁割而成如蕡考據經術條析急務一時大義略皆先具進士之俊傑無能及矣然知治與致治不同惜蕡不一試用觀其所為如何也宦官所以制人主之命以其有兵而訓注之徒但欲殄滅其人至不勝遂從兵以逞唐之亡形由此成訓注固不足道然唐人之慮要自無及此者王叔文収宦官兵權不就韓愈著於實録方以為幸其詩謂六軍百萬虎與貔天子自將非他師一朝奪印付私黨懍懍朝士何能為昔季路墮三都不克而孔子出奔人在天地間職分必有所底麗不然雖勵志無用也李德裕宻勿綜理當國威重知大體料敵制勝任事獨克唐宰相皆所不及然其以父為凖的父之所怨已亦怨之結成大隙不可救止自為黨魁而辨愬朋黨不少置豈惟身灾國祚長短之所繋也嗚呼徳裕智不足以知此以天下之大惟父是崇至於宗不能庇而猶不顧省豈所謂賢哉道家澹泊主於治人其説以要省勝支離漢初嘗用之如蕭曹是已浮屠本以壊滅為㫖行其道必亡雖亡不悔蓋本説然也自梁武不能曉用滅國之術當身而失至唐憲懿識慮又出其下直謂崇事可増福利悲哉流品不分無甚於唐至末年始欲分别劉瑑謂當循名責實崔愼由坐此罷周官以九兩繫民清濁麤細各有所得此真循名責實之要非戰國秦漢所能知也而況瑑乎然崔逺以風流為時所慕有飣坐黎之目白馬之禍與唐俱亡昔石勒謂王衍不可加以鋒刃夜排墻殺之而朱温乃投於黄河使為濁流夫以流品自標爭於亡國而擅其貴位此豈伯夷所謂清乎新史叙羣盜亡唐其一因王處存定京師悲唐室屏翰皆為朱温翦覆甚於禄山黄巢之害其二謂王重榮似霸而非其三惜楊行宻無霸材不能提兵為四方倡以興王室其四鄙高仁厚田頵朱延夀材不足為吳蜀之老夫唐自天寳失馭無故𤓰分為藩鎮么麽盜賊據天下要㑹百餘年禍日深内有中官為疽根廢立生殺出其手至於驕卒饑民相扇四起壞於黄巢秦宗權極於朱温李克用裨刼特剽儵敗忽成隨所建置而得將相坐待滅盡豈有救法尚欲責重榮行密桓文之功而以管仲狐偃望其下耶歴觀前世周晉以諸侯王漢以外戚宦豎秦及隋唐以盜賊其勢已成雖聖賢復出無益於事咎猶不能容口而況為之者欲措手哉苐前世之事不足追議本朝立國幸無前世之患獨有契丹之患湏為服弱使弱而常安甘於屈服何所計惜然真宗仁宗當太平盛時已不敢保有中原至靖康果失之自建炎以後所願保有者江淮吳蜀而已然兀术一渡江則江東西兩浙皆震蕩幾不可立中間凌突淮漢聲言渡江縱横破碎難於補葺者凡數四焉夫極盛不免衰微之形已安常有覆亡之懼所恃者惟有納賄請和堅守不背約爾況舊敵垂亡與新冦並行人事草創和好未成直指江淮所在城戍望風奔遁我雖無虐政逸徳可以召亡而敵威所加自然有土崩瓦解之勢然則安樂無虞引日玩嵗而傾壞常臨於目前未知曉事者何以救之是其證雖與前世不同而同歸於亡則有甚矣故余素論常欲於沿邉牢作家計壯固藩牆以保堂奥之安且漢淮沃壤形勝控扼直以並塞視為棄物今若取地五十里間比其室廬時其耕稼什伍而用之敵來必捍於垣塹之上長㦸勁弩持滿以待則自此以南人情帖然蚤臥晏起無朝夕之憂矣此今日救法百年之利也或曰自古未有沿邉二千餘里縻費數千億萬尺寸而守其地若是之拙者然不思今日甚有費數千萬億為無益之用嵗嵗無窮未嘗敢一毫削損而獨此之吝何哉又請以一家譬之夫富者多積厚藏廣宅美堂聚子孫而居何嘗不高牆外實僮僕備守不使强鄰暴客輕輒窺伺而後得安者與天下一家何異盡沿邊道里費數千億萬尺寸備守乃事理當然安有袒禓空洞示人以室家之好皇皇於内而反不汲汲於外歟孔子曰微管仲吾其被髪左衽矣不然以堯舜文武所𫝊之衣冠禮樂道德仁義將一舉而棄之吾不知所稅駕矣按崔彦昭相於乾符初在路巖楊収韋保衡後僖宗尚能加以訓誡勉其克終不知此意出於人主或中官為之然則雖將亡而馭臣之柄猶存也至於舉一國以聽姦臣之所行賢否同聲威福日運而莫名其所以然彼卒伍賤人未至於横潰而問罪者特有幸不幸爾唐末可稱者劉瞻崔彦昭鄭畋鄭從讜王鐸至鐸為収復元功然以三百口併命於高鷄泊則士大夫力指氣使之勢蕩盡而唐隨以亡矣蓋識慮不及而倚虚驕立事唐人之敝也若鄭綮粗自立能量其材分所止未餗先顛不為國辱比於諸人殆似過之而當時反以為命相尤謬季末之妖然則議論好惡若此國祚何以望其少延哉按舊史獨孤及為盧奕諡議中間稱或曰洛陽之存亡操兵者實任其咎非執法吏所能抗師敗將奔去之可也委身冦讐以死誰懟及以為不然云云夫居位食禄必死其難乃理之常當及議時庸夫小人間有為此論者及因而正之可也至新史修改遂揭其語於前而後著及議則是當時衆論無不如此非及不能破之是以一國之大不復有人心之所同史文顛倒豈不害義余觀夏侯端劉感常達羅士信吕子臧李公逸張善相李𤣥通在唐初草草君臣未定而皆能以死固節及貞觀開元之後反有此論又如張廵許逺事尤卓偉亦有謂其死守為愚者昔由于言脾洩之事余亦弗能蓋興亡之變可見矣昌黎作諍臣論年甚少是時意盛謂天下事但當如是為之及出入憂患終不能有所為去陽城逺矣城與元徳秀卷舒以已而不以人唐人未有及者近於東漢人矣蕭穎士仕不為已而以誨俗進人為任蓋又其次也其與李林甫相失事新舊史載不同以其所立考之舊史妄矣然舊史言穎士以縗服至政事堂為林甫所逐不過門生賔客下俚謗讟之辭自無足辨而新史乃稱宰相李林甫欲見之穎士方父喪不詣林甫嘗至故人舍邀穎士穎士前往哭門内以待林甫不得已前弔乃去怒其不下已云云疑亦出於門人所傳非其實也蓋以今準古宰相至故人舍求見名士大為難事戰國相傾容或有之田蚡過竇嬰同列尚不肯遂成死禍侯霸召見嚴光光報以腰領絶霸怒封奏其書然則雖古宰相亦未必肯下士也自父喪不詣以下當削去别修讀于公異吳通微兄弟事為陛贄歎息唐置翰林本非用人材正路後出干進者資淺而地親雖以贄之賢居羣小所必争未能免於利害是非之間也贄既不能容又不能去以此得相而欲濟世難矣至本朝欲以唐故事使蘇軾入翰林則不然蓋已位次執政習見為貴人當王安石變更而得地位重者與之較或未可知然宰相止以近例始入館則眇然朝士上書諠譁而已去之如掃枯葉何難之有古人立人之朝必觀時度已而後制義矣立國之勢有未當論治亂安危而當先論存亡者自昔善論之士少有能之新史謂唐三變歸咎於𤣥宗而於神䇿宿衛之兵姑汎言之而已如募兵藩鎭以治亂安危言之可也而存亡之分猶未及焉自𤣥宗以楊思朂將兵平蠻始啟亡國之禍肅宗用李輔國代宗用程元振魚朝恩徳宗遂為故事不獨其君以為故事其臣亦以為當然終唐之世未有言其非者惟劉蕡對䇿欲挈兵柄以歸於將然王叔文既已取之而不能使蕡得用未知其何道以歸於將也然則以唐事考之募兵藩鎮不過能危亂其國而亡唐者特中官將兵而已三代所以乆長及其諸侯之國有至七八百年者皆以其雖可危亂而未可亡故也使其可亡誰得而存之至於今日事勢亦只當先論存亡今日存亡之勢在外而不在内而今日隄防之䇿乃在内而不在外一朝陵突舉國拱手隄防者盡壞而相隨以亡哀哉昔三良之死秦人為賦黄鳥以哀之李邕將見殺孔璋不識面乃請以身代死其為國愛材惜賢之意又過於黄鳥矣秦穆公狃所私以殉君子猶謂之棄民𤣥宗昏庸聴姚崇張説李林甫放戮名士如除垢汙斃狐兔棄天下不亦多乎冝其保治不終隳唐之成業也突厥既嵗侵無已宇文士及請避冦將遷樊鄧豈不用大王語乎而羣臣多贊行者獨太宗論能假數年願取可汗以報卒滅而臣之盖雖興王未有無為亡國之計者士及何足道也澶淵之役以和為權冦凖雖不肯遷然輸幣約和幸其少定而上下之論不自警惕求其當然反謂上䇿無出於和至今不可移改然則士及何足道哉太宗初或請築古長城發民乗塞帝陳頡利四事證其將亡古稱天子有道守在四夷其衰在諸侯諸侯守在四隣其衰在四境築障煩民誠為下䇿夫有道而不知修有障而不知築捨下策而自歎其無策將何以自存乎郝靈佺傳黙啜首事宋璟謂天子年少好武抑其勞逾年僅授郎將靈佺慟哭而死按黙啜强盛為中國患殺人不可勝計有能得其首者可謂大功安得無厚賞今為他虜狙繋而靈佺偶入蕃乃傳首之人爾行賞如此正合事宜不知何名為抑況唐是時兼制戎夏黙啜雖死而暾谷為患未衰方勞攻守之計亦不得言好武强開邊隙也恐此非璟本語而後世信之傳誦不已捨明從暗失實得虚利害不細新史因叙張保皋鄭年併著李郭遂反召公不說事以為茍有仁義之心不資以明雖召公尚爾况其下哉觀君奭篇周公為周家長久堅留召公詞語明白不待講解而知若新史用世俗所疑則其陋甚矣何足稱述不然則所謂有仁義而不明者安在且烏有仁義而無明而可為召公耶太宗既滅突厥又平髙昌吐谷渾焉耆龜茲號四鎮置兵三萬人唐人供億者行萬里矣太宗嘗語大臣朕始即位咸言天子須耀兵以威服四夷惟魏徴勸我脩文徳安中夏中國既安逺人自服今天下既安四夷君長皆来獻此徴力也夫徴之所以勸修文徳者欲其息兵而不用而太宗無一日不用兵則徴何勸之有四夷之所以来王者謂不用兵而自至而太宗因勝而後得則徴何力之為盖太宗以武功而駕言於文徳以拒諫而傅致於從諫學者不考其實而信其言為後世害大矣禹稱外薄四海咸建五長各迪有功則如太宗立四鎮置羈縻州府之類亦必有之而其事逺不可見矣然苖頑弗即功則其君臣以為深疚而所謂誕敷文徳舞千羽於兩階者亦不若太宗以黷兵為偃革而欺後世也新史諸𫝊好以刻削簡約為功又必易本語之質俚以從雅馴反墮褊迫故可觀者殊少惟夷狄諸𫝊多佳如渤海𫝊最勝支司憲相不甚佳史載訶陵國上元間國人推女子為王號悉莫威令整肅道不舉遺大食君聞之持金一囊置其郊行者輒避如是三年太子過以足躪金悉莫將斬之羣臣固請悉莫曰爾罪實本於足可㫁趾羣臣復為請乃斬指以徇大食聞而畏之不敢加兵此與商鞅事同古人勤心苦力為民除患致利遷之善而逺其罪所以成民也堯舜交武所𫝊以為治也茍操一至而已又何難焉故申商之術命堯禹曰桎梏戰國至秦既已大敗而後世更為霸王雜用之說自以為甚恕矣至於書𫝊間時得其一若申商之類者未嘗不拊卷嗟惜以為偶舉而必效當行而無疑也今史載其事而不辨其失意亦出此哀哉太宗十七年伐邊既不勝二十年復伐薛延陀滅之北方悉平其詔謂曩者聊命偏師遂擒頡利今兹始宏廟畧已滅延陀至云混元已降殊未前聞無疆之業永貽來𦙍斯實書契所未有古今之壯觀余觀府衛之成太宗獲其用所向必克如此乃以為一已神靈致之耶又太宗二十餘年間曽無一日息民靖國之念其去煬帝幾何而新史以為中材庸主之所常為夫常為者固可無敗而中材者卒以乆存歟僕固懐恩雖驕而非逆李光弼激之終以畔亂唐幾亡後世方以斬張用濟為名談可謂不中利害之實矣惟顔真卿言懐恩不反薦用郭子儀始有収拾䖏五代史朱温事至不足言然其脫於盜賊以宣武節度區區数州在四戰之郊而能翦滅黄巢秦宗權咀吞河南山東竟簒唐室更七姓至本朝皆因其故都邑而後人之論乃以大梁為不可戰亦不可守使女真入吾地數千里如無人而卒有之其故何也余嘗數李綱世所謂有志宗澤世所謂有材二人皆已位將相使其盡河南而守身當勞苦而以安佚付黄潛善輩國家之敗宜不至酷烈如此而朝廷競言和議以為得計若猶不悟則又將有甚焉者然則議論定而利害明要先自士大夫之心術始可也李克用父子李嗣源王從珂三姓不同皆稱繼唐雖可笑而唐之故家文獻由此粗𫝊豈惟一唐乃中國夷狄分合之所繋也劉備諸葛亮號為紹漢而漢事乃無髣髴余於莊宗蓋有感焉晉紀𫝊載出帝䧟虜及桑維翰景延廣始末甚詳是時中國已再與契丹和韓琦富弼守信誓如金石然不知靖康之禍有甚於開運也余頗疑漢人固已專主和親然猶未以此遽分士大夫之賢否功罪方建炎紹興十餘年間天下能憤愾視之如仇敵秦檜堅持之自此不惟以和親為性命義理之實而言復讐雪恥者更為元惡大憝滅天常絶人理其事極大未知此論何時當囘也裴樞獨孤損之流雖其力末必能存唐終不亡唐而獨存樞語如此然是時已隨朱温至洛陽何不亡唐之有其不使非清流為太常卿乃習氣尚存耳以此立義欲扶世教亦如司馬氏言不當命韓趙魏為諸侯而自壊其名分也又張承業諫唐莊宗無舉大號與茍彧不欲曹求九錫者語意正同彧為操所殺而承業至於自殺承業宦者見聞不廣獨持一意自應如此而彧何為亦然孔子所謂不能反三隅者與劭許異矣初後唐廢帝憂石敬塘吕琦李崧請與契丹和如漢故事給金帛妻以女是時張延朗為三司使謂嵗費十數萬緡責吾取足何也事既不行而敬塘竟以割地稱臣得天下及劉旻抗中國亦倚契丹後不助則破滅矣此一段議論至本朝遂為廢興存亡根本方曹利用往來評認遂有手指三百萬之𫝊然則琦崧䇿盡蕪俚不過十數萬緡而君臣之間猶喧悖不同如此况敬塘嵗賂亦止於三十萬疋絹而已冦凖既過用之反以為大功名王旦又依並作無限勲業冨弼再和墓碑乃明言増幣二十萬而契丹平北方無事又四十年大書深刻後生𫝊誦以為元臣碩相殊勲盛業無出於此余老矣不復預世論誦吕琦𫝊掩卷嘆息而已習學記言卷四十三
