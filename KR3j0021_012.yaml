body:
  text: 習學記言卷十二宋葉適撰國語周至晉祭公謀父諫征犬戎自春秋以來讀之便為迂緩然穆王時上接成康兵偃刑措乆矣一旦征行倉猝暴師於逺是始禍也其語如此正合事宜爾古今遼濶學者不推其世觀之難乎得其要矣修字尤宜細看榮夷公専利在當時大為異事故曰王人者導利而布之上下由後言之為材臣矣宣王不籍千畆而料民戰國之風氣已開然號稱中興而吉甫方召之徒自相歌頌得非新進驟起以旦夕成功盖舊人前輩所不與耶故太子晉但與幽厲同稱亦學者所當知也修徳者以為無事於功責功者功成而徳日削矣常棣詩國語以為周公作與左傳異左氏採國語凡數百言者約以數十字而已穀洛鬭將毁宫而壅之由後世而言水敗宫闕隄防急務不待令而趨也而太子晉諫詞深切前鑒共鯀後指幽厲怛然畏禍亂之在前古今異意不亦甚乎學者從是求之足以深思而逺尤矣孟子論禹行水但以為無惡乎智猶降此等數語當併考周人之論尚徳尊舊薄功厚本嚴報應崇鬼神至東遷後流風不改然坐視俗壊道淪亦不能反也周語所記雖皆古意極有不通於世者如叔向子産晏子乃無此病然與時升降先民之所存者鮮矣惟孔子渾融不見其隙爾叔孫穆子謂臧文仲之言立今在魯語者不稱豈陋於記録將忽忘之耶莒僕事魯語與左氏詳略大異左氏雖記舜之功然近於浮矣伊訓謂方懋厥徳鳥獸魚鱉咸若行葦言牛羊勿踐履而孟子有不勝食用之論觀里革斷罟事廉貪仁暴盖有底止王政君道其則匪渝古人常所講明也後世失其宗本雖儒者亦不復知可歎爾義理有擇而無降謂陷而入恭誠非矣老子於道徳仁義各有失字齊語載管仲相齊本末粗備後世言治功者皆祖述之然詳驗細考多所不合今䟽下方昭穆固無治效可論捨文武而論昭穆豈是時已變周制耶然其語不類春秋時盖未足據四民勿使雜處别生分類雖自古而然然民情亦未嘗不然也處士於閒燕謂學校也不言學校而言閒燕是不知學制爾工必於官府是使餘民闕於器用也商之市井農之田野固不待上之教令矣其要欲使四民世為之其理固當然而四民古今未有不以世至於烝進髦士則古人盖曰無類雖工商不敢絶也制國為二十一鄉不知太公舊法如何公與髙國各有所帥君從臣則卑臣踰君則犯君臣相媮則競非霸術也此處士妄議為國者也𨼆令寄政尤為複重盖比閭族黨古人未有不於此𨼆令寄政者豈待管仲而後能之軌里連鄉皆作書者自為之名非其實也又言有此士三萬人方行天下齊國之大何止三萬人為兵併家計不知矣田單亦言帝王之兵不過三萬令鄉長舉善刑姦退而自修此意固善自古亦未嘗不如此何必管仲也其説草畧疾急安能上下孚信而欲在家者各得為善之利乎若以為上下簡直易通則鄉大夫賔興之法與民何嘗拘礙而管仲輕變之也以為修廢則非舊典以為作新則奚用紛更管仲通達治體固不如此但其智不足以盡行王道故有殘缺茍且之患而張其説者方以為新竒陋矣伍鄙亦舊法但伍字為異耳且制國以萬家為軍三軍三鼓大柄所在制鄙乃以九萬家為屬都鄙不相命而以五承古人也觀優施之言誦柏舟之詩善惡之相仇不待相遇而後毒加焉悲夫晉之亂荀息為之也其不遂亡里克也其亂乆而不已亦里克也宰周公言齊桓不務徳此周人及當時君子之論也自常人及後世言之徳之貶於桓者衆矣晉非號召而欲自至後之為霸固無此事晉文公不圖入於恵公未入之前為亷也然其後不免妻懐嬴殺懐公以求入晉語始末比諸國最詳左氏叙事採用其語煩簡工拙可考使同姓同徳而為異姓異徳兄弟而為路人則堯之親睦舜禹之惇叙周人常棣之義廢矣霸圖淺近乃有此等見識議論雖多聞何為也多聞不能行古人分此二節子路謂唯恐有聞也然聞識無盡行之道易言畜徳可矣晉之興司空季子慱習陽處父為國人所敬其後伯宗似之諸侯之史日存君側以其善行以其惡戒此晉人所言春秋也教之春秋而為之聳善而抑惡焉以戒懼其心此楚人所言春秋也韓宣子所見孔子所修左氏傳之此魯春秋也然則晉謂之乗楚謂之檮杌當是戰國時妄立名字上世之史固皆名春秋也古之人君不能從諫其相為終始以諫者不加怒也後之人君雖能從諫其相為終始以諫者不加恕也叔向之思司馬侯後世人君之所諱也人材隨世盛衰晉暮年盡入强家雖叔向之賢猶不得盡為公臣如董安于閻没女寛之流固不足道也家臣自是一種氣象晉陽尹鐸之所寛沈竈産鼃民無叛意戰國以後有此事不知㳺士増飾其詞抑實然乎等為虐用其民無復愛利之心而姑欲致厚於一二以為喪亡之地何哉鄭至越史伯所答雖鄭事盖周語也宗周將亡天下分裂史伯以諸侯輕重之勢占其所歸是時猶有古人功徳之餘異乎後世謀臣䇿士徒巧詐數力而已鄭雖王母弟受封而以併吞得國故春秋之初其俗最先變與戰國無異及諸大國並争而鄭薾然奔走聽命不暇遂先亡者地狹而居中國戰場也棄和取同史伯以是為幽王致斃之本晏子辨和同之異甚詳然不言其為興王之所在也武王言同謂心與徳若幽王所取正反是心離但以勢利為同耳因史伯晏子所言騐天下古今之常理凡異民力作百工成事萬物並生未有不求其和者雖欲同之不敢同也非惟不敢勢亦不能同也惟人心之取捨好惡求同者皆是而求和者千百之一二焉若夫惎而至人主又萬一焉賢否聖狂之不齊治亂存亡之難常其機惟在於此可不畏哉申叔時之言春秋詩禮樂故志訓典皆以教世子左史倚相舉衛武公語當是時未有生老病死入士大夫之心不以聰明寄之佛老為善者有全力故多成材宜哉凡人壯不自定老而自逸孔子稱君子有三戒亦以末世人材言之若周之道俗未衰則不然也説命當與白公子張語並看又言既得道得道必有物故孔子亦言朝聞道楚本以詐力得國而其人材見識所造如此非齊晉之淺陋所能及也乃命重黎絶地天通世之亂也聽於神故絶地天通罔使降格而後命三后以徳牖民士制刑之中以人道治也觀射父徒能記重黎職業而未及穆王序堯恤刑之意盖古人於詩書禮樂亦未能盡知大意爾唯仁者可好也可惡也可髙也可下也葉公非知仁者也而能論仁盖在我者惟知有仁而已人之好惡髙下於我無加損焉孔子曰唯仁者能好人能惡人觀人之所以施好惡于我而不足以動吾之仁觀我之所以施好惡於人而足以得吾之仁也如是而已孟子曰仁則榮又曰仁者宜在髙位髙榮仁之報也而不能必髙與榮必髙是不可下也必榮是不可惡也是以利誘人使為仁不榮不髙則强者以為詬弱者以為怨而仁始病矣按吴語載王孫雒教夫差挑戰争長遂得先歃左氏乃曰日旰矣大事未成二臣之罪也建鼔整列二臣死之長幼必可知也乃先晉人自宋之盟言之楚衷甲而晉不備楚得歃而先書晉然傳必當紀其實安有呉求挑戰而反以晉為建鼓整列呉實先㰱而乃稱先晉人者盖國語出於辨士浮夸之詞又言晉禦呉稱王呉楚雖自王其國其㑹諸侯固未嘗稱王何禦之為皆謬妄不足信也以國語左氏二書參較左氏雖有全用國語文字者然所採次僅十一而已至齊語不復用呉越語則採用絶少盖徒空文非事實也左氏合諸國記載成一家之言工拙煩簡自應若此惜他書不存無以徧觀也而漢魏相𫝊乃以左氏國語一人所為左氏雅志未盡故别著外傳餘人為此語不足怪若賈誼司馬遷劉向不加訂正乃異事爾習學記言卷十二
