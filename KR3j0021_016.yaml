body:
  text: 習學記言卷十六宋葉適撰子華子混茫之中是名太初實生三氣曰始曰元曰玄通三為一離之為兩是名隂陽五運流轉有輪樞之象水涵太一之中精潤澤百物行乎地中風涵太玄之中精動化百物行乎天上上赤之象其宫成離下黑之象其宫成坎坎離獨幹乎中氣中天地而立生生萬物新新而不窮陽氣為火火勝故冬至之日燥隂氣為水水勝故夏至之日濕火則上炎水則下注程子儒者而其言如此異哉然亦無以為異者蓋古之言道三墳八索舊所聞記往往皆然故問者有風輪誰轉三三六六誰究誰使之語明其為常所傳習也按浮屠在異域而風水諸輪相與執持上至有頂其説尤怪至以為意生之身親履其處又非推測之比矣洪範九疇箕子言天所錫一為五行即程子所謂上炎下注者而風輪坎離之説舜禹所不道也又易言坎有孚維心亨離利貞亨畜牝牛吉無所謂獨幹中氣生生萬物新新而不窮者若三墳八索果以此為異則伏羲神農之道豈必盡見黜於後人哉蓋經籍乖異無所統一怪妄之所由起轉相誕惑而不能正爾後世學者幸六經之已明五行八卦品列純備道之會宗無所變流可以日用而無疑矣奈何反為太極無極動靜男女清虛一大轉相夸授自貽蔽蒙悲夫蓋孔子已盡究古人之異學發於彖象其述天地精微皆卦義所未言不幸大傳文言諸雜説附益混亂是以令學者紛紛至此夫懸日月以示人惟無目故不能見若有目而昧之可謂智乎古之知道者務全其生謂道所以為生全生者全道也全生者為上虧生者次之死次之迫斯為下矣所謂迫生者六欲莫得其宜也皆獲其所甚惡者也辱莫大於不義不義者迫生也故曰迫生者不如死按子貢問政子曰足食足兵民信之矣曰必不得已而去於斯三者何先曰去兵必不得已而去於斯二者何先曰去食自古皆有死民無信不立夫以為不義不如死與寧死而無去信者皆以道而為生全生以歸道聖賢之常知立論之本指也豈賜也已知而故設問乎不然則是飲食男女之生而道者外假而已凡可以存生而廢道者皆當安而為之而又奚以疑黃帝采銅鑄鼎隊烏號之弓程子以理辨其非而謂太古之聖人所以範世訓俗有直言者有曲言者直言者直以情貢也曲言者假以指喻也采銅鑄鼎假以指喻之言也按今典誥所傳皆非太古之言唯郯子論官名所釋大義頗與程子合且謂唐虞以來不能紀逺故命以民事然則太古之言豈或此類也歟程子又謂言之致曲則其傳也久傳久而訛則知者正之訛甚而殽亂則知者止之夫典誥之言其傳也久矣所以不訛者非曲假以指喻也使太古之言果曲假以指喻訛甚而殽亂則宜其為後人之所止非不能也而何久之云所言郯子以達禮聞而程子往從之謂異乎所聞肅駕而起遵塗而歸詳其意則郯子於禮嚴以苛非所謂和為貴者按孔子是時亦學於郯子但云天子失官學在四夷而已程孔遂相遇於塗傾蓋語終日不知所道何事以其書考之則微生畝晨門荷蓧長沮桀溺之流皆不能及而弟子竟無一字以記蓋仲由謂士不中間見女嫁無媒君子不以交豈為是惡之不録歟二三子之狹陋自私如此不惟失孔子之意亦難乎語道矣有美一人清揚婉兮邂逅相遇適我願兮序詩者謂男女思不期而會余固疑其非按孔子稱此以況程子然則凡詩之美人當皆謂賢者其於刺淫貶色要須特有所指乃可從爾不然則彼何足以汙簡䇿而復載重出諄悉不已哉孔子臨河之操曰河之水洋洋兮丘之不濟此命也夫程子敘其本末甚詳可信不疑也孔子周行天下而不至秦晉秦無道最先割裂宗周晉次之亦寡弱王室其鄙詐粗武皆與夷翟無異曽不如荆尸尚有文詞可觀孔子雖曰因竇鳴犢舜華死罷河梁之行然終無秦晉之轍迹豈亦有慨於中也而俗師妄傳乃謂本其風俗憂深思逺儉而用禮有堯之風夫晉自始封以來固未嘗競於禮而孔子稱堯之君蕩蕩巍巍豈蟋蟀諸詩可象其遺風哉武王襪係解事世所共傳按牧誓王左杖黃鉞右秉白旄以麾此書言牧野之事周師壓郊而陳五臣將受誓事於前王釋旄鉞而親係之則其語不訛也詩云淠彼涇舟蒸徒楫之周王于邁六師及之鳶飛戾天魚躍于淵周王夀考遐不作人夫周文武之所以作人而成其材者使之皆知自尊而非以尊其身也而司馬遷述禮論秦儀乃謂尊君抑臣朝廷濟濟此等語言蕩溺人心不復可反程子既違趙趙簡子不恱以語燭過過曰彼庶人而傲侮公上無以為國簡子曰而士以兵之燭過至苓塞子華子行五日矣按左氏夾谷之會孔丘相犂彌言於齊侯曰孔丘知禮而無勇君使萊人以兵劫魯侯必得志焉從之孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不姦盟兵不逼好於神為不祥於德為愆義於人為失禮齊君必不然齊侯聞之遽辟之趙鞅所謂而士以兵之者使燭過將持兵之士以殺之也左氏所謂士兵之者使虎賁武士捍禦而公退也其言兵之者可殺而未必殺也犂彌本謀乘其倉猝擾駭欲有所逞而孔子從容辭令折服齊人故齊侯聞而遽辟之也而家語榖梁子孔子世家乃謂孔子請具左右司馬又有厯階而升不盡一等熒惑諸侯司馬加法首足異門以為文事武備之效多至數百言然則燭過之兵程子豈必以司馬乎夫諸侯好會使其當具司馬則不待孔子有請不當具而具好會而以兵往主盟者其肯從乎史稱以公退則語禮者固在君側矣若厯階而升則在壇墄之下何能相儀而以公進退乎兩君合好相示以禮相命以詞烏有喋血宫庭戮其盟主而為衣裳之盛事哉蓋儒生草野傳聞非實動色張大疑亂後學而孔子用世之驗才此一舉暗晦不明為害大矣程子問北宫意以自事其心者謹志其所欲為於善而違其惡程子愀然變容謂善奚足願而惡奚足違按善惡天下公理趨善避惡求道者所同遷善改過學易者所貴而程子欲以古人之淡泊滌除一世之羡慕失其所以教矣至論碏厚聵輒寤段忽突季友叔向君臣父子兄弟夫婦倫紀之間以惡故不存以善故不完者又皆當時大節目則其言亦未可厚非也蓋善惡出於相形而以私意行之者常為公理之害孔子曰見善如不及見不善如探湯吾見其人矣吾聞其語矣隱居以求其志行義以達其道吾聞其語矣未見其人也然則行義而不能達道固亦孔子所諱但程子太徑疾爾言趙文子好學而能受規諫立若不勝衣言若不出口身舉士於白屋之下者四十有六人皆能獲其赤心公家賴焉及其歿也四十有六人皆就賓位是其無私德也按檀弓記趙文子事甚詳而謂其中退然如不勝衣其言呐呐然如不出諸其口所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉略與程子語合但舉士數不同爾其言主盟諸夏天下賴其仁兵矟之不試者垂十許年是當時果以弭兵為大功與宋子罕之論異也趙武在時諸卿已弱公室然未有取晉之心及趙鞅先叛而三晉之分始決如竇鳴犢舜華最初用事後乃見殺不知何罪豈其時為家臣者猶欲與國共存而鞅專自封殖故致忤若荀彧之於曹操類耶齊景公問所以為國奈何而治程子謂國不足為事不足治反覆幾千言按齊景公問政於孔子所對數言而已何程子之繁而孔子之簡豈弟子所記有不同也然程子既不合而孔子亦不用又其言司空之刀鋸斷斷如也而罪罟滋長亦與晏子屨賤踊貴語合然史稱晏子一言而齊侯省刑曷為程子之落落蓋直攻諱受微諷樂從事近易知道逺難識自古而然也仲尼天也其可違物而奠處乎其可絶物而自營乎日月不宇宙四指必迷所鄉矣仲尼人之凖繩也仲尼之轍迹則病矣而亦皇暇之恤按儀封人達巷黨人所稱孔子皆不得如程子之大而程子之賢何止二人弟子存彼遺此然則他書之所不見而聖賢之出處不得盡白於世者衆矣又言本也何足以望夫子夫子軫方而轂圓者也將無乎而不可我則有所可也按孔子自言我則異於是無可無不可弟子多不能知而程子能知之然程子以有所可從夫子之無乎不可今之學者因孔子之自言而謂無可無不可者無所不可而已嗚呼安得有所可者而與之進於無乎不可之地乎所論天地之生材甚愛甚惜必有恪固之心人之蔽賢者違天地之所恪固使之氣沮而志奪拂然而怒聚為隂陽之罰則其人雖大必折雖炎必撲荒落而類圮敗而族故隱戮者隂隲之反也晏子以為駭哉其言按孔子臧文仲其竊位者與知栁下惠之賢而不與立也孟子言無實不祥不祥之實蔽賢者當之語緩而意平不如是之峻也豈有所激於中歟雖舜文王要不能盡賢材之用然用者十八九而天地之和氣亦應之亂亡之世皆生於賢不肖之倒置則其理固然爾程子自不求用非世不用程子其言如此亦非激於中也晏子所言齊侯惡羣臣之有黨問何方以弭及程子所答全是漢唐間事朋黨比周古人所名其向背離合之際亦未嘗不同而詩書以文行逺故不得盡載其情偽也其言左右之臣原君之所惡以墮遊士之修舉齊之朝將化而為私人又言遊士之所以去則治象之所以不存古者諸侯雖各自為國而取臣則不專在其境後人見六國相傾奪滅亡以為遊士所致以程子言觀之士之遊固久而皆賢至春秋末俗壞而士始懷詐以遊人之國如儀秦之流則焉往不敗故秦厭之遂逐客爾孟子言舜為天子被袗衣鼓琴二女果若固有之程子言舜被袗衣鼓五絃之琴畫日月於太常備十有二章黼黻玄黃爛如也亦若固有之也二家所聞則同矣堯土階茅茨舜造漆器羣臣諫程子以為腐儒之所守汙俗之所以相欺按孔子謂禹卑宫室而盡力乎溝洫惡衣服而致美乎黻冕若堯舜外雖備物而內實約已此議論自不可輕破而謂亡天下者以不仁而不以奢文王卑服即康功田功未有仁而奢者也聖人貴中君子守中中則不既矣小人恣雎好盡物之情偽而極其勢其受禍必酷矣故誠能由於中矣一左一右雖過於中也而在中之庭一前一卻雖不及於中也而在中之皇及小人好盡則迷於中矣迷於中則必窘於邊幅而裂矣必觸於巖墻而僵矣必隊於坑塹而亡矣如以石而投之於淵也不極則不止矣悲夫天道惡盡而昧者不之知也古之君子齋戒以滌其心奉之而不敢失者其中之謂歟按中道自古聖人所建易以卦爻分位敘而孔子固專以中贊之矣若其疏義明切如與凡鄙人語使皆可曉而中之用常在目前則古今諸書所述未有及程子之言也故詳摘其語著之出於一立於兩成於三連山以之而呈形歸藏以之而御氣大易以之而立數按周官既稱其經卦皆八其别皆六十有四而易安獨得以數立豈連山歸藏止以物象言之而無名字文義之可指如雲火建官之類乎使果若是則其不存也宜矣人之心莫隱乎慈莫便乎恕赤子匍匐使我心惻隱於慈故也凌波而先濟跂而望乎後之人便乎恕故也此心之弗失可以事帝可以格天可以入道按孟子言今人乍見孺子將入於井皆有怵惕惻隱之心謂危猝而後見子貢問有一言而可以終身行之者乎子曰其恕乎已所不欲勿施於人謂比並而後明若程子則此心不約而常在尤為歷然也論人之性其猶水水有五易非水之性而所以為性則然按孔子言性相近習相逺亦畏其所以湛之也而孟子乃謂水無有不下猶性無有不善不畏其所以湛而獨守其所以下雖曰有救而言亦恐未盡也言禎祥瑞應之物聖王不識君子不道治世所無有鳯凰麒麟豢牢之養醴液甘露甽澮之寫芝房草木之異畦圃之育玉石瓌怪篋襲之藏按鳯凰來儀書猶以為祥麟趾騶虞詩猶以為應而程子之言如此參而觀之可也何敞直言異鳥翔於殿屋怪草生於庭際大庭中皇赫胥尊盧與七十九代之君皆伏羲神農以前事余嘗疑其為莊列之寓而程子亦言之則上世之記信有之矣按孔子以為繼周者百世可知而唐虞之上乃百代而不録惜乎顔閔之問不能及此豈非曠古之遺恨也余雖以詩書易春秋周官左氏為正文推見孔氏之學而患無他書可以互考晚始得劉向所校子華子輯次為二十餘章蓋程子與孔氏同時相從一傾蓋之間所敬惟夫子其書甚古而文與今人相近然怪孟荀以來陳良子弓皆得稱數漢唐博學之士掎托前聞義理非一皆未嘗及此書而余所從先生大儒亦無道之者夫以孔安國序尚書本末明具或者猶謂非西漢之文況程子所論太古混茫醫藥五行類道家方伎之流故望而棄之以為異端偽説者耶習學記言卷十六
