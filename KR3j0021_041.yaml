body:
  text: 習學記言卷四十一宋葉適撰唐書列傳新史論于志寧諫廢承乾知太宗之明雖匕首揕胸不畏不諫立武后知髙宗之昧雖死無益身任宰相主蒸父妾為妻國存亡所係豈更論有益無益惟不居其位則可矣如志寧者恃太宗諫必不死不惟不死而已髙宗時直畏死禍不敢言隨時觀望孟子所謂逢君之惡正永徽之罪人新史去取如此安能有輔世教耶張易之之亂所從當時文士房融崔融李嶠宋之問杜審言沈佺期閻朝隱崔融詩有昔遇浮丘伯今同丁令威中郎才貌是藏史姓名非號為絶唱蓋其醜甚於賈謐祖珽王叔文矣而士猶歸之若流悲夫此文王以寧所以為在上而不在下耶于志寧傳載修定本草圖經事世謂神農嘗藥而黃帝以前議識相付不傳文字安得有此神農本草自古為醫師所傳如黃帝岐伯對問皆非矣杜正倫為魏徵所薦既以漏語承乾見逐併惡魏徴余觀太宗與正倫語乃不使聞於承乾與臣為密而踈其子好惡乖舛疑阻橫生此心術之害而臣下承其羞徵與正倫豈有過哉劉祥道所陳釐補選部敝缺六事自齊至隋敘進人材非復漢晉之舊則唐人所謂銓選者乃兼總昔日郡縣功曹職任耳如祥道父子所能何足以預世道盛衰哉然後人亦不能及者以其尚隨材論擬猶有甄拔品第之遺餘至裴光庭則蕩然壞盡矣祥道言歲入流千四百人不知色目各幾文武總别異同且欲嵗定為五百人不知驟減三之二於時得否又言內外官一品至九品萬三千四百六十五員則亦不至甚多新史記太宗定內外官為七百三十員曰此足以待天下之賢材矣恨其後不能守而徇一切之茍且然都不論朝廷一切自除吏與古不同則七百三十員果足以盡內外之用耶按班固百官表載卿相任政中二千石大略不盈二十人朝士千石秩以上者二百人其數絶少然議郎中郎屬光祿勳者亦名朝士乃至千人郡都尉刺史守縣令外官也亦二千人而佐史以上十三萬餘人蓋其多如此今太宗所定七百三十員者只以在內職任通計五百員固得為多而外官自節度使都督刺史猶當不止二百餘員也則已少矣况縣令不入員數則是設官不復為民也以漢議郎郎中千人例之更無餘地則是議論不廣情志不通也守令功實之所由成議臣功實之所由出漢時常以郎宰邑又患見大夫無可使而今止以七百三十員限之則無怪其少而員外特置同正兼守檢校之類紛紛復出也亦絶不知太宗與房杜輩何以定制而遺落不具史家從而信之遽載於書遂為成説疑誤後人矣舊史陳子昻入文苑傳止載諫返葬長安翦雅州生羌二事而新史别為傳所載甚多及言變徐庾體始追雅正又言學堂至今猶存蓋用韓愈翬語以唐古文所起尊異之也然與傅奕吕才同列則不倫甚矣又嗤其勸武后興明堂太學薦圭壁於房闥以脂澤汗漫之則輕侮甚矣惟聖賢自為出處餘則因時各繫其所逢如子昻終始一武后爾吐其所懷信其所學不得不然可無訾也舊史言子昻父為縣令假簡所辱遽還鄉里簡乃因事收繫獄中憂憤而卒而新史乃言父老表解官歸待詔以官歸養段簡貪暴聞其富欲害子昻家人納錢二十萬緡簡薄其賂捕送獄中子昻名重朝廷簡何人猶以二十萬緡為少而殺之雖梁冀之惡不過恐所載兩未真也舊史以劉仁軌裴行儉比諸葛亮王猛國之有將如病得竒藥有敵而無將必亡有病而無藥必死然無病則不可用故善者養以待事若裴行儉兩勝皆在薛仁貴李敬玄喪師之後足以救敗雪恥使夷狄不敢輕唐此以藥愈病也劉仁軌蘇定方奮其巧詐滅百濟平髙麗生擒三王是時唐自強盛無益勝敗之數徒夸暴戾之名此無病而服藥也詩稱南仲方召皆迫於不得已而孟子謂善戰者服上刑後世雜而言之無事則妄用有事則無所用所以兩失之也髙宗孱懦而繼太宗之後狃於所習故亦以用兵為戲賈誼所謂胡亥今日即位而明日射人也郝處俊諫止髙宗遜位處俊安陸人蔡確守安州因以作詩確固小人情在諷斥然未知何以為罪而舉朝張皇以為大議論范堯夫又謂嶺南一路久已荆棘不可踏開又是何見識使果當於罪投之四裔與衆棄之可也豈以不可踏開而自為地耶然則元祐之所以開皇極者止於如此又何以責熙豐乎觀王求禮折豆盧欽望姚璹蘇味道可見為宰相者情意也學者失於匆脫往往謂武后時宰相如此不知後世之相其能不如此者絶少大要以為分謗體國自不當與朝士同操此等節目須子細看過不然則淪墮而不自知矣唐人之論謂徐有功過於張釋之于定國二人平世執法者其議罪在輕重之間非無罪而故入也非有功時比不得言過不過又言當雷霆之震而能全仁恕此語不知底裏而妄為髙逺亦非是至新史言有功不以唐周二其心則尤陋矣今改云當武氏篡盜酷吏為之起獄殺之不從命者獨有功能生之夫人雖有必殺之心而天無必殺之理非有功能自生之也天也以人臣處吕武擅命事自陳平王陵已不能全固不可責之唐人狄仁傑猶以能還廬陵薦張柬之為解然亦非所以責之也惟郝處俊折之於始比諸人差若明白然使其未死親見武氏自取之又未知當如何爾舊史謂裴炎斬阿史那伏念溫傳等五十四人負義殺降搆成隂禍其敗也冝此不特舊史語蓋唐人相承之語也忌功殺降信有罪然武后方逞其志炎不惟不同又使還政當此時縱有能一介之休休以活千萬人為隂德未知何道以免死而唐人所言如此蓋無識之論從昔充滿何足怪哉當武后時顯然立異如炎者不過數人豈可訾也魏玄同論選舉與劉祥道相關玄同並非魏晉則愈不見從矣其言諸色入流嵗以千計似比祥道時稍損然祥道欲限五百人而玄同乃言選集之始霧積雲屯擢敘於終十不收一則又當削少蓋其時吏部權重如此異日宰相不敢望也此疏貫通古今苞括體統後學但稱陸贄而未知玄同之論比贄尤更精確新史刪簡其文故觀者莫辨爾陸象先能使崔湜敬已引之同升而又為太平公主所用極是異事蓋宰相子登髙科早在朝廷勢或然也象先簡逺有識量終始無玷缺自不失為賢若韋布干進而欲以此為法謂富貴可以兼取其喪壞不勝計矣五王誅二張而捨武三思等以非當時救急之要爾不然其愚不應至此也凡舉大事無不倉猝况唐人要自智不及逺彼以武李皆一等宗室平居俯首為之臣畜未嘗有唐周之異則安得知三思承嗣之非野人曰父母何擇焉於茲信矣按舊史稱誅二張時薛季昶謂敬暉二凶雖除産祿猶在請因兵勢誅武三思之屬匡正王室以安天下暉與張柬之屢陳不可乃止通鑑亦載季昶謂柬之敬暉二凶雖除産祿猶在去草不去根終當復生二人曰大事已定彼猶几上肉耳夫何能為所誅已多不可復益也新史乃言柬之勒兵景運門將遂夷諸武薛季昶亦勸之會日暮事遽桓彥範不欲廣殺曰三思几上肉耳留為天子藉手是柬之等初不欲除三思而有屢陳不可之論舊史通鑑皆合不知新史何所據而云然則止是季昶有言柬之初不欲誅三思明甚新史轉易其辭故至失實爾人主亦有逆鱗戰國人語也自下摩上漢人語也後學皆祖用之矣官師相規工執藝事以諫臣下不匡其刑墨禹湯間語也後學未嘗知也立節而不辨義下者為利髙者為名而世道愈降矣李渤以考功而校宰相考杜元頴雖欲附離猶能言舉舊事為褒貶後世豈惟無渤議論並元頴議論亦無矣治之興替可不懼乎渤行其意而未嘗在利名之間庶幾古人也崔融武后時有諫稅關市疏陳六不可利害深切不止以義理不應稅而已又言魏晉齊隋所不用蓋創事自難爾融號能文此疏詳密可觀新史節略太甚乃無足採後人惟恐稅不重宜其輕視之也新史稱姚崇以十事要説天子而後輔政顧不偉哉而舊史不傳通鑑亦言元之請抑權幸愛爵賞納諫諍却貢獻不與羣臣褻狎上從之與新史條目略同但新史夸耀其語太過爾崇及宋璟皆以功業自矜然旁觀粗有識者便已不許蓋壅滯處豁開橫流中猛截只是隨時粗采何異白駒過隙至於一家局靣伸縮一人身分整頓能使之自然及逺則非二人本質所有矣張九齡却頗近似宜乎後人謂其用捨為開元天寶治亂所由分也夫古人之事誠非崇璟所知而今人之論不過崇璟而止則豈復更有以上地位是可哀也玄宗時宰相可稱者源乾曜亦一人之數史載其罷相以京兆尹留守京師大內失白鷹詔京兆督捕獲於野外挂榛而死吏懼得罪乾曜曰上仁明不以畜玩罪人茍獲戾尹當之遂入自劾失旨帝一不問衆服其知體而善引咎其君臣之間議論趣操如此治道髙下可知矣悲夫此亦姚崇在相位時輔贊一驗也代宗問裴諝𣙜酤一歲出納諝初不對且及孟子何必曰利代宗謂非諝不聞此言然𣙜酤終於不改諝與代宗皆不知何以致𣙜何道罷之故其臣徒泛持髙論而君亦茍為虛美無廢利明義之實功也鹽酒茶麴皆始於天寶亂後雖貪君邪臣無所不為要亦有急迫不得已而然者考詳治道須使到自然不征利處哀公問有若年飢用不足對以盍徹夫年飢當貸而何徹之有其君臣問答皆為不切恐記者誤也宋慶禮為河東河北營田使史稱好興作濱塞掘穽植兵以邀虜徑議者笑其不切事余常議使沿邉盡為障捍穿河設穽疆者聚居守望互救金革相聞因利乘便外可進攻內則寧輯蓋今世議論所未有其為蚩詆不既多乎然武后嘗使桓彥範行河北鄣斷居庸五回以支突厥夫不立藩牆而使將士肉薄以較勝負勇者猶懼其怯而怯者安能勇哉慶禮再治桞城宋璟力爭以為不可故張星以好巧自是諡之曰專而張九齡言慶禮在邊垂三十年既城營州則罷邉運收嵗儲其功可推不當醜諡而已蓋慶禮之事唐人無稱焉可悲已然今北虜窺邊計固出此若山東羣盜方興與我共舟楫為心腹之患則又當别論因玄宗令崔隱甫見牛仙客不從遂不用其既用仙客知時議不歸以問髙力士力士謂本胥史非宰相器玄宗忿然曰朕且用康辨知人主宰制天下未論聖賢須實見得細密處若玄宗終始粗豪以喜怒為用捨非有存亡治亂之形象自懸於前而世以為能靖內難致太平蓋出於僥幸而身逢大亂殺人如刈麻幾亡其國蓋非不幸也或言其始勤力而終怠棄者亦非也如用牛仙客事可見矣與太宗因房玄齡言李緯好髭鬚遽改命者何智愚殊轍哉武后營大像於司馬坂以張廷圭諫止其疏全用浮圖金剛經義解析蓋因其所溺易於回曉亦足以見一時士大夫習尚也而新史削去豈以為非雅言耶韋后表民二十二成丁既敗有司追趣其課楊瑒獨以為韋后當國擅擢士大夫赦罪人皆不改何獨取已寬之人重斂其租遂止不諫此瑒為麟遊令時所言也瑒拒竇懷貞自謂所論者民寃抑官髙下于何取懷貞壯其語沮所為懷貞雖不肖猶能如此天下大患在於議論不開展則下者不能言上者不能聽國雖存而亡矣文宗清約思治好言論與李君反復乃甘露後也然無救於敗每使人歎恨謝安謂晉簡文為惠帝之流但清談差勝簡文猶能保全武陵王而文宗不能明宋申錫又在簡文下其敗自當沈既濟論武后不當立本紀天下之義理能知於事初者為難晉董狐書趙盾齊太史書崔杼孔子齋三日請伐齊此知於初也事之初作固滅義理而能以義理正事初者非聖智不能武氏事初舉一世不能知及既濟時已百年矣聞者尚漫無省又數百年方復追論儒者之論每若此則何益乎既濟傳載百司權公錢收子月本千萬得息百萬配戶二百復除其家且得入流是等户嵗出六十千免稅役又與百官為優矣然上之取此雖省而下誅求乃不勝計所以毁家破産積而不能革後世一切收於上而與之似免此患然官既負不義之責而私亦若無名之斂固未有以處也安祿山難作封常清以市人挑戰固當敗然扼關而守遲以旬月四方兵至則事定矣史謂玄宗雖為左右蒙瞽然荒奪其明故至此不知玄宗本無明何荒奪之有自始至末但以豪氣用賞罰其欲親征一事未嘗明見事機封常清髙仙芝死其意亦只如平時行敗軍之戮爾及哥舒翰不可得而殺則脫身逃走不贍矣史不知人暗明智愚多輕與奪極有所害惟梁武可以言荒奪苻堅猶自取之而况玄宗乎常清表文宛轉可哀初以作捷書發名果不妄新史但存一句爾李郭之功後世所稱過於前人按初有嘉山之捷光弼子儀同之此不足言光弼守太原守河陽兩勝可以言功矣然潰於相州敗於邙山唐由此遂不復振子儀敗清渠雖復兩京尋與九節度奔北而中興之業隳矣其後吐番再犯長安賴子儀不亡號為一時大功然而扶持收拾僅救目前比於撥亂反正一勞久逸世載不朽者安得同年而語哉是李郭之功猶未能及李靖道宗裴行儉張仁願之流而後世夸大俊特掩絶前美者蓋庸情常論狃於近而忘其逺也後世又不止尊異李郭而已如趙普李沆王旦皆欲以無功而自為功又其決不可無者文彥博以貝州富弼以議和狄青以儂智髙韓琦以定策張浚以苗劉趙鼎以親征皆為元功盛業矣然則古人之功名豈終不可及耶古今毁譽類不可慿而房琯李泌為甚琯明敗事立朝踈略論者終以為王佐盛德泌歷三主艱難時彌綸補益蓋不為少然毁之者乃無異於左道怪民何也琯結知於衆人泌結知於人主勢應至此唐興百五十年士大夫未有風流學尚王義方畢淺張九齡孤特皆不能開其端至琯始為宗主所以名過其實爾泌薦陽城為諫官與栁渾顧况為交友亦何必減夫不能與人同好者惡之所集也習學記言卷四十一
