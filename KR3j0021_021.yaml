body:
  text: 習學記言卷二十一宋葉適撰漢書帝紀上世載籍之法至太史公紀而絶班氏漢書以下學者不得不别自為法蓋後人用世之學專指漢以來為準的於唐虞三代姑泛焉而已古人以德為言以義為事言與事至簡而猶不勝德義之多此詩書諸經所以雖約而能該貫二千年也若夫世次日月地名年號文字工拙本末纖悉皆古人所略而為後世所詳如李翺之徒亦號髙世之材所求尚不過如此然則後之人材日以淪溺其勢必然因是推之使古人逆為後世慮以上世載籍而已用後世之法則學者終不敢置於誕謾荒忽之地其所成就當亦稍殊矣良使人撫遺編而浩歎也世變以積習為難除以身為可畏髙祖所以能約法三章者處下流之勢身被見殺之難不如昔日之亂君徒知自上殺人之易故也其所以終不能輕刑者內外前後積習使之也然而後世要以此語為論刑之祖古人言恤刑慎罰固多矣至謂凡民自得罪及昏墨賊殺為臯陶之刑則不足以止後世濫殺之禍蓋不如此語之簡直無愚智皆可曉也髙帝言鎮國家撫百姓給餉饋不絶糧道不如蕭何與張韓分功此言蕭何之粗者實未知何也漢得天下專蕭何之力不獨漢乃與後世得天下者起樣子蓋古人之經綸至是已滅絶不復見矣髙祖又自謂馬上得之使馬上可得烏得前困項羽後圍胸奴乎司馬遷言何依日月之末光著實處豈可用贊頌常語但何之材智自有所止爾班固習見近事謂髙祖不修文學而性明達固意當謂加以文學則不止如此矣按與髙祖同時者如楚懷王仁義成安君儒者不免敗亡天下大慮帝王事業非區區書生所能知固所謂文學恐未足以語王者之事也其處者為劉氏滅魏遷豐皆民也無族姓可論與范宣子所言異矣然則安能承堯運哉叔孫穆子以為無其德而有其祿者猶不足以不朽而况匹夫單人乎蓋向之陋而固又甚矣取天下於羣雄爭奪之時易定社稷於母后専制之日難此陳平當吕后時所以銷縮不敢有所為也然平自審産祿昏庸不為深患但以吕后不可廷爭故一切順聽及吕后死四十日間諸吕巳滅更數十日則孝文立漢事定矣後人徒見處之不難便謂若戲劇不知其處置精密蓋能使外朝上下相合為一更無趨和吕氏之意不然不足為燕居深念也秦始皇始有制詔而漢因之蓋示人主夸大威服之勢非古人所謂言曰從王言惟作命之意也王通曰詔其見王者之志通所謂詔者以秦為非耶以為是耶若言不足以見志而必有待於詔則盤庚説命褊矣漢文除肉刑短喪賜民租皆以其豫民者闕不為勉強更有以上事亦可行惜乎輔之者無其人也班氏父子雖掎托其善然亦止能言其儉及近裏做事蓋其所知者如此而已漢武初即位竇嬰田蚡趙綰等議立明堂迎申公坐請無奏事東宫綰臧見殺諸所興為皆廢是時武帝才年十六七綰臧不能養之以德而為希古慕名之虛事施行急驟操切宫庭既以殺身又使武帝血氣日剛無所防節終縱其欲漢儒之用固至是也武帝䇿賢良詔稱唐虞成康上參堯舜下配三王全指説在虛浮處詩書所謂稽古先民者皆恭儉敬畏力行不息去民之疾成其利致其義而不以身參之孔子言仁者己欲立而立人己欲達而達人能近取譬蓋不特人主見道不實當時言道者自不實也彼汲黯雖能言內多欲而外施仁義然又不過一戇人而所得者乃公孫𢎞之流耳若使僅有晏子子産輩便自不同蓋前世人材不復見矣班氏於武帝極稱其美而於昭帝乃謂承奢侈餘弊海內虛耗問民疾苦古人稽古禮文之事本以養民而武帝之稽古禮文者反以􅊣民班氏欲擇一以歸美故其避就如此然則是稽古禮文終以害民而後止也而可乎孝宣五日一聽事自丞相以下各奉職奏事以傅奏其言考試功能侍中尚書功勞當遷及有異善厚賜不易當時謂之樞機周密品式備具蓋自成康以後人主能以天下為一家之治始終無缺者方有此耳古人以天下為公非為一家也曰野無遺賢萬邦咸寧宣帝以天下為私侍中尚書終身不遷賴其幹力足以任家事而已雖遺賢不恤雖有賢不用也此事既逺而風聲氣習所薰炙此論亦不復有哀哉王成詔稱有功不賞有罪不誅雖唐虞猶不能以化天下後世論治道無所統一只以刑賞為極至遂以私意扳執古人此等語言傳誦既熟極害義理有大父母父母喪勿繇事是時猶存此意鳳凰神雀甘露醴泉當是一時氣候所召宣帝操殺罰如左契而乃以此為瑞應何哉然急吏而緩民持刑而不濫雖非古人之道亦求治之心也胸奴在九州之外與周玁狁不同自中國為一而丐奴亦一大敵為對自盛自衰昔鬬今服非孝宣之力能致之也惜哉孝武君臣不明以此枉用民命幾亡其國諸儒講五經同異蕭望之平奏上稱制臨決立梁丘易大小夏侯尚書榖梁春秋博士人主親經術未論所知正偽深淺而能使儒生風動以其好惡豫奪為是非如此等類於學者義理無所增益更令不分曉而已上古之治君臣同心舉措曲直各得其所此以自意極力考究非如景武但取古語之影響髣佛也務行寬大順民疾苦而吏或不禁姦邪縱釋有罪是誠末世之敝然古人以所有待所無不以所無責所有猶不能得其全也臯陶曰罪疑惟輕功疑惟重與其殺不辜寧失不經故盤庚告遷都周公待殷頑多其嵗月别作意度此寬大之實證也若宣帝必欲使姦邪有罪皆無所失而寬大自行於其中則是以己所無責人所有不可得矣信賞必罰綜核名實申韓之法術兼用之矣宣帝所以能稱治而無大患者以其主於愛民故也然當時人主不能自名其為何術姑曰雜用霸王而已至班氏父子正色言之而百世之下皆以王道儒學緣飾申韓之治雖卓然豪傑者尚未能知而况於改之乎孝元勸用儒生幾坐廢而漢治亦終以不振蓋俗儒不足委任正中其用人之病也然則孝元審不堪天下歟成康非上質而以文武周召之故能致隆平為百王法使宣帝王道已明擇人以遺其子何遽不為成康古人先後一揆而後世父子異意由操術殊也孝元非宣帝持刑深而蕭望之以二年冬殞恭顯之手君臣皆不悟父之知子其驗速矣然恭顯本宣帝所委信史臣謂之樞機周密者望之之死宣帝之遺也舉隂陽詔言事者衆或進擢召見人人自以得上意孝元非無意於天下者若見臣下多使品局有分而鑒照自逺衆言並進使異情無壅而思慮易中古人所以貴於明作哲聰作謀也不然則東西高下惟物所使外惑內眩無以自知而其害猶甚於獨聽孤立者矣如孝宣之牢關固拒專守一智蓋懼此也永光詔自咎不明亡以知賢併考孝元諸詔往往引過在已不失君道史以為號令溫雅信矣自三代誥誓既絶至漢制詔遂為空文然猶有其意與言也又降而後世言與意皆亡但襞積故實矣王莽以孝平初秉政才四月越裳獻白雉賜號安漢公而篡事已成蓋承諸父之舊內外無非王氏之人故速捷如此自霍光以大司馬領尚書事宰相失職而外戚躡踵當國所以致亡不足論也表司馬遷班固論堯舜三代秦漢興亡謂鐫金石者難為功摧枯朽者易為力此古今至大事也不得以金石枯朽為比且聖人躬行仁義固無以漸鐫取之心而事亦不然况漢起布衣微賤豈更有為之枯朽者而又安所摧折哉孟子曰為淵驅魚者獺也為叢驅爵者鸇也為湯武驅民者桀與紂也秦暴強不以道雖曰興其國其實驅民也為之驅者必有能受之者故孟子又曰當今之時萬乘之國行仁政民之悅之猶解倒懸也積驅不已而天下終無能受之者遂至迸溢潰裂人自為聚家自為受而漢竟得之自是以後無不驅天下而歸於一夫與秦同一轍者皆勢不得已自為之受而非有能受之者也諸侯王表言諸吕時賴諸侯強而存王莽時以諸侯弱而亡此黏合論事形似而實非也如意鴆死肥幾不脫死友餓死不嗣皆髙帝親子何足賴也古人親賢並建所以為民也夾輔一家自為久存之計此後人以私意疑之也秦雖廢其法漢雖慕其名存亡之實蓋不在此不考德而任私後世之論大抵皆是矣孝武封公孫𢎞為列侯儒者歆艷然欒大一見而封三千户亦不必貴也郊祀志二千户元封初置部刺史後世相因謂監司不可少文景時州縣號平治未嘗有刺史也王嘉傳乃頗言其為患古人州牧侯伯尊尊貴貴以相統承而監司以賤繩貴以卑臨尊至怙威作氣勢妄廢置然後為立風采勝任然則用敝法求吏稱職不可得矣甚者至設法以防監司又失之逺矣縣鄉亭之制本於商鞅鞅雖改法要是周衰國大者難用舊制齊晉楚裂地名官以自便往往在商鞅之前矣古者百里之狹自為朝廷由後世視之疑若煩民然三老嗇夫遊徼猶各有職掌近民而分其責任若後世蕩然無復紀秩而令長悍焉獨以征取為事則又鞅之所不為也品第人材以示勸戒古人之本意史氏之常職也名世之士無非以一二數過熟惡積是為下愚至於雜然中流則不復論矣故禹戒無若丹朱傲周公謂無若殷王受此實指也班固枚數銖稱失本意矣若其髙下差謬蓋未足究志王莽時通知鍾律者皆聚所言聲數度量權衡無不傅合於易其説甚淺似後世義疏之為何取其知物也其傳伶倫取嶰谷之竹以定律本而物皆由律起斯又妄矣自司馬遷言王者物度軌則一本於六律六律為萬事根本漢人之論蓋因之矣書言同律度量衡又曰豫欲聞六律五聲八音在治忽以出納五言然則古人以律與度數同為一物未嘗言皆由律起而孔子贊易無以八卦合度量權衡之文夫準平規矩世用所須粲然陳列雖在夷狄荒逺無不畢具生民以來共之但其精粗疏密不同耳學者將求通乎物變未明其本而先膠其末有終身不得而至者又從而為説以徇之多此類也書稱命羲和厯象日月星辰而其法不可見所可見者四時昏旦之正而已至司馬遷造新厯始以律之籥起而劉歆又推春秋與易參合為厯書按堯舜時易道未備三代以前未有春秋然則古厯法蓋不起於易律春秋亦不兼厯數此遷所謂律為萬事根本者而歆自謂有得于左氏亦不過施之於律爾學者立乎百世之末而律厯皆難知之技不以古文聖人為正而眩後世一家之私説以今逆古以後準前則窮年終老而學之者皆無用之虛詞其去道德義理逺矣春秋以來論禮樂數十家未有能實知其意可以措之於治者余固言之矣觀班固取昔人已論雜合為意綴織成辭盛推賈誼董仲舒王吉劉向而歎其不得用雖無大戾然愈不可據矣八珍美膳也必有烹調之方文錦竒服也要識裁製之實不然則委而棄之不如布褐糲粱為口體之適也自有生民而君之教治之道不一端惟羲農堯舜聖人相承能摩以德化而使之興於仁義習以禮樂而使之逺于刑戮文武周公既沒聖人不作異君殊國各以私智為治至孔子時政刑詐力日趨於下既不可返而其言曰安上治民莫善於禮移風易俗莫善於樂又曰道之以政齊之以刑民免而無恥夫孔子之所以善於禮樂而不善於政刑者豈徒言之而已哉必有為之之道也為之之道豈汗漫遲久而難成哉必統理敏速而易效也春秋之人材如管仲者雖不知以禮樂善俗猶未至以政刑劫民若子産則以政刑劫民矣子産自以政刑為已至刋而垂之而叔向以為不足以靖民故直曰議事以制不為刑辟夫不為刑辟而後禮樂可為未有禮樂刑辟兼而為之者也而樂記乃曰禮樂刑政四達而不悖則王道備矣豈古人之本旨乎若賈誼以權勢法制為人主斤斧而乃服上黃數用五董仲舒明春秋公羊深繩臣子不得容足而乃設庠序興太學以至王吉劉向皆欲於未世政刑刻急之內暫興治古禮樂之虛文以養人之毫髮而勝殺人之丘山求王道之行不可得也夫捨泥塗者趨几席惡辛螫者服甘飴誠使後世君臣有能深知政刑之不足以善世明見道德教化之意篤信安上易俗之實擇其忠厚至誠力行之士布在州縣廢其所以為鞭箠刑戮監臨防制者而一以父兄師友之道經紀其民然則禮樂之效不待嵗月而變矣卓茂曰今我以禮治汝汝必無怨惡以律治汝汝何所措其手足一門之內小者可論大者可殺也嗚呼後世雖無三代之材若茂者亦豈乏少乎然而茂可以治一邑而不能推之於國則亦未知其方耳六代之樂春秋時尚存諸侯大國固多有者况魯素具乎孔子在齊聞韶説者以為陳公子完奔齊陳舜之後故有韶樂謂孔子在齊始考正韶樂久而忘味則可謂孔子至齊始得識韶樂悅而忘味則不可以陳公子完事意之尤非也太師摯適齊至入于海司馬遷言仲尼歿後受業之徒沉湮而不舉或適齊楚或入于海班固言紂作淫聲樂官師瞽抱其器而奔散或適諸侯或入河海按論語此章其義可推其時當闕遷既逼近而固太疏逺矣解章句者自應難準也自周衰文字日以淪滅至秦而盡字畫變於徒𨽻典册成於吏筆漢興大而朝廷小而郡國無非秦舊蓋皆胥史漸磨之餘功士子所學流靡十九雖間有豪傑好古者猶未能追三代之髣佛也最異者房中歌郊祀歌皆當時輕薄者所為極浮淺鄙俚而郊廟燕饗常用之匡衡以儒學用有所更定未知其孰愈也後世反謂此乃西漢之文當與三代並行窮力模擬或剽剝不厭然則清廟維天之命以下諸詩未知學者竟以為何如而亦復誦説不已嗚呼斯文其終不可振乎習學記言卷二十一
