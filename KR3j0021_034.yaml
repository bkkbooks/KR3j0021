body:
  text: 習學記言卷三十四宋葉適撰北史魏書劉石乘晉亂迭據中土極強盛者不過數十年紛糾騰突徒互為廢興而不足以定事蓋華夷地勢不同習俗亦異統御不一彼此不安亦其勢然也惟拓跋退都平城純用彼俗控勒諸夏故最為長久孝文慨慕華風力變舊俗始遷洛邑根本既虛隨即崩潰亦不過數十年天下復還中國之舊矣然則用夏變夷者聖人之道也不然則遂為夷狄之利也失其利則衰反其常則滅烏得謂黎民懷之三才其捨諸蓋書生之浮論也魏收為拓跋序世次自始均爵於舜六十七世至毛而後威服北方又十三世而至誥汾以天女之子為子是為力微力微立四十二年始遣子朝於魏魏景元二年也自誥汾以前既皆荒忽誕漫而力微生於天女推其年當是漢桓靈之嵗蓋亦近爾乃復有此異事昔玄鳥生商后稷野字皆在上古或者猶以為逺而誣不知收何所考信而云然也崔浩實録魏事舊人皆怒遂致族誅然則收之不足慿也審矣地形志載正一作元光以前時惟全盛户口之數比夫晉之太康倍而已矣北方自晉太康至此是一節限元魏之興百四十年矣雖無志於靖民而立國既久民得以生息理應蕃遂但惜無版籍之實特以意言爾李業興造甲子元厯稱趙􅜫何承天祖沖之三厯參校其長一倍然則祖沖之厯當時雖不施用蓋為厯家所傳也業興言造厯者皆須積年纍日依法候天知其疏密然後審其近者用作厯術不可一月兩月之間能正是非故五星有七頭術得七頭者為近當考魏世稱有祖廟在烏洛侯國去代四千餘里其祭斬樺木立之以置牲醴後復生長成林而民益神奉之樺何等木斬析而生者固衆矣亦以此為神竒耶載魏孝文冠子恂自愧有三失事蓋因家語記邾隱公因孟懿子問冠禮春秋著邾子益終於失國韓生言楚人沐猴而冠冠雖成人之盛禮然古人之所以為教至深至厚自齠齓而至於冠日異月殊卓然而進於成德故冠者教成之節也若不安其質而徒既其文則邾隱公與魏太子恂同趨於死亡正與沐猴之冠何異孝文之智未足以及此而區區焉欲以禮文之末為其國進命之始不知魏之亡兆於此矣因李憐行毒事見舊律犯死罪祖父母七十以上無成人子孫旁無期親者具狀上請流者鞭笞留養其親終則從流不在赦原之例又毒殺人者斬妻子流若妻子本非預謀而逆設流坐則為法酷矣又以後世之薄俗槩之姦民不畏死而許以無期親上請則是立寬法以誘人之輕犯重罪也當考崔纂論劉輝姦亂毆主傷胎而逃謂容妃等罪止姦私若擒之穢席衆證分明即律科處不越刑坐何得同宫掖之罪齊奚官之役又妹己他適私門失度罪在於夫釁非兄弟纂時為三公郎而尚書元修僕射遊肇皆從纂議雖皆以此獲罪然前世昏主亂朝伸貴屈賤刑賞惟意顛越常經固皆有之而當時猶有執議不同者雖或以不同為罪而亦無深譴蓋其前後據事即言上下安之不以為異故也若後世猶未至於顛越而執事者遂無一言以聽其所為或至於顛越而有一言者則又以為大戮而不可解矣故余以為論議不開馴致世道日陋最為治者之大諱此為何時而尚能如此故特舉一端爾劉石諸國及慕容初起粗有本兵力農之意後得中原則不然矣蓋皆以驕悍之性襲盜賊之迹狼虎自快民無定心雖欲不亡不可得也史稱拓跋經略之先以食為本懇闢河北計民授田常與諸戎深入角逐得其鹵獲時佐國用比劉石之搏噬其民有間矣至太和則又制祿立長行錢稍循漢晉之舊要之為國既久以漸修立自然如此然不於立國之初便分别先後其國亦不能至於久論八政者首載食貨信非目前事也因魏置從品遡上古官制五帝皆繼立而各建官名何其好變也郯子言鳯鳥適至及後世不能紀逺故命以民事尤怪又稱仲尼聞而學之然則唐虞以前豈惟逺而不傳蓋有不可傳者矣然周官言唐虞稽古則不止五帝又參取五帝之先名雖不合而義不可離故也如魏有鳬雕白鷺象物則質野反置從品象事則冗雜乃夷狄之餘率意妄作自無足論然從品厯隋唐至今遂不能易豈非事敝之極併其義不足據矣按書稱别生分類而傳有賜姓命氏之文蓋帝王諸侯各為族姓義又相襲後世封建法廢既無專國不自為族姓而天子亦無賜姓命氏之法至傳國數百年而臣下仍用舊氏與編户齊民無别蓋以兵力崛起而無德勢不暇爾雖然尊前代而慕聖賢使其後人以風流相命則猶可言也及魏起深北不毛以九十九姓為部落姓改氏易流布諸華周齊繼之至於隋唐凡胡丘周伊穆陸劉賀梁冦羅葛樓鮑何髙潘薛甄杜之類皆夷狄種而三代漢魏之氏族蕩不復存縱有存者不可識矣然則後世所謂譜牒世次豈足信哉魏收載漢武遣霍去病討胸奴至臯蘭過居延斬首大獲昆邪王殺休屠王來降獲其金人帝以為大神列於甘泉宫金人長丈餘不祭祀但燒香禮拜而已此則佛道流通之漸也及張騫出使始聞有浮屠之教哀帝元夀初博士弟子秦景憲受大月氐王使伊存口授浮屠經案胸奴傳稱殺休屠王獲其祭天金神顔師古但云今浮屠像是其遺法無列甘泉宫燒香禮拜等餘語使誠有之則是釋氏已萌芽於前世不待至漢明而後流入也蓋收時於遷固外尚見他書可以旁證異聞此雖不比中國事本末源流無繫重輕然後世一以遷固為斷而他書所言遂不及知者衆矣冦謙之事世俗常有崔浩主之遂使張王深濶至與釋氏角其廢興浩意無他不過為諂耳浩事僭偽之君盡用材技又偽媚左道以求容恱然竟亦滅族此不足責而有可哀者然則四皓終不出張良欲辟榖道引非以為髙乃其勢當然也王猛賴苻堅有閎度能始終無隙若便稱人傑亦恐未可馮后之喪孝文服衰毁瘠絶酒肉不內御者三年孝文志切有為而方優遊垂拱順適祖母之心居喪始終自然盡禮而無勉強督迫之意雖無舜文王之道而有舜文王之資矣故自夷狄能慷慨感慕同於諸華蓋非偶然者古今未有無其本而可以強致者也孝文都洛最無謂周公雖有四方朝貢道里均之説然成周固未嘗受遷邑之利五帝三代何嘗有都洛之文况王政廢興豈在都邑乃漢以後經生相承夸大其辭耳孝文自合更與其國開百餘年深厚之業豈謂一遷洛而本根浮動墳廟宗族皆已棄絶邉徼鎮戎單寒無依向非孝文便當身見禍亂然亦竟十餘年而國為墟矣蓋好名慕古而不實見國家大計其害至此後之學者又將譽之不已是以亡為存以敗為成烏在其言王道也魏亡之禍成於六鎮輕薄六鎮實自太和夫變夷從夏人孰不以為美至一家門户緊切利害乃忽棄不顧可乎然則自古公亶父陶復陶穴至於岐有夷之行彼纍積而後成非文勝其質也孝文與元澄論子産叔向爭鑄刑書事古人之治雖深逺難窮然推其身之實有與民共之非言之而不可行亦非可行於古而不可行於今也叔向能言而不能行子産直以為今不可行王政之不復皆自此等議論壞之後世言治者不過祖述子産叔向餘論治道自無由可起孔子曰子欲善而民善矣君子之德風也小人之德草也草尚之風必偃此是通前徹後功用更無今古但信及者鮮耳遷洛之舉羣臣不順孝文設術以詐之示威以脅之不知厭忽纍世安樂之餘經始百年荒榛之地一事不成舊業盡棄欲以何為嗟夫孝文誠非玩嵗月而茍目前者及其昧先後失名實不安於本而眩其末則好治與念亂同科可不悲哉論婦人冠帽著小襦襖元澄謂著猶少於不著者昔趙將胡服其臣以為難魏欲革之復患其不易夫自中國變夷狄孔子固諱之以夷狄變中國則未有論而王通便謂太和之政近雅又言王猛功近而德逺恐更須考詳也彭城王協舉曹子建語辭官孝文謂二曹以才名相忌吾與汝以道德相親此語甚占地位雖未必道德在已而可以𢎞道德矣孝文所到如此惜其一二十年間不知內修以養性而徒外毁以傷生傷生猶可而國從而傷此蓋末世虛名誤之也太子恂事甚可傷孝文急於有為不計階序不本土俗不量難易其臣好富貴者李彪王肅之流以輕薄刻急承迎取快於革治興道未有分寸之益而使孩孺之兒愚騃之婦幽囚并命損天性害人倫禮所謂教世子詩所謂刑寡妻固若是耶張袞與拓跋圭同起其臨終語有恢崇睿道克廣德心使揖讓與干戈並陳文德與武功俱運則太平之化康哉之美復隆於今不獨前世余三復而悲之自胡夷迭起百年屠割諸夏而為之主劫執人士寄命旦夕袞以垂歿之言勸之善道彼豈以其心之欲然冀其主之或然耶袞孜孜薦引恂恂誘化蓋庶幾以古人自期而所遇之時如此其得身免於大悔已為幸矣哀哉張白澤傳載顯祖詔諸監臨官所監治受羊一口酒一斛者罪至大辟與者以徒坐論糾告得尚書已下罪狀者各隨所糾官輕重授之魏未嘗祿其臣教之使貪而以重法禁之故白澤謂今之都曹古之公卿周之下士尚有代耕皇朝貴仕服勤無報舜稱臣哉鄰哉鄰哉臣哉魏待其臣傭力之不若猶行之百年然則必能明臣鄰之義者然後為舜乎崔宏崔林六世孫崔氏北州大家祖恱仕石虎父潛仕慕容暐宏苻堅之亂欲南歸不克復仕慕容垂父子遂與張衮對掌機要觀其博議國號事典章文物可想矣宏寄作詩自傷懼罪不敢行於時至浩竟滅其族悲夫悲夫宏稱有王佐才方戎夷暴亂南北分隔而人士困於鞭箠刻烙者何可勝數孟子謂南蠻鵙舌之人非先王之道此豈其地使之耶長孫稚稱河東鹽池嵗絹三十萬匹是移冀定二州置於畿甸按三十萬匹絹於今中價為百萬緡矣稚又言今王公素餐百官尸祿租徵六年之粟調折來嵗之資魏至太和而後賦祿羣臣得食蓋僅爾而稚之言乃如此晉末公卿以下日廩七升然亦同歸於亂豈為國者興亡操縱自有得失無預於臣之飢飽耶穆亮勸孝文訊之蓍龜以定可否又去嵗役作為功甚多太廟明堂一年便就仍嵗頻興民力凋弊材幹斬伐為功不固願得逾年小康百姓而孝文以為若終不為可如卿言後必為之逾年何益人生大分修短命也蓍蔡雖智其如命何孝文拒羣言甚峻而不得為非者以其所欲為皆古人好事非徇耳目鄙淺也禹言辛壬癸甲啓呱呱而泣周公思兼三王幸而得之坐以待旦古人急切之理誠然而孝文行之亦或不驗當更商量孝文謂亮三代之禮日出視朝漢魏已降禮儀漸殺晉令有朔望集公卿於朝堂而論政事亦無天子親臨之文今因卿等日中之集中前則卿等自論政事中後與卿等共議可否此可與魏王肅所言參看然則人主不視朝論政久矣齊明帝有鍾嶸何人乃欲斷朕機務之語當謂自攬事耳隋郭衍勸煬帝取樂五日一視事無得效髙祖空自劬勞帝從之是隋文帝蓋嘗日視朝也勤惰固係人主自身治之興廢從之然制度不立君臣遂至於不相識積習生常不知其非也古弼捽劉樹圍碁事前世時有之乃興國之象也魏主謂築社之役蹇蹶而築之端冕而事之神與之福此亦雅言若上下齊整反成衰壤者多矣崔浩在魏言無不行取赫連沮渠秦隴拓定幾滅蠕蠕漠北斂迹其他碎謀密畫應機達變有益其國者蓋不可勝數此尸祝社稷之寶臣也而遭罹酷暴觸忤一朝并夷五族雖復奴僕盜賊遇之亦不至此矣戰國以來謀功之臣罕自免浩所以比張良者不比其全身之智而欲比其策畫之工矜露不已以取大戮哀哉哀哉李問勸孝文都長安孝文既都洛喻以婁敬事謂當由獻可理殊所以今古相反言殊有風致可以想見其人也夷狄中惟苻堅孝文耳王遵業為黃門郎時政歸門下世謂侍中黃門為小宰相而遵業從容恬素若處丘園政歸尚書漢事也歸中書魏事也歸門下蓋是時母后専朝與宦者同耳然後世相承遂為故實並號三省而侍中門下侍郎為真宰執其源有自來也與晉志通看遵業慧龍曾孫江東齇王也陸睿傳稱長江浩蕩彼之巨防南土昏霧暑氣鬱蒸師人經夏必多疾病而鼎遷草創庶事甫爾臺省無論政之館府寺靡聽治之所百僚居止事等行路此亦可見孝文營洛事意也周公雖以洛為東都仍居鄷鎬至平王而後卒遷若無故移徙自伐木根中人不肯為况賢乎睿與穆泰元丕遂誘子恂為逆皆緣遷都乃知盤庚委曲告諭非畏其臣也韋崇兩為中正史稱其頻居衡品以平直見稱是魏世選用亦由中正也崔亮傳當考崇為南頴川太守不好發擲細事常云何用小察以傷大道吏民感之郡中大治此語宜録古人謂前旒蔽明黈纊塞聰使其無以致治而徒自聾瞽則古人不足稽矣孝文遷洛不止慕古人居中土蓋欲身在近地經營江左耳其與盧昶語可見卿使至彼勿存彼我密邇江揚不早當晚會是朕物草創之物便事南伐所圖不就躁擾變亂竟死道塗本希成康反類昭穆是德與力兩失之也且晉武隋文未嘗親戎驅使將相而南北自一統孝文苻堅皆欲以馬上取之卒不遂孝文之僅存者幸耳蓋後世與古人不同所以兼并真自有算非浪戰所能也盧氏自志諶偃邈玄度世淵道將纍世風素北州所推史稱其閨門之禮及髙允傳青齊淪陷衣冠播流親表賑贍之美然則三百年間人士乖離其能守家法存義槩者難矣雖孔子尚畏左袵之禍豈私憂哉然是時猶有聲問可通不若後世之影滅響絶撫卷可為永歎髙允一生落拓晚乃榮遇其所以能始終悔吝不及蓋亦英邁銷盡而然徵士頌亦有可觀魏氏六七十年北方才彥略聚於此如從容廊廟遊集祕門上談公務下盡欣娛以為千載一時始於此矣日月推移吉凶代謝同徵之人凋殲殆盡在者數子然復分張往昔之欣變為悲戚張仲業東臨營州遲其還返一敘於懷齊襟於垂歿之年寫情於桑榆之末其人不幸復至殞歿在朝者皆後進之士居里者非疇昔之人進涉無寄心之所出入無解顔之地此亦其當時士大夫翔集輩行之大槩也然允乃不如其弟推每被詔徴辭疾不應常譏笑允屈折久官栖泊京邑故常從容於家以是而言則亦未至於必不可以出而出如蔡雍之於董卓也孔子曰賢者辟世其次辟地又曰鳥獸不可與同羣然則士之出處審之而已允酒訓稱子思有云夫子之飲不能一升以此推之千鍾百觚皆為妄也子思語載何書當考今鄉黨學者以為載夫子言行云惟酒無量不及亂而巳酒無量是何義若謂飲不自限要不至亂恐未然也又云不為酒困崔浩傳有譖敗李順事為浩一短以趙逸傳考之彼之謬迷亦猶子雲之美新皇王之度固宜容之浩言能如此學亦有標本非譖人者也李孝伯張暢當時南北名對應答之言相與傳誦為口實此傳所載劉氏偽書翻流上國逸韻難虧猶見稱載蓋北人貴重南書如此後世文字不復關通圗事揆策無以相知自契丹時已然李沖傳稱孝文謂本所以多置官者慮有令僕暗弱百事稽壅若明獨聰専則權勢大并今朕雖不得為聰明又不為暗劣卿等不為大賢亦不為大惡且可一兩年許少置官司此語意自周以來不用矣舜言咨汝二十有二人不舉其屬古人無不以専智任獨事聨事合治後世號為公心相維然無不以私意相敗者雖人材不能如古亦由角出競立其本先弱也遊明根劉芳北方所謂儒者明根乞致仕孝文謂七十致仕典禮所稱位隆固辭賢者達節季俗陵遲斯道弗繼卿獨秉沖操居今行古有魏以來首振頽俗進可以光我朝化退可以榮慰私門嗟夫魏之待羣臣與臣之仕於其時蓋有不得止而後不止者矣然孝文猶以此薄其臣何也崔挺稱司馬牛受桓魋之罰栁下惠嬰盜跖之誅詞趣𢎞雅非落胡士大夫所能道也觀其安恬進退之際夷夏不可榮辱庶幾君子之風矣斧山營觀事亦當記王尊水波稍却回還尚見貴前史也方魏盛時門誅族刑在於瞬息而崔浩中外皆以無罪夷滅及其衰也凶領悍厮奮起逺裔劫執國命河隂之役舉朝屠陷而楊侃兄弟闔門百口一朝并死是士生於其時無往而可也如椿誡子孫語亦萬石君之流宜無以致禍者豈魏收為椿情故儻有虛美耶梁武與蕭寶寅書敘兄弟事初不虛飾又言自有天下絶棄房室斷除滋味正欲使四海見其本心雖非聖賢語然亦秦漢以來人生不能到也當與郤后化龍同看又言造浮山堰及李繼伯事則大誤矣烏有昆蟲不殺而魚人之民海人之地以較勝負者哉蕭寶寅論守令考課悉以六載為程限滿代還復經六年而敘是嵗周十二始得一階內官散職乃限四年則一紀之中便登三級不知代還六年方敘是何義韓顯宗論遷都伎作不可雜引古四民異居為證齊語羣萃州處余既辨之又言孔父云里仁之美孟母𢎞三徙之智君道在乎起天下絶類之材還以教之顯宗舉其粗者耳李彪落落識其大者及氣盛用之亦庶幾一二摧挫後索然無復存矣彪稱孔明在蜀不以史官留意亮鋭於興復不暇典章劉表公孫述故習蓋其所諱也又稱王隱集成晉書存一代之事當時所言如此然則西晉事行於今者皆隱筆歟李崇置樓懸鼓捕盜當時效之後世亦有效者但為笑耳崇又有斷獄兩事及改鎮為州皆明智過人學者逺觀近取若識開智長遇事成理可矣襲故迹因已行未有能合者崇在淮北十年梁人所畏遂興浮山之役而史載其父子販肆聚斂為時論輕鄙然則昔人所謂使貪使愚者豈物之一患不足以纍其所長耶崔亮停年格雖復官須此人停日後者終於不得庸材下品年月久者灼然先用按蕭寶寅傳載魏世外官代還六年方敘內官四年為限亮立此格専以停罷後嵗月斷之不總計其平生資厯抑新進拔滯淹故為有意利柄在已人不得干雖曰失之猶有所獲不若後世泛論考任無復止法容僥幸長躁求使士大夫皆傲然取必於上其得失相較又逺矣江東王氏子弟如王肅者不為少而與孝文相遇任待隆洽如此蓋其年相少長且中以圖南之規故也肅傳載孝文禱雨三日不食惜乎孝文涉道淺而雜用之故命不延永而功業亦以無成不然豈止是哉袁翻論甄琛諡是時人家已有行狀至德與聖人齊蹤鴻名與大賢比迹則行狀所起當又在前大抵浮美溢稱自西漢末方然蓋王莽餘教也蔡雍言作碑唯郭太陳實無愧其來固久矣傅水量南人記淺斫營蓋輕剽之習也昔人能渡淮斫營而今人不能渡江劫寨余在制司時和州被圍日夜告急元帥追諸營兵赴援既而以渡江無駐足之地竟不敢行然則兵無素習唯所便耳奚康生弓力十石矢異常箭梁武遺之弓長八尺杷中圍尺二寸箭粗殆如長笛康生用以平射猶有餘力考工記載造弓法詩稱袒裼暴虎然如此絶倫事乃不見于古人豈以德掩之耶湯文王雖起小國王天下後世皆謂德衰不可復為故孟子言霸必有大國司馬懿楊堅所以能盜取之者竊其權故也爾朱榮以部落酋長居秀容不毛地止一縣衆才數千世為邉藩朝權輕重曾莫之預一旦稱兵沈太后幼主獵舉國士如狐散葛榮百萬擒蕭寶寅萬醜奴天下大難略盡雖身不終而魏竟以亡然則權與力皆不足而能若是何也孝文藉纍世富盛志慕古人解縱維索護養癰疽既無幹風俗之功反受動搖根本之害榮之禍實自取之悲夫爾朱仲逺言比來行臺採募者皆得權立中正在軍定第斟酌受官今求兼置權制軍要從之於是隨情補授肆意聚斂魏初立中正見衛瓘李重傳余嘗以為曺操能以鄉論品第人材使不得由軍功雜進故其後有正始勝流之目今拓跋政壞軍立中正爵由意與官以賄成蓋襲其名以遂強臣之欲而魏中此亡然則魏尚上功首差六級下吏罰作馮唐以為過非權在上亦不能也辛雄祿養論稱仲尼陳五孝自天子至庶人無致仕之文禮記八十一子不從政九十家不從政鄭玄注云復除之然則止復庶民非公卿大夫士之謂以為宜聽祿養不約其年肅宗納之魏自遷洛之後政過於厚而一時議論亦多此類然無驗而速亡蓋可哀也錢徒有五銖之文而無二銖之實薄甚榆莢上貫便破置之水上殆欲不沈此髙道穆魏末論濫錢也古今救錢弊之説甚多大抵以錢代物以大改小以重易輕從否雖殊致益不異未有如後世以無銅為患者督鑄不已至毁錢而為銅矣嗚呼此不可不深思也孫紹論律班令止謂主議之家太用古制此孝文後事不可收拾之驗也故紹又謂往在代都武質而治安中京以來文華而政亂昔於太和極陳得失具論四方華夷心態即日事勢乃至於此不憂荒外乃慮中畿然則當時非無智者改絃易調豈可謂易哉張普惠諫太上泰公一時壯議如任城清河元匡崔光袁翻預問難者亦皆心知其不可固不憂刑禍之及也以弱從諛以強拒諫雖若不同致敗則一此本為國者之利害故左氏載仲尼之論泄冶民之多辟無自立辟然則普惠之免可以為幸也以髙允傳觀遊雅雅得為修士矣以陳竒傳觀遊雅雅得為佳人乎局已小知遂深伐異之怨因時酷法陷人覆家之戮哀哉哀哉徐遵明指其心謂真師正在於此古者師無誤師即心也心即師也非師無心非心無師以左氏考之周衰設學而教者師已有誤故其義理漸差及至後世積衆師之誤以成一家之學學者惟師之信而心不復求遵明此義殆千載所未發雖然師誤猶可改心誤不可為此蓋遵明智所不及而以心為陷穽者方滔滔矣裴伯茂因內宴侮慢元景哲申啓稱伯茂棄其本列與監同行以梨擊案傍汙冠服禁庭之內令人挈衣言不應令人挈衣不言人不許入殿庭當考史稱溫子升外恬靜與物無競言有準的不妄毁譽而內深險事故之際好預其問所以終致禍敗爾朱髙歡父子之間惟子升號能有意父室一時人士如其比者絶無矣魏收之言不亦宜乎眭夸言桃簡卿已為司徒何足以此勞國士及素服受弔皆可録魏法峻急仕者皆云不敢不至然則決不欲仕而能自行其意如夸者亦安得而禦耶張淵觀象賦備著星文江式集字書號古今文字四十卷依許氏説文為本上篆下𨽻有表具論房景伯母子可謂能以孝化民矣世之愚儒怒擒突擊冒行無忌而陷人於罪者是以曾閔為桀跖也悲夫余嘗論善攻者必使救無所用善救者雖攻圍力重必并敗之以虛聲望風退挫者不與此數惟徐晃韋睿收赴救之功而姚興將十萬衆相守數月外望突免內冀引接拱手受陷莫收一力之用豈興崛強一隅猶未見大敵而然耶如竇建德固不足道也董琬記西域為十六國地為西域西域本三道後更為四出道接漢西域傳看魏收序傳後亡逸然本傳未有不用自序者自司馬遷班固以來雖無不髙自譽道觀收之詞如此可謂陋而無恥矣習學記言卷三十四
