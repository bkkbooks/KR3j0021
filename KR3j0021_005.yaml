body:
  text: 習學記言卷五宋葉適撰書序孔安國序堯典舜典按以書為孔氏之書序亦孔子作其説本出班固固因司馬遷遷因孔安國安國無先世的傳止據前後浮稱兼左氏楚靈王言倚相事爾固引雒出書而謂字文為書既已甚陋安國初言典墳至夏商周語義奥雅厯代以為大訓旋復言討論墳典芟煩翦浮則是孔子併大訓亦去取也豈有是哉文字章義理著自典謨始此古聖賢所擇以為法言非史家繫日月之汎文也自是以後代有詮叙尊於朝廷藏於史官孔氏得之知其為統紀之宗致道成徳之要者也何所不足而加損於其間以為孔氏之書歟書序亦舊史所述明記當時之事以見其書之意非孔子作也不然則升自陑放太甲殺受皆其書所無有孔子胡斷然録之哉春秋以後游士浸盛雖然不因孔氏而獲見書之全者寡矣又况後世屋壁之中乎其盡歸之孔氏不足怪也至於迹上古已定不刋之訓推孔氏有述無作之心則蓋有不然者後有君子當更考詳或疑非安國文無證堯舜之前非無聖人神靈而不常者非人道之始故也安安者言人倫之常也允恭克譲所以下之也此所以為人道之始也大禹謨臯陶謨益稷禹益言為治道之首其言至后臣克艱而止不可以有進矣曰勤儉曰不滿假曰不矜伐皆艱類也世稍降而徳衰艱逸之論始參至孔子乃復正之曰為君難為臣不易䂓矩凖繩必先立而以身奉之故法度不可失也人心衆人之同心也所以就利逺害能成養生送死之事也是心也可以成而不可以安能使之安者道心也利害生死不膠於中者也舜禹之徳不稱其兵也必反兵而有苖服也知人無法而知徳有法豈惟知徳有法而教徳有方也天徳雖偏必以人徳補之天徳非異能補之以人則皆異能也合而聽之天下之材不可勝盡也故教徳而多材禹湯文王皆用之若後世治偏盡性必至於聖而後用者非臯陶法也枉其材棄其徳者也丹朱傲虐之戒元首股肱之歌君臣克艱之驗也禹貢五子之歌甘誓三江既入震澤底定呉人之習於水事者謂呉松江青龍江揚子江也水自震澤入呉松江而入于海最近自諸湖􅍩而入青龍江入于海次之自諸涇浦港而入江陰揚子江入于海又次之江得其入則澤得其瀦故言底定也所謂導漾為北江導江為中江者亦揚州境然是二而非三不可以意足之也愚夫愚婦一能勝予禹以民為可畏若是中不害李斯所謂命又曰桎梏若堯禹然者也舜臯陶之歌歌也五子之歌亦歌也風雅騷人之義具焉其正與變未之敢論甘誓以自治為命而已𦙍征則言克愛是勸殺也師之繇曰師出以律湯誓仲虺之誥湯誥伊訓太甲咸有一徳强其國人以伐共主功成而有慙徳湯何為而然也舜禹貴民之甚以君為輕湯不敢違故也雖然世道一變矣古者君人無威桀始作威威作而徳滅矣湯用𤣥牡請命為滅徳也伊尹弗狎于弗順為不徳也徳之為言伊尹曰一也得其所以一事雖無常必協必主而堯舜不難至也失其所以一事雖有常必二必三而桀紂不難至也孟子曰有伊尹之志則可無伊尹之志則簒也問者徒以君不可放孟子曷為而遽簒之伊尹知復其君於徳而已奚顧其他惜乎孟子之答粗也是絶天下以無伊尹也盤庚説命髙宗肜日西伯戡黎微子盤庚五遷民咨胥怨話而告之前後諄復其辭切近皆酬對臣庶之常語衆人所可識非有文采義理以震耀之也周誥亦同而韓愈乃以為佶屈聱牙若難知難解何也當更熟考湯以有夏昏徳民墜塗炭故聿求元聖髙宗恐徳弗類不足正四方故夢賚良弼古者君求臣非臣求君也木從繩則正繩所不合者削之而已然則后之從諫不曰委曲諷之先從而後弼也樹后王君公承以大夫師長不惟逸豫惟以亂民傅説亦知位不在逸禹益之論於時未息也髙宗使説交脩予罔予棄予惟克邁乃訓舜之遺意蓋猶存焉微子去之箕子為之奴比干諌而死各正其義所以自獻於先王也不曰我必能存商我必不事周者紂得罪於民先王所不赦也泰誓牧誓武成泰誓序惟十有一年武王伐殷戊午師渡孟津書惟十有三年春大㑹于孟津惟戊午王次于河朔時厥明王乃大巡六師牧誓甲子昧爽王朝至于商郊牧野武成厥四月哉生明王来自商五篇始末最為明備序所謂十一年伐殷者書所謂以庶邦冡君觀政于商受罔有悛心犧牲粢盛既于㓙盜與微子相應三仁之自靖在觀政于商之後大會孟津之前此書之可信者也或言文王受命稱元年九年而崩武王不稱元年通數為十一年雖云九年大統未集而稱元不稱元書所不載不可信也武成序稱往伐歸獸識其政事不專謂命諸侯細觀編簡無錯亂不可移易洪範旅􅋙金縢大誥箕子言天不以洪範九疇畀鯀而以錫禹其詞甚敬而嚴後世之傳固妄矣然古人之所崇畏者必有故也文武起小國為天下所歸夏商之世傳先聖之治法宜未能盡知此武王之所為訪箕子之所為告也余於皇極而歎古人之道至是散矣五子述禹所傳之訓曰予臨兆民懍乎若朽索之馭六馬而皇極言淫朋比徳則民有罪焉下無好徳而上之福則不錫焉王義王路以我為正而民之情不敢自任焉豈待於民者已狹而出於君者已不可忤矣猶曰未至於虐而已然則夏商之季俗壊民薄而堯舜禹湯之道已不可復反乎臯陶曰天聦明自我民聦明天明畏自我民明威箕子之言無乃異是歟蓋亦有不得已者歟然則成康之後遂為雜霸不復古人之萬一者其兆見矣九疇於古無見也禹稱九功或庶幾近之虞夏商書之言徳必自厚而民服箕子叙三徳乃視世厚薄而稱吾徳以乂之非古人意也古者戒人君自作福威玉食必也克已以惠下敬身以敦俗况於人臣尚安有作福作威玉食者箕子謂惟辟作威臣無作得非商之末世權强陵上之俗已成紂雖肆其暴而威柄已失矣故其言如此然而武王周公亦未果用也其後周衰秦漢乃卒用之箕子言皇極三徳即堯舜禹臯陶言知人官人也舜嘗論股肱耳目将一委於臣而庶頑䜛説既先為法以待之蓋近於箕子之論故禹以為疑而丹朱之戒進焉禹以知人官人為難臯陶獨言九徳咸事則人材無非可用者而孔壬殄行不治自銷矣蓋人君敬己之徳教多材而官使之百世不變之道也皇極雖多立善意以待其臣然黨偏已扇虚偽已張亷耻已喪欲救於末流甚難至於臣自為威福玉食則非大刑弗治非峻防必踰君徳日衰臣節日壊是使帝王之道非降為刑名法術弗止矣悲夫武王即以商封武庚不私其地徳欲過於湯矣而武庚不服管蔡和之乃為家禍故周公居東大誥作於外鴟鴞賦於中也康誥酒誥梓材召誥紂以力征諸侯斥大王土幾為秦矣武王誅紂復立武庚與之盡其故地武庚弗從而滅周公然後以次分封而同姓多焉後世謂犬牙相制為磐石宗若自守其天下者非本㫖也明徳反之言無逸也慎罰反之言惡殺也自人道言之其性分也自君道言之其職業也酣歌恒舞禹湯有訓矣蓋國亡而其民以為戒也紂之庶羣自酒嗟乎甚哉國亡而其民猶以為俗也商之貴家舊族終頑不率周公方為之營洛遷以自近而化誨之召公因是又戒成王疾敬徳蓋與禹益同意矣不隨世變而遷惟聖賢能之洛誥多士無逸惟周公誕保文武受命惟七年蓋特紀其攝也自師保相成王後又别紀禹言克艱為聖君也周公言無逸為中君也艱非逸之對也以艱先之以逸戒之以夀誘之以天懼之多門禁之多塗誘之矻矻乎治道之艱進也君奭蔡仲之命多方立政召公不説無異故不欲為相而已周公留之無私説使後世知成王之時為有臣如古人之時也無是臣則無是治周公之所畏也武庚弗順可也四國多方胡為而迪屢不靜乎以是知紂之存亡為世道之大變矣周公雖盡心力以行王道而自是以後聖人之治終不復作乃世變之當然不可不知也有夏既迪知九徳之行而周公戒立政則必用吉士又曰常人又專以庶獄為重中罰為冝豈臯陶之法至是而有所改歟雖然臯陶之法不可改也吉士常人失其用則鄉原出矣周官君陳顧命康王之誥周官官制與堯典畧同而命官之意與立政異恐是時治道已成易於訓飭若淺者然當考君薨世子諒陰不言委政冡宰免喪而後即阼古人之逹禮也成王當彌留之際被冕憑几以其子託諸臣召公及羣公渝恤致文而奉之康王又使康王報誥之何忽以位為重而為是衰末之舉歟嗚呼紂武庚之時變故煩矣管蔡流言成王疑慮道将喪矣周召恐懼師保恊心卒能復成王於徳於是疾病矣洮頮自力大延羣臣還以周召訓已者而訓之是可謂難矣是故召畢變禮傳命於康儀物粲然四方風動為斯道之在也位何足言哉天下大器也聖賢厚積也所以富是道而出之也刑政權勢威力皆道徳之棄餘也如其不然而曰文武之道未墜於地則仲尼之徒何述焉無依勢作威無倚法以削成王知所以命君陳矣然而人材日陋也世變日下也皆依勢倚法之類也畢命君牙冏命吕刑成康再世皆以商民為畏非畏其頑畏吾不能化也越三紀而後能化者待之以道而不以刑故也觀畢命而成康之道備矣後世責道化於旦暮孟子謂惟此時為然恐更當考祁寒暑雨小民之所痛也文武周公所以盡其心而保之也穆王雖以為艱然厭薄形矣信是道之衰也按吕刑言苗民始為劓刵㭬黥之刑皇帝報虐以威疑肉刑非治世所為五帝皆聖人安得因亂國之淫刑而不改也舜以流宥五刑臯陶天討有罪五刑五用然則五刑之名古矣非始於苗也吕刑為贖而作雖大辟皆赦後世但有官蔭減之法唐有加役流當議文侯之命費誓秦誓東周命誥間見於左氏自幽厲治道缺王命逹於諸侯大抵禮錫之常文也若詹桓伯之辭一二而已王子朝則又甚矣魯初封有難伯禽本以武競謂後世浸微殆非周公語陳悔過之意誓於其臣而以受責如流為羣言之首雖在亂世是心足以王矣天有常道地有常事人有常心於書見之孔氏索焉不可不考書稱若稽古四人言大哉堯之為君也舜有天下而不與焉禹吾無間然矣子夏曰舜舉臯陶不仁者逺矣故考徳者必先四人其次湯伊尹又次文武周公世有差降徳有出入時有難易道有屈伸孔氏以是為學之統緒孟子所謂聞而知見而知者也近世之學雖曰一出於經然而汎雜無統洄洑失次以今疑古以後凖前尊舜文王而不知堯禹以曾子子思斷制衆理而臯陶伊尹所造忽而不思意悟難守力踐非實凡此類當於書求之習學記言卷五
