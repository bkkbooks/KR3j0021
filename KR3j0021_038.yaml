body:
  text: 習學記言卷三十八宋葉適撰唐書帝紀歐陽氏用春秋法書唐五代帝紀按堯舜三代史今存者惟書其載事必具本末春秋諸侯史也載事不能自通者左氏必以傳緯之亦所以具本末也孤行無本末而以類例為義始於公羊董仲舒師之於是經生空言主斷而古史法沒不見矣若夫司馬遷變史則又不然紀世家君也傳臣也各因其人以著其事非如上世史因事以著其人也歐陽氏三者不備考而雜用之於紀則有掩鬱不詳之患於傳則有掠美偏惡之失長空言之驕肆而實事不足以勸懲學者不當遵也高祖隋甥也為太原留守晉陽宫監任遇不卑隋政既亂天下皆挺刃而起隋之罪雖足以亡而自高祖父子分義言之只謂之反今乃美其名曰義兵唐人義之可也後世亦從而義之使李密竇建德之徒有成庸非義乎范氏又謂太宗有濟世之志撥亂之材獨譏其創業不正無以示後夫濟世撥亂必不志於利今也朝為匹夫暮為帝王利之而已且彼患無以起則何暇於示後世又非所以責之也故凡為後世之論欲引而致之古人者常多失實不可不知高祖既克長安將革隋命為相國加九錫乃常禮也高祖以為堯舜湯武各因其時取與異道未聞夏商之末必效唐虞之禪故但改丞相府為相國府九錫殊禮皆歸之有司范氏謂其雖不能如三代而優於魏晉此亦後世大議論也蓋自王莽以來未有不假禪讓以奪國者非故效唐虞之文也乃其取之無辭姑假借之云爾高祖以前其人無不已據大權示為之漸先加殊錫徐乃遜位使人知其勢當然豈以是為超夏商而比唐虞哉今高祖乃云推其至誠以順天命夫天命不可知必視其德天下雖共起而亡隋高祖敢自謂其德可代隋乎彼必信妄人圖䜟之言李氏當王以此為天命爾則其陋尤甚矣隋得罪於天下不得罪於李氏羣盜可以取隋高祖父子不可以取隋代王嫡孫也尊煬為王立代為帝君臣再定矣今高祖之言如此無漸而逼取明奪而不慚是又在魏晉下而何非笑之有哉且王莽曹操司馬氏皆能不殺舊君而武德二年八月癸酉􅈶國公薨嗟夫孺子何罪固不及魏晉逺矣新史言太宗之治制度紀綱之法有以憑藉扶持永其天命古人制度紀綱自當别論然按高宗中睿武氏之間制度紀綱皆已壞天寶之後制度紀綱皆已失如人痼病與命適相劫制明皇憲宗醫治不盡餘疾依然歷觀古今無不以相制而僅存者無能制則亡矣自楊𤣥感反李密已為畫次䇿據關中矣是時隋猶未亂也况大業末天下盡叛而煬帝南游不歸太宗於此决計入關無復反顧如升虛邑遂定本根冝矣其敗宗羅㬋乃直趨折托城衆以為當止者不止遂降薛仁杲而收秦隴其禦宋金剛乃固守柏壁壘衆以為當戰者不戰卒走劉武周而復汾晉為王世充也竇建德來援兩賊連衡勢數千里腹背受患常情同憂然而太宗自將迎前留兵綴後既擒建德併降世充齊趙河南一舉蕩定雖古之能將固多如此至於慮敵明審赴機果徑緩急在手仗勝獨克羣算衆力蓋莫得預焉秦漢以來由徒步搏取天下者必以智起以勇奮以氣勝非兼是三長蔑濟矣項羽常謂力拔山氣蓋世真不虛語方其盛時竭天下之智力不足以當漢高祖智勇俱劣特以氣勝爾而能用人之智勇故終困項籍夫是三者雖欲兼而又惡其太盛太盛則過偏而有反噬自焚之災高祖幸因人成功虛氣不除幾復失之太宗不至如高祖之甚然亦太盛矣雖身自致治而天下未及受富庶之實以其堅凝之術少也惟光武僅處三者之中而又必欲摧剛成柔以安靜為效故其三世相繼海內稱平延及安順風俗未改直本規使之非偶然也外則孫䇿劉裕周武帝世宗雖起徒步於此三者亦號庶幾餘不論矣䇿與周武皆年少亦惡太盛爾然則千有餘歲覆載之廣合離成壞之多求其能調和血氣志慮以整頓當世者曾不一二而得况欲望其亶聰明備道德為百姓請命上帝而保祐之乎雖然就三者細論以身從人者易自作事主者難李密非無三者所以終為俘馘正坐自作事主爾太宗固於三者皆絶出其成功之易亦由專愛子之親任不疑之地居守有寄故可以一意征行使身為權首已登大位安得常與馬上角逐哉此又議者所未詳也太宗殺建成元吉最為異證如齊桓晉文兄弟爭國鮑叔尚謂子糾親也請君討之安有君父在上以藩王而攻冢嫡蹀血橫尸於禁門外使父不許又將併篡之乎房杜以此為功難與蕭何鄧禹並稱矣然後世避莫敢指蘇氏言孔子蓋罪湯武以警後世而謂太宗從諫如流為秦漢以來百王之冠可乎程氏又有三代天理漢唐人欲之論嗟夫人必逼父殺兄而後為欲則其所惡又將若何哉貞觀四年斷死刑二十九人史稱其幾致刑措太宗以為用魏徴言行仁義所致故恨不使封德彜見之後人爭𫝊誦者尤以此一事也按孝惠高后十五年中史稱海內初離戰國之苦君臣俱欲無為故孝惠垂拱高后女主制政不出房闥而天下晏然刑罰罕用民務稼穡衣食滋殖此亦當時實事也民遭大亂已二十餘年死亡且盡若又動搖國何以立豈不為石勒拓跋乎固不必夸言之也比屋可封象刑不用皆處士虛談聖人但云刑罰清而民服天下之廣安得更無殺死人耶顧其清濁何如爾余嘗論宣和海上之盟招冦致禍至今百年上下無不愧悔以為大戒雖失事計然可謂審於知過矣太宗親因隋伐遼故能奪有天下乃復事高麗身與之終不畏他人踵其後乎不惟不戒反復已亡之不勝為異代雪恥其用心之謬見理之昏何止以好大喜功為病哉史稱太宗除隋之亂比迹湯武致治之美庶幾成康自古功德兼隆由漢未之有堯舜三代之統既絶學者寂寥莫能推與不得不從漢唐然其德固難論而功亦未易言也湯武世有其國已為諸侯所歸不忍桀紂之亂起而滅之直以不免用兵有慚於德謂之功則可矣光武宗室子志復舊物猶是一理如漢高祖唐太宗與羣盜爭攘競殺勝者得之皆為已富貴何嘗有志於民以人之命相乘除而我收其利若此者猶可以為功乎今但當論其得志後不至於淫夸暴虐可與百姓為刑賞之主足矣若便說向湯武成康大義一差萬世不復有所凖程學者之大患也責備賢者為賢者諱皆公羊語也古者聖賢同辭惟其未至於賢也故不備備則何責而又何諱焉此論既立天下反以有所缺為賢春秋又以責所備為嚴道愈隱矣高宗雖非克肖之材然始終恭畏不得罪於民使無武氏一事豈不得在惠景章和間耶五子之歌曰內作色荒外作禽荒甘酒嗜音峻宇雕牆有一于此未或不亡伊訓曰惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨具訓於䝉士吁可畏哉敗亡之物聖賢記之象驗昭灼無不以類應高宗好慕沉溺蒸黷汙下犯禹湯正條貫矣夫以欲殉身者常不免於殺身雖有他善固不能救也無忌遂良之流粗澀庸鄙輔導無法方武氏從感業寺再入羣臣不引禮廷諍以絶其萌乎三數年中位遇未極不相繼陳義以决其去乎寵熖既成至于奪嫡然後言其託體先帝將何及也且自武以妬聞掖庭忿鬭日喧於外豈不預為陳平之深念乎太宗雖有好諫之美而無伊訓不匡之刑嗚呼孰謂其制度紀綱尚可以憑藉扶持哉武后貶楊素詔云朕接統百王恭臨四海上嘉賢佐下惡賊臣常欲從容於萬幾之餘褒貶於千載之外况年代未逺耳目所存者乎雖張易之惡楊元僖兄弟所為然此數語不可不記也近世多言狄仁傑能順導武后迎還中宗唐室再造其功最大按廬陵王以聖歷元年九月復立為皇太子至神龍元年春首尾八年方復位以武氏之翻覆八年之久豈可逆期况既已革命雖於中睿母子無絶道而為唐臣者皆得而誅之仁傑固勝餘人然亦才可免罪爾張柬之長安四年冬作相數月便能誅二張反正使其處仁傑地位必不如是遲緩也於是過之矣或者又言仁傑不自為薦柬之使為之故其功全在仁傑雖然豈可付一老人以許大事於八年之外耶此亦虛論爾史稱𤣥宗始終之異性習相逺以開元治而天寶亂也開元不得言治但盛爾杜甫謂憶昔開元全盛日小邑猶藏萬家室稻米流脂粟米白公私倉廪俱豐實宫中聖人奏雲門天下朋友皆膠漆百餘年間未災變叔孫禮樂蕭何律韓愈言高祖太宗既除既治高宗中睿休養生息至於𤣥宗受報收功極熾而豐物衆地大蘖芽其間是唐人之論本以開元為盛不以為治也盛與治相近而不同鴟梟小毖之詞百世後讀者常悲哀痛楚周所以有成康功用也家禍深則創艾切君臣相戒克己念治治而後盛故可保矣高宗中睿六十年中親父母骨肉相戕殺幾盡存者性命如絲髮爾𤣥宗以諸王殺韋后便超冢嫡以監國誅太平徑擅天下家禍慘烈如此君臣處之皆以為功不以為畏也姚宋雖舊相然無逺識又所任只三數歲及自用李林甫遂至二十年猶幸其止是嫉妬士大夫若亦如宇文融王鉷一向導以殘民橫斂必不能禁而聽其所為則本根盡拔海內土崩不可復收矣治亂人主所致無偶然者晉悼公漢宣帝皆中材猶自保終始如𤣥宗豪俊之資用人主利勢操無根之賞罰享國既久盛極而衰證自當然不得言始終異而性習逺也此論既立昏庸者資以藉口中材無所據依矣學者當詳考然後知天寶雖亂而開元未可言治也戰國秦漢以來經營天下皆待智士縱無一民寸土中尚擘畫得出况四海晏然人心未叛之時乎祿山始亂起於倉猝雖極可畏然不是無可經營就使巴蜀奔播靈夏單弱若處置得冝年歲自定矣其如當時無一智士可以論此無故增立諸節度相次遍滿四方不知天下本何嘗分裂而自作分裂借回紇諸蠻兵與祿山交鬭不知夷狄本未至侵凌而召其侵凌坐此二失百六十年與之終始祿山安能壞唐唐自壞之爾唐人雖有幹力而少智謀自其初興固已患之後益滋甚愈後則謀國者幾絶夫道德既不足以恱服而智謀又不足以經營天下雖大誰與共之其乘輿屢遷何足怪也肅宗暮年天下之勢將亡幸而有代宗代宗以廣平王統帥收兩京功在諸將上材練涉而資寬仁又能沉斷蓋良主也所以不治而愈亂者不知其禍在置藩鎮既不能收反更成之故也聽僕固懷恩不改河北幽燕最大節目藩鎮已成自無治法德宗初立恃其聰明始欲伐叛幾不免身憲宗辛苦十四年積勞未厭卒以大壞夫不知置鎮之禍而欲以治鎮之道治之冝其不治而愈亂也張良論立六國謂漢高祖事去周亞夫拒吳王濞請專以梁委之東漢改刺史為牧天下遂亡然則謀國不善真在反掌呼吸間耶余嘆唐諸君未至於不足以守天下獨既置藩鎮一事無所用力而迄唐世無一人能知之韓愈但言大慝適去稂莠不薅而已如元和十四年用多少薅使得淨盡此尤可歎也大率天下於已安平時無故更張忽有變處不能把握是皆亡形如魏孝文遷都及唐增節度使是也德宗先殺劉晏既用兵遂借商人錢杜佑力不足奉行坐黜然佑徒曰撰通典爾方其時乃進省官議固不能損益也德宗初意非剝下者謂兵事急適當如是罷則止矣商人錢不足遂稅間架而亂已作德宗出走余每歎昔人有故而橫斂猶可改也後人無故而橫斂獨不可改哉德宗疾革而順宗已不能言父子欲一見不可得此瞬息致亂之時非從容為姦之日也故自貞元二十一年正月德宗崩至八月憲宗即位二百餘日耳又其間三月廣陵王為皇太子七月皇太子監國伾文就欲弄權其與幾何余意栁宗元劉禹錫固惕息悚恐之不暇而方依憑以躐富貴耶宗元貶後自言三十三歲為禮部員外郎甚少超取顯美自古文人無識雖多如此然宗元終身著論欲裁量古今不知立身在何許故可訝也李藩對憲宗神仙事言君人者但務求治四海樂推社稷延永自然長年其下云憲宗深然之後欲以栁泌為台州刺史羣臣諌而帝以為臣子欲為君父求不死何惜一州此亦不樂推之罪歟晏子謂古而無死爽鳩氏之樂非君所願齊景公至庸尚受此語然則憲宗雖不知道亦其臣識陋非晏子比也至韓愈言後代帝王事佛年祚短促以此取怒又太甚矣蔣係稱上自藩邸監國以至臨御訖于元和軍國樞機盡歸宰相由是中外咸理紀律再張又言任异鏄之聚斂逐羣度於藩方政道國經未至衰紊新史言𤣥宗憲宗皆不克終檢尋舊書無憲宗不克終之事若指服食躁怒被弒余謂此正求克終之過爾係以為政道國經未至衰紊是也憲宗止是少人與措置藩鎮一節蓋充其所為可使天下復平矣按元和十五年十月成德王承元請命帥長慶元年二月幽州劉總請為增於是兩河燕薊俱平皆憲宗事也謂其不克終果非矣至於撫御乖方致燕趙再失則自是穆宗君臣之過論者不分别難以監後來也又所謂歸咎於銷兵者兵銷豈得為非但銷之無其道爾敬宗初立賞神策軍絹十匹錢十千畿內諸軍鎮絹五十千其餘軍鎮頒給有差內出綾絹三百萬段以助賞給史繫其下云穆宗即位在京軍士人獲五十千在外軍鎮差降無幾至是宰臣奏議請量國力頒賞故差减如先朝物議是之宰臣李逢吉也敬宗又童昏其所以能如此者是時軍士驕恣必未至如後世之甚故也國之大患義理不得行而以例為定已增則不可减已與則不可奪而所是者皆為非此危亡之徴與國相為短長而不知治其知者亦不能治雖有國猶無國也庚申詔君天下者莫尚乎崇淡泊子困窮遵道以端本推誠而達下故聖祖之誡以慈儉為寶大易明訓垂簡易之文未有上約而下不豐欲寡而求不給朕以眇薄遭逢內難刷君父之仇耻攄億兆之哀寃而股肱大臣羣卿庶士引義抗請至于再三以圖宗社之安以答華夷之望俯從衆欲夙夜震兢思所以克己復禮修政安民宵興匪寧旰食勞慮夫儉過則酌之以禮文勝則矯之以質庶乎俗登太古道洽生靈儀刑家邦以化天下內庭宫人非職掌者放三千人任從所適長春宫斛斗諸物依前户部收掌鄠縣渼陂鳯翔府落谷地還府縣教坊樂官翰林待詔伎術官并總監諸色職掌內冗員者共一千二百七十人並冝停廢總監中一百二十四人先屬諸軍並各歸本司餘七百三人勒納牒身放歸本管先供教坊衣糧一百分廂家及諸司新加衣糧三千分並冝停給五坊鷹鷂並解放今年新宣附食度支衣糧小兒一百人並停給别詔宣索纂組雕鏤不在常貢內者並停度支鹽鐵户部及州府百司應供宫禁年支一物已上並凖貞元額為定先造供禁中牀榻以金筐瑟瑟寶鈿者悉冝停造東頭御馬坊毬場冝却還龍武軍其殿及亭子所司毀折餘舍賜本軍應行從處張陳不得用花蠟結綵華飾今年已來諸道所進音聲女人各賜束帛放還城外墳墓先有開劚以備行幸處冝曉示百姓任其修塞其大逆魁首蘇佐明等二十八人並已處斬宗族籍沒妖妄僧惟貞道士趙歸真等或假於卜筮或託以醫方疑衆挾邪已從流竄其情非奸惡迹涉詿誤者一切不問凶徒既殄寰宇佇康載舉令猷用宏庶績布告中外知朕意焉按文宗年十八以寶厯二年十二月乙巳即位距下此詔十六日爾舊史稱帝在藩邸知兩朝之積弊此時釐革並出宸𠂻士民相慶喜理道之復興矣其聰明恭儉自然合道蓋非秦漢以後繼世之君所能及况行其所言終始不變則雖秦漢以前猶難之新史用春秋法减省文字此詔遂遺落不得具可惜也右僕射王涯奉敕凖令式條疏士庶衣服車馬第舍之制度敕下後浮議沸騰杜悰於敕內條件易施行者寬其限事竟不行公議惜之此太和六年也至七年冊皇太子降詔言皇太子方從師傅傳授六經一二年後當令齒胄國庠以興墜典冝令國子選名儒置五經博士各一人其公卿士族子弟明年以後不先入國學習業不在應明經進士限進士舉冝先試帖經并略問大義取經義精通者放及第卿大夫者下人之所視逺方之所倣若非恭儉克己廉貞任人而望其服從固不可得况朕不寶珠玉不御纎華逮于六宫皆務儉薄卿大夫得不叶朕此志率先兆人比年所頒制度皆約國家令式去其甚者稍謂得中而士大夫茍自便身安於習俗因循未革以至于今百官士族起今年十月其衣服車馬並冝凖太和六年十月七日敕如有故違重加黜責漢以來人主詔令如此者固少矣豈可不存也漢唐中世以後為其國死禍者藩鎮宦官而已藩鎮自穆敬以後不可復治宦官自文宗以後不可復治治則亡矣自昔惟恐人主無志如文宗夙夜不忘而廷臣竟無可共此者始以周行孤逺用宋申錫繼以內臣薦引用訓注皆大敗余每歎王守澄使豆盧著告申錫反聲宦臣之罪而治之莫易於此時要是人主居深宫先慮而後蔽此聰而彼聾當自責而不當責人也悲哉武宗論王起不放子弟事自古有國私其所近未有不用卿相子弟者雖堯舜三代以道起天下之材然而草野寒門終得其志者鮮矣及漢武盡破前世之法而三百年間遂化布褐為公侯魏晉南北又不然矣及詞藝既勝習俗已成則自隋唐至今無不由閭巷單寒出者蓋其勢所偏積而然非中道也然而緣是能使人主求士常以寒畯為主無聖人之道而合聖人之心其於致治之源亦非小故爾而李德裕乃言朝廷顯官須是公卿子弟臺閣儀範班行凖則不教自成寒士縱有出人之材登第之後始得一班一級固不能熟習然則臯陶九德成湯克知三有宅心灼見三有俊心皆可廢也德裕區區以幹力負天下重任其議論密勿之際童騃鄙暴如此欲為名宰相難哉又論韋宏景事尤不近理重令自非管子本說其言虧令者死益令者死不行令者不從令者死令之嚴如此然下令如流水之原令順民心故論卑而易行又却不以為證據若不順民心遽從而殺之可乎制置職業雖曰人主之柄非人所得干議然須制置得是若悖於道乖於事而禁人不使議豈不危亡乎又所謂制置職業者須祖宗成憲以為常典子孫遵行故非人所干議若後世子孫一切任意忽改驟易有害於人而亦不使人干議可乎況當時錢穀鹽鐵刑法之類屢經更張朝此暮彼茍徇一時非所謂制置職業也安得不使人預議其間哉德裕以宰相之材自許後人亦以其自許者許之夫宰相者秉德以服人明義以率下若恣其偏私自作胸臆又可許乎舊史稱宣宗帝道皇猷始終無缺雖漢之文帝不能過也惜乎簡籍遺落十無三四吮墨揮翰有所慊然而新史謂其以察為明無復仁恩之意蓋自是之後唐遂衰亡不復能振故也然舊史言寶厯以來中人擅權事多假借京師豪右大擾窮民迫急洎大中臨馭一之日權豪斂迹二之日奸臣畏法三之日閽寺讋氣由是刑政不濫賢能效用百揆四嶽穆若清風十餘年間頌聲載路然則新舊史相去百餘年舊史所褒者皆實美而新史所貶者乃虛意也若謂唐自此衰以為宣宗之過則又不然宣王之後有幽王十餘年周遽亡豈必以此咎宣王乎夫方鎮宦官為唐必壞之疾至是既不可為則為人主者能斂祍恭已精於聽察使小權小政不至甚撓不貽民害以了目前若是而已新史以大者責之論則善矣余亦未知其所處也新史稱以僖宗之時唐之威德在人孰與天寶之際而僖宗幸蜀諸鎮之兵糾合戮力遂破黃巢而復京師由是言之肅宗雖不即尊位亦可以破賊矣按僖宗既幸蜀廣明二年勤王兵雖會於京師王處存為賊所敗諸軍退舍賊鋒愈熾三年召沙陀李克用連破黃巢始收京城五年為光啓元年僖宗歸自成都至冬李克用與王重榮合逼京師逐再出鳳翔而嗣襄王煴僭立唐自此亡矣然則所謂諸鎮糾合戮力破黃巢復京師者徒有名無實未可引以為斷也以堯舜之治天下德不衰而耄及尚皆遜位況𤣥宗老而棄國不與其子而誰與儒者雖知肅宗不當不待命於其父未知𤣥宗不當不即以位授其子然亦由奔逆阻絶各不相知之故吁可哀也人不止識治又當識亂昭宗初藩鎮最强者朱溫李克用然未有取唐之心張濬助全忠無故討太原使韓建李茂貞狼顧而起宦官外憚强藩雖暴橫然權不足以覆國崔𦙍倚全忠志必滅之然後昭宗劫遷東都身與家族不保而併其名號盡矣新史謂昭宗為人明雋而舊史亦稱英傑然則不識亂亡而以不忍之心處之是速其亡而已雖雋傑無益也昔子家羈終始以為魯昭公不當與季氏立異而羈之義却不與季氏偕存世事有多少節次儒者論不了真無補於人哉前代造事之君惟漢光武以身獨任自餘無不與其臣相左右終始者太宗相房𤣥齡二十三年始用魏徴及相十八年皆死於位後不復能然矣惟李林甫元載蔡京秦檜最久夫忠智者必世而不足奸昏者一日而有餘世之所謂賢者不自量而欲以歲月售功其君不自量與一時之人不知量皆以歲月責之所以有謗而無名事不集而弊常在也士誠知此惟不求用為庶幾爾習學記言卷三十八
