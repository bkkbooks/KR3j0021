body:
  text: 習學記言卷三十二宋葉適撰南史齊書按漢魏之季皆以君弱不能主斷為強臣劫取至宋非專取之於晉差若無愧余固論之矣及其後世三遇淫虐營陽見廢早故毒未加於人使縱其惡非桓靈所能當也前廢殞首雖授之湘東而子房子頊禍遍天下蕭道成材非雄特仕於亂世懼不獲死密有狂心殆與莽卓操懿之流異矣夫有桀紂之暴以殺為能德如湯武則曰為天下誅之茍非其人姑以自救取位如道成是也况休若景素既已再奪猶不知懼好殺愈熾凶窮虐極不可復存是則蕭氏之篡雖義所不許而勢有所必至矣但其父子智識凡猥曽無毫髮為民請命之念放飰於大物流啜於髙位武帝謂豫章王嶷今夜行無使為尉司所呵嶷言封畿之內皆屬臣州願陛下不賜過慮上大笑促亡之象近在目前而其臣方為之稱竒數瑞封樹枯骨陳說蛟蛇以神怪之嗚呼自司馬遷以來如是矣余嘗論宋元嘉守宰以六朞為斷非欲久之乃速之及齊永明一以小滿為限則遂以頻替速易為永制而魏晉以前事不復行矣至其後三周習熟反謂近於古人之考績而以憐其久滯之失職用其初至之鋭心為論治之善者嗚呼聖人之法淪墜不得見而以俗說文於史䇿其條有幾不可不思海陵記言正厨諸役舊出州郡徴利民以應其數公獲二旬私纍數朔今可長停諸縣使村長路都防城直縣為劇尤深亦宜禁斷所謂正厨者當是元㑹宴設之類耶國饗而民供之不知何所始也若防城直縣則後世亦未嘗不然但有委曲不公言役民耳永元三年有物降色如小甕漸大如倉廪隆隆聲如雷墜太湖中野雉皆雊按劉聰流星起牽牛入紫微龍形委蛇其光照地落平陽北十里視之則有肉長三十步廣二十七步臭聞平陽肉旁常有哭聲晝夜不止使永元之隕不在震澤亦為平陽之肉矣劉聰之亡東昏之滅震干怪物自應如此哉余既論蕭氏之篡雖義所不許而勢有必至然則禇淵王儉亦可得而言也袁粲力不能正國家止欲以身死節是安能枝劉氏之亡召忽死之管仲不死子路貶之孔子許焉所可恨者淵儉非懷匡世之志但有富貴之願乘時掉臂如負販然諸葛亮自比管樂以其人可也若其仕則有不屑矣儉弱年便以宰相自許俯首就人惟恐不合與劉湛王融何異而謂謝安亦爾耶齊武帝自謂與髙帝同創業專行不忌斷割自與父子之隙遂開使享國年多未知其安所終也而王瞻以輕傲構釁桓崇祖荀伯玉以觸意被嫌在斬袪之地受無妄之戮嗚呼阻薄至此乃欲繼體迪德乘運方興可一朝居乎按王敬則傳竟陵子良言三吳凋困斛直數十匹裁三百乘間錢多剪鑿鮮復完者公家所受必須圜大以兩代一困於所貿又民無士庶皆為塘丁而王敬則悉斂為錢以送臺庫計此要見當時民力昔漢宣帝謂長於閭閻知民疾苦用致中興武帝乃不爾耶其計畫信任又如敬則輩欲永國命難矣崔祖思傳載劉備取帳鈎銅鑄錢以充國用魏武遣女皂帳婢十人王景興以浙米見誚宋武桃花米飯皆前志所不及余記此非美其能行儉德如禹文王之髣佛蓋當是時兵革力役為其上者服用猶如此則民生之憔悴不能自免於溝壑可憐甚矣至其後世未能臻乎富庶而為子孫者遽自驕侈窮珠玉極文繡則又甚焉悲哉桓榮祖言曹操曹丕上馬橫槊下馬談論於此天下可不負飲食矣君輩自全之伎何異犬羊乎此言似是而非古之聖智皆生亂世排患扞難無不為己任獨未有以一夫之藝力自雄者故孔子謂驥不稱其力稱其德也驥猶稱德而况人乎曹操父子何足法哉榮祖粗暴武人妄肆胸臆而學者或從而信之過矣王僧䖍誡子書當時學𤣥者略可見言專一書轉通數十家注至老不釋卷尚未敢輕言今開老子未五尺許便手捉塵尾謂之談士令謂粲也謝中書朏也張吳興緒也當時風流所宗也才性四本聲無哀樂皆言家口實謂執談之本轉相破解者也自王弼何晏郭象所傳二百年間勝人名士所從出也𤣥之陋非有益於道也然當時貴之預在此學者不為凡流則是猶能以人守學也後以性命之學為至貴而其人不足以守學百餘年間視𤣥愈下矣虞玩之傳載黃籍事言宋元嘉中光祿大夫傅隆年出七十餘手自書籍躬加隱校隆何必有石建之慎髙柔之勤正以世屬休明服道修身故耳籍無人人自書之理謂隆以列卿同於編民書籍州縣既不近理若謂朝士預州縣事躬校簿書又非義也後又言納玩之言别置板籍官置令史限人一日得數考詳此似緣揚州都畿諸郡民籍當在朝廷故傳隆在元嘉中容以典領得手書隱校故又云泰始至元徽揚州九郡四號黃籍共卻七萬餘户今十一年而所正者猶未四萬神州奧區猶或如此江湘諸郡倍不可念也周官雖大司徒辨王畿民數及夫家衆寡然當時天子亦各自治其國與後世不同勢應如此至漢三輔河南不復關朝廷矣而江左乃以宰相兼揚州既無清正根本之實反以浮淫隱蠧為四方逋逃主謝安所言可見也然則號元嘉為最者劉義康劉湛之徒精力綜核所致耳如齊髙武意則欲之終莫近矣張緒宋齊間第一人宋明帝見輒歎其清淡齊髙帝不敢移緒自近武帝目送謂緒以位尊我我以德貴緒帝驕而猜乃能有此言不知當是時緒能於周行以聲音笑貌自致人主敬異耶亦或其主故好親近其臣而然也緒忘情榮祿口不言利有財輒散清言端坐或竟日無食素望孚於中外王衍樂廣所不能及惜其言論不傳獨有教子充一語爾緒所學者老易易之道固非緒所能知然當時要自以此二書為微妙髙世茍誠其人才涉户庭洗滌蘇醒便已絶出余所謂人猶能守其學也而後世之學自謂得於道深者乃不足以變化其人其病安在不可不熟講也齊武帝與劉悛有舊數幸其家著鹿皮冠披悛莬皮衾宴飲至夜乃去數歎曰貧賤之交不可忘糟糠之妻不下堂顧謂悛曰此况卿也世言富貴好改素情吾雖富有四海今日與卿盡布衣之適悛起拜謝此語似能以天子篤布衣之好如詩人所謂不遺故舊者然而非也正是驕滿酣豢後所發耳光武物色訪齊男子嚴光不屈公孫述單衣立舊交位馬援笑之况此以貨利交結乎悛傳載孔顗鑄錢議言漢鑄五銖錢至宋文帝歷五百餘年制度世有廢興而不變五銖蓋宋自武帝後錢法壞也悛言蒙城故嚴道鄧通鑄錢處並獻蒙山銅遂使入蜀鑄錢得千餘萬功費多乃止當考今世蜀不用銅錢久宜有遺策未究也王儉自負經術其作相也不能協輔時主光𢎞道化立規垂訓庶乎久成區區炫耀耳目以家為館孩撫後進蹇肆成風蓋儒者之學墜於是矣而史臣以為家尋孔教人誦儒書執卷欣欣此焉為盛殆見其外耶竟陵王子良所言遣臺使有㹠蒜轉積鵝粟漸盈逺則分鬻他境近則託貿吏民及凡諸檢課宜停遣使密畿州縣别指賜敕遙外鎮宰明下滌源推此當時朝廷之人遍州縣矣又皆微賤者競作威福昔稱犬不夜吠吏不至門為郡縣簡靜之政若王人數至村落民何以堪又言究預二藩密邇冦庭下無安志編草結菴不違涼暑扶淮聚落靡有生向俱禀人靈獨絶溫飽而賦斂多少尚均沃實然則是時荒民不減賦也子良居富貴之地而論人疾若能同其仆起豈可謂之非仁耶史言其勸人為善未嘗厭倦以此終致盛名蓋齊世一人而已張融自序言丈夫當删詩書制禮樂何至因循寄人籬下此言誠太狂簡如融自不足深論然人具一性性具一源求盡人職必以聖人為師師聖人必知其所自得以見己之所當得者詩書雖不可復删禮樂雖不可自制至於隨世見聞因時述作既不極乎義理之正而祖其固陋轉相師習枝纒葉繞不能自脫者錮人之材窒人之德者也周顒勸何𦙍蔬食言善為士者豈不以恕已為懷是以各靜封疆罔相陵軼浮屠有旅泊三界之論雖非所以經紀人道然世之甘於滋味而不能止者茍有概焉亦足以寡欲飯疏飲水簞食瓢飲孔顔皆以為至樂蓋聖賢無許厚味之法也然則各靜封疆罔相陵軼自當為名言西陵四埭有可增之稅郡無所白而戍主乞專其利顧憲之斥議雖深然終不言杜元懿是不應主論者然則宋齊之間綱紀敗壞兵官遂干民政耶抑自江左至魏晉皆然也雖衰世若體統未失民猶可暫安不然雖興王之時百姓無所託命矣憲之言頃言便宜者非能於民力之外用天分地也率皆即日不宜於民方來不便於公其言深切時政昔司馬子長謂可施之廊廟者此等語是也謝朓始變齊梁之文沈約和之漢魏舊風掃地盡矣按陸厥傳約朓及王融以氣類相推轂周顒善識聲韻約等文皆用宫商以平上去入為四聲以此制韻不可增減世呼為永明體而厥與約爭論謂前英已早識宫徴非此祕未覩也其詞往往復云可謂葑菲之下體筆墨之贅疣然文章之變自是遂不可復反後世學者常言人心自有天理嗟夫此豈天耶至蕭子顯又總該三體之外自出機軸以為吐石含金滋潤婉切雜以風謠輕脣利吻易稱艮其輔言有序悔亡哀哉梁書梁武本出諸生有勝流之目與沈約謝朓王融任昉追逐上下初起能決䇿不反願遂乘摧枯之勢以定大事未有如此之易者蓋逄其時也情念在民精擇守宰拔舉人材不隔前後賞士愛文意無厭斁博雅通經精義不窮不特江左人主所無秦漢以來語賢君者皆未易及也自古以慎終如始為最難又曰靡不有初鮮克有終雖三代中君以上犯此戒者多矣若梁武慎終有過於始烏得有初無終所謂游田聲色玩好致敗之具色色無之若謂末年委政羣小如何敬容自是吏手朱异未為蠧政若謂子孫爭權朋黨角立此易世事未應一擲遽亡若謂崇信異教此只是蔽溺上一過亦安在於社禝不守海內橫流也世論每以三者立貶義既於梁武存亡利害不接又使賢君與幽厲赧獻同稱甚不中理此余不得不為破羣疑者也堯舜三代至秦漢有全一之天下其待外國皆無上策至晉宋乃以江淮為淵乍前乍卻梁武未有明特立國之規與外域限一水徒循舊事騃弟悖子屢出屢挫偶值拓跋衰殘繼以東西幅裂故得四五十年對立而形證未分然和戰雜用守備不飭及侯景以詐入腹裏一奮其暴雖數百千人而疽潰川决心喪膽落拱手破亡此蓋計數之失非敗德所召也漢景削七國苻堅南侵宋文帝北伐幸而存者僅同一縷梁武納侯景與此何異雖求無辱固不可矣計數之於國家秦漢以來大事不可不詳論也梁元帝勸農令云三農務業尚看夭桃敷水四人有令猶及落杏飛花又云豈直燕垂寒谷積黍自溫寧可墮此𤣥苗坐餐紅粒不植燕頷空候蟬鳴帝之文章所以潤色時務者如此豈載芟良耜之變者耶梁樹本根比晉宋齊為厚不應速亡所以卒於亡者計數之失也武帝納侯景計數之失一也元帝能克景而不歸建康計數之失二也王僧辨畏齊立貞陽侯陳霸先因之而起計數之失三也或謂元帝猜險非繼世之君其理則然然使即歸舊都當使僧辨霸先皆無異志而並獲其用北人不能徑渡必不身遭屠戮也僧辨之心固不在篡梁若不以立君為舉棊霸先雖姦凶無自而發梁祚尚可延也十年之間積三大失皆於完身中自致扼吭刎頸之禍悲哉魏徴名善論事論梁事猥托故實而已南史載郗后化為龍居池中轆轤金瓶灌百味以祀及徐妃淫行甚詳而姚察本書皆不記自古策書惟紀大事至簡牘則無不言顧筆墨所存有雅俗耳察但知諱避止述世出官職號諡於義無用也自宋以來委任宗室子弟駕御功臣士大夫鄧元起有平蜀之勳而蕭淵藻後至一朝用睚眦殺之如斃犬豕是時梁武得志未久也使在漢光魏武便為攘證不可立矣淵藻年少尚有俊材至臨川喪師蹙國去亡幾何吕僧珍令兄子速反䓤肆不徙督郵廨益宅鹵簿省姊不恥小屋此為還仕本州者法也漢光武言天下重任日復一日常恐不勝安敢逺期十嵗推其意似不以天下為私矣如髙祖惻愴得志留戀豐沛何足紀録哉江南自劉裕後惟韋睿邵陽洲之捷最偉昔徐晃救曹仁破偃城四冢屯陷入圍裏遂全樊城睿於曹景宗營前立城致敵來攻裝艦為水軍拔栅斫橋魏人崩潰而鍾離自解時魏號百萬連城數十不止為一鍾離蓋堂堂之陳也晃以勇奪敵氣睿以勇奪敵勢故皆能取勝世之敗者無他憚敵而己之氣勢自奪非能奪氣勢於彼者也余頃在江上所聞見上自公卿諸將下至走卒無不如此范雲心事粗可然無奈要富貴何昔蕭曹以文吏自愛迎沛公而輔之猶不以意外僥幸而雲與沈約皆於梁武事成之後自獻為佐命安有此理故約暮年欲台司卒不得蓋有以致厭薄也沈約傳稱其自負髙材昧於榮利乘時藉勢頗纍清談謝混張緒之風流至是以絶然而清談之在天下自不廢也又言約每進一官輒殷勤請退而終不能去論者方之山濤當時能為此論者亦豈易得顔延之作五君詠山濤王戎不預殆是晉宋舊語相傳耶約為郊居賦工巧在謝靈運上蓋名生意意生文文生句句生字逆順相取俯仰成態始有開舒終示斂縮自文字以來雖已皆如此而約始備其體宜其以此自矜也前世髙詞其失固久非約之罪而魏晉纎弱之餘約遂輯而成之使後不能復反則可恨耳任昉在齊梁之間為一時宗主然德義不足而文華有餘以名聲勢利接引而無隱約相與之實不惟許郭舊意不復有而竹林東山之游亦懸殊矣自是後纍數百年風流殆絶豈細事耶命康絢築浮山堰自天監十三年至十五年四月始成八月而決人之死物之壞以數十百巨萬昔人謂水可以亡人之國故或倉卒壅塞不復顧是非今此堰止欲浸灌夀陽於敵未有大損而己之土地人民亦自被害未知梁武必欲為之何所見也帝以博古通今精識自許而暗於大理如此况晚歲耄期遂引侯景以自亡蓋不足怪矣王氏自敦導執晉權𢎞華曇首在宋僧䖍儉在齊自魏以上品付胄子起家得顯仕尋聲接勢牽聨不絶未必其後人皆材賢也觀僧䖍誡子妷書可見與謝之藴藉蔡之真方張之風裁劉之文藻又當差别洛口非小敗而梁之君臣不以為意自宋武始創用子弟義貞一舉而喪關中武陵閉城敵越至瓜步幾亡然相承行之不悔也梁武諸弟尚有可使乃以甲乙用𢎞余故謂其守邊無定規雖立國數十年特幸而已矣至𢎞不肖反逆而帝能容之不失兄弟之恩蓋人情所難本史闕不載不知此乃梁所以亡者何可諱也蕭懿言自古皆有死豈有叛走中書令又云家弟在雍深為朝廷憂之梁武雖篡有江南不能出此二言也人能有所不為何必論品目寧殺身而不敢圖君賢於當時一等矣蕭憺傳都督益州舊守宰丞尉嵗時乞丐躬歷村里百姓苦之習以為常憺至州停斷嚴切百姓以蘇又羅研傳為信安令故事置勸農謁者圍桑度田勞擾百姓研請除其弊帝從之研又言蜀中積弊實非一朝百家為村不過數家有食窮迫之人十有八九束縳之使旬有二三貪亂樂禍無足多怪若令家畜五母之雞一母之豕牀上有百錢布被甑中有數升麥飯雖使蘇張巧說於前韓白按劒於後將不能使一夫為盜况貪亂乎觀其時吏與民至於如此然則亦不獨一時為然也冉有以為比及三年可使足民民無不可足者擾之使窮乃自吏始爾徐勉傳稱時人間喪事多不遵禮朝終夕殯相尚以速故屬纊才畢灰釘已至按禮記君子恥具一日二日而可為也者君子弗為也又六十嵗制七十時制八十月制九十日修又君即位而為椑嵗一漆之衣衾棺槨雖不貴於速掩亦惡於不能掩若曰虞以待事哀以從禮庶幾可也宋齊之間君德征虐屏除四出人子有不能掩其親者矣恐此欲速有為而然勉與史家蓋未能推也梁修五禮起於伏曼容何佟之三十年間成八千餘條據勉表以為莫不網羅經誥玉振金聲義貫幽微理入神契前儒所不釋後學所未聞今其書不存按隋經籍志五禮合千餘卷隋止存吉禮十卷賓禮九卷而已雖去取得失之中不可知然一時君臣不可謂不盡其心矣以禮決事就不合古猶賢於用法梁政稱平蓋有所自來也雖然以禮決事孰若以禮制心周公成王之文固不如禹湯之質也况於梁乎勉救昭明及沈約事有補於時與斥江葺王泰殊不同江左相承以門胄自髙如勉任遇而不得齒猶當以徐爰戴法興待之此正是膏梁綺紈之病未可為勉𥚹心之罪也讀梁宗室傳史臣稱周漢廣樹藩屏固本深根髙宗之封建將遵古制也衋然有感梁武慈儉勤約終身不墮自足以致治及其不擇賢否例用子弟盤據錯峙骨肉爭奪何異冦讐豈惟無益於存而求亡更速矣然則遵踵周漢如史所言乃江左之敝事非法之也故余謂唐虞夏商以至公守天下享國未嘗不長久而周獨有建置諸姬之名彼文武周公烏在不以天下為私此亦未經孔孟議論學者要當深考中書通事舍人吏史刀筆之任脂膏佞幸之門也梁武始用文儒而顧協在省十六載器服飲食不改於常固惟其人爾穆王尚能言舊典欲使羣僕侍御皆吉士後世人主不審先以塗轍分清濁夫常取潔士居清官尚不能治何者其汙墨者尚衆也至其甚也以穢雜蠧清華猶不知惜焉則是舉其國而無人者豈其人之罪也習學記言卷三十二
