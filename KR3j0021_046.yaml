body:
  text: 習學記言卷四十六宋葉適撰孫子按司馬遷稱孫子十三篇兩言之而班固志藝文乃言吳孫子兵法八十二篇又吳起四十八篇而今吳起六篇而已又今中庸一篇而志稱四十九篇豈昔所謂篇者特章次之比非今粹書也然遷時已稱十三篇而劉歆班固在其後反著八十二篇以火攻用間考之疑孫子亦有未盡之書然此為文字多少其不存者自不足論遷載孫武齊人而用於吳在闔廬時破楚入郢為大將按左氏無孫武他書所有左氏不必盡有然穎考叔曹劌燭之武鱄設諸之流微賤暴用事左氏未嘗遺武功名章灼如此乃更闕略又同時伍員宰嚭一一詮次乃獨不及武耶詳味孫子與管子六韜越語相出入春秋末戰國初山林處士所為其言得用於吳者其徒誇大之説也自周之盛至春秋凡將兵者必與聞國政未有特將於外者六國時此制始改吳雖蠻夷而孫武為大將乃不為命卿而左氏無傳焉可乎故凡謂穰苴孫武者皆辨士妄相標指非事實其言闔閭試以婦人尤為奇險不足信且武自詭婦人可勒兵然用百八十人為二隊是何陳法且既教婦人而愛姬為隊長則軍吏不可參用男子隊長當斬其誰任之倉猝展轉武將自敗之不暇然謬誤流傳但謂穰苴既斬寵臣而孫武又戮愛姫也不知真所謂知兵者何用此或問子不與斬愛姬於事何所損益天下有道征伐自上出而行陣部伍皆有定法以教天下天下無道匹夫賤人以意言兵行陣部伍無復常經其流及上而為國者願聴命焉禍結數千年不可救止此豈小故而謂無所損益耶兵者詭道也故能而示之不能用而示之不用近而示之逺逺而示之近利而誘之亂而取之實而備之强而避之怒而撓之卑而驕之佚而勞之親而離之攻其無備出其不意按子罕言天生五材民並用之廢一不可誰能去兵兵者所以威不軌而昭文德也聖人以興亂人以廢其論突兀怪偉無有典常然猶是兵内事今詭道二字於兵外立義遂為千古不刋之説自司馬子魚以來不得已而一用之者以類採集自為一家變異翕忽猶若鬼神而古人之言兵者盡廢矣亂而取實而備强而避卑而驕禹湯文王之兵也正道也非詭道也孫子不學不能知所知者詭而已兵聞拙速未覩巧乆最為論後世用兵要處然巧者能乆拙者不能速古人久速此書未深考也書稱武王一戎衣而天下大定此非巧拙久速所能預髙宗伐鬼方周公誅管蔡之黨齊桓楚莊圖霸皆最久後世諸葛亮雖無功亦能久暴師而不困夫行師有節駐兵有制於敵不厭於我不勤雖久可也若輕行歘反亟肄多方譬如冦盜有同夷狄雖速奚貴哉智將務食於敵食敵一鍾當吾二十鍾􅠇秆一石當吾二十石按轅濤塗欲齊桓觀兵東夷循海而歸申侯反之使出陳鄭之間供其資粮屝屨而齊執濤塗城濮之勝晉入楚師三日穀邲之敗楚亦穀晉三日皆為大慶雖春秋用兵劣於前世然未有指敵以為食者至於後世剽劫掠奪無所不有而此書以為智將則赤眉黄巾紛紛起矣自周衰諸侯强凌弱大併小春秋時無嵗無之圍入滅取至立為凡例而此書有全國破國全軍破軍攻城十圍五攻之論又謂不戰而屈人兵當以全爭於天下初看似徑省然豈伐謀伐交所能致必如禹湯而後不戰全爭者可言也極論縻軍引勝又謂將能而君不御春秋時固無中御之患戰國始有而未甚也秦漢以後其語遂為砭石蓋此書亦非能見微者本於窺測而勢轉激耳先為不可勝也以待敵之可勝能為不可勝不能使敵之必可勝可勝者守也不可勝者攻也守則不足攻則有餘善守者藏於九地之下善攻者動於九天之上善戰者之勝也無智名無勇功其論彼己勝敗之際至為懇切蓋止欲不敗而未嘗敢求必勝也而後之欲必勝者皆於此書索之其它不足道而曹操李靖為最詳則余所不能知也戰勢不過奇正專為將兵者言之可也若為國則有正無奇也能知戰地能知戰日則可千里而㑹戰不知戰地不知戰日則左不能救右右不能救左前不能救後後不能救前而況遠者數十里近者數里乎凡戰以聲相臨以勢相加決知戰地戰日雖湯武之師不敢以此自任如是則有守而已此書盡用兵之害而於守與不戰持之最堅學者亦未之詳也兵非貴益多唯無武進足以併力料敵取人而已夫惟無慮而易敵者必擒於人此篇所記行軍候敵情偽數十條而卒係之以此數語蓋喜謀者多躁有慮者易驕智士之通患也故戰道必勝主曰無戰必戰可也戰道不勝主曰必戰無戰可也夫可以必勝而輕失之者世固多有不可以勝而輕犯之者世固多有不然亦安得成敗存亡之易置也此何獨為兵言之故曰進不求名退不避罪惟民是保而利於主國之寶也又曰知兵者動而不迷舉而不窮嗚呼何獨兵也投之無所往諸劌之勇也明此書不與闔廬伍員同時善用兵者譬如率然率然者常山之蛇也攻其首則尾至攻其尾則首至攻其中則首尾俱至敢問可使如率然乎曰可夫吳人與越人相惡也當其同舟濟而遇風其相救也如左右手又曰善用兵者攜手若使一人不得已古人謂善治者能使天下如一家中國如一人又曰出入相友守望相助疾病相扶持則百姓親睦然則善用兵者人人知其勇怯事事同其憂患死生利害不相背離所以首尾相救如使一人非謂陣法奇正同舟遇風不得已而然也如必曰投之死地然後生䧟之亡地然後存是真死亡豈復有生存之理哉火攻淺事以此為書則不勝書何止十三篇也下文戰勝攻取而不修其功者㓙命曰費留不與上篇連屬戰國説士所謂養由基可教射之類也故明君賢將所以動而勝人成功出於衆者先知也凡孫子所言皆先知之事而謂先知者不可取於鬼神不可象於事不可驗於度必取於人知敵之情者而歸之於用間則此書之綱領不過於用間而已然謂明君賢將以上智為間者必成大功蓋其妄意之過若近事秦檜挾金人以執國權則可謂彼能用間矣司馬遷謂世所稱師旅多道孫子十三篇始管子申韓之學行於戰國秦漢而是書獨為言兵之宗及董仲舒劉向修明孔子其説皆已黜而是書猶傑然尊奉逮今又將傳之至於無窮此文武所以卒為二塗也悲夫甚哉揚雄不喜孫吳而曰不有司馬乎嗚呼不知雄所指何司馬也吳子强國之君必料其民民有膽勇氣力者聚為一卒樂以進戰効力顯其忠勇者聚為一卒能踰髙超逺輕足善走者聚為一卒王臣失位而欲見功於上者聚為一卒棄城去守欲除其罪者聚為一卒此五者軍之練銳也有此三千人内出可以決圍外入可以屠城矣屠城決圍非是使地輕馬馬輕車車輕人人輕戰明知險易則地輕馬芻秣以時則馬輕車教練有餘則軍輕人鋒鋭甲堅則人輕戰用兵之法敎戒為先一人學戰敎成十人十人學戰敎成百人百人學戰教成千人千人學戰教成萬人萬人學戰教成三軍以近待遠以佚待勞以飽待飢圓而方之坐而起之行而止之左而右之前而後之分而合之結而解之每變皆習乃授其兵是謂將事按孫子言將事太深遠不若此之切近吳子曰凡兵有四機一曰氣機二曰地機三曰事機四曰力機三軍之衆百萬之師張設輕重在於一人是謂氣機路狹道險名山大塞十夫所守千夫不過是謂地機善行間謀輕兵往來分散其衆使其君臣相怨上下相咎是謂事機車堅管轄舟利櫓楫士習戰陳馬閑馳逐是謂力機知此四者乃可為將按孫子軍形兵勢虚實軍爭九變諸篇微妙入神然起此語簡直明白無智愚高下皆可用用而必驗則過之矣司馬法古者以人為本以義治之之謂正正不獲意則權權出於戰不出於中人正不獲意則權不成語又言有虞氏不賞不罰而民可用至德也夏賞而不罰至教也殷罰而不賞至威也周以賞罰德衰也尤不成語其它大抵類此司馬遷謂司馬兵法閎廓深遠雖三代征伐未能竟其意即此法耶抑别有所指也穰苴事余固言其非儒生學士籍名於兵漫漶弛靡無所歸宿夫非知德者不足以知兵而遷之所云閎廓深逺纔若此悲夫六韜古人盛際堯舉舜舜薦禹臬陶湯用伊尹髙宗夢傅説書皆詳紀而文王遇太公望事乃闕略可恨詩但言維師尚父時維鷹揚諒彼武王肆伐大商㑹朝清明而已觀左氏載賜履一節葢太公初進文王尚為諸侯及佐武滅商遂屏輔於外故其功不及周召之大也然世俗流傳而兵家竊借以為書若今六韜者後世承繆謂其君臣遇合之間隂譎狹陋至此則何以對越在天而上帝臨汝乎自龍韜以後四十三篇條畫變故預設方禦皆為兵者所當講習孫子之論至深不可測而此四十三篇繁悉備舉以為孫子義疏也其言避正殿乃戰國後事固當後於孫子論將有十過近於五危戰車十死戰騎十敗與行軍九地相出入其勵軍言禮將力將止欲練士各聚卒敎戰成三軍又本於吳起然則孫吳固兵家所師用至莊周亦稱九徴則真以為太公所言矣然周嫚侮為方術者而不悟六韜之非偽何也蓋當時學術無統諸子或妄相詆訾或偶相崇尚出於率爾豈足據哉按軍用述三軍器用攻守之具秩品衆寡之法甲士萬人器械重厚無所不有計十萬人乃足葢非道路所能容左氏邲之戰但言軍行右轅左追蓐前茅慮無中權後勁百官象物而動軍政不戒而備城濮七百乗韅靷鞅靽而已若羣物盡行起江越海皆有兵其臨時倉猝施用不及乃自敗之道然亦不可不知也孫子謂無輜重則亡無粮食則亡無委積則亡又曰百里而爭利則擒將軍五十里而爭利則蹶上將軍夫阻守其處見利而不能爭則何取於兵而捨輜重糧委徒手而搏者又未有不覆軍殺將則兵焉往而求勝然則為孫子之術者必無戰而後可爾三略使智使勇使貪使愚世以為口實按孫子將有五危必死可殺必生可虜忿速可侮亷潔可辱愛民可煩凡此五者將之過也兵之災也覆軍殺將必以五危然則無智勇貪愚者孫子之所用而使智勇貪愚者孫子之所禁也智勇猶不可而况貪愚乎師必以功無不可使惟其勝而已患在勝後自賤而貴自卒而將亡國殺君未有不由此矣軍井未達將不言渇軍幕未辦將不言倦軍竈未炊將不言饑冬不服裘夏不操扇雨不張蓋是謂將禮按將禮二字及下禮將力將欲將皆兵家自為之義於古無所稽據也周官宗伯以軍禮同邦國大師之禮用衆也大均之禮恤衆也大田之禮簡衆也大役之禮任衆也大封之禮合衆也所貴於禮者謂能有所别異而軍禮獨言同然則將禮二字亦不可謂不得古人意矣晉侯登有莘之墟以觀師曰少長有禮其可用也不知當時所言有禮者指何事然後世及今有訛謬相傳為將者不言禮而皆言威故子玉治兵終朝而畢鞭七人貫三人耳國老皆賀而蒍賈以為剛而無禮不可以治民其有能弔死哀傷同士卒甘苦則又以為恩而不復言禮矣夫禮者將之本威者將之末恩者威之餘也况後世及今士卒習慣望其上者惟威是必無敢希恩正蒍賈所謂靖於内而敗於外安能勝敵哉尉繚子今國被患者以重寶出聘以愛子出質以地界出割得天下助卒名為十萬其實不過數萬爾兵來者無不謂其將曰無謂天下先戰其實不可得而戰也史稱吳起要在强兵破游説之言縱横者天下既亂各有一種常勢隨其所趨無得自免且三代諸侯既已吞倂及六七可謂至强而縱横之説方出而制其死命如尉繚之流所見與起略同然孱王謬主終不能翻然改悔而相隨以亡其後唐化為節度每徴諸道兵討賊度支倍廩給隂與賊約所取不過一縣一鎮而止唐亦竟以此消盡不復能改圖今世固自有常勢士已無特出之智所恃者以前代成敗自考質或能警省爾然無所増長而更以眩惑多矣至於兵書則腐陋不足採聴尤甚矣凡兵不攻無過之城不殺無罪之人夫殺人之父兄利人之貨財臣妾人之子女皆盜也尉繚子言兵猶能立此論孫子得車十乘以上賞其先得者而更其旌旗車雜而乘之卒善而養之是謂勝敵而益强區區乎計虜掠之多少視尉繚此論何其狹也夫名為禁暴除患而未嘗不以盜賊自居者天下皆是也何論兵法乎太宗李靖問對太宗欲取髙麗專委李靖固能辨之如論用正兵及諸葛亮馬隆事皆後世為將者所當知也然太宗欲以髙麗為己功忌靖不用迄無尺寸效而疲弊天下當是時豈奇正之説所可了方人主鋭意自將而靖不能出一言救止或有蹉跌必與之俱敗蓋靖者止知言為將而不知言為國也夫以將事隠國謀誤後人甚矣當削霍邑之戰唐事幾敗而成太祖由此始定霸業所以言者矜夸其功特假設奇正為問耳靖非不知而難斥高祖固亦回謢為答而太宗猶恐靖不悟重複詰難蓋其自伐之心終不忘也蔽吝若此安足以決奇正之實論哉故言旗參差而不齊鼓大小而不應令喧囂而不一真敗卻非奇也則已明告之矣且建成軍郤只謂之敗太宗救敗僅而致勝固無奇正相生之理今以敗郤為奇亦恐誤後人也孫子言三軍之衆可使必受敵而無敗者奇正是也凡戰者以正合以奇勝善出奇者無窮如天地不竭如江海終而復始日月是也死而更生四時是也戰勢不過奇正奇正之變不可勝窮也奇正相生如環之無端孰能窮之哉曹操修其術有一術二術先後旁繫至太宗與靖問答益詳自是奇正為兵家大議論按孫子所謂奇正者一軍之内教令素明士卒服習若使一人臨敵制變分合在已不可預料且山林䖏士所以自神其説遂有天地江海日月四時之論乃一將之任非有國者所當言也從古兵法有正無奇神農黄帝雜説紛紛不足考信所考信者惟舜禹湯武禹之於三苖豈是不能以奇勝然終于班師而不用及其必用而不得已則湯武之於桀紂亦卒用之桀紂之衆豈是不能以奇拒敵然終於滅亡而不振也況諸侯萬數各出奇險大者并吞旁鄰小者自守其國正帝王所禁而可以自為之哉故易稱師出以律否臧凶律者正也否而臧者不以律為正而以奇取勝也易者三代所傳孔子所述之正文非孫子處士自神之説也誠使舜禹湯文武之道復明師出以律真丈人吉而天下服矣不然則孫武曹操更奇迭正圖别指授列散卒聚一將之術講於廟堂㡬敗忽成小獲大喪而無底止也哀哉靖以分合所出惟孫武能之吳起而下莫可及焉其説謂兩軍相向使賤而勇者前擊鋒始交而北北而勿罰觀敵進取一坐一起奔走不追則敵有謀矣若悉衆追北行止縱横此敵人不材擊之勿疑臣謂吳術多此類非孫武所謂以正合也按起所言設術嘗冦昔人所用固與武相出入餌兵勿入佯北勿追未知謂何以為不如起簡直勝負欲其易見而武蔽秘務為不可窺測若如後世之論用兵不過於求勝奚必自分髙下於其間況武之指在於必受敵而無敗夫使其可以疾速而取勝則焉取夫遲緩而無敗哉靖言前代戰鬭多是以小術而勝無術片善而勝無善安足以論兵法謝𤣥破苻堅非謝𤣥之善乃苻堅之不善以余觀之靖為堅用則𤣥信不足以敵堅矣然靖不及王猛猛勸堅勿以晉為圖是猶知兵有不可用者非戰勝攻取所能與也若靖之志在於用兵而已使其為堅謀負其詐力急於混平大衆乖離一旦氷解非智所及淝水之敗依然固在正如賛伐高麗之比則雖有兵法何所施哉靖又言堅為慕容垂所陷尤不近理王猛本以垂非乆畜多方疑間不能奪堅謬計而堅以十分天下八九之威貪得怙勝自致滅亡垂安能䧟之靖徒知從太宗取羣盜之易遂以筭略為準極輕視豪雄不知兵法以上更有多少節次固不可以責靖也兵法何必自黄帝起而世所傳握奇文者兵家流借其名李靖亦有不知乎丘井所以度地居民豈為兵制謂數起於五終於八皆在此非也周自上世遷岐已有立國之法謂太公始建非也戎車三百兩虎賁三千人言師盡行謂立軍制非也六步七步四伐五伐六伐七伐誓衆貴速且不窮兵謂教戰法非也夫法所以用兵而兵之成敗不專在法若必以法為勝則蚩尤桀紂若林之旅豈其皆無法哉且項羽之於漢髙固嘗百勝一敗而亡豈漢一日而有法哉靖雖通明練事而兵家之習氣不除恐如此而謀人之國家亦儘有害偶值唐之方興故不見耳至李勣則見之矣民與兵皆自伍法起蓋自有生民以來如此最為大事而靖輕言之但云臣酌其法自五人變為二十五二十五變為七十五而已而獨珍貴陣法既以為黃帝所制又謂太公實繕其法又謂齊人得其遺法管仲復修之又祖管子言管仲分齊為三又謂諸葛亮八陣即握奇法凡此皆山澤隠約以術自喜夸妄相承而後人信之就如其言則自黄帝三代數千年獨數人通悟陣法餘皆寂寥零落且天下之兵無日不鬭而部伍卒乗將安所寄託乎按周官司馬掌蒐苗獮狩其陳皆如戰之陳其坐作進退疾徐疏數皆如戰之節而春秋所記魯事皆具以魯視之他國何獨不然然則五家為比積而成鄉五人為伍積而成軍元帥居中鄉大夫士各守部分前戰後拒險易分合形勢自然彼四頭八尾六花八陣曽何區區執為奥密哉蓋當時上自王公下至卒伍皆明知之不以為異也鄭魚麗楚乗廣晉毁車雖臨時昧利壞亂常制終不能變大法然後世反更以為奇術方戰國處士主議論舊諸侯相次亡滅秦亦繼之豈惟詩書禮樂淪没而兵制亦大壞盜賊亡命化為侯王此古戰陣法所以蕩盡而黄帝握奇遂為秘文也然前人未嘗學周官虚聲崇周自不足怪今之學者已學周官奈何視為外物相與别畫陣法無休時學既無所統一而殫思竭慮有害無益是可嘆矣太宗舉孔明言有制之兵無能之將不可敗也無制之兵有能之將不可勝也余毎恨亮集不存無以考其所行也亟肄以疲之多方以誤之彼出則歸彼歸則出楚必道敝闔廬從之楚於是始病此戰國相傾之術也太宗以天下之大乃謂千章萬句不出乎多方以誤之一句孔子曰智及之仁不能守之雖得之必失之智非誤也智得而仁不能守猶且失之況以誤得而又以誤守耶此太宗與靖所未講也靖言王尋王邑不曉兵法徒夸兵衆所以自敗按王莽用事者嚴尤最曉兵法昆陽之戰尤為謀主既敗乗輕騎踐死人而逃嗟夫莽之亡至此晩矣何論兵法乎太宗言李勣非朕控御則不可用它日太子治若何用之靖言為陛下計莫如黜勣令太子復用之則必感恩圖報於理何損太宗曰善朕無疑矣太宗雖盡用一世豪英而其心量狹薄如此與漢武畫周公負成王以賜霍光不太相遠乎且固無父黜而子用以此為顧命者然則房杜王魏之流號為遇時而儒生譊譊稱誦不已蓋可悲矣靖言兵法分為三等一曰道至微至深易所謂聰明睿智神武而不殺又言張良范蠡孫武脱然髙引不知所在非知道安能爾尤汎濫無實兵之所謂道者以義治不義誅暴亂禁淫慝若周官司馬九伐之法是矣然益謂惟德動天若兵之治人深者不可以動天矣又言滿招損謙受益時乃天道夫以兵加人而制其死命滿孰甚焉故知德者不以兵而知兵者安能自託於道雖太公閎散未敢當也而況范蠡孫武之流哉按諸子書惟莊列文中子不及論述先生嘗答之宏書云記言序目荀卿後僅有四卷如莊列諸書雖熟商量莫知所以命筆只得且放過因思向前有多少聰明豪傑之士向渠虀瓮裏淹殺可憐可憐以此且欲將文鑑結尾作了當去然亦非盡此嵗不能成也又云莊列文中子向本欲先下手為其當條理䖏太多不勝筆墨頗若煩碎合為一論則又貫串未易至今果如文中子説經史前代儒者所未有説理雖不背馳而摸搨形似無卓特見識此為大病至於房魏禮樂其家子弟從舊傳習間者或信或疑然要是淺者未足論也習學記言卷四十六
