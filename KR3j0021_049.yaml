body:
  text: 習學記言卷四十九宋葉適撰吕氏文鑑蘇軾徐州上皇帝書目惜其文所謂故紙糊籠篋者吕氏數語余歎其抑揚馳驟開闔之妙天下竒作也彭城為齊楚形勝雄藩重地從古以然方其時積衰纍薄乃至於此以守郡之力而無數十百千可以使人豈非賈昌朝言朘削方鎮太甚而致之乎然則改法制變而安危之勢有所激雖聖人固不能盡其慮也買燈後所上書於告君理體疑若未足然初學為文者無不誦習安石尤畏之昔英宗欲以唐故事召軾翰林韓琦但用近例入館而已使軾已列侍從胡宗愈請令帶館職人赴三館供職回看琦故欲守此法度而為熙豐所變也與安石較其輕重宜不止此余固言之矣琦號有名宰相乃使俊傑異能之人計尋常拘尺寸以為茍賤委身之地與綘灌馮敬害賈誼名異而實同也惜哉然軾謂有始有卒自可徐徐十年之後何事不立終不言十年後當立何事若神宗罷安石而聽軾非安於不為而止者亦未知軾以何道致其君此不可不素講也蘇氏言朝董公孫之流皆有科舉之病然乃身為科舉之宗不止於病而已獨轍三冗疏過於平生文字大蘇亦不能及蓋猶有方略效之人主可以嵗月待不紛然雜以論古今無所統一也百萬之兵省去六七但欲不復戍邊死亡勿補恐此為難營房零落部分銷減兵費未去軍律先壞矣吕氏不喜諸蘇議論以為隂侵陽程氏論十事當與此並觀自昔經生通人各自為方不知其偏也然轍暮年不能守方為兵民燕薊之説未幾而女真起然則必真有見而後為豪傑之士固不在筆墨歟吕氏嘗言近世文人劉摯善為疏其攻短安石摸寫精妙情態曲盡而無迫切躁忿之氣一時莫能及然不為安石所忌惡但言其妄作愚而易見爾蓋名素輕所與奪不能動俗神宗嘗問摯從安石學否可見也故其受謫亦薄文彥博後與韓富齊名獨摯有駁論幾成誅族之禍程氏為彭思永議濮邸事當稱姪嗣皇帝敢昭告于皇伯父濮國太王按兄弟之子稱姪禮無所據而本生子以其屬言者世俗之辭也以太加於王又不經也為人後者為其父母報父母不可沒也特大宗者降於小宗小宗不敢齊也避父稱親義固無當捨父稱伯理將曷宜以古人之意議禮而以世俗之名制禮可乎夫立後與為人後所後父與本生親皆至公大義所在而非以私情臆説行於其間也然則世俗無據之名不可以制禮也決矣程氏上太皇太后書問學職業所欲致之君者具於此矣蓋以輔養主德為大而以周公之輔養成王為法為立政專言常伯常任綴衣虎賁發此論也今按立政厯陳夏商先君及周文武用人之方與桀紂寵任暴逸亡滅之故乃在成王即政後非初立沖幼時也又按金縢武王既葬群叔流言周公居東作詩以遺成王成王悟天變罷穆卜迎歸周公及既作洛周公復子明辟成王重留委國以聽而周召復相遂終周公之身與成王之世然則非成王之智不足以知其臣非成王之明不足以任其臣其聖質卓然周召蓋為其所用以致盛治非如童稚未識必待封唐叔撻伯禽以警厲之若後世俗儒所傳而後足以進其德成其材也當元祐初母后垂簾姦邪窺伺用事者惴惴度日常不自保取子毁室之痛未知安所寄託至於流溢橫潰而人之大倫幾廢矣輔養之道豈易言哉梁燾論欲退吕大防以禮略見祖宗輔相用舍節目雖然燾未之思矣大防雖以禮退考其時之爻象可復以禮進乎蓋守死善道則當辭而不就如范鎮亡身徇國則當危而不亂為司馬光尚庶幾爾若夫既已冒進於憂危之先而復求幸免於變移之後者此元祐是非之論所以至今未決也且古大臣進退之道固未可責蕭何嘗有賜金置衛請苑之疑而為生乃不治垣屋買田宅必於窮僻處鄧禹免相閉門教子各授一經諸葛亮國命在手不與子弟共祿但令治耕桑而已審如燾言三二年而善去去而規復來終何以為國家立久大之業乎覽名臣奏議至范祖禹聽政疏言今四方之民傾耳而聽拭目而視乃宋室隆替之本社稷安危之基天下治亂之端生民休戚之始君子小人消長進退之際天命人心去就離合之時也此十數語可為涕流蓋國家存亡從是決矣余嘗與吕氏極論纍日終無救法舊傳程皓謂當今熙豐用事之臣自擇其太甚者變之天下至今以為知言然小人視民如草芥何嘗知世間有苦痛事而利柄在手亦安肯輕有變易殆不過一種好語耳况祖禹所言亦止能如此與黍離麥秀事敗而悲者又何以異余每思熙豐小人特立紹述一條歸罪元祐以為不當輕變神宗政事故其禍蔓延不可復遏而元祐諸人不能以輕改祖宗政事為熙豐小人大罪正名定法治其尤無良者倒戈以授仇人此大失也自王安石外凶狡陵肆必遂其惡者吕惠卿章惇蔡卞蔡京而已若元豐末元祐初首以輕改祖宗政事為大罪重責安石惠卿與卞自當從坐惇嘗有簾前悖戾不遜一節投諸荒裔人亦何辭但使九年間尊祖之義常伸則子孫紹述之論無自而發况京新進後生他日何所依據以為姦慝之地哉其後陳瓘與京卞並馳方欲以尊私史壓宗廟罪之夫既以孫屈祖為是矣則私史者乃其所教也又何足以開悟人主乎本朝諌諍二事范仲淹鄒浩皆廢后大事也郭后雖廢尚美人併斥而立曹后嘉祐治平之間有助焉浩所論在賢妃既立後雖已無及而孟后終復位號為建炎再造之祥與漢成帝唐髙宗禍福相去逺矣浩之力難於仲淹浩本常才而能為此者積習見聞之久源流有自而然也慶厯諌者禍福雜元符諌者有禍無福所遇之時殊也陳瓘力拄蔡氏其言絶滅史學一似王衍重南輕北分裂有萌先鑒之明一人而已至於不恤一身家族之害别為尊堯之説欲障蔡氏之橫流而止中原之幅裂惟天知之人不知也以謝知制誥表考之得文字之正意古今如歐陽修者鮮矣然翰林學士表則已退落逺甚若王安石謂有道德者難於進取則不過驕夸大言而已至蘇軾止於近事則又衰焉孟子所稱有德慧術智常存乎疢疾而後世之士每以所遇之憂樂為氣之盈虛則其文安能及古蓋可悲也安石謝宰相表最工為近世第一而吕氏不録蓋大言之尤者不可為後生法故也曾鞏賀南郊表論者謂鈎陳太微星緯咸若崑崙渤澥波濤不驚與韓愈析木天街星宿清潤北嶽醫閭神鬼受職可相比方就其果然亦何足道夫文不務與事稱而納諂以希進最鄙下矣清廟之詩曰於穆清廟肅雍顯相濟濟多士秉文之德對越在天駿奔走在廟不顯不承無射於人斯豈有泛辭拈枝弄葉耶范純仁遺表一時難言者略已盡言矣於此見范氏家風非文富比或言其家嘗申穎昌府用印僅免大戮云陳瓘進尊堯集表可惜元豐末元祐初無能明此義者或以為操蔡氏之矛而攻其室此何足論乃百世存亡所係而天不牖民以智不導民以言可重歎也然瓘當其末流而能及此壯哉壯哉按程氏視聽言動針學者傳誦久矣然孔子教顏子數語是何等精神顏淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣克己治己也成己也立己也己克而仁至矣言己之重也己不能自克非禮害之也故曰一日克己復禮天下歸仁焉為仁由己而由人乎哉此仁之具體而全用也視聽言動無不善者古人成德未有不由此其有不善非禮害之也故孔子教顔淵以非禮則勿視聽言動誠使非禮而勿視聽言動則視聽言動皆由乎禮或不由者寡矣此其所以為仁也其一日則有一日之效言功成之速也程氏針其辭緩其理散舉雜而病不切雖欲以此自警且教學者然已未必可克禮未必可復仁未必可致非孔顔之所講學也劉敞讓針言資政富公始讓樞密直學士又讓翰林學士又讓樞密副使所讓益尊所守益堅古人所謂讓者終身不踐其位故足以矯世厲俗弼雖暫讓然不見聽已卒受之但稍異於世俗備禮辭免者爾况又窮富極貴而不止乎敞謂時豈無人昏夜乞憐時豈無人乘機射利然則泰伯伯夷子臧季札僅勝於此耶吕大臨克己銘程氏四針但緩散耳固講學中事也伊尹言惟尹躬暨湯咸有一德克享天心受天明命故孟子謂其自任以天下之重曽子言仁以為己任故曰動容貌正顔色出辭氣以其養於一身者盡廢百聖之學雖曰偏狹然自任固重矣不如是何以進道而大臨方以不仁為有已所致其意鄙淺乃釋老之下者猶謂道學可乎蘇轍管幼安贊按轍序和陶詩言子瞻出仕三十餘年為獄吏所折困終不能悛以陷大難乃欲以桑榆之末景自託於淵明其誰肯信之然則轍雖許寧寧其許轍乎荀彧以救世為重自不計一身張昭東南之材為孫氏用華歆許靖自謀不給古人出處豈以責之轍言幼安未見其確徂徠石有道作慶厯聖德頌後世莫能定其是非按蒸民韓奕嵩髙江漢皆指一人為一詩其詞優遊無尅厲迫切之意故曰人亦有言柔則茹之剛則吐之惟仲山甫柔亦不茹剛亦不吐不侮鰥寡不畏強禦抑揚豫奪至此極矣仲淹方有盛名舉世和附一旦驟用出人主意比仲山甫宜若無愧頌之可也而介所講未詳乃以二十年間否泰消長之形與當時用舍進退之迹盡於一頌明發機鍵以示小人而導之報復易所謂翩翩不富城復于隍若合契符宜其不足以助治而徒以自禍也介死最為歐陽氏所哀序外制視頌語不少異然則修所見亦與介同者耶王禹稱文簡雅古淡由上三朝未有及者而不甚為學者所稱蓋無師友論議之故也栁開穆修張景劉牧當時號能古文今所存來賢河南尉廳壁法相院鐘靜勝待月諸篇可見時以偶儷工巧為尚而我以斷散拙鄙為髙自齊梁以來言古文者無不如此韓愈之文備盡時體抑不自名李翺皇甫湜往往不能知而况孟郊張籍乎古人文字固極天下之麗巧矣彼怪迂鈍朴用功不深才得其腐敗粗澀而已韓愈以來相承以碑志序記為文章家大典册而記雖愈及宗元猶未能擅所長也至歐曽王蘇始盡其變態如吉州學豐樂亭始飲未詳擬峴臺道山亭信州興造桂州修城後鮮過之矣若超然臺放鶴亭篔簹偃竹石鐘山奔放四出其鋒不可當又關鈕繩約之不能齊而歐曽不逮也舊傳曽鞏諸文士為吳郡六經閣記相顧莫敢先張伯玉忽題云六經閣諸子百家皆在焉不書尊經也衆遂閣筆不知此何以為工而流俗夸艷至其終篇皆陳語緝補若聚帳狀無可採又謂伯玉博涉多聞每以所短困鞏如榜曽夫子位戲侮之類鞏甚苦之而劉敞亦有可惜歐九不讀書之誚然猶流言未足憑也若黃庭堅稱蘇洵木假山似莊周韓非夫舉世俗所以屈莊周之文者以其雖一切寓言而能抑縱舒斂自無入有殆若天成而實言者或不及也玉石異物竦擢特起似於山而世貴之木未嘗似山就其似山何足貴而謂得莊周體末言三峯尚未脫凡筆周言六合中有魏魏中有梁梁中有王似稊米之在太倉其怪偉殊特至此三峯何足異哉二篇偶以流俗所敬而存讀者不察坐墮處矣蘇轍記閔子祠堂東軒遺老齊轍以知道自許雖求為有得之言然與事不合按孔子未嘗以舟楫足侍不顧而仕諸子未嘗以陋舟而求試顔淵未及仕而夭冉伯牛有疾獨閔子不為季氏宰蓋家臣其所恥也孔子使子路復見荷蓧丈人其言曰不仕無義顔子雖少年而孔子以成材許之將同其進退出處故曰用之則行舍之則藏惟我與爾有是夫初未嘗必於不仕也魯男子學栁下惠蓋非義理所安轍不考詳矣又言顔子所以甘心貧賤不肯求斗升之祿以自給者良以其害於學世固無不行之道亦安有不仕之學而况沈酣勢利以玉帛子女自厚在世俗最為淺下固非論議所及而轍以此較道學之髙卑是其所知未深而然爾樂莫善於如意憂莫慘於不如意聖賢無此論乃莊周放言也古人立公意以絶天下之私捐私意以合天下之公若夫據勢行權使物皆自撓以從已而謂之如意者聖賢之所禁也范祖禹布衾銘記其清如水而澄之不已其直如矢而端之不止故其居處必有法其動作必有禮此言有益於學者所以為水者以清也非清則無澄也所以為矢者以直也非直則無端也今夫澄其汙洳端其撓節以求直清之效者多矣未有己清而澄不已己直而端不止者也雖然郭太言奉髙之氣譬諸泛濫雖清而易挹叔度汪洋若萬頃之波澄之不清淆之不濁及直不疑買金償同舍等事又不可量也與契丹和前四十年劉牧送張損之後四十年蘇洵送石揚休張來送李之儀三序就如其所憂未足以謀國而況百年中泰然不知憂者皆是則安得無靖康之禍賈誼之言徒貽笑後世而董仲舒至謂天下大計莫如和然則雖如三人亦不復有是可悲也因范育序正蒙遂總述講學大指道始於帝堯欽明文思安安允恭克讓易傳雖有庖羲神農黃帝在堯之前而書不載稱若稽古帝堯而已命羲和厯象日月星辰敬授人時吕刑乃命重黎絶地天通罔有降格左氏載尤詳堯敬天至矣厯而象之使人事與天行不差若夫以術下神而欲窮天道之所難知則不許也次舜濬哲文明溫恭允塞在璿璣玉衡以齊七政舜之知天不過以器求之日月五星齊則天道合矣其微言曰人心惟危道心惟微惟精惟一允執厥中人心至可見執中至易知至易行不言性命子思贊舜始有大知執兩端用中之論孟子尤多皆推稱所及非本文也次禹后克艱厥后臣克艱厥臣惠迪吉從逆凶惟影響洪範者武王問以天箕子亦對以天故曰帝乃震怒不畀洪範九疇天乃錫禹洪範九疇明水有逆順也孔子因箕子周公之言故曰鳯鳥不至河不出圖歎治有廢興也然自前世以為龍馬負圖自天而降洛書九疇亦自然之文其言怪誣夫思曰睿睿作聖人固能之奚以怪焉甚至山林詭譎有先天後天之説今不取次臯陶訓人德以補天德觀天道以開人治能教天下之多材自臯陶始按髙辛髙陽之子聚為元凱舜雖盡用而禹以材難得人難知為憂臯陶既言亦行有九德亦言其人有德卿大夫諸侯皆有可任者翕受敷施九德咸事以人代天典禮賞罰本諸天意禹相與共行之治成功立至夏商周一遵此道次湯惟皇上帝降衷于下民若有恆性克綏厥猷惟后其言性蓋如此次伊尹湯自言聿求元聖與之戮力以與爾有衆請命伊尹自言惟尹躬暨湯咸有一德克享天心受天明命故以伊尹次之言德惟一又曰終始惟一又曰善無常主協于克一鳴呼堯舜禹臯陶湯伊尹於道德性命天人之交君臣民庶均有之矣次文王肆戎疾不殄烈假不瑕不聞亦式不諫亦入雍雍在宫肅肅在廟不顯亦臨無射亦保無然畔援無然歆羡誕先登于岸不大聲以色不長夏以革不識不知順帝之則夫雅頌作於成康之時而言文王備道盡理如此則豈特文王為然哉固所以成天下之材而使皆有以充乎性全於天也按中庸言鳶飛戾天魚躍于淵言其上下察也德輶如毛毛猶有倫上天之載無聲無臭至矣夫鳥至於髙魚超於深言文王作人之功也德輶如毛舉輕以明重也上天之載無聲無臭言天不可即而文王可象也古人患夫道德之難知而難求也故曰安安允恭克讓濬哲文明執中惠迪克綏厥猷主善協一皆盡已而無所察於物色皆有倫而非無聲無臭也今也顚倒文義而指其至妙以示人後世冥惑於性命之理蓋自是始噫言者過矣不可謂文王之道固然也次周公治教並行禮刑並舉百官衆有司雖名物卑瑣而道德義理皆具自堯舜元凱以來聖賢繼作措於事物其該括演暢皆不得如周公不惟周公而召公與焉遂成一代之治道統厯然如貫聨算數不可違越按大司樂言天神降地示出與簫韶九成鳯凰來儀何異次孔子周道既壞上世所存皆放失諸子辨士人各為家孔子搜補遺文墜典詩書禮樂春秋有述無作惟易著彖象舊傳刪詩定書作春秋余以諸書考詳始明其不然然後唐虞三代之道賴以有傳按論語子罕言利與命與仁今考孔子言仁多於它語豈其説教不在於是朋至羣集有不獲聞故以為罕耶孔子沒或言傳之曽子曽子傳子思子思傳孟子按孔子自言德行顔淵而下十人無曽子曰參也魯若孔子晚嵗獨進曽子或曾子於孔子沒後德加尊行加修獨任孔子之道然無明據又按曽子之學以身為本容色辭氣之外不暇問於大道多所遺略未可謂至又按伯魚答陳亢無異聞孔子嘗言中庸之德民鮮能而子思作中庸若以中庸為孔子遺言是顔閔猶是足告而獨閟其家非是若子思所自作則髙者極髙深者極深宜非上世所傳也然則言孔子傳曽子曽子傳子思必有謬誤孟子極稱堯舜禹湯伊尹文王周公所願則孔子聖賢統緒既得之矣養氣知言外明內實文獻禮樂各審所從矣夫古昔謂之傳者豈必曰授之親而受之的哉後世以孟子能傳孔子殆或庶幾然開德廣語治驟處己過涉世疏學者趨新逐竒忽亡本統使道不完而有迹自是而往爭言千載絶學矣按孟子言性言命言仁言天此古人所未及故曰開德廣齊滕大小異而言行王道皆若建瓴以為湯文王固然故曰語治驟自謂庶人不見諸侯然以彭更言考之後車數十乘從者數百人而曰庶人可乎故曰處己過孔子復汶陽田使兹無還對罷齊饗與梁丘據語孟子不與王歡言行事憚煩若是乎故曰涉世疏學者不足以知其統而務襲孟子之迹則以道為新説竒論矣易不知何人所作雖曰伏羲畫卦文王重之按周太卜掌三易經卦皆八别皆六十四則畫非伏羲重非文王也又周有司以先君所為書為筮占而文王自言王用享于岐山乎亦非也有易以來筮之辭義不勝多矣周易者知道者所為而周有司所用也孔子獨為之著彖象蓋惜其為它異説所亂故約之中正以明卦爻之指黜異説之妄以示道德之歸其餘文言上下繫説卦諸篇所著之人或在孔子前或在孔子後或與孔子同時習易者會為一書後世不深考以為皆孔子作也故象象掩鬱未振而十翼講誦獨多魏晉而後遂與老莊並行號為孔老佛學後出其變為禪喜其説者以為與孔子不異亦挽十翼以自况故又為儒釋本朝承平時禪説尤熾儒釋共駕異端會同其間豪傑之士有欲修明吾説以勝之者而周張二程出焉自謂出入於佛老甚久矣而曰吾道固有之矣故無極太極動靜男女太和參兩形氣聚散絪緼感通有直內無方外不足以入堯舜之道皆本於十翼以為此吾所有之道非彼之道也及其啓教後學於子思孟子之新説竒論皆特發明之大抵欲抑浮屠之鋒鋭而示吾所有之道若此然不悟十翼非孔子作則道之本統晦矣按佛在西南數萬里外未嘗以其學求勝於中國其俗無君臣父子安得以人倫義理責之乎無際無極此皆其身所親厯足所親履目實見而耳實聞也以為世外瓌特廣慱之論置之可矣今儒者乃援引大傳天地絪緼通晝夜之道而知不疾而速不行而至子思誠之不可掩孟子大而化聖而不可知而曰吾所有之道蓋若是也譽之者以自同毁之者以自異嘻末矣蘇洵自比賈誼曽鞏王安石皆畏其筆至以為過之歐陽氏比於荀卿嘉祐後布衣特起名冠當時而髙後世李覯王回豈敢望也權書衡論幾䇿多談兵論為將草野未除去誼固逺今所取者一二而已六經論尤失理皆以為聖人機權之用乃異聞也故家庭所講不能深造誤其子矣或傳洵常自祕一書誦習二子不得見它日竊視之戰國䇿也洵聞而歎息此雖未可信然觀其遺文大略可見矣又傳富韓方欲整齊驕卒洵始見之因顯言治兵當用嚴引李光弼事二公以為漏密事頗駭動故久而無成又二子應制舉洵戒轍用直言對䇿得不黜晚嵗力撼宰相修因革禮未奏卒古人謂招之不來况不待其自至而馳騁以求之乎尹洙早悟先識言必中慮同時莫能及敘燕息成法制與賈誼相上下適會其時故但為救敗之䇿爾源亦善論事非擅所長於空文者也救時莫如養力辨道莫如平氣石介以其忿嫉不忍之意發於偏宕太過之辭激猶可與為善者之怒堅己陷於邪者之敵莫不震動驚駭羣而攻之故回挽無毫髮而傷敗積丘陵矣哀哉然自學者言之則見善明立志果殉道重視身輕自謂大過上六當其任則其節有足卲也今所録皆放此可以覽觀矣唐庚憫俗今四方萬里之國而無恢大閎逺之風以充之百工所造商賈所鬻士女所服日益狹陋謂崇觀宣政間也其敝至渡江且百年猶在淳熙中上下皆有從窄之論余甚憂之邇來服用乃更疏濶大冠髙髻廣袖滿領莫知所從始豈庚所言恢大閎逺者幸會旋復將以充而夀之殆天意耶習學記言卷四十九
