body:
  text: 習學記言卷二十七宋葉適撰三國志魏志橋𤣥以曹操為命世之才而許劭以為治世之能臣亂世之姦雄𤣥與劭品數大殊言之髙下固當不同也操為劭所鄙乃為𤣥及何顒所異不知劭自與漢人隔多少重數操得志後一時人材受其生殺榮辱為所位叙者其賢否氣類又可知矣劭猶若此况不為劭者乎東漢未亂時猶若此况三代之盛乎道之升降古人所以深致意也東漢壞敗已久自張溫皇甫嵩成功而策士以改物說之矣人主與宦竪小人為密虐用其民甚於冦讎與桀紂幽厲無異勢當然也獨有一事雖三代亡秦之季世至於王莽然皆其民叛而吏不叛其後唐衰雖兵將叛而士大夫不叛也董卓袁紹袁術曹操劉表劉焉陶謙公孫瓉世為公子身任漢臣一朝狂誕假號奮呼自為亂首劫脅平民屠剝天下兵民未叛而吏士大夫先叛此前後所無也蓋漢末世有才者多上不惟無以御之又失其心激而思悖私義勝公道滅各徔其黨不知有君而論者反謂東漢風俗最美能銷姦賊窺伺之心國家賴以不亡豈未之考歟按操以中平六年十二月起兵初平二年七月袁紹表為東郡太守據兖州以其中間攻于毒眭固陶謙又為張邈陳宮所敗六七年內轉戰百艱所獲甚微視髙祖光武指麾戡定何太懸絶乎適㑹天子東還遂挾以自重方有扶義征討之事然則操之功業蓋因輔漢而後致非漢已亡待操而能存也使如董卓袁紹甘心為賊固無可論若稍隱諸心欲因此跳梁跋扈自同問鼎其可安乎操以令縣滿五百户者置校官而其辭曰其令郡國各修文學按操雖竊漢柄號令所行施其統內若兖冀之郡國可也與人主制詔並行於天下可乎荀彧非不見微者猶曰愛人以德何也陳燾雖著魏書然有漢則無魏而其詞錯雜使後世無别史法不復存矣皇甫謐載王雋稱操有濟世具而言袁紹與術母喪歸葬㑹者三萬人操密語雋天下將亂為亂魁者必此二人也此語當不妄黃瓊陳實之喪㑹者皆數萬紹術亦然聚各以類則其人皆飛揚輕俠者也私援成於下動衆太甚自無安靖之理與張角兄弟何殊操十五年令叙幾人稱帝幾人稱王事極有始末當詳看後世多稱操姦賊狙伺猶畏迫名義不敢身自代漢按操僣亂顯逼惟孔融隂沮惟荀彧二人既死中外無不迎承自獻以拒後為羞名義安在而尚何所畏迫耶然天下大物自戰國秦漢以來形窺若易而實取亦難董卓袁紹之流鴟張廣莫未有能自知節限者卒皆隨以夷滅操雖奸賊不仁然能自知節限故敢僣而不敢叛敢取而不敢代所以諄諄自叙齊晉文王樂毅䝉恬等事皆實語非虛飾益知許劭之評為不妄也建安體如王粲徔軍詩奚用也建安十五年司徒趙溫辟曹操子丕操怒免溫官明年而丕為副丞相矣豈溫真不省事而以門地辟耶將示若不知故為蓋塞以使之也魏文嗣事之初霍性以論用兵誅死戴陵以諫弋獵被刑性言先王功無與比而能言之類不稱為德厯數漢魏中間士人為此語者絶無亦非不能蓋不敢爾不知性何等人也魏文居喪半年無東南之警而倉猝伐吳不過耀兵起隙以逼漢位性不知事機豈張湯所謂愚儒也魏文之所欲者禪代爾而符瑞章奏勸進辭讓前後節目連篇纍牘存之極無謂然可以見其辭煩而理寡也黃初二年初復五銖錢未幾以穀貴罷至太和元年始復行然則建安中物踊但用榖帛不比王莽自改幣而禁策錢也幣與物相權從古而然雖操猜詐百出不敢用異說後世以有限從無涯自坐窮處遂無策矣癸酉詔言今事多而民少上下相蔽以文法百姓無所措其手足夫民多而法敝勢極而變也民少而法敝盡民之術也秦及王莽之亡蓋如此曹氏轉戰三十年所成就幾何民愈盡而法愈敝其自言者尚爾况使他人言之乎當是時猶欲以功名自居吾不知其說也魏文帝欲并吳積年以司馬懿居留自謂得所任矣而患方起於慮外然用人之道百世同軌此非所以為悔也所當悔者前面已起樣子爾馬上賦詩極陳觀兵之盛其終曰量宜運權略六軍何悅康豈如東山詩悠悠多哀傷彼以周公為怯耶大抵六子二曹為建安黃初體自此不得復見前世之風雅而後人以為髙風絶塵所未喻也建安十年始定冀州濊貊貢良弓燕代獻名馬時嵗之暮春勾芒司節和風扇物弓燥手柔草淺獸肥與族兄子丹終日狩獲麞鹿九雉兔三十文墨之士多以為壯余觀大叔于田還猗嗟其技藝材敏有過於此而詩人刺之以為亡國之形也今曹氏虐用其民挾持殺戮驕豎騃子乘堅驅良慿勢作威以自快其得意而風聲氣俗之所熏炙更百十餘年有志之士不復知古人之流禍直可悲爾江漢為池舟楫為用利則陸鈔不利則入水中國長技無所用之此袁淮稱江南地利也既又言孫權自十數年以來大畋江北敢逺其水陸次平土中國所願聞蓋權是時不止於守江而又欲為取淮漢以北之規故也孫氏及五代江淮攻守大略類此自吳楊氏無爭淮北之勢而淮不可守唐李氏割淮臣周不敢窺江以北而江不可守建炎紹興承用楊李以淮守淮以江守江而孫氏及五代之故實遂不復講余頃在制司初亦循近轍幾誤急易之僅能自完既將經畫江北以及兩淮而上自卿相士大夫下至偏校走卒無一人以過江守江過淮守淮為事者余亦以病歸矣今因諸書簡錯見之此今世大議論也未有不知守江淮而猶欲論取中原者也何晏論治心慎習放鄭聲逺佞人欲因幸武乾殿遊豫後園使大臣侍徔徔容戲宴兼省文書詢謀政事講論經義為萬世法此疏殆晏所謂格君事業者乎然方晏等用事而當時經生學士謀臣武將皆無以為然者彼固不足以知之矣而晏等以急利競進之心當幼君驕相之勢行人所不能知之學固所以不旋踵而覆其族歟司馬懿初除曹爽蓋因朝臣內外惡其驕縱方以此舉為便國未有言其非者王凌雖知之而謀立藩王不利見主使懿尤得以自直二者皆因當時之所謂正義以售其逆謀人心密移國向隨改轉盼呼吸傾奪已成雖欲起而圖之無與共功矣古今存亡之機雖未嘗不如此然曹氏辛苦作計三世相承才二十年本以託孤乃得篡弒而懿因公行邪乘間掩竊上下拱手全而付之是非疑信曾不及一出諸口嗚呼孰謂三國多智士哉如劉煜蔣濟之流區區乎以揣摩徔人者固至是歟髙貴鄉公劣漢髙而優少康論著禎祥以耀逺近其意蓋欲感動臣下使之協同爾今其書之存者但縱論文義無所激發則當時未嘗領㑹可知矣而公不勝忿怒奮一夫之決以速其死悲夫鄭𤣥以三老五更為更事之稱蔡雍云更應作叟引俗字女傍更為證按三老五更二戴集書也至東漢初既立更以養之距𤣥與雍時上下二百年爾一朝見聞未至懸隔𤣥經生家以意說之固未必是雍周旋臺閣從胡廣諸人遊號為通博既不能以義斷其是非又於故實無所考據而徒以字學偏傍輕改之可乎後世經文以雍改定者為的而其見識如此恐未可慿也按晉靈公不君趙穿弒之趙盾反不討賊史官以穿罪罪焉孔子以為其義足以戒後世因而不改然而法一變也及晉厲公亦以淫虐被弒而悼公要誓之詞曰立而不從將安用君二三子用我今日否亦今日而欒書中行偃束手退聽晉自是復霸人以為材至魯昭公不忍討伐季氏不克而奔齊悼公亦循周子故步欲正其始陳乞不從尋即遇篡四者之逆足以互見蓋趙盾欒范恭順未失故臣道可復存意如田恆悖惡已定故君權不復反事既至此但以勝負為是非耳至髙貴公則又有可哀者司馬懿父子暴擅亟奪五年未逺國祚已非魏有按母丘儉表司馬師自公立未嘗朝公欲問其疾亦拒不得至觀此際㑹雖有二悼欲正其始何可復行侍徔羣臣一語不酬對更假數嵗不過身親授受而已而或者乃指易屯膏之義謂小貞則吉大貞則凶未知亡國與殺身小大何所别異而尚以吉凶言乎宜公欲以少康自比而終不能也公立時年十五英才逸氣與少康晉悼略相似哀哉哀哉陳登以雄豪自許劉備亦亟稱之然登父子已與曹操相首尾受其驅役就不早殞終何所能至如華歆王朗登所敬者皆駢首為魏公侯矣至臧洪則不然猶是漢之陪臣死超讎紹義有可依關東起兵以漢為亂者無問大小終於臣僕篡盜喪名失節以茍其生惟洪可以免焉陳夀雖知貴之而智不足以及此遂與登同稱學者宜詳之嘉平之役極是異事曹氏造基立業雖無兩漢本根之固然自操至此已五六十年民志久定司馬懿再世受遺信非忠貞何遽盜奪而况虛位無權勢同單庶一旦因人主在外閉門截橋劫取事柄與反何殊此至愚者不敢為懿號有智而披猖妄作自取族滅然竟以勝一異也曹爽兄弟昏庸童豎無足深責然崇信何鄧惟其所為晏等皆勝流名士並居要職命令所由出方天子朝陵爽義扈徔未知晏揚之流安在而變起倉猝但有桓範拔劍南奔其餘竟無一辭懿奏既通駢首受戮而魏事已去矣懿一旦僥幸於至愚而成至智晏平時自許以上智而終成下愚茍無人心忍而就此哀哉二異也昔韓馥讓州於袁紹竟走厠求死當危亡之際舉國無人乃至於是孟子謂耳目之官不思而蔽於物何太甚乎夏侯𤣥言先王建國分疆畫界各守土境非重纍羈絆之體欲省郡守縣皆徑逹兩漢論治未有及此者其自負宏濟良不虛也而親姻中外竟相首尾委肉以當豺虎之鋒悲夫如𤣥之智雖未必能存魏然𤣥死而後魏卒亡蓋與其國相始終矣曹操取天下事盡具荀彧傳中故或者以彧比張良張良髙妙𤣥逺智因物生不為定形固非彧所能至然而清整愷悌以善自與是三君八俊家良子弟也或者又言漢已亡操取之於羣雄非取之於漢此甚不然以操終始挾漢而令猶不能盡得几操之得非名依漢則無由是漢固未嘗失但不能主令爾譬如人有良田廣宅雖失劵要而田宅固其物也臣僕不直而歸之而欲直而盜之可乎彧為漢人子孫其當死無疑所可惜者智不足以知操之為竊狃於謀而不自制遂失其身爾此乃士君子出處之至戒學者尚弗分别何哉袁渙舉動節度言議政幹皆近儒者然特其粗爾操之事初最蒙褒用或疑此非所以施於操操但不容孔融禰衡輩耳過是色色有之若已受其籠紲而又能將之以德行矯之以貞介無不可者如張範邴原之流正操所欲奬飾也昔閔子稱如有復我者則吾必在汶上而公晢哀季次皆未嘗仕季氏孔子告仲由以知德者鮮士雖欲自勉於德而不知立德之地不可也獨田疇終始辭封似其志有所在是時操未建國前為蓨令後為議郎皆是王官若不遽死未知竟何如也管寧漢末逺遁漢魏興廢之間君子存身用舍之際皆可以免比其來還則改物已定年邁時逾獨𨼆中退泯然無迹士君子之處世以道雖難易不同不害其為仁至於心所不欲而自行之屈伸舒卷在己而不在物則未有能及寧者固與荀爽相去逺矣按崔琰初仕袁紹諫以天子在許民望助順不如守境述職次對曹操以未聞王師仁聲先路此蓋老書生守經不易之常語也然琰便甘心委質曹氏首為魏臣未知琰意以為諸侯復興各事其主以翼戴天下如古之齊晉正當爾耶抑風靡波順遂無漢朝忘其素守而不自覺也人之立德必有其地余既於袁渙邴原見之如玠孤峻特立匪躬正色於人之本朝而無自立之地逢喜迎恚漂搖中流殺身如斷梗進無孔融荀彧之節退乏鍾繇陳羣之利則余固未知其說也此亦不足為士君子出處之至戒乎鍾繇欲復肉刑斬右趾以生易死而王朗以為律自有減死一等之法不死即為減後世雜犯死罪者皆當不死古人恤刑而不免於濫後世濫刑而猶可以恤非後世智於古人也積習既極而反爾王肅言周官五日視朝考漢宣帝使公卿五日一朝成帝始置尚書五人自是陵遲朝禮遂闕可復五日視朝之儀使公卿尚書各以事進廢禮復興光宣聖緒按成帝既置尚書簡闕親政遂無視朝之禮公卿不復進見三百餘年可謂敝事而兩漢諸臣未嘗一言及此史亦不載何也肅去其時未逺既正論指陳就使不盡然而視朝之廢固久矣然則尚書為天子私人事歸臺閣公卿充位蓋有由來至於人主不能親覽臺閣遂成朝廷古禮之變微而不自知也然當時號治世者未聞以不視朝為失後世人主之見羣臣多矣而其治亦不能有加於前世何也肅言何晏鄧揚等為宏恭石顯之屬肅大臣子以學問自負論事有稽據立朝明始末指晏輩為恭顯亦其理也肅既自守如此則其出處不應草草若以晏輩附從曹爽為邪而以身從司馬父子為正恐未可也齊王見廢肅以太常迎髙貴公是時司馬師篡事定矣彼亦以為是耶甘露元年肅死去髙貴公見殺亦不逺使肅再遇此事未知又當如何然則何其明於知爽而昧於師昭故自漢魏以來不以廢興存亡之際考士而信其自許為正人者余不知也魏略叙董遇邯鄲淳蘇林樂詳等言太學生千數冬來春去博士粗疏弟子避役無復學者圜丘議下郎官諸吏見在萬人應書無幾朝士四百餘人能操筆者無十人及劉靖亦言髙門弟子恥非其倫故無學者此論魏世儒學興替大概可知也曹氏父子上馬殺敵下馬賦詩自難語學爾魏有校事吳有典校近後世皇城邏者之任也程曉言上察宮廟下攝衆司官無局業職無分限隨意任情惟心所適則誠與後世邏者同至典校又糾摘文書其干繫尤切矣然吳魏倉猝用之不久尋廢而後世乃以為官常豈曉所謂大臣恥與分勢含忍而不言小人畏其鋒芒鬱結而無告蓋亦有言者而莫之能革也漢魏之際胸奴氐羌皆居內地兆於漢宣成於魏武昔秦人築長城以限拒胡而漢武力戰使之逺漠不能為冦至孝宣因其衰弱乃反輔之塞內而張既設策一旦徙氐五萬餘落於扶風天水當時方以為快不以為虞也使魏稍傳世未亡則諸胡之禍親自當之孔子稱人無逺慮必有近憂夫慮無逺近而事有是非故出之不以正者萬世之患也豈止百年為戒而已棗祇任峻為魏建屯田後世祖其說然未知時用不同蓋曹操起事廢罷錢布專行榖帛祿賜調度無不由之然則於民不耕之地官置典農春任其勞秋獲其利年豐業廣百萬之衆足以自給雖不待租稅可也後世化榖帛為金錢軍國諸費絹米才居十二兵料下者日猶百錢若以多錢之卒嵗種二十畝官收十斛米以五而獲一秕稗蓄藏已輒塵腐是以有用而就無用而欲徔祇峻之遺策可謂疏矣此事當大有櫽括然後可議如前黃霸龔遂任延召信臣之流兩漢名循良吏也然止是治民一節爾杜畿𫝊中乃有數節可看其始空將一身犯必死任竒譎以得郡而其後乃行之以寬惠示之以教勸待之以富庶自無入有由險至平豈有講論之功哉若畿及劉馥蓋春秋以上人材不止如遷固所稱也後世材品益下權數者武猛者生聚者平易者各自為家不相通而徒相誚蓋陋矣且漢末餘吏曹氏所用其變化屈伸之際後人猶未能望其藩牆奈何欲輕語三代事乎杜恕峭峻特立之意長者自逹之言於魏極少其比雖兩漢人亦難之今録其語切者實願四州之牧守獨修務本之業以堪四支之重厯六代而考績之法不著閲七聖而課試之文不垂古人不患於念治之心不盡患於自任之意不足古之聖王所以能輔世長民者莫不逺得百姓之歡心近盡羣臣之智力陛下何不試變業而示之彼豈執其所守以違聖意哉朝錯蓋寬饒固無此論也鍾繇王朗老成練逹然其意自以為如是止矣年邁而志不新人之通患後生真可畏哉孫權十萬攻合肥守者七千旁無近援固已不自保而遼乃募士八百擊其未合以至尾追幾獲大醜非操之智無以使張遼非遼之勇而明亦不能自任勝負成敗蓋誠以人不在衆寡士常如此則立於積衰甘弱之地為預怯莫前之說以自附於明哲者可察矣魏文帝乃謂古之召虎殊可笑召虎却不如此曹操美徐晃賊圍塹鹿角十重吾用兵三十餘年及所聞古之善用兵未有長驅徑入敵門者以理勢而言非徑入敵圍固不能解圍全城非於圍上破走救者固不能得城全勝然古今自非見救至逆遁則皆畏敵不敢救少有如關羽及晃之真以勇力相遇而決鬬者客主單復之殊陸抗能知之此羽之所以終屈而觀者之所當思也孫權以五萬圍文聘於石陽甚急聘堅守不動權住三十餘日乃解去魏略載云云而注者乃云此語與本𫝊反非也傳固本諸魏略但刪簡煩辭耳書傳中比比不少也然古人以智期人而又以自期故縮於不敢而敢者勝後人以愚期人而又以自期故冒於所敢而不敢者敗爾魏武病召曹彰未至而歿彰謂曹植曰先王召我者欲立汝也植曰不可不見袁氏兄弟乎魏略此語雖未必實然操於諸子將擇才而與之意不專在嫡倉舒天死以文則植以武則彰使植稍以智承之則得其處矣故王通謂君子哉思王以天下讓而人莫之知亦非過論也陳思王讓德余既發明文中子之論然以植事始末驗之謂植能讓猶不為知植蓋能取然後能讓植含毫弄筆自喜目前而已機數防慮何嘗萌心兄忌惡之不啻讎敵猶自乞為將及入侍求死不太迫乎又謂取齊非呂宗分晉非姬姓寒溫燥濕髙下共之植不自疏而不悟兄之不已親也悲哉然植雖天材縱逸而筆勢汗漫不幸早終未及繩約以追古人尤可痛也倉舒童孺而有仁人之心痕舟稱象為世開智物理蓋天禀耶彭城王據璽書書云惟聖罔念作狂惟狂克念作聖古人垂誥乃至於此常慮所以纍德者而去之則德明矣開心所以為塞者而通之則心夷矣慎行所以為尤者而修之則行全矣此作詔者非能解釋義理而言與理合箋𫝊家不能及也人不能常慮所以慮德而去之開心所以為塞而通之何取於知學乎曹冏六代論逺推周秦近托漢魏雖確篤而成敗得失有所依憑行於末世親踈相錯十得四五子建固奇材恐考驗之實未逮如墉基不可倉卒而成威名不可一朝而立皆為之有漸建之有素等語如饑人進一餐勝絶食也傅嘏精識自命謂何平叔不念務本敗曹爽兄弟是矣至其為司馬師謀力疾勸行又與昭還洛繼世執政終移魏柄此則嘏之所謂務本者歟國命延促之際士所去就忠邪賢不肖分焉過是而自號曰能吾不信也夫人之所欲莫不有辭况乃天王莫之敢違若必作之固非臣下辭言所屈若少留神卓然回意亦非臣下之所及因舉鍾離意諫王者豈憚一臣蓋為百姓也今臣曾不能少凝聖聽不及意逺矣此陳羣諫語直而不回切而不割可從而不可怒得大臣體矣至子泰請誅賈充謂言有進於此不知其次勇過晏子不墜陳太邱家聲也陳登為劉備所許且以許泛所言不但上下床之間其品第甚髙而登又自言所敬於當世者有數亦足以驗矣然觀登指意雖名助漢實亦為曹操驅使耳豈是時登疏逺不知耶使其不死盡見操所為將遂從之耶將遂絶之耶絶之則孔融荀彧之禍至從之則登之生平喪矣此亦不可不論也盧育駮妻白等死引未見君子未廟見及附從輕曹操以為引經典有意令孤歎息用此語求之漢人引經之有意者少矣所謂春秋之義繩臣下大抵多無意之引也豈不害生民乎然操喜有意之經足以緩死而不知自立無意之法為殺人孟子謂雖得天下不為信非所以責操爾盧育之語有益世教蓋為善以致名非無實之名以才而為善非傷道之才育所謂可以得常士者是也天下常士多而異人少推而行之庶幾臯陶之意爾魏晉以後選士之權多在吏部至唐初猶然後世宰相不過能行吏部之職經逺之業盡廢而以銓叙為大功至非其人則用傷情敗俗無所不至夫一有司之不若則烏在其為王佐宜乎責效愈卑也和洽貧素賣田宅而言古之善教在通人情所謂不以格物者也又言勉而行之必有疲悴疲悴二字深得其要故古人以利和義不以義抑利世道雖降其行未嘗不過中孰謂曹操建國能使大吏自挈壺餐乎按髙柔傳稱魏初三公無事又希與朝政三公止朝朔望東漢雖事歸臺閣三公猶為宰相至是但崇官稱而已臺閣既未成朝廷三公又非相職其特命相者往往多非人臣之事數百年間有君無臣雖方夏幅裂治化與古異然天地之經安能久不正耶孫禮以伊呂望司馬懿而責其社稷將危天下胸胸當時議論趨舍蓋多如此然則助成懿之叛逆殆天意耶辛毗言湯武以戰伐定天下乃改正朔孔子曰行夏之時何必期於相反孔子以夏時為正而不言商周之非謂以戰伐而改正朔前論亦無所見蓋毗一時之意也然上循五帝協時月正日所以正天下諸侯而未嘗自有改易獨殷周變之毗陋士臆說固未必中至於無益而祇為異則學孔子者闕之可也楊阜論袁曹勝敗曰袁公寬而不斷好謀而少決曹公決機無疑法一而兵精能用度外之人所任各盡其力昔商鞅教秦孝公申不害相韓昭侯行果敢睚眦之術彼世有國而自用之干進者固應然而秦漢以後皆施之於賈豎盜賊崛起然亦未嘗不驗豈古人叢驅網漏之道遂已亡滅耶末世所謂度內者皆愚儒也所謂度外者皆羣不逞也安得度內而非愚度外而非不逞也謂操能用度外之人此自阜輩所見爾凌霄闕始構鵲巢其上髙堂隆曰惟鵲有巢惟鳩居之今興宮室起凌霄而鵲巢之此宮室未成身不得居之象也天意若曰宮室未成將有他姓制御之今詳詩義鵲巢而鳩居非有惡於鵲非有愛於鳩也鳩以均一之德詩所發興至其才拙不營而奪非其有豈復取之哉鳥巢於髙物理之常何遽怪歟然時主心有所疑而問隆即事為象而言如契之合劵之同無其義而有其應何也雖然物鑿以顯而理不正以通此亡國昏主之患諫者所不能回可歎爾隆又言黃初之際天兆其戒異類之鳥育長燕巢口爪胸赤此魏室之大異昔五子之歌獨以道鑒亡而周人之興乃兼言符瑞若曹操之猜雄阻逆竊非其有殘民不已天下為墟久近之卜亦可算矣無以異物為也恐隆引類告君不得不爾魏明帝不能徔楊阜髙堂隆之諫節減宮室而欲傳蘇林秦靜之業課試學者緩其實而急其華漢武帝誤之也孝宣親見其害尚欲修武帝故事况後人乎按滿寵傳陸遜向廬江寵言賊捨船二百里來後尾空縣又言合肥城南臨江湖北逺夀春乃移西三十里依險而引賊平地又言權遣兵數千家佃於江北蓋吳魏相拒吳常以能蹂躪江北為守而魏不能以跨越江南為戰後世守江者畫江內而守之每患退走此非竒計祕謀當與衆共之使知戰守所宜處不然雖江水不為險矣王基進據南頓稱議者多欲將軍持重將軍持重是也停軍不進非也持重非不行之謂也進而不可犯耳世人多以淹止自保替過持重二字基如此析言之甚善不特為言兵者解惑且以重為進則前茅慮無中權後徑百官象物而動軍政不戒而備投袂而起猶可有功雖非古人仁義之師庶乎黷而不挫矣而基始則能倡議獨進安坐莫搖終則能持勝全歸不求深入勇怯各當動靜以時基亦儒生非武將也觀者自當斟酌王陵子廣論何晏丁畢桓鄧所存雖髙事不下接同日斬戮名士減半而百姓莫哀及懿情雖難量事未有逆廣樹勝已擢用賢能等語裴松之以為前史不載皆習鑿齒自造前史載與不載不必問然此乃魏晉人議論兩黨根柢非虛言也蓋夏侯𤣥何晏以器韻𤣥逺為一時表則士之神雋朗邁者爭宗之其老成重朴有局幹者皆所不悅此司馬懿所以能乘機取魏柄俗人甘心為之役而不悟然雖能取魏而晏𤣥之標度風流已不可掩抑所以晉人終於成俗而向之不悅者久亦消折後生遂靡然矣余觀三代之後道德喪壞而利義不並立雖孔顔孟軻不容有晉楚之位况晏𤣥挾髙名而競厚利自無全理又王陵方欲廢見主立藩侯其去叛逆幾何此借懿父子之兵而資其食堅衆人之用而成其篡也悲夫毋丘儉諸葛誕亦善夏侯𤣥鄧揚等儉廢司馬師之辭猶謂懿有大功而昭賢欲以昭代師雖非實語然可見當時中外人情未以懿父子為決取魏也鄧艾開渠溉田積榖且通運漕其䇿可考然謂四萬人耕訃除衆費嵗完五百萬斛而以三千萬斛為十萬衆五年食以今約之則收少而食多未知當時調度如何然作田計夫軍食計口古今所同決不能一夫耕百畝而食六十斛也華他管輅等傳雖規倣太史公至叙載指實而竒態自生往往遷不能逮所謂辨而不華質而不俚以上當更有事矣遷書虢世子趙無恤怪甚以漢髙滅秦項之威而胸奴項領受圍平城光武百戰百克遂定海內而盧芳連胡擾邊終其身不能屈烏丸踏頓之暴不減前世曹操親伐一戰斬之徙其部落遂為名騎所向有功何其壯也自古立國德義為難而以武勝者多矣若夫德義不足而又羞武事十世淪胥坐視天下變為左衽學者當諱而不當法也陳夀載東夷接前史皆以六畜名官有馬加牛加豬加狗加犬使因思前世雲紀火紀至以鳥名官蓋上者神靈下者鄙野故未嘗酌人道之中而郯子乃以為不紀逺而以民事則不能之故恐亦未然左氏但言仲尼見而學之蓋以備異聞而未暇辨其是非也習學記言卷二十七
