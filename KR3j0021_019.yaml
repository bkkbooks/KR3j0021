body:
  text: 習學記言卷十九宋葉適撰史記五帝三代本紀羲黄為文字之始聖智之先不獨學者言之孔子蓋言之矣至於簡棄鴻荒斷自堯舜則何必孔子自舜禹以来固然也何以知之方禹益臯陶共明治道祖述舊聞其時去黄帝顓頊不逺所稱道徳廣大皆獨曰堯舜未有上及其先者推羣聖賢之心豈夸禰而掩祖哉故余以為神靈不常非人道之始闕而不論非掩之也如遷所見五帝徳帝繋姓雖曰起自黄帝若夫稽古而得之君止堯舜臣止禹臯陶而羲黄后牧之倫不預焉遷未造古人之深旨特於百家雜亂之中取其雅馴者而著之然則典謨大訓徒雅而已乎況黄帝堯舜之後既數千年長老所言不可信審矣不擇義而務廣意亦為學之患也孔子謂顔淵行夏之時乗殷之輅服周之冕蓋為邦之要略漢儒之智未足以及此也而遷紀夏商言孔子正夏時又曰殷路車為善近是矣至文王三分天下有其二以服事殷周之徳其可謂至徳也已矣則遷不能知故曰受命稱王改法度制正朔當以孔子為正也以遷所紀五帝三代考之堯舜以前固絶逺而夏商殘缺無可證雖孔子亦云獨周享國最長去漢未乆遷竭力収拾然亦不過詩書國語所記而已他蓋不能有所増益也是則古史法止於此矣及孔子以諸侯之史時比嵗次加以日月以存世敎故最為詳密左氏因而作傳羅絡諸國備極妙巧然尚未有變史法之意也至遷窺見本末勇不自制於時無大人先哲為道古人所以然者史法遂大變不復古人之舊然則豈特天下空盡而為秦而斯文至是亦蕩然殊制可歎已秦本紀由余言治類老子偏駮不槩於道然能行其意耳太史公言秦穆公作誓君子聞之皆為垂涕不知此語何所據来爾其次於書有以也百里奚蹇叔皆且百歳故曰番番良士膂力既愆我尚有之蓋深悔之也城周之役晉執政不能記踐土之盟既而晉亡秦孝公出令上距穆公二百五十年矣穆公舊事常鏡觀之宜其興也人未有自求强而不獲者彼不幸而得商鞅百餘年秦亦亡遺患萬世悲夫始皇本紀始皇七年九年十三年三十三年彗星從横竟天不獨告六國滅亦告秦亡也商周以頌次樂告神明始皇乃刻石自頌功徳其詞下俚後之學古文者反並稱先秦又因其體雜以雅頌語欲復古文不可得也始皇并天下十年五巡行周得火德秦從所不勝以剛毅戾深刻削毋仁思和義為水徳按子産言火烈人望而畏之水弱人狎而玩之是周秦用徳皆失也而老耼言水善利萬物而不爭處人之所惡故幾於道蓋怪民竒論為天下患非特秦承其敝至後世猶然秦燒書六年坑諸生五年而亡天下反秦二世死在旦夕方引韓非語欲造千乗之駕萬乗之屬充吾號名亡國之君舉動如此固不足怪然參以李斯傳恐先後差誤賈生論專指險塞設攻守殊不然周在岐邠何嘗用險自諸侯叩闗攻秦不勝漢人因之遂衍為百二之勢誼亦以一時習尚言之耳然西漢既亡之後歴代所都亦未聞有能以全制天下者至唐以後遂泯然無稱矣司馬侯謂九州之險不一姓賈生本用從横之學而並縁以仁義固未能知其統也項羽本紀古書之於聖賢皆因事以著其人未嘗以人載事項籍雖盜奪然文字以来以人著事最信而詳實始於此如初起時二十四少學書不成去學劍又不成書足記姓名劍一人敵不足學學萬人敵乃敎籍兵法不肯竟學楚漢間頗用此例推觀不知古人之材與後世之材何以敎何以成就上世敎法盡廢而亡命草野之人出為雄强遷欲以此接周孔之統紀恐未可也空諸侯之國而得天下者秦也敺天下之人而亡天下者亦秦也秦自以滅六國無與敵及其敗也雖名諸侯復立其實黔首化為盜賊亡之如拾遺自是以後未有不以羣盜亡者次則敵國次則卒伍皆古所無有也然則後之有天下者謹備三者而已范増立楚懐王以亡秦董公為義帝發喪以撃楚殆若徴祥厭勝然非計利之實也儒者因是謂取天下自有名義當更細論詩曰柞棫拔矣行道兊矣昆夷駾矣唯其喙矣孟子曰為淵敺魚者獺也為叢敺爵者鸇也為湯武敺民者桀與紂也却不如此疎闊而儒者欲兼而言之何也宋義用戰國遺智䇿是非比勝負之際未為近謬然不知項羽之剽悍豈區區䇿畫所能當不惟義見殺而義帝之事亦不成矣太史公言羽非有尺寸乗勢起隴畆之中三年將五諸侯滅秦分裂天下而封王侯政由羽出號為霸王近古所無不知古人之治未嘗崇長不義之人左氏載傁瞞三人皆為諸侯所誅蓋是時先王之餘政猶存負力桀悍者終不得自肆如項羽氣力不過長狄而不幸遭世大壊遂横行至此遷以畏異之意加嗟惜之辭史法散矣髙惠文景本紀述髙祖神怪相術太煩而妄豈以起閭巷為天子必當有異耶契稷仲衍皆上古事不可考闕之而已班彪遂謂體貌多竒異語尤陋矣書曰慎徽五典五典克從納于百揆百揆時叙詩曰惠于宗公神罔時怨神罔時恫若捨其徳而以異震愚俗則民之受患者衆矣惜乎遷筆之未精也沛公年餘四十奮臂兵間不至失人理故懐王諸老將謂更遣長者扶義而西義帝之事雖不成而漢得天下自此始然則范増徒能為沛公之膏盲故髙祖畏之至於佐羽為虐則固敗亡之道也數項羽十罪要是漢得算多不然則良平之籌不必畫矣滅楚後遂有失徳去羽無幾爾益賛于禹以惟徳動天伊尹言暨湯咸有一徳周人稱文王之徳至矣有是徳也則有是政也而太史公乃謂三代之政忠敬文若循環漢救以忠為得天統是遷於禹湯文武皆望其藩牆而不即者也為治既如彼而言治復若此世道所以有汙而無隆歟哀哉吕氏可謂亂矣而禍不及民天下稱平或者古人後世之治不同故猶與褒妲一間耶三代以後嗣子之美者申生太子晉扶蘇孝惠孝文彼皆夭閼不遂而孝文獨推其仁心見於事業徒得古人之一二而後世賴之使有孟軻之臣則所開大矣惜哉表遷既以意别為史而設諸表存古史法又頗自損益之古法之不絶者毫釐耳義理所在雖不以改作為間然其乖異不合則學者不可以無考遷稱孔子因史文次春秋紀元年正時日月蓋其詳哉按春秋諸侯之史二百餘年之間年時月日皆素具非孔子特詳之又稱序尚書則畧無年月或頗有然多闕不可録尚書載周事有書年者有書日月者有書明書魄書朏者然不繼他所不書則寥逺曠絶若不復省亦古文之已然孔子故闕之也夫春秋有年時月日之可繼此可以義斷者孔子因之可也尚書有年時月日而不可繼此不可以義斷者孔子亦因之何哉然則年月之有無非二書之大指也况帝繋世本去二書之義尤逺孔子將以垂道徳之統於後於是乎盡心而彼瑣瑣者烏用之遷欲以世表訖共和下接春秋失本意矣遷斷自共和著周統既失不待東遷以國語黜宣王事推之不為無意然謂二南小雅盡周衰所作既與師傳不合且周人以文教自文王時七月鴟鴞常棣大扺周召所筆也然則其盛也乃無詩必衰而後有詩且文武之君臣經營細微芟撥煩亂而致盛大乃無以勸戒諷道之且待其衰而後有嗟歎刺譏何哉又大雅不言周衰獨小雅言之原此數意皆非實也遷言孔子及左氏作春秋徒仿像無的騐余於二書論之詳矣又言鐸椒虞卿吕不韋皆戰國時孔子春秋遷豈不知國語孔子前自有春秋非始作於此特以董仲舒師授公羊其語方爛漫於世故不暇考詳也遷雖言欲一觀諸要難其實既因春秋左氏變舊史法又以二書無所置之故用紀年聚其要語前乎共和後乎楚漢接續章次畧成一體以存舊文然均之一事表既譜之紀復紀之世家列傳又申明之參互錯重十數見而猶未已甚矣遷之自勞而啓後世之煩且雜也収功實者常於西北漢人因前世之迹為此語漢後不復騐矣先儒所謂法後王猶後人言知典故及今事也後王可以言知而不可言法俗變相類議卑易行此論尤不可作丘甲用田賦初税畆及秦之變法亂政豈可謂後王已行者便為法乎明於道者有是非而無今古至學之則不然不深於古無以見後不監於後無以明前古今並䇿道可復興聖人之志也卓然謂王政可行者孟子也曉然見後世可為者荀卿也然言之易者行之難不可不審也舜禹之事且置仲虺言天生民有欲無主乃亂所以興商也武王言亶聰明作元后元后作民父母所以興周也諸侯萬國奉於有徳堯舜湯武得天下之難者形也四海無主民急無歸漢髙得天下之易者亦形也遷若有所諱挹褒美而不能明徴其義以警當時訓後世徒謂非大聖不能當天命將使已得者據盛滿而驕閭巷之姦妄疑非意而奪其害大矣遷於十二諸侯表言齊晉秦楚在成周微甚漢諸侯表又言太公於齊兼五侯地接齊比三國幷吞最少秦盡得宗周舊地晉始封亦不微後乃滋暴楚本無封國浸起蠻夷之雄耳武王初意不在封子弟余固論之大要有徳則興無徳則衰而亡初不以形勢强弱而周以宗室同姓多為諸侯雖卑不忍倍而强大者因相挾未敢取故猶寄號名數百年而周之實已亡矣世儒以此論封建郡縣得失蓋疎於事而漢置諸侯王於夾輔何取徒使其謀臣䇿士忘食而憂勢必盡絀削之而後已耳遷序次髙祖至建元以来王子侯者年表示當世得失之林正應史職蓋古法無可改後有欲作則從其時且古人亦以其時言之爾豈自意其為古乎今逺取載籍以来紛更之以就已法使古今皆失則文掩於前而道墜於後其病於學者非小故也據將相年表遷没後亡其書則今所謂大事記者後人依放諸表載之非遷筆也禮樂律書八書體既立後有國者禮樂政刑皆聚此書雖載事各從其時而論治不可不一禮樂律書皆已亡大意猶可見往往飄忽草畧使後有願治之主無所據依孔子曰行夏之時乗殷之輅服周之冕樂則韶舞放鄭聲逺佞人此教顔淵以為邦之目也遷於夏殷本紀言正夏時善殷輅固已得之至論禮樂則不能本孔氏空汎然華説而已自春秋以来儒者論禮樂何可勝數雖無謬於道而實知其意可以措之於治者絶少孔子曰安上治民莫善於禮移風易俗莫善於樂又曰道之以徳齊之以禮又曰其或繼周者雖百世可知也夫民不可以一日無其上而亦不能一日以安其上後世為上之不能安也搖手動足皆歸之於刑夫民相依以生而不相依以刑也刑之而後安非善治也故安上治民齊之以禮孔子以是為善治繼周之後雖逺而猶可知者此意是也不獨以其文也若夫淫鄙暴慢化導遷改和親安樂乆而成性則雖湯武功成之樂孔子猶以為有憾於其間而况於鄭聲乎此禮樂之實意致治之精説不可以他求也遷乃謂秦尊君抑臣朝廷濟濟方以太初之禮為常典而鄭衛之音所從来乆人情所感逺俗則懐何其雜於道而易於言乎以六律言兵既不可曉又言咎犯孫武身寵君尊而羞薄世儒猥云徳化其意凡近且是時儒者固無不當用兵之論豈謂孔子俎豆孟子仁義等語耶若指後世俗儒則又不足云也歴天官河渠書太初歴始復夏正太史公之力然漢武帝賛饗敬拜太一則固用方士語耳璇璣玉衡以齊七政為政以徳譬如北辰居其所而衆星拱之凡二十八星之常五星之變皆古羲和所司聖人所祗畏也至其他星文占騐家所存方術所眩晏子子産之所不道也封禪最無據舜二月東巡狩至于岱宗柴禮其所尊也望秩于山川無不徧也至于西南北猶是禮也烏有所謂封禪者乎周成王蓋未有言封禪者遷殆誣之管子封禪篇游士所謂其諫止齊桓固妄矣至秦始封禪而漢武因之皆用方士之説虚引黄帝而推於神仙變詐是以淫祀黷天也遷亦知其非不能論正反傅㑹之雖微見其意而所徇已多矣安能救乎河渠書稱禹道河自積石歴龍門南到華隂東下砥柱及孟津雒汭至于大邳於是禹以為河所從来者髙水湍悍難以行平地數為敗乃厮二渠以引其河北載之髙地過洚水至于大陸播為九河同為逆河入于渤海按禹貢道河積石至于龍門南至于華隂東至于厎柱又東至于孟津東過洛汭至于大伾北過洚水至于大陸又北播為九河同為逆河入于海無所謂厮二渠引其河北載之髙地者然則二渠之功非禹之所自以為績者他書不當特出而儳見也遷豈以是著後世有渠之始乎河者水之道也渠者水之利也治其道者禹之事也治其利者後世之事也後世雖百引渠終不足以救水敗遷以為塞瓠子道河北行二渠能復禹舊迹然而河復北決於館陶者蓋雖知引渠通溝以治水之利而未知去隄徹防以治水之道故也平凖書平凖書直叙漢事明載聚斂之罪比諸書最簡直然觀遷意終以為安寜變故質文不同山海輕重有國之利按書懋遷有無化居周譏而不征春秋通商惠工皆以國家之力扶持商賈流通貨幣故子産拒韓宣子一環不與今其詞尚存也漢髙祖始行困辱商人之䇿至武帝乃有算船告緡之令鹽鐵㩁酤之入極於平凖取天下百貨自居之夫四民交致其用而後治化興抑末厚本非正論也使其果出於厚本而抑末雖偏尚有義若後世但奪之以自利則何名為抑恐此意遷亦未知也世家子胥鞭楚平王尸左氏不載事之有無雖不足道而義理所闗最大後世至有謂父不受誅子復讎斬首鞭尸為得禮者子産奉觴韓厥獻飲於他國君知此舊君當如何隂謀修徳以傾商政徳非傾人之事豈隂謀所能為信如此則古之為徳乃後之所以為暴也遷併言之未可與論知徳矣客寢甚安殆非就國此後世鄙語而遷以施之周公師尚父之間是世無復有聖賢何取於論載也遷言曹沫以匕首刼齊桓公遂與沫三敗所亡地此事公羊先見按左氏魯莊公九年納糾敗于乾時幾獲十年有長勺之勝劌實主之齊猶未已與宋次乗丘公子偃敗宋師十三年北杏之㑹齊將稱霸其冬魯乃㑹盟于柯是三戰而再勝未嘗失地三年不交兵何用要刼二十三年曹劌復諫觀社詳其前後詞語豈操匕首於壇坫之間者耶意當時處士謂劌自郷人拔起有功業宗主之不以為徳而以為刺習俗之陋何獨後世可哀也已齊頃公欲尊王晉景公遷以數百年後事開迹數百年前此等語皆不暇審也犂彌知孔子相禮遂使莱人以兵刼魯侯是時已有慢儒侮賢之俗忌名非聖之事非莊僖間比亦以孔子驟起故也周公奔楚是時楚未有國公奚之焉詩書以為居東而異説以為南奔推此類則亦當時史法不備之故自遷固為史其髙者固不盡知而卑者差弗誤爾遷言金縢事既錯謬而繋以得郊祭文王有天子禮樂尤害義金縢所謂自以為功代武王一時事也舉周公所以造周者不足以用異禮而以金縢故與之是以天下之名器為徇己之私物將與逢丑父紀信一等矣成王既㓜周公攝政當國踐祚召公疑之作君奭不知遷所謂疑者何事必挾世俗之意既稱伊尹伊陟殷諸賢臣使召公之智不足以知之則周公一時之語安能遽説其心遷論聖賢之際大抵率易如兒戲耳周人崇尚報應遷所稱十一人唐虞之際有功徳臣舜後為陳田常建國皆舊語也然武王封先代蓋褒有徳臧文仲歎臯陶不祀謂徳義之後不應絶爾若陳氏簒盜亦曰舜所致則是不復論天徳但以利責報也至孔子始改此論曰巍巍乎舜禹之有天下也而不與焉夫以天下為不與則雖勢位銷歇而道徳自存義理常尊而利欲退聽矣此遷所未知也董狐書趙盾弑君以示於朝義甚深左氏載宣子自解之詞止曰不然蓋難言之史記遽言弑者趙穿我無罪恐如此下筆亦了古人事未得晉之宗家祁奚孫叔向子相惡於君六卿欲弱公室乃遂以法盡滅其族而分其邑為十縣各令其子為大夫晉益弱六卿皆大此雖以戰國意書春秋事得之矣按左氏載叔向與晏子語已著晉衰壊之跡自憂其不長但於此猶欲明魏舒之舉載仲尼之論不刻露事本然不如史記正言之也序楚世家可觀言其再自王及隨請尊楚周召數隨侯意既疎闊以管仲對詞考之周之號令殆不復通於江漢間乆矣弱弓微繳加歸鴈之上虎肉臊而兵利身人猶攻之二事皆戰國䇿所無其文無異意劉向所序比遷時已有遺落也遷載范蠡殊不足據越語固言其去矣而遷之雜説既言其相齊又去齊為陶朱公又子殺人於楚又行千金書遺莊生又莊生怒長子卒敗其事信如是則蠡偪側亂世以狡儈賈豎為業何異吕不韋之流何必稱賢也當遷去蠡時尚近而不能斷其是非使蠡䝉羞惜哉穆王見西王母樂之忘歸日馳千里馬攻徐偃王此方士語也血脈不亂夢之帝所鈞天九奏射中熊羆此醫師語也遷皆載之蕪妄甚矣按左氏晉趙嬰通于趙莊姬原屏放諸齊姬以為討武從姬氏畜於公宫韓厥言成季之勲宣孟之忠乃立武而反其田遷乃言屠岸賈欲誅趙氏乃治靈公之賊遂及程嬰杵臼何其悖戾也武靈王胡服經營天下困於吳娃卜子夏田子方段干木在魏文侯時風致不同孔子之學行於世者僅有此耳上追文武閎散之徒既不可繼下傳戰國至於後世遂無復有此事道之行士之遇合夫豈易哉齊宣王為稷下之學而孟子至自齊君視之無異瞽之於日月聾之於雷霆也而道卒賴以傳悲夫亦未可忽也陳完之占前代此類甚多孔子以為不足以訓故獨賛易以黜之凡左氏所載皆孔子所黜也當其時亦有知象數筮占為非道者但其智不能盡古今之變故閔黙終墮於卜師爾而遷乃謂孔子晩而喜易幽明逺矣非通人達材孰能注意反以陳完之占為孔氏所盡心者是遷未嘗知有孔氏之易所識如此蓋難語上也孔子世家所取甚雜然比之載五帝三代周召等事猶不至於駁異譬如以相求人雖非其真然禹行舜趨要無桀跖步履學者深考之亦足以成徳也蕭何雖不逮古人然漢非何不興也遷既不能品第其人而始但輕之為刀筆吏終遽與閎散爭烈伊尹傅説未嘗無賤微之誚此固何足論然又何閎散之易為乎漢髙之徳與力比非有尺寸而以何為磐桓故能建侯未知勞苦置衛繋獄者發於褊宕而然耶抑亦有流言之誤耶遷殊不能辨而後世因之使人廢卷歎息而已曹參言陛下垂拱參等守職遵而勿失此語持之甚難然則歌呼應和正為永日計非所謂盤樂怠傲以求禍者也小人所見不逺故以不能有所改作為疑雖然以惠帝之仁不幸而吕氏已執其柄不然則參之所守當更别論以籌䇿算天下於古無是規國慮敵則有之矣至從横人妄為揣摩而後世遂有取天下之術然皆無以逾張良方其在散亂中如洪流一板卒能合而為一異哉然良因事開説若不得已未嘗為成謀開闔在手信爾則上世聖賢之勤勞皆可廢斯尤異矣遷序良事無不足考四皓之来極其辨智古今未嘗有而後世儒者欲以空義斷其是非何可當也周勃傳亦言伊尹周公何以加與論蕭何同意遷之於聖賢徒存其貌耳河間王傳被服造次必於儒者山東諸儒多從之游甚得體恨太畧耳習學記言卷十九
