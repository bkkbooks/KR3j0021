body:
  text: 習學記言卷四十四宋葉適撰荀子𫝊說固已言學之要孔子講之尤詳道無內外學則內外交相明今在書論語者其指可以考索而獲也荀卿纍千數百餘言比物引類條端數十為辭甚苦然終不能使人知學是何物但雜舉泛稱從此則彼背外得則內失其言學數有終義則不可須臾離全是於陋儒專門上立見識又隆禮而貶詩書此最為入道之害後揚雄言學行之上言之次教人又其次亦是與專門者較淺深爾古人固無以行為上而教人為下者惟後世陋儒専門莫知所以學而徒守其師𫝊之妄以教人雄習見之以為能勝此而兼行者則上矣近世之學則又偏墮大甚謂獨自內出不由外入往往以為一念之功聖賢可招楫而致不知此身之稂莠未可遽以嘉禾自名也故余謂孔子以三語成聖人之功極至於無內外其所以學者皆內外交相明之事無生死壯老之分而不厭不倦於其中此孔子之本統與𫝊說同也止鬭一義莫曉故事按子路問君子尚勇孔子稱戒之在鬭中庸袵金革死而不厭北方之强司馬遷亦言子路陵暴孔子孔子設禮誘之古之師友豈固訓導於戈矛陵奪之間耶而荀卿之戒則尤為鄙暴不近人理至謂以少頃之怒喪終身之軀室家立殘親戚不免刑戮若立學聚教而其弟子粗猛至此則奚以學為雖古今材品强弱不同而荀卿亦有過論然致道必有象而果若是則仁義道德安從生有子以孝弟而好犯上作亂者鮮後世疑之觀此殆非誣爾然則陵世之學又有愈焉者矣荀卿屢言為治當以後王為法後王者周也意誠不差然周道在春秋時已自闕絶不繼自一魯外諸侯視之皆如辨髦孔子盡力補拾其大者十僅得七八而小者不存多矣況至荀卿王法滅盡之餘暴秦大并之日孔氏子孫畏逼不敢而獨倀倀然以無因難驗之說呌呼於其間有輕易之情無哀思之意徒以召侮而不能為益也自晨門荷蓧楚狂接輿之流猶以孔子為病而魯兩生梁鴻尚謂漢人不足為況昭襄始皇之際耶余嘗疑孟子盡力排楊墨楊墨豈能害道然非之不已者害所由生也此自孟子一病不可為法若夫荀卿所言諸子茍操無類之說自衣食於一時其是非尤不足計而乃倒攻羣辨若衢罵巷哭之為至於子思孟軻併遭詆斥其謬戾無識甚矣又好言子弓常與仲尼同稱安有與仲尼齊聖獨為荀卿所私而他害無見者既無立言行事可以考其是非使非荀卿之妄則或者子弓仲尼之别名不然姑假立名字以自況爾孟軻亦屢扳仲尼孔子乃無所比何哉仲尼之門羞稱五霸按孟子或問曽西吾子與管仲孰賢曾西艴然不悅然則豎子羞稱固當有之蓋幼志先登能自啓迪不墮駮地然雖成勞茂烈茍徒止於所能則晚進後生皆輕貶之矣此一義常存自應有益於新學孟子大人也天下臧否由已而定豈以其身與人稱量高下者哉故孔子雖謂管仲器小而終以九合之功歸之此亦深於學者所宜知也荀卿言周公大儒之故與中庸仲尼祖述堯舜一章略相似皆夸奢飛動之辭聖人自用力處極不然二者參觀子思言理閎大而分限不可名荀卿言事雖張皇而節目猶可見也周公孔子艱難一世以就德業而後世學者反以為甚易而無難若是則神靈之所為而非人也且又引以自神則近乎狂惑矣荀卿論治多舉已然之跡無自致之方可觀而不可即也惟言國具差若有意謂無便嬖左右足信者之謂暗無卿相輔佐足任者之謂獨所使於四鄰諸侯者非其人之謂孤也然穆王命太僕左右僕從侍御無以便嬖側媚其惟吉士是則嬖者不吉吉者不嬖也卿相輔佐所以同起治功臣雖專任其勞君不獨有其逸謂不能不有游觀安燕之時欲倚之為基杖則用人之道狹矣湯滅桀而自慚仲虺誥而解之德誠有餘安用其臣喻志於四方然則荀卿所言者戰國之事非帝王之治也讀荀卿與臨武君議兵及四世有勝非幸又入秦何見以為無儒又與秦昭王辨儒有益於人之國令人嘆息周衰諸侯皆恣已自便而秦以夷狄之治隳滅先王之典法吞噬其天下别治為區域孔子力不能救不過能不入秦而已子孫守其家法故曰秦為不義義所不入遂死於家荀卿談王道若白黑嗣孔氏如冢嫡不秦之讐而望之以王責之以儒嗚呼固哉秦惟不能自反也不用荀卿而用李斯者歟天行有常不為堯存不為桀亡所以言有常道者覆燾運行日月之所麗爾堯之時則治是為堯而存也桀之時則亂是為桀而亡也謂不為堯存不為桀亡非也又言應之以治則吉應之以亂則凶吉凶果在所應則是無常也謂天行有常非也强本而節用則天不能使之貧養備而動時則天不能病修道而不二則天不能禍夫古人既强本節用矣既養備動時矣既修道不二矣其不貧不病無禍則皆曰天也非我也今偃然而自居曰我也非天也夫奉天以立治者聖人之事也今皆曰我自致之非天能為是以己滅天也不為而成不求而得夫是之謂天職謂下民天情也天官也天君也夫物各賦形於天古人謂其獨降衷於民然必為而後成求而後得故謂聖賢敗而失之者下愚不肖也今既謂當清天君正天官養天情以全天功而又謂不求知天且雖聖人無不自修於受形之後而未有求知於未形之先者及其既行而能全天之所賦矣則惟聖人為求知天今謂聖人為不求知天非也又謂全其天功則天地官而萬物役且古聖人未嘗敢自大其身而曰吾能官使天地者也又曰大天而思之孰與物畜而制之從天而頌之孰與制天命而用之按孔子曰大哉堯之為君也惟天為大惟堯則之是堯未嘗物畜而制之也詩曰不識不知順帝之則是文王未嘗制天命而用之也詳考荀卿之說直以人不能自為而聽於天者不可也然則人能自為而不聽於天可乎武王曰惟天隂隲下民相協厥居堯舜𫝊之至於周矣然則謂人之所自為而天無預也可乎又曰道之所善中則可從畸則不可為匿則惑嗚呼惟其不知中也是以其言屢變而卒為畸且匿也又曰萬物為道一偏一物為萬物一偏愚者為一物一偏而自以為知道無知也愼子有見於後無見於先老子有見於詘無見於信墨子有見於齊無見於畸宋子有見於少無見於多嗚呼萬物之於道無偏也無中也一物之於萬物無偏也無中也自其中言之皆中也一物猶萬物也自其偏言之皆偏也萬物猶一物也荀卿以諸子為愚而偏而自謂為中也而其乖錯不合於道如此吾未見其能異於諸子也世俗之為說曰堯舜禮讓荀卿明其不然以為天子至尊無所與讓故有以堯繼堯以堯易堯之語又謂諸侯有老天子無老血氣精力有衰智慮取舍無衰持老養衰莫如天子按書序將遜于位讓于虞舜書記堯舜禪讓甚明而又自言在位七十載耄期倦于勤然則荀卿不信書而詆其為世俗之說耶且必不當禮讓何義以天子之位為持老養衰之地何據孟軻言民為貴社稷次之君為輕雖偏然猶有警也而荀卿謂天子如天帝如天神蓋秦始皇自稱曰朕命為制令為詔民曰黔首意與此同而荀卿不知哀哉故禮者養也芻豢稻粱五味調香所以飬口也椒蘭芬苾所以飬鼻也雕琢刻鏤黼黻文章所以養目也疏扆襚舁牀第几筵所以飬體也按孔子教顔淵非禮勿視非禮勿聽非禮勿言非禮勿動謂能自克以復禮夫自克則不費乎物而後禮行焉而荀卿謂制禮以為養使耳目口鼻百體之類必皆有待於禮則禮者欲而已矣且顔子簞食瓢飲陋巷不改其樂孔子亟稱之故獨許以復禮今為費以求多於禮筋骸通塞紛紛乎豢養於外物之不暇而安所復哉然則養者禮之文也非禮之實也荀卿議論之要有三曰解蔽正名性惡而已其言諸子莫不有蔽而不蔽之理莫如知道而治心故曰虛一而靜謂之大清明萬物莫形而不見莫見而不論莫論而失位坐於室而見四海處於今而論久逺疏觀萬物而知其情參稽治亂而通其度至於參日月滿八極謂之大人而無有蔽之者也雖然難矣蓋諸子之學何嘗不曰知道而治心使之虛靜而清明以形天下萬物之理而自謂不能蔽也荀卿以己之所明而號人以蔽人安得而受之舜言人心惟危道心惟微不止於治心箕子思曰睿不在心古之聖賢無獨指心者至孟子始有盡心知性心官賤耳目之說然則辨士素隱之流固多論心而孟荀為甚焉孔子曰學而時習之不亦說乎有朋自逺方來不亦樂乎人不知而不愠不亦君子乎夫學常進則得其養同於人則不偏於己重於己則不尤於人捨是吾未見其不蔽也後王之成名刑名從商爵名從周文名從禮散名之加於萬物則從諸夏之成俗曲期荀子之言如此其於名可以為精矣雖然古人正事而不正名名與天地並未有知其所由來者以書詩所稱則何必後王捨前而取後是名因人而廢興也孔子謂衛之政當先正名是時父子不正而人道失序則孔子所欲正者亦其事而已名不正故事亂名正則事從矣戰國羣談聚議妄為無類之言彼固自知其不可而姑為戲以玩一世其貴人公子亦以戲聽之然於事不為之損益也荀卿不知其不足辨而辨之終身不置是時去六國滅亡無幾焚經籍殺儒生事既壞而名亦喪荀卿無以救之則與十二子者同歸於盡爾哀哉孟子性善荀卿性惡皆切物理皆關世教未易輕重也夫知其為善則固損夫惡矣知其為惡則固進夫善矣然而知其為惡而後進夫善以至於聖人故能起僞以化性使之終於為善而不為惡則是聖人者其性亦未嘗善歟伊尹曰兹乃不義習與性成孔子曰性相近也習相逺也惟上智與下愚不移嗚呼古人固不以善惡論性也而所以至於聖人者必有道矣荀卿於陋儒專門立見識隆禮而貶詩書為入道之害又專辨析諸子無體道之宏心皆略具前章按後世言道統相承自孔氏門人至孟荀而止孔氏未嘗以辭明道內之所安則為仁外之所明則為學學則六經也門人之志於六經者少至於內外不得而異稱者於道其庶幾乎子思之流始以辭明道中庸未必專子思作其徒所共言也辭之所之道亦之焉非其辭也則道不可以明孟子不止於辭而辨勝矣荀卿本起稷下凡有所言皆欲挫下士之鋒破滑稽之的其指決割其言奮呼怒目裂眥極將經緯大道奈何俯首效之且未有求其小而能得其大者惜乎其未講矣揚子太𤣥連山歸藏雄時固應有完書然左氏已不道八索左氏所記孔安國亦言之則漢世猶存也安國又言孔子贊易道以黜八索則八索義當與孔氏絶異所謂十翼者獨彖象為孔子之文其他或先或後皆非也然皆自附於孔氏司馬遷固不能辨而劉向父子與雄尤篤信之及班固取七略以志藝文百世之後雖有豪傑特出之士心不能思智不能慮滌膠以漆妄為清明而孔氏之學榛棘蔽路矣嗟夫雄雖誤後世而自誤亦豈少哉古人有作無述孔氏有述無作彖象述也非作也雄不能知以為彖象者作而已故既首之復自贊之又自測之述作雜而紀法亂自誤一也言一而已有精者無粗也有深者無淺也十翼非一人之言也淺深精粗宜其不同雄既以為皆孔氏之書矣故或衝或錯或攡或測一書而異其言者十數自誤二也易之始口切齒先王大道至此散薄無復淳完或者反謂其才髙力強易於有行然則誅少正卯戮俳優無怪乎陋儒以是為孔子之極功也學者茍知辭辨之未足以盡道而能推見孔氏之學以上接聖賢之統散可復完薄可復淳矣不然循而下之無所終極斷港絶潢爭於波靡於道何有哉太𤣥雖名幽深然既稱枝葉扶疏獨說十餘萬言侯芭又受其辭則是雄所以作之意固嘗曉然號令於人使皆可識不為甚難明也至宋衷陸績范望乃皆創立注釋若昔未嘗聞知者如首名以節氣起止贊易以五行勝尅最為此書要㑹不知自雄及芭親相𫝊授已如此耶或舊語果零落而衷績等方以意自為參測也以位當卦以卦當日出於漢人若夫節侯晷刻推其五行所寄而吉凶禍福生之至𤣥而益詳蓋農工小人所教以避就趨舍者雄為孔氏之學其書有義而已義立而後數從之今之所謂數者非易之初也雄見其已成而謂為易者必先數而後義故研精殫智於歷而後𤣥始成不知數既立則義豈復有哉自誤三也十翼言大衍分而為二以象兩掛一以象三至可與酬酢佑神蓋贊筮占有此功用雖似卑淺然乃筮人所為不言易當自為也雄不悟遂為假太𤣥自著揲法近世司馬氏擬𤣥為虛專以五行起數而亦先以揲法示人其詞義乃類連珠比𤣥尤狹劣矣按易之始其義有陽而未有隂其物有天而未有地及其陽而隂之初虛取諸風中虛取諸火終虛取諸澤隂而陽之初實取諸雷雷有形中實取諸水終實取諸山畫起於一物莫先於天故象天天尊陽也二之則象地地卑隂也及自陽為隂自隂為陽始有虛實之辨取物以配義義立而物隱連山歸藏既不存不知其為義為物今易卦及彖象皆不以物而以義蓋其簡直易知如此十翼所謂帝出於震齊於巽相見於離天地定位山澤通氣雷風相薄其詞前後差重蔓衍皆說易者為之非易之書本然也况於五行四時二十四節癸甲而計之晷刻而察之又逺在十翼下數十等安得為義理所歸哉法言因雄論吾子少而好賦見自屈原堯舜三代之文始變數百年間惟章句經生不能工而通人俊士未有不由此者至雄方知以上更有事故謂孔氏之門用賦賈誼升堂相如入室如其不用何其語甚大乃雄回轉關捩處懷襄浩浩障止東趨所以於道有功也如董仲舒蕭望之夏侯勝非不専守經術然力微勢弱不過僅自立而已蘇氏謂離騷六經之變者雖與日月爭光可也又言賈誼見孔子升堂有餘不當以賦貶之雄正以屈原變六經而誼未免於用賦致大道分裂不合豈蘇氏猶未知雄意耶事辭稱則經按雄所見史襞積故實文組繪浮語使事辭偏重故法言太𤣥欲離此二過辭必稱事事必稱辭雖然淺矣自有文字以來聖人迭起唐虞夏商間觀其百年數世之逺才只垂數十簡若以為道則固有非言語所能載若以為事則何止勝辭而已至周乃稍詳於前不獨文武成康變故殷煩周召經營之勞未必倍於伊傅時近故耳孔子當壞亂之後惜其無所統紀又將隨事滅散是以由唐沿周極力收補雖魯人區區記録以其猶有係於當世大義亦復為之討論而左氏又遍採國史旁加翼贊然則孔子之業已成譬如權衡度量不可有二雖更有孔子其書亦不得為經也而况太𤣥法言乎多聞則守之以約多見則守之以卓寡聞則無約也寡見則無卓也按孟子稱博學而詳說之將以反說約又言曾子守約荀卿多言博學顔淵既竭吾才如有所立卓爾雄酌於顔孟故定約卓之論也義理隨世講習而為準的誠無後先然必質於孔子而後不失其正按孔子博學於文約之以禮亦可以弗畔矣夫顔淵自言博我以文約我以禮則所謂博而約者禮也子曰惜乎吾見其進也未見其止也又曰譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也古人自修不惰以山明之故曰為山九仞功虧一簣而顔子自言欲罷不能既竭吾才如有所立卓爾則所謂卓者進而不止也今於多聞多見中欲守以約卓而不知約為何實卓為何形意擇而堅執則前言滿胸而固吝不除往事溢目而驕肆逾長是誤共所由之途而趨於愚暗爾子曰賜汝以豫為多學而識之者與子貢曰然非與曰非也豫一以貫之一以為學古聖人未之及也而獨見於孔子曾子徒唯而子貢疑之孟子自以為無所不悟然漸失孔子之意故博學雖實而反約為虛至雄析見為卓而失之愈甚矣夫茍得其一無精粗無本末終身由之安有約卓之異不然則見聞無據而立說以為主未見其能至道也或問道曰道也者通也無不通也或曰可以適他歟曰適堯舜文王者為正道非堯舜文王者為他道君子正而不他或問道曰道若塗若川車航混混不捨晝夜或曰焉得直道而由諸曰塗雖曲而通諸夏則由諸川雖曲而通諸海則由諸或曰事雖曲而通諸聖則由諸乎古之言道也以道為止後之言道也以道為始以道為止者周公孔子也以道為始者子思孟軻也至雄則又失其所以始而以無不通為道夫行者以不得乎道也故陷於迷學者以不得乎道也故趨於謬是則道者限也非有不通而非無不通也道一而已無正也無他也自行而言車航混混不捨晝夜雖不得其道猶至也自學而言車航混混不捨晝夜茍不得其道皆迷也奈何併諸子百家之紛紛舉以為道而姑教其惟堯舜文王之適彼不知其所以適雖堯舜文王而不知道猶是也徐行後長者曹交烏得而為性善稱堯舜滕世子何取於信以其始之易於言也是以誤後世之無所始也至韓愈則又曰道有君子有小人德有凶有吉豈惟無所始幾於攘臂而詬矣已則然而曰吾闢異說以明夫道也可乎蓋周公孔子之道而學者喜為異以離之其初在毫忽而其流有越南燕北之逺矣或曰經可損益歟曰易始八卦而文王六十四其益可知也按伏羲氏始畫八卦造書契以代結繩之政孔氏安國言之則漢儒相傳固如此不知何所授也豈周官晚出雄猶未通習或雖通習猶未信據而然耶雄因此遂以經為可益故作太𤣥法言矣盛哉成湯丕承也文王淵懿也或問丕承曰由小致大不亦丕乎革夏以天不亦承乎淵懿曰重易六爻不亦淵乎浸以光大不亦懿乎此語全勿交涉與湯執中立賢無方文王視民如傷望道而未之見相去遠矣雄謂遐言周于天地贊於神明幽𢎞擴廣絶乎邇言故曰吾寡見人好遐者也邇文之視邇言之聽遐則福焉意皆為太𤣥發也孟子曰言近而指遠者善言也守約而施博者善道也君子之言也不下帶而道存焉觀孟子此言雄不待辨而知其非矣然以言為學孔子沒後事在時固無之仲尼以來國君將相卿士名臣仲尼之後迄於漢道德行顔閔股肱蕭曹爰及名將兩篇皆詳看統紀之學論述今古孔氏之後春秋絶書修其業者司馬遷劉向揚雄班固而已董仲舒局狹孔安國拘淺鄭𤣥浮肆李膺郭泰之流言議殆不存無以考見也若鄭子真莊君平李仲元則固賴雄而傳矣蘇氏稱子胥種蠡皆人傑而揚雄曲士也余嘗論孔子言後進於禮樂君子也而子胥種蠡皆無禮樂而得為君子此蘇氏所謂人傑歟蓋自春秋而管仲始賢孔子稍抑損之晚至戰國則子胥種蠡既顯於世獨董仲舒言越無一人而雄亦莫之與也若文字由屈宋變流荆軻聶政人以為壯烈者雄皆論正於大義有補矣論聖人固多變子游子夏得其書未得其所以書宰我子貢得其言未得其所以言顔淵閔子騫得其行未得其所以行其於言孔子固甚淺欲大而反小之然猶未失際畔也至謂聖人自恣者歟何其言之多端也曰子未覩禹之行水歟一東一北行之無礙也君子之行獨無礙乎如何直往也水避礙則通於海君子避礙則通于理按孔子之言皆在未有多端而避礙者不知雄何所指也夫初使難知己而易識先設疑論後乃誠言始為限礙終也通達此文人辨士玩弄筆舌之病也春秋以前諸書猶不若是有問則答有藴則陳而已至戰國秦漢然後爭為放恣如雄所云而雄雖振拔於常流卒違眩於故習且人有礙而我通之未嘗自礙而又自通也孔子之論語是也雄之太𤣥自礙而又自通者也理有海而學至之未嘗自為海而又自為水也孔子之贊易是也雄之太𤣥自為海而又自為水者也雄稱周公以來未有漢公之懿也勤勞則過於阿衡漢興二百一十載而中天其庶矣乎辟雍以本之學校以教之禮樂以容之輿服以表之復其井刑免人役唐矣夫詳此法言之成在莽未篡以前篡後為劇秦美新亦言和鸞肆夏黼黻袞冕欽修百祀明堂雍臺復五爵度三壤經井田免人役方甫刑匡馬法與法言不異則雄雖巽而不諂明矣又按司馬相如而下歌頌之文遂為故實文士無能免者故雖易世而班固謂相如封禪靡而不典揚雄美新典而無實皆游揚後世垂為舊式則是當時議論相承未有以為不當作者夫孔父仇牧死晏嬰不死龔勝死揚雄不死古人各賢其賢不以相厲也而千載之後方追數雄罪為漢舉法惜哉習學記言卷四十四
