body:
  text: 習學記言卷四十七宋葉適撰吕氏文鑑吕祖謙字伯恭公著五世孫中進士第又中慱學宏詞與張栻朱熹同時學者宗之仕至著作郎卒年四十五初孝宗命知臨安府趙磻老詮校本朝文海磻老辭不能遂以命祖謙因盡取渡江前衆作備加蒐擇成百五十卷蓋自古類書未有善於此按上世以道為治而文出於其中戰國至秦道統放滅自無可論後世可論惟漢唐然既不知以道為治當時見於文者徃徃訛雜乖戾各恣私情極其所到便為雄長類次者復不能歸一以為文正當爾華忘實巧傷正蕩流不反於義理愈害而治道愈逺矣此書刋落浩穰者百存一二茍其義無所考雖甚文不録或於事有所該雖稍質不廢鉅家鴻筆以浮淺受黜稀名短句以幽逺見収合而論之大抵欲約一代治體歸之於道而不以區區虚文為主余以舊所聞於吕氏又推言之學者可以覽焉然則謂荘周相如為文章宗者司馬遷韓愈之過也禮部尚書周必大承詔為序稱建隆雍熈之間其文偉咸平景徳之際其文慱天聖明道之辭古熈寧元祐之辭達按吕氏所次二千餘篇天聖明道以前在者不能十一其工拙可驗矣文字之興萌芽於栁開穆修而歐陽修最有力曽鞏王安石蘇洵父子繼之始大振故蘇氏謂雖天聖景祐斯文終有愧於古此論世所共知不可改安得均年析號各擅其美乎及王氏用事以周孔自比掩絶前作程氏兄弟發明道學從者十八九文字遂復淪壊則所謂熈寧元祐其辭達亦豈的論哉且人主之職以道出治形而為文堯舜禹湯是也若所好者文由文合道則必深明統紀洞見本末使淺知狹好者無所行於其間然後能有助於治乃侍從之臣相與論思之力也而此序無一詞不諂尚何望其開廣徳意哉葢此書以序而晦不以序而顯學者宜審觀也賦雖詩人以来有之而司馬相如始為廣體撼動一世司馬遷至為備録其文駭所無也揚雄喜而效焉晚則悔之矣然自班固以後不惟文浸不及而義味亦俱盡然後世猶繼作不已其虚夸妄說蓋可鄙厭故韓愈歐王蘇氏皆絶不為今所謂皇畿汴都感山南都之類非於其文有所取直以一代之制一方之事不可不知而已皇畿以事實勝而汴都惟盛稱熈豊興作遂特被賞識昔梁孝王漢武宣毎有所為輒令臣下述賦戲弄文墨直俳優之雄而厯代文士相與沿襲不恥是可歎也自與虜通和太行皆為禁山坐失地利故此賦感之然謂以元祐之版書較景徳之圖籙雖増田三十四萬餘頃反減賦七十一萬餘斛以為不用先王之法致然則非也夫墾闢衆則利在下蠲放多則恩在上何害為王政而必欲如宇文融乎蓋近世之論無不然矣五鳯樓賦是時大梁宫室始與西京比而梁周翰厯陳前代亡國之君滛於土木者為戒何止諷也蓋顯刺必出於明時無若丹朱傲信其為舜禹之盛矣世多言太祖嘗議都洛陽以省冗兵恨後世不能用本據王禹偁遺事其載李符李懐忠之諫或當有之至謂太祖答晉王欲循周漢故事以安天下又謂不及百年民力必殚則其家子孫以當時所見聞増益之非本語也冗兵自在真宗仁宗世太祖時兵何嘗冗而頓憂其後乎自唐裂藩鎮養兵民力固已殚而士大夫不能知就有能知者亦不能改安得謂本朝百年後民力始殚為太祖語且五代時鹽酒末利皆輒殺人民命尚不可保何止殚民力乎秦漢及唐雖都關中何嘗不以兵强天下隋唐府衛民半為兵而人主嵗猶就食東都何止冗兵為費哉厯代帝王不常厥居汴無不可都之理葢自得太原即乘勢伐幽州筭畫無素一時倉猝幾不自保國勢由此而弱契丹侵陵河北破壊始堅守和好而兵因以日増乃謀國者之謬非謂必恃兵以為固也使太祖臨御乆其所以處此要自有道遺事所記失其實矣籍田大蒐大酺不常有賦頌所以記也明堂未之有所以兆也凡此類以事觀可也張詠聲賦詞近指逺宏達朗暢異乎鳴蝉秋聲之為葢古今竒作文人不能進也晏殊中園葉清臣松江秋汎自謂得窮達奢儉之中今亦以此録之然上無補衮拯溺之公義下無隠居放言之逸想則所謂中者特居處飲食之泰而已不足道也秋蓬度石室鑿二江賦發明文翁李氷有功於蜀其言民未得所欲事或有不利先世所未暇除去聖人所未及裁制皆吾人之所事有感於斯言也聞之吕氏讀王深父文字使人長一格事君責難愛人抱關諸賦可以熟玩自王安石王回始有幽逺遺俗之思異於他文人而回不志於利能充其言殆非安石所能及然若少假不死及安石之用未知與曾鞏常秩何如士之出處固難言也周氏拙賦為今世講學之要按書稱作偽心勞日拙古人不貴拙也大巧若拙巧者勞而智者憂無能者無所求老荘之學然爾葢削世俗纎浮靡薄之巧而歸之於正則不以拙言也以拙易巧而不能運道則拙有時而偽矣學者所當思也初歐陽氏以文起從之者雖衆而尹洙李覯王今諸人各自名家其後王氏尤衆而文學大壊矣獨黄庭堅秦觀張耒晁補之始終蘇氏陳師道出於曽而客於蘇蘇氏極力援此數人者以為可及古人世或未能盡信然聚群作而驗之自歐曽王蘇外非無文人而其卓然可以名家者不過此數人而已邢居實蚤夭沈括劉跂之流終不近也黄庭堅言屈宋之後自鑄偉辭此語當考天下為一家賦吕大鈞作大鈞兄弟從張氏學而大防為相程氏與司馬氏善當時在要地者多程氏之門故元祐之政亦有自来此賦與西銘相出入然其言昔既有離則今必有合彼既可廢則我亦可舉謂井田封建當復也若存古道自可如此論若實欲為治當更審詳漢以經義造士唐以詞賦取人方其假物喻理聲諧字恊巧者趨之經義之樸閣筆而不能措王安石深惡之以為市井小人皆可以得之也然及其廢賦而用經流弊至今㫁題折字破碎大道反甚於賦故今日之經義即昔日之賦而今日之賦皆遲鈍拙澁不能為經義者然後為之葢不以徳而以言無往而能獲也諸律賦皆場屋之伎於理道材品非有所關惟王曽范仲淹有以自見故當時相𫝊有得我之小者散而為草木得我之大者聚而為山川如云區别妍媸願為軒鑑儻使削平禍亂請就干将之句而歐蘇二賦非舉場所作葢欲知昔時格律寛假人各以意為之不拘礙也有物混成先天地生老氏之言道如此按自古聖人中天地而立因天地而教道可言未有於天地之先而言道者有司不考詳以邪說取士士亦以邪說應之既以此得遂以為是豈惟不以徳而以言又併其言失之矣按吕氏有家塾讀詩記麗澤集詩行於世本朝詩與今篇目不同無幾乃其素所詮次云爾孟子言王者之迹熄而詩亡詩亡然後春秋作春秋作不作不繫詩存亡此論非是然孔子時人已不能作詩其後别為逐臣憂憤之詞其體變壊葢王道行而後王迹著王政廢而後王迹熄詩之廢興非小故也自是詩絶不繼數百年漢中世文字興人稍為歌詩既失舊制始以意為五七言與古詩指趣音節異而出於人心者實同然後世儒者以古詩為王道之盛而漢魏以来乃文人浮靡之作也棄而不論諱而不講至或禁使勿習上既不能涵濡道徳發舒心術之所存與古詩庻幾下復不能抑揚文義鋪寫物象之所有為近詩繩準塊然樸拙而謂聖賢之教如是而止此學者之大患也吕氏自古樂府至本朝詩人存其性情之正哀樂之中者上接古詩差不甚異可與學者共由而從之尚少故略為明其大槩如此後世詩文選集詩通為一家陶潜杜甫李白韋應物韓愈歐陽脩王安石蘇軾各自為家唐詩通為一家黄庭堅及江西詩通為一家人或自謂知古詩而不能知後世詩或自謂知後世詩而不能知古詩及其皆知而辭之所至皆不類則皆非也韓愈稱臯䕫伊周孔子之鳴其卒歸之於詩詩之道固大矣雖以聖賢當之未為失然遂謂魏晉以来無善鳴者其聲清以浮其節數以急其辭滛以哀其志弛以肆其為言亂雜而無章則尊古而陋今太過而又以孟郊張籍當之則尤非也如郊寒苦孤時自鳴其私刻深刺骨何足以繼古人之統又况於無本者乎愈欲以絶識髙一世而不自知其無識至此重可歎爾張衡四愁雖在蘇李後得古人意則過之建安至晉髙逺宋齊麗宻梁陳稍放靡大抵辭意終未盡唐變為近體雖白居易元稹以多為能觀其論叙亦未失詩意而韓愈盡廢之至有亂雜蟬噪之譏此語未經昔人評量或以為是而呌呼怒罵之態濫溢不可禦所以後世詩去古益逺雖如愈所謂亂雜蝉噪者尚不能到况欲求風雅之萬一乎孟郊謂詩骨聳東野詩濤洶退之而愈亦自謂還當三千秋更起鳴相詶嗚呼以豪氣言詩慿陵古今與孔子之論何異指哉四言自韋孟司馬遷相如班固束晢陶潜韓愈栁宗元尹洙梅堯臣歐陽脩王安石蘇軾工拙畧可見余嘗怪五言而上徃徃世人極其材之所至而四言雖文詞巨伯輒不能工何也按古詩作者無不以一物立義物之所在道則在焉物有止道無止也非知道者不能該物非知物者不能至道道雖廣大理備事足而終歸之於物不使散流此聖賢經世之業非習為文詞者所能知也詩既亡孔子與弟子講習其義能明之而已不敢言作雖如㳺夏子思孟子之流皆不敢言作詩也後世操筆研思存其體可也而韓愈便自謂古人復生未肯多讓或者不知量乎李至桃花犬歌史官書事無大於此犬者乎葢譏之也月石硯屏余頃見之長溪陳氏云其舊物莫知是非然何足道喜其似而强名之又為之窮搜異說以為慱君子之學所宜慎也王禹偁髙錫詩言文自咸通後流蕩不復雅因仍厯五代秉筆多艶冶髙公在紫微濫觴誘學者自此遂彬彬不蕩亦不雅此文章小氣數只論用世者栁開穆脩至歐陽氏以不用世之文欲捩回機括雖不能獨勝然後世學者要為有用力處夫可以自勉而安於自棄時文誤之爾韓氏晝錦堂自為詩而歐陽氏為記未知與蘇季子朱買臣所較幾何而謂伊周事業可幾而及崧髙韓奕備叙文物之美使誠得其道孔子不以為過不然則沐猴而冠顧影惕息韓生之譏終在未可以言邦家之光也歐陽氏讀書正經首唐虞偽說起秦漢篇章與句讀解詁及箋𫝊是非自相攻去取在勇斷初如兩軍交乘勝方酣戰當其旗鼔催不覺人馬汗至哉天下樂終日在几案以經為正而不汨於章讀箋詀此歐陽氏讀書法也然其間節目甚多葢未易言以其學考之雖能信經而失事理之實者不少矣且箋傳雜亂無所不有必待戰勝而後得則迫切而無味强勉而非真几案之間徒見其勞而未見其樂也几案之樂當黙識先覺迎刃自解如日月朗耀雲隂解駁安在鬭是非决勝負哉東州逸黨言西晉阮籍王衍等事余固辨之司馬懿父子殺夏侯𤣥嵇康遂簒曹氏天地隂陽為之顛倒者數百年使孔子在何止臨河而返太初憤逸黨可也柰何以罪籍衍乎劉敞言多古意與王安石同安石為世所信而敞不能者敞據科目為官職故也蘇軾少年時便謂其奮臂取兩制不十餘年非有汗馬之勞米鹽之能大意畧可見堯舜文王不作士無必遇者固多得於奔走困窮之餘爾日出堂上飲欲主人髙礎為去蟻之地其自任重矣然不知蚍蜉由己而生蚍蜉猶惡其漸而又尋斧焉余嘗疑其文字言語之工未當在小人之列吕氏云既為小人之事只是小人今人徃徃未知此王令邢居實皆少而雄邁有古人筋骨畧不相上下然令逆為憤嫉不能容人居實過自摧殘不能自容夀夭雖有命其徳之所近或有以取之也令採選詩韓愈遭駁議最甚愈年長矣後生何可畏之甚也然令謂安知九列榮顧是徳所累按孔子稱以吾從大夫之後不可以徒行又謂喜将閭巷好特與妻子議子疾病子路使門人為臣曾子曰季孫之賜也我未之能易古人亦未至輕鄙富貴顧其義何如爾令一至之見固未能盡道謂之有志可矣蘇氏半字韻詩酬和最工為一時所慕次韻自此盛於天下失詩本意最多夫以六義為詩猶不足言詩况以韻為詩乎言今年一線在那復堪把玩欲起强持酒故交雲雨散無乃與川上之逝異觀比於愽塞為歡娱粗勝耳東坡七首哀而不傷放而無怨髙於古今數等秦黄諸人欲至而不能葢其天之所資至是而後信爾五七言律詩按詩自曹劉至二謝日趨於工然猶未以聯屬校巧拙靈運自誇池塘生春草而無偶句亦不計也及沈約謝朓競為浮聲竊響自言靈均所未覩其後浸有聲病之拘前髙後下左律右吕匀緻麗宻哀思宛轉極於唐人而古詩廢矣杜甫强作近體以功力氣勢掩奪衆作然當時為律詩者不服甚或絶口不道至本朝初年律詩大壊王安石黄庭堅欲兼用二體擅其所長然終不能庻幾唐人蘇氏但謂七言之偉麗者則失之尤甚葢不考源流所自來姑因其已成者貌似求之耳王安石七言絶句人皆以為特工此亦後人貎似之論爾七言絶句凡唐人所謂工者今人皆不能到惟杜甫功力氣勢之所掩奪則不復在其䋲墨中若王氏則徒有纎弱而已而今人絶句無不祖述王氏則安能窺唐人之藩牆况甫之所掩奪者尚安得至乎初分大道非常道纔有先天未後天大道常道孔安國語先天後天易師𫝊之辭也三墳今不𫝊且不經孔氏莫知其為何道而師𫝊先後天乃義理之見於形容者非有其實然山人隠士輙以意附益别為先天之學且天不以言命人所謂卦畫爻象皆古聖智所自為寓之於物以濟世用未知其於天道孰先孰後而先後二字亦何繫損益山人隠士以此玩世自足則可矣而儒者信之遂有㕘用先後天之論夫天地之道常與人接顧恐人之所以法象者不能相為流通至其差忒乖戾則無以輔其不及而天人交失矣柰何捨實事而希影象棄有用而為無益此與孟子所謂毁瓦畫墁何異蓋學者之大患也邵雍詩以玩物為道非是孔氏之門惟曽晳直云浴乎沂風乎舞雩詠而歸孔子與之若言偃觀蜡樊遲從㳺仲由揖觀射者皆因物以講徳指意不在物也此亦山人隠士所以自樂而儒者信之故有雲淡風輕傍花隨栁之趣其與穿花蛺蝶㸃水蜻蜓何以較重輕而謂道在此不在彼乎吕大臨送劉户曹獨立孔門無一事惟𫝊顔氏得心齋按顔氏立孔門其𫝊具在博我以文約我以禮欲罷不能既竭吾才雖非杜預之癖相如之俳然非無事也心齋荘列之寓言也其言若一志無聽以耳而聽以心無聽以心而聽以氣葢寓言之無理者非所以言顔子也今初學者誦之深入肺腑不可抽吐為害最甚鮮于侁九誦亦為當時所稱清廟祀文王葢無以言其徳而侁祠堯舜周孔語絶鄙近不知何故通商茶法詔按是時富弼韓琦為相貢舉條制勅按是時范仲淹為參政本朝治道極盛之日也余嘗考自慶厯嘉祐以來士之有志於當世者不少顯用於時者亦衆然不知天下事經隋唐茍且變壊古人治法遂不可復如財賦則天寶之後以稅養兵如取士則開皇貞觀已為科舉以韓富極力僅能使茶法通商以范深思僅能先試䇿論而歐陽氏又謂欲復訓誥於三代之文者不過如此是可悲已古人治法從上相承當其将變而知其不可變者叔向與孔子而已旣變而以為當復者孟子而已蕭曹邴魏偶當治法未甚變壊之時故其行事猶粗有可觀使其已壊則一等是収拾不來韓范富亦不足深責也歐陽氏言古者山澤之利與民共之此謂鹽鐡金錫之類可也若茶則民所自種官直禁而奪之爾何共之有至韓刺義男為兵則不惟不知所以復而増益其變壊又甚矣賜陜西招討經畧都部署司寛放公用庫錢事吕氏言國初宰相權重臺諫侍從莫敢議朝士不平屢有攻擊如盧多遜雷徳驤翟馬周趙昌言王禹偁宋湜胡旦李昌齡范諷孔道輔更勝迭負然終不能損廟堂之勢至范仲淹空一時所謂賢者而争之天下議論相因而起朝廷不能主令而勢始輕矣雖賢否邪正不同要為以下攻上為名節地可也而未知為國家計也然范韓既以此取勝及其自得用臺諌侍從方襲其迹朝廷毎立一事則是非鋒起譁然不安如滕宗諒張亢因用公使錢過當至為置獄劾治范始覺其非以去就争之雖幸而獄不竟而小人窺伺間隙外則尹洙貨部将内則蘇舜欽賣故紙方紛紛交作諸人之身幾不能自保且元昊反敗軍殺将殚困天下曾不知所以為謀乃以公使錢數十百萬持英豪長短而陷之死地耶鄭子孔為載書大夫諸司門子弗順将殺之子産止之又請為之焚書子孔曰為書以定國衆怒而焚之是衆為政也國不亦難乎子産以為衆怒難犯専欲難成迄焚而後定然及子産自為相却不如此直云禮義不愆何恤於人言而已葢韓范之所以攻人者卒其所以受攻而無以處此是以雖有志而無成也至於歐陽先為諫官後為侍從尤好立論士之有言者皆依以為重遂以成俗及濮園議起未知是非所在而傾國之人反回戈向之平日盛舉一朝隳損善人君子無不化為仇敵至今不定然則歐陽氏之所以攻人者亦其所以受攻而不自知也孔子曰天下有道則政不在大夫天下有道則庶人不議夫不以道而以言其末流宜若是矣歐陽脩尊皇太后冊文昔者明王之以孝治天下者非家至而日見之矣推所以行於已者為天下率盡所以奉其親者為天下先而四海靡然其承風矣此人臣規諷人主之辭非人子所以施於其親也又言深鑒漢家母后之失訖不踐於外朝此人臣推美母后之辭亦非人子所以施於其親也又言歸政冲人合於易之進退不失其正之聖且英宗本以荒迷得疾不能聽斷故暫請后非后自欲之此尤非人子所當言也曹后還政世多異說然以神宗奉承之謹終始待遇曹氏不少衰則知宫閫固無間言而外人妄𫝊耳習學記言卷四十七
