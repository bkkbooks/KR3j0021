body:
  text: 習學記言卷二十四宋葉適撰後漢書帝紀光武匹夫徒手得天下其難有甚於髙祖然西漢初天下謀臣畫䇿起而並馳者甚衆久猶不已東漢乃無之雖有鄧禹參計謀亦不過常議論士大夫皆奉繩墨從事以力用取之求如良平不可得夫興王同而人材異何也王莽雖篡奪而政已亂天下固期漢以復興向若劉伯升遂立誅盜反正還手即定矣偶為更始凡庸所敗而能親致太平前史稱其身濟大業兢兢如不及髙祖在章邯項羽時椎鈍奔北及得志後矜其功伐屢以盛氣加物反者四起終身不定求其與民息肩固無時矣論者或謂髙祖英豪大略非光武所能及是事吾未知其孰賢若以民為貴則光武之得多也東漢至孝和八十年間上無敗政天下乂安鄧后臨朝災變備矣后約己為民撫以至誠復用寧息世多譏其留權擅事不肯明辟禍釁逮宗然迄於永康上接興元四十年紀綱扶持未甚濁亂后之力也不然以孝安昏穢之資早親政事極其所欲則漢之亡不待桓靈而見矣以三代盛德桀紂幽厲承之猶即壞滅况後世乎然則桓靈之亡晚矣名冠天下當受天下重賞天下重器常恐不任日復一日安敢逺期十嵗方今上無天子下無方伯若涉淵水而無舟楫夫萬乘至重而壯者慮輕𦙍子無成康之質羣臣無吕旦之謀尊事三老兄事五更朕親袒割執爵而酳但患不能脫粟瓢飲耳襄城令劉方吏人同聲謂之不煩雖未有他異斯亦殆近之矣車可以引避引避之騑馬可以輟解輟解之此東漢詔令語言近古可稱者也魏晉以後無此體矣志知之者欲教而無從心達者體知而無師張光論律準蓋數術家語也豈惟數術而道何不然心悟獨見與庸衆異耳且既得者無𫝊未得者無教古人所以歎絶學之難繼微言之難識也然而精不極不為思物不驗不為理三代以前用力於是道者多矣觀周孔所以教不可言無𫝊顔曽所以學不可言無師秦漢雖殘滅士猶欲思而不得欲求而不至也其後益下怠而不思棄而不求其道廢絶故有此論自是以後偶然得者誇而無𫝊泛然迷者傲而無師則此論乃為障道之面牆而心悟獨見者至理之蟊賊也學者可以懼矣厯家之說具於堯典詳於左氏至司馬遷劉歆始有厯書而法術備焉東海又改用四分自此議論蜂起前後相非各出己意執天愈急其時惟蔡雍最為通達以為三光之行遲速進退不必若一術家以算追而求之取合於當時而已故有古今之術今之不能上通於古亦猶古之不能下通于今也其後杜預亦言當順天以求合非為合以驗天此一言者皆古人所未發後世所當遵也若孟子謂茍求其故千嵗之日至可坐而致則不過指其大歸而已雖然不當用昔之疏議今之密則雍之論誠中為術之膏肓若夫不求詳於未差之前而為合於已差之後則預猶未免以己意言厯者也漢上陵儀胡廣所言蔡雍所記以為可以寓人子悲哀之心其意固未失也然古人之於禮貴魂而賤魄捨降而求升將以其氣為無所不在則悲哀無所不至也若孝明戀戀焉致誠極孝不過枯骨之間則哀之所及者狹矣君臣所見既皆若此故後無不厚墓而薄廟以形為實以神為誣此委巷野人之事奚取於禮哉孝明行養老禮意既篤實文亦丁寧可謂三代之後曠千載而一遇也東漢相承有巡狩之禮自人主而言固無獨坐深宫不觀省風俗之禮然自後世行之則以為厲民觀章帝詔書蓋庶幾焉孟子載晏子語曰吾王不豫吾何以助吾王不游吾何以休豈古人之舉遂不可復見耶按堯典嵗二月東巡狩至于岱宗柴望秩于山川遍于羣神西南北皆然必若以柴為升中告天封禪之盛禮則西南北皆然不得獨于泰山也至成周巡狩之詩雖曰陟其髙山而序但言祀四嶽河海不主於告天則是登與不登皆未可知也後世獨始皇漢武封禪而其說出于管子蓋戰國諸子游士之言又雜以方士之狂誕雖司馬遷博通不能明也至後漢又以讖文封禪益無據矣漢晉春秋載鍾離意治孔子廟室有古文䇿書言亂吾書董仲舒事既怪學者所不道而别傳又言修吾書董仲舒語參錯不能明也然自漢以來仲舒首為推明孔氏後世咸從之宜若修其業者然而以春秋為宗以公羊為師以刻薄為義以操切為法顛錯倫紀迷惑統緒學者莫之或正是則亂孔氏之書亦不無也嗟夫尊聖人而不足以知其道若之何可哉應邵言郡國罷材官騎士馴致張角之變或又謂誅中官引董卓以亡漢過在銷兵按光武自以精鋭多而郡國兵怯懦坐廢糧廩故還之民未為失䇿大亂以來父子不相保休其疲弊未為失義承平之後因而不復後世之失也若謂以此致亡則不然材官騎士自秦而有散為羣盜何救於亡王莽講肄尤密天下亦盡化為賊漢以再興董卓雖桀逆而四方牧守未嘗無兵興亡在道得失不在材官騎士也龔遂教民棄弓弩而持鈎鉏故能治郡要之漢晉南北兵農不分施置之間小小同異未足害大體唐以來則不然矣𫝊光武兄弟跨牛舉事初馘阜賜再梟尋邑所謂海內豪傑殺其牧守自稱將軍用漢年號以待詔命旬月之間遍于天下者席兩勝之威也蓋大事已就矣昔髙祖雖乘虛入關赴懷王之約然虜王離燒涉間降章邯收天下權者乃在項羽固非光武比也不幸落羣盜手更始立伯升死俯首受役事柄索然豈如髙祖尚得蜀漢以為資乎其難一也仗空節而旅燕趙王郎倡號顛沛垂死僅依二部茍活旦暮猶張弮轉鬬卒滅邯鄲然而謝躬苗爭隂伺逆拒劇寇名賊交刃軍門一壘之外無復安地若髙祖劫五諸侯兵收項羽美人珍寶置酒髙㑹以致敗北則為自取矣其難二也昔髙祖已殺項籍天下為一從容固請然後即位而更始被禽四方蜂起光武君臣危事機之去倉猝野次遽正尊名既數月後方收朱鮪立都邑漂搖客寄未知所止故當時謂洛陽地如掌耳其難三也稱帝之後劉永張步董憲李憲方各割據立名字初藉幽燕以為根本而彭寵反叛朱浮敗走輿地所披十無一二五六年間草鉏櫛理寸攘尺取然後漁陽復平董憲李憲張步劉紆皆獲而齊梁山東江淮甫定矣其餘盜賊不根土地身所誅降赤眉銅馬以下蓋數百萬人徒見髙祖得秦項之逸不思光武復漢業之勞其難四也若夫隗囂改圖合從公孫述決計自立其憑恃巢窟經略面勢羣下用命衆士齊心非脆敵也曠嵗竭力僅乃勝之而盧芳結連胸奴侵擾代北十餘年未已使韓信因冒頓致髙祖困白登得毋匆匆乎蓋光武勇怯不踰矩沈慮精詳先勝後戰不試成敗於一擲不然則自投髙岸者何止一事而已或者乃謂使當髙帝之時羣雄角逐光武必有不能辦者不知使當光武時羣盜力爭髙祖亦豈易辦哉石勒又言當並驅爭先未知鹿死誰手嗟夫使天下至於勒能稱豪者魏晉積亂也髙祖光武何預髙下而學者遂信之歟故馬援謂天下反覆盜名字不可勝數才明勇略非人敵經學博覽政事文辨前世無比動如節度不喜飲酒援雖狂率為光武所忌然皆實録也夫才略勇智後世人主所持以獨過天下而取之者也未有皆不及天下而可以取也以有為無聖賢之事也以無為無而以為足以勝有此學者之虛論不可以强同也劉伯升慷慨大略忠信仁厚無愧興王之材然知以己從人而不知以人從己招合羣盜與之共事急于茍且所謂大兵聚㑹强者為雄宜其足以殺身而不能成功也鄧禹所以為元功者始贊光武自為政君臣之交合也然天下事謀之若易而行之實難其披輿地圖始得其一而禹以為古之興者在德薄厚不以大小若光武收成業于百戰夷傷之後謂之以德不可也禹中分麾下數年終不就功蓋用力之難而使人以德自歸者不驗矣彼湯武無意于天下而天下從之戰伐少而戡定多及伊尹周公一以德輔而猶且不易况用力乎然則禹之論謂之人思漢未衰有所憑藉而可以用力用力而終歸於德則可矣謂之在德而不在力則與書生迂濶之常談無異也鄧隲兄弟之寃不旋踵而獲伸者有朱寵之直也漢中世以後常有此事主德雖昏猶賴以未亡也觀冦恂𫝊光武創業之初根本單薄可知矣髙祖偶因其厚故得與項羽相持耳若光武於朝菌求嵗寒之功所謂難也馮異集關中岑彭定南方耿弇平齊漢事以成三將之功大矣昔絳灌鄉曲以首級定功而糾合元勳乃付於韓彭等故不得不割裂大國以王之賈誼謂諸公幸者乃為中涓其次僅得舍人以此待信布之倫可乎功大而賞小厚力而薄望惟雲臺諸將為然論者不貴其謙讓易足之近道而反以頡頑難制者為雄傑蓋未深考也光武處敗能勇處勝能怯雖以兵定天下一念未嘗不在息兵能身享太平非偶然也平生雅言切中機㑹笑談戲劇必有可稱自三代以後齊桓晉文之賢莫能望也髙祖大風歌尚為談者所誇與答臧宫詔相去何如哉若㑹聚觀之自當有益於學者王霸在上谷二十餘年邳彤在遼東三十年胸奴烏桓鮮卑不能為患邉方撤備惠及內地此任人之效也漢法雖嚴而光武顯宗能寬以待臣使各盡力其臣亦自檢飭赴功不撓法度過髙祖文景時逺矣袁安任隗同心和帝初安自當然而隗可謂賢矣史稱隗義行內修不求名譽而以沈正見重於世東漢有此一等人以職分自致不為名怵不為利誘不可不知史家謂邳彤近於一言興邦按光武以王郎猝起其下不知所措若扳兩郡兵自送長安長安固不可得至就便得至光武豈復有容身之地哉然遂謂如此即是成業則亦不然蓋幸而兩郡猶可假力何遽言成也光武以繩墨待諸將諸將亦能以繩墨從之千里外如對面無蹉跌者惟彭寵龎萌鄧奉反叛賈復任氣後亦收拾矣功名不自矜一難也爵位不過望二難也奉身及家皆自勤約三難也凡此皆髙帝時不能及也大抵光武材過諸將而以氣柔之髙祖才不及諸將而以氣壓之韓彭黥布亦輕視髙祖而然耳使遇光武殆未必爾雖石勒之流不盡心於展布正復何損而况勒語自不然後人往往承誤蓋疏略矣卓茂為吏三代以後所無司馬遷班固所記蓋不能髣佛孔子言為政以德譬如北辰然春秋時無能以德者如茂可謂近之光武言名冠天下當受天下重賞大哉言乎亦三代以後所未有所謂周有大賚善人是富雖有周親不如仁人也光武初立而茂為首相若茂有周召之材而光武能受輔導未知當如何矣按前漢宰相自蕭何外皆武臣軍功或外戚崛起武帝始特用儒生終西京可稱者不數人而光武明帝雖以吏職自任號為嚴察然舉相任重必望實相符德器自過伏湛侯霸宋𢎞蔡茂杜林張湛張純牟融皆當時選郭丹范遷清儉絶人馮勤趙熹雖文俗而幹正經逺非偶然致身不厭衆論者宣秉王良有高世節亦本以輔相待之此其所以上下自厲操行成俗人材之盛十倍前漢也創業垂統為子孫程式而能柱石不撓後世效之推致其位使典刑有繼雖成周作人亦不過此矣習學記言卷二十四
