body:
  text: 習學記言卷四十二宋葉適撰唐書列𫝊楊綰誠清簡所以得重望者由元載為之資藉盖天下公好惡未嘗廢也綰誠不附離然載能容於朝終其身小人之不肖亦尚有齊量矣當是時人主茍於弛懦上下習為崇侈然則一朝誅載用綰人情震懼而所改化者如此後人便以舉臯陶伊尹不仁者逺為比恐亦非其實也唐人奇崔祐甫謀畧謂可復貞觀開元之治然自古無兩易宰相徳宗初立率情任意匆匆如此可以占其後矣祐甫方銳於自見任責如流未暇計他日楊炎乃其所薦固已失之而祐甫亦遽死不然君臣之終始未可知也舊史言唐以來詩人之達者惟有髙適按新舊史載適事皆不止於能詩又其論建亦非疎畧不切時用而謂之言過其實為大臣所輕新史又改云不為搢紳所推亦非也且大臣之輕重又何足計况唐世能詩之達者甚衆何必髙適豈待之在甫白郊島之間耶適論東西川利害可見當時率然割裂州縣以為節度自成弱勢而適亦不能知其本原但據目前言之爾元結放浪其迹以文墨自命出䖏不常若非利禄所能羈紲者而實有材用論能扶世政能便民與温造李渤之流唐時高品人物不過如此也𫝊載道州西原蠻掠居人數萬去遺纔數千而諸使調發符牒乃至二百函故結賦詩以為賊之不如而杜甫有粲粲元道州前賢畏後生之語余憶在金陵時前嵗運米出淮西界一戸已費百餘千次年運至廬州轉運司復欲調民余力止之請以本府錢自用水運終不聴㑹徐邦憲至乃免盖一經兵亂不肖之人妄相促迫草芥其民賊猶未足以為病而官吏相與亡其國矣郤士美為昭義節度昭義自李抱真以來私厨月費米六千石羊千頭酒數十萬斛潞人困甚通一嵗由今計之二十四萬緡矣士美悉去之出廩錢市物自給又盧從史時日具三百人膳以㗖牙兵士美亦罷之按抱真傳稱能完實府庫教成丁二萬繕甲治兵遂雄山東天下依昭義為强鎮盖當時良帥也而浮侈如此則其不良者又可知矣然史隨舊述各務私美融㑹者少恐士美所剔除容或未盡然也戸部侍郎崔蠡上疏國忌日設僧齋百官行香論事無經據詔曰朕以郊廟之禮嚴奉祖宗備物盡誠庶幾昭格恭惟忌日之感所謂終身之憂而近代以來歸依釋老徴二教以設食㑹百辟而行香將以有助聖靈冥資福祚有異皇王之術頗乖教義之宗昨得崔蠡奏論遂遣討尋本末禮文令式曽不該明習俗因循雅當整革其兩京天下州府以國忌日於寺觀設齋行香起今以後並宜停罷此開成四年也唐世禮文不為知禮者所許然如此等事猶能釐正不若後世定著不刋以為臣子恭順報効之節無逾於此也近傳蘇子瞻程正叔爭行香日食葷素饌有劉氏左袒之誚而范淳父黄魯直各私其所主遂結怨嫌然則安於流俗而計恭慢之偏恐或未攷也代宗本以涉歴艱難忍事能㫁故僅存壞亂之餘其於李輔國魚朝恩程元振李光弼郭子儀生死始終之際皆用此術雖不足為君道然不可謂無其意也獨至元載則初乃放縱未遂猜殘操御乖離全不中理且已知其為奸而不遂罷黜不知何所疑畏而必待遷延嵗月養成大惡用舉國之力如捕强冦而後勝之耶楊綰既自當相置之閒地直俟載誅乃以為代既非致麟鳯之道而綰不量其君冐昧前進適㑹即死姑留美名不然君臣之義終何所就也學者輕信往事異時自䖏不審無與建功趨向日以卑下不可不知楊炎變兩稅盖當是時不復授田乆矣自古官養民辛苦為立制度若家人父子貢稅之田號曰借力官民不相雜也春秋季年已履畝賦田至戰國而授田之制蕩盡漢人疆理廣大但因民所自有而廉取之雖非古法至於隨時簡易不大望於民則反過之矣唐雖因周隋為授田法非古法也而嵗輒更改煩擾難遵方其盛時已不能守迄於民自有田而後已矣民自有田多少不等貧富不齊奈何猶欲用授田時法稅之而後世之論謂租庸調近古兩稅變古乃是全不究始末爾所謂戸無主客以見居為簿人無丁中以貧富為差此變為兩稅之要而租庸調之所以不可乆行者正以主客丁中難分别故也舊說李徳裕重修實録増崇其父之美然以吉甫事與李絳對㸔心念識慮固非吉甫所能及至處置國家節目絳尤過之信如傳者所言德裕更淺下雖欲虚夸益彰其短爾然絳自罷相後沉浮麤使垂二十年不知早退卒蹈竒禍最為可痛蓋唐人之陋雖絳及宋璟不能免也管仲始以鹽䇿霸齊余常疑左氏所不載而管子書乃諸子辨士刻薄揣摩者附㑹其說非實事也是時王道雖衰而未盡聖賢餘論尚存若管子果奪商賈之利以自封殖議者安肯赦之且陳氏盜齊柄蓋以家量貸以公量収晏子謂民愛之如父母歸之如流水然則豪奪民利非管氏所為决也自後遂有桑𢎞羊孔僅又後遂有劉晏李巽𢎞羊等奉漢武之欲最得罪於民晏事與𢎞羊無異其可恕者𢎞羊興利用兵晏用兵而後興利若不得已而然又後至今五百年晏之術不廢愈増史家乃言取人不怨予人不乏道御而王權用而霸不知帝王所謂食貨者如禹益稷播奏艱食鮮食懋遷有無化居烝民乃粒萬邦作乂乃是為民通致食貨全與無取豈得以權道王霸為一種史家無識如此輕立論自不足責其如學者因之淪浹心髓一則非𢎞羊一則是劉晏隨聲褒貶無復根柢此治道所以淪没不可復振稍有意者宜痛哭流涕而思之也顔真卿論羣臣奏事先白長官利害甚明庸人皆可曉是時去載誅且十年使代宗能因此發悟罷載不待稔極惡用大刑也怪唐人及後世都作尋常文字㸔過至殺載而代宗亦無追憶先見之言視真卿與衆人無異豈以真卿遇事輒言望風厭之故不能感動耶其言自艱難之初百姓尚未凋弊太平之理立可便致屬李輔國用權宰相專政逓相姑息莫肯直言大開三司不安反側逆賊散落將士北走黨項合集土賊至今為患偽將更相驚恐因思明危懼扇動却反又令相州散敗東都陷没先帝由此憂勤至於損夀臣每思之痛切心骨可謂曲盡事情使得用必消平世難非止直氣呌呼徒言之而已也世但知真卿剛烈能視死如歸蓋孔子所謂殺身以成仁而不知其身在可以成仁然則李郭之功勲又何足亟稱哉李晟材出李郭上逺甚徳宗將相有晟與陸贄當朱泚死後便盡其用必能制吐蕃以除關中之逼漸處置諸鎮遲以嵗年兩河之患十减五六矣世無其人固所不論若有之又已在當用之地而抑遏掩沒自取衰微詩人所以歎日之方中在前上處故可為痛傷爾合天下之兵累年以攻淮蔡無尺寸效而李愬不殺一人用李祐招董重質全師獨有不血刃之功前代固未易一二數而韓愈作平淮西碑遂言乃勅顔𦙍愬武古通咸統於𢎞夫不擇將任人而陽拘汎率以僥倖於一勝乃唐人之大失愈既不能知又無所别異使絶世奇勲挫折庸帥姦將之手若魚朝恩吐突承瓘而有成又將何詞宜其不心服而卒以沮毁也陸贄論事始末無疵獨諫徳宗失在推誠一説不中其病蓋徳宗以輕信為推誠徒信言而不觀行初不憂其悔誠而為詐此乃贄有所未達也唐人頗病贄褊急不能容于邵于公異竇參之死以為漏言此猶其小者蓋古人將欲輔世必先度其君徳宗相崔祐甫楊炎盧杞姜公輔竇參皆出於一時悤悤至其廢罷甚者誅戮皆用一律贄不度幾見微與參及吳通𤣥兄弟計較是非以勝負為離合誅參相贄安然受之比其去也亦然夫矜其所長而不能照其所短詩人之稱仲山甫已不然矣而况伊傅周召乎惜乎贄之所未及也舊史全載梁鎮奏止李國禎立大地婆父等祠堂文字學者味之自當長益志意雖唐畿赤令尉得自通於朝廷然長民者既有城社而不以實利害告君徒以奉令為恭而竊議於下則何取焉當其時宰相導逢人主荒惑而道士威脅於其間固亦可見蓋不特如林靈素輩能為姦慝也而鎮以縣令獨嬰其鋒朗激傾盡如此然則人患不為而已裴延齡皇甫鎛進用陸贄裴度皆有諫疏贄雖詳復懇切不如度之簡重得體真大臣之言也度言比者淮西糧料所破五城錢其實只與一城兩城士卒怨怒皆欲離叛臣到行營方且慰諭責其遷延不進供軍漸難但能前行必有優償以此約定然後切勒供軍官且支九月一日兩城已上錢俱容努力方將少安雖侵刻不少然漏落亦多所以罷兵之後輕費錢數一千三十萬不知所謂漏落者鎛私以自入耶吏所乾沒耶邦賦有名而無實耶度為宰相不能透見事㡳但以意言之亦未可也朱泚既反朱滔連回紇圍真州將絶河津窺東都與泚合時李懐光據河中李希烈自汴逼江漢李納田緒猖狂未已唐號令所及十纔二三然而天下卒不至土崩者李抱真結王武俊之力抱真所以能説回武俊者賴賈林之詞也存唐之功過於曹劌燭之武矣徳宗初立運動天下事出萬全及其荒急謬計自取遷辱而以存亡離合呼吸俯仰之勢寄於辨士之口為人主者可不監哉徳宗天資喜文愛李楷落碑用楊炎作宸扆台衡銘君臣箴筆意精穎該涉治道非魏文隋煬所能及也然與諸將裴延齡渠牟執誼之流應和附著如影響而陸贄輩乃不能容蓋樂與不勝已者䖏而安其言以為莫予違者人主之大患自古然矣然至於王安石則又反是奈何蕭昕薦張鎬自布衣為拾遺昕亦拾遺也唐世尚存此風其言用之為帝王師不用則幽谷一叟亦可想見昕之風致鮑防為竇參逼致仕未七十言吾與蕭昕之子齒而與昕同致仕蓋昕致仕時八十八矣唐人雖以義責士大夫而不以法限之故桞公權以元㑹先稱賀占奏忽謬奪俸議者恨其不歸事猶至咸通初乃致仕亦八十餘高崇文在長武城練卒五千常若冦至及討劉闢夘時宣命辰時出師與楚莊王投袂而起正同杜黄裳不可謂不知人其能成功非偶然也黄裳首開憲宗中興之業然論方鎮亦只言貞元近事勸以法度整肅諸侯而已終不能言事本夫力争於横流者勞而難為功故賈誼謂當衆建諸侯而少其力趙普亦請支郡各自奉事京師憲宗十二三年竭生民之力僅取數鎮此事固不易収拾亦其君臣思慮有未至也舊史稱前代以史為學者率不偶於時多罹放逐其故何哉誠以褒貶是非在於手賢愚輕重繋乎言君子道微俗多忌諱一言切已嫉之如讐所以峘薦坎壈於仕塗沈栁不登於顯貴後之載筆執簡者可以為之痛心道在必伸物不終否子孫藉其餘祐多至公卿者蓋有天道存焉此語雖不足以定世論然比於韓愈自言人禍天刑則粗勝矣古人以官守道況史者與義降升國之賞罰莫敢望焉天下臧否在我則何計位之高卑舊史之意不已陋乎李夷簡劾楊憑欲抵以死置對未得状即捕故官屬簿録家貲當時御史之權如此夷簡亦號賢者而怙勢作威與楊球崔暹無異何耶時論雖以挾私不與而乃謂摧挫方鎮為得冝推挫方鎮以道不以力此固無識者所言不足為凖但憑本士人習於侈汰自取頓辱為可恨爾獨孤及言減江淮山南諸道兵謂今天下惟朔方關西有吐蕃僕固之虞邠涇鳯翔兵足以當之此外東泊海南至番禺西盡巴蜀無䑕竊之道而兵不為解此言肅代間無故變天下皆為兵之實録也蓋其患自古所無而至今終在盜殺武元衡許孟容以吏部侍郎白宰相請起裴中丞輔政余記往時朱熹坐本曹侍郎林粟劾去而太學諸生啟其師乞扣閽畱熹為司業當時謂即師求師為侮其師夫即師求師為侮其師則即相論相為侮其相矣然孟容所言廟堂不以為忤而度果相淮蔡之平事至淺鮮尚湏議論不壅方能致之況有大於此者乎唐中世以後稱家法之美父兄子弟相繼賢材者穆崔栁氏爾子貢問何如斯可謂之士矣子曰行已有恥使於四方不辱君命可謂士矣敢問其次曰宗族稱孝焉鄉黨稱弟焉又問曰言必信行必果硜硜然小人哉抑亦可以為次矣夫不原道徳之大意不知古人之本末而以宦學所由之途便為立身之大節足以干禄而已視漢陽陳江南袁氏固已逺矣自天寳亂而吐蕃强國西門即戰地古人稱無怠無荒四夷來王太宗君臣恃一時兵力以除㓙雪恥驕穉前代豈知子孫之患至此乎於時馬驎劉昌郝玼史敬奉野詩良輔相繼扞境僅能自保而使謂其不能北踰白道西出蕭關以為將略有所未至蓋猶以太宗時事望之耶元稹李逢吉交扇險賊乃穆敬中大事文宗初稱肅清韋處厚之力也其貶熊望詔曰孔門高懸百行由至順者其身必榮朝廷廣設衆官踐正途者其道必達前鄉貢進士熊望因縁薄伎偷兾䙝幸營居中之密職擾惑朝經致偪下之囂聲因依邪隙及衆議波湧累月不寧司門驗繻累月至四考覆謬妄乃非坦途朕大啟康莊以端羣望俾示投荒之典用正向方之流可漳州司戸望劉栖楚客也余既於平淮西碑論陽拘汎率之非然猶有未盡者韓𢎞賊也去李師道王承宗一間爾而乃使為統帥責以成功此武元衡李吉甫之謬歟去杜黄裳逺矣𢎞無狀至於蠱壊李光顔裴度雖督戰尚不敢當招討凡事利害縱曉然在目前終非智者不能睹而世以為智則必待决了於冥冥亦豈皆然哉國忌行香外又有人主生日稱賀春秋釋奠於孔子按韋綬劉禹錫言可見蓋當時皆以為非禮而今世反以為盛禮也有其舉之莫敢廢前世禮師相傳之語則然夫不論其是非而直以廢舉㫁之可乎新史所云陋矣高瑀傳稱韋裴作相少債師此本起於中官貪冒所行及積習漸乆則人以為常非賢者不能革雖杜黄裳不免況其下乎近世固有債師之論淳熈間除授清明然外𫝊閹倖以告覔而得亦不為少夫天下之私情常欲敗至公此乾徳所以為難也憲宗問政之寛猛權德輿言唐家以仁厚為先余考於載籍自古流俗未嘗不以猛勝惟聖人能用寛周衰而寛道廢故孔子力爭深辨以明嚴猛之非如佚道使民生道殺民則孟子固已偏駁不能盡究孔子之義也德輿但以利害言之蓋俗儒常見爾然近世引經講學未嘗不主寛及其從政未豪末則雄猜刻暴叱咤百出何止於用嚴而已又德輿之罪人也哉唐輔相三節自魏徵外皆不及元和諸人至杜黄裳懲刈德宗首開治柄百年賴之又非諸人比也所可恨者材智止於其所能既不知上一截又不知下一截爾夫不知上一截則國論不明不知下一截則士俗不成尚未可望兩漢魏晉人材也裴度能聚天下之望在已為公卿大夫所宗終其身此一事自唐以來貴人皆無其意與僅有其意而不能成其能成者度一人而已笑受崔咸罰爵可併㸔然若使其所知稍進又當不止此未嘗不拊卷深惜之也初韓愈科目輩行立朝所歴與度畧等而愈工文字自致名聞非度敢望也及愈先依鄭餘慶方能在百僚間後益困非度提衡不復進遂判然為下與馮宿李正封輩無别矣豈愈皇皇然以行道自任而不計其身之重輕哉抑行道者必輕其身哉曽子謂士不可以不𢎞毅比其死也未免易季孫之簀蓋古人難之抑講明猶有未至歟習學記言卷四十二
