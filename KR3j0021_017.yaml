body:
  text: 習學記言卷十七宋葉適撰孔子家語家語四十四篇雖孔安國撰次按後序實孔氏諸弟子舊所集録與論語孝經並時取其正實而切事者别出為論語其餘則都集録名曰孔子家語且言凡所論辨流判較歸實自夫子本旨而屬文下辭往往浮説煩而不要者其材或有優劣故使之然也學者學乎孔氏孔氏之不存與存而本末不能明者置而不言可也其存而以安國所論次本末最明如家語者乃不復究悉終始條理歸於一道而浮沈寄泊殆如道聽塗説之云則何以學為雖以論語為正實而切事又庸能保其固守而無畔哉初仕為中都宰孟子謂嘗為委吏嘗為乘田其時去孔子未逺此篇無有豈徴之而不記耶抑孟子誤也謂相夾谷為行相事疑未然春秋墮三都成人叛不克墮此言遂墮三都之城非是又言攝相事有喜色樂其以貴下人非是又言七日誅亂政大夫少正卯戮于兩觀之下尸於朝三日其詞云云皆非是此荀卿子所載或者荀氏之傳宜若此而孔氏家遂取以實其書爾按論語君召使擯色勃如也足躩如也公西赤宗廟之事如會同端章甫願為小相焉赤也為之小孰能為之大然則君在其國而宗廟出其境而會朝固皆有相擇能而使無常官事畢而止夾谷之會孔子與齊人辨爭最著其效至於能還鄆歡龜隂之田而孔子及子路由此預魯政矣故學者訛傳以為相魯也相與不相於孔子無所加損然弟子名實之不知而後世以虛言為實用則學者之心術疏矣又按論語子疾病子路使門人為臣病間曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎詳此則孔子見用子路以為喜而孔子不喜子路以為貴而孔子不貴又孔子自言以吾從大夫之後者再皆明其義非樂其官則所謂有喜色而樂以貴下人者果非也又按始誅下文子貢進曰夫少正卯魯之聞人今夫子為政而始誅之其為失乎詳此則少正卯之聞次於孔子又按下文有父子訟者同狴執之三月不決其父請止孔子捨之夫父子訟真大罪而孔子尚欲化誨之使復於善少正卯為國聞人其罪未彰而孔子乃先事設誅播揚其惡由後為夫子本旨則其前為非夫子本旨明矣按舜堲讒説殄行震驚朕師故命龍納言出納惟允而周召之於頑民待之數世然則湯誅尹諧文王誅潘正以至華士付乙史何少正卯殆書生之寓言非聖賢之實録也使後世謂聖人之用不量先後緩急教未加而還震於大討輕舉妄發以害中道而曰孔子實然蓋百世所同患矣自子思孟子猶皆不然獨荀况近之故余以為荀氏之傳也王言解幾千言謂今之君子惟聞士與大夫之言而未聞王者之言按孔子與曾子言孝幾二千言於王道莫詳焉今王言略取先王之制雜舉而不類稱謂守必折衝千里之外征必還師衽席之上似戰國儒者之語孔子時未有是也豈其未見孝經而作耶夫聲為律身為度布指知寸布手知尺舒肘知尋言之雅俗雖異其為鄙近而不稽於道一也書曰協時月正日同律度量衡烏有求於肘指之間而自以為不逺哉蓋後世有挾是而亂天下者矣大婚解儒行解問禮哀公問政本命解後論禮樂觀鄉射郊問刑政禮運辨樂問玉曲禮子貢問子夏問公西赤問以上已見二戴記禮中按二戴其野而誕及文詞近戰國者皆不取惟月令外雖淺深不同大扺亦能出入諸經非他書比也或疑家語禮記並出無辨按孔衍言戴聖近世小儒以曲禮不足而乃取孔子家語雜亂者及子思孟軻荀卿之書以裨益之總名曰禮記謂劉向見其已在禮記者則便除家語之本篇是滅其原而存其末也家語漢初已流布人間又經孔安國撰定戴聖集禮在安國之後禮記蓋本家語家語不本禮記使向果如衍之言則其考家語為不詳矣按家語孔子去魯十餘年魯人以幣召之而歸果如家語所言是孔子始歸國升自賓階哀公驟以儒服為問其詞意皆戲侮與逰囿仰視蜚鴈何異其可留乎且孔子昔已為魯之大夫今雖不為大夫其服宜何服即如羔裘之詩大夫以道去其君而其詞曰羔裘逍遙狐裘以嘲其次章曰羔裘如膏日出有耀然則大夫以道去其國者固猶大夫之服而哀公方疑孔子之儒服是孔子冠竒冠而服異服而見其君也豈近理乎且魯人亦何必諱儒服齊人之歌曰魯人之臯數年不覺使我髙蹈唯以儒書以為二國憂蓋儒者以服竒服見駭於世俗而解之者方且駕其師以為説嗚呼舉魯國而儒服儒冠者一人當時之靳儒可見矣刑政載仲弓問于孔子曰至刑無所用政至政無所用刑自有成語而孔子答以昔者聖人之治化也必刑政相參焉按孔子未嘗以刑政二者為是其言一而已矣豈有精粗之别哉使其以在論語者為精而家語為粗則非所謂本旨也禮記哀公與孔子問答甚多而皆無救於弱無損於昏無益於明無力於治也然而孔子諄諄不已而孟子乃謂大人惟為能格君心之非恐此語不驗也哀公又嘗自言寡人幼生於深宮之中長於婦人之手未嘗知哀未嘗知憂未嘗知危未嘗知懼雖甚庸愚既與孔子相往反何綺紈騃陋至此極耶按左氏國語載孔氏之言家語使凡所載皆若是可為孔氏之成書與易論語相經緯而行矣史必有所本不知左氏何本宜若取諸孔氏然集家語者往往在左氏後則固本之左氏而左氏不本家語也余嘗疑集論語何人而義精詞嚴視詩書有加焉孔氏而無是書其道或幾乎隱矣至左氏兼諸國事見孔子之所以斷制物理者比論語尤精然學者多忽而不親蓋左氏本以孔子用力於春秋故為之傳專在發明大旨今捨四達之衢而荒徑是即如之何五儀所言庸人士君子賢聖人之别與哀公生於深宫連文按論語孔子未嘗輕言聖故曰何事於仁必也聖乎堯舜其猶病諸聖人吾不得而見之矣至孟子始言聖而荀卿為甚此亦荀卿之傳也輕言聖而學者之患至於重言士不可救已致思載三子言志有赤羽若日白羽若月攘地千里搴旗執馘由無所施其勇賜無所用其辨等語按論語孔子與弟子言志其詞指皆不類又與程子傾蓋而語顧謂子路取束帛以贈而往來酬答之詞不傳夫不可言者妄載言可傳者失録信弟子㧍劣而然耶伯常騫欲身亦不窮道亦不隱按論語君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之從輕勿為先從重勿為後按樊遲問仁子曰仁者先難而後獲語略同觀東流之水發似德者八按論語子在川上曰逝者如斯夫不舍晝夜而孟子亦言仲尼亟稱於水有本者如是夫水之為德古人取象非一然八似之義廣矣蓋雖以水言德而實以德言水也好生載孔子讀史至楚復陳曰賢哉楚莊王輕千乘之國而重一言之信按司馬遷亦見外世家而左氏乃無有但言鄉取一人以歸謂之夏州而已以蠻夷入中國滅復自由天地變壞至此而極而孔子猶賢之乎楚恭王亡烏嘷之弓曰楚人亡弓楚人得之孔子曰惜乎其不大也亦曰人遺弓人得之而已何必楚也按孔子稱楚昭王知大道故不失國其言曰江漢沮漳楚之望也不穀雖不德河非所獲罪也夫能守其軍文子言弟子行而孔子曰汝次為人夫所知不逺而取足於師友之間雖欲追配古人以為成材何可得也學者讀此要當深悟憤發多識畜德使無淺薄之患按論語子言衛靈公之無道也季康子曰夫如是奚而不喪子曰仲叔圉治賓客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪而此篇稱哀公問於孔子當今之君孰為最賢孔子對曰丘未之見也抑有衛靈公乎公曰吾聞其閨門之內無别而子以之賢何也孔子曰臣語其朝廷行事不論其私家之際也下文云云夫以其無道而善用人故至於不喪此孔子之言也以其善用人而遂以無道為賢非孔子之言也自家語論語及諸子敘孔子之多能博物甚衆其鄙而不當於義者不足辨也其稱吳獲骨其節專車按隳會稽之嵗與孔子歸魯之年既不合又言在虞夏商為汪芒氏於周為長翟於今為大人形之修短各以胤類物則有然而秦漢國而志不越於分境之外故孔子謂之知大道豈有失其涯量忘其國守而後得謂之大哉又謂善學栁下惠未有若魯之男子按宰我問井有仁焉其從之也子曰何為其然也君子可逝也不可陷也可欺也不可罔也又曰言必信行必果硜硜然小人哉夫井猶若可從孰謂室壞而不納必果孔子之所少安得為善學栁下惠也按孔子觀周與南宫敬叔俱至問禮於老聃訪樂於萇𢎞歷郊社之所考明堂之制察廟朝之度於是喟然曰吾乃今知周公之聖與周之所以王也此是孔子最大節目後世又作常語看過蓋是時周之天下崩削已盡一城之內獨周公與其先王舊制儼然具存其故老宗臣皆已亡殁而老聃萇𢎞之徒猶在而孔子以方盛之年考識其典法接聞其源流因以追夏殷祖唐虞衣被草萊雲蔭雨化雖弟子不足以盡得其意而尊之者既廣守之者既衆燧改沿革丕冒無窮周雖遂亡而此道固有託矣猶文武面命而周召親傳之也不觀周何以致此孟子謂宰我子貢有若智足以知聖人汙蓋欲自命以其至精者噫一己之心量未能合前聖之紀自用之博約孰與遵已成之訓議孟子徒以其自命者願學於孔子而未知以孔子之觀周者自觀此亦百世之論而未講者也金人背銘按本文在后稷廟堂右階之前使果周人之詞不以言之可從者為義而以言之不出者為福不正其本而慎其末何其與禹箕子異指耶至於執雌持下人莫踰之人皆趨彼我獨守此人皆惑之我獨不徙內藏我智不示人技我雖尊髙人弗我害江海雖左長於百川以其卑也斯又老氏之枝葉而生民瓜瓞之奏息矣宜其衰也余嘗歎詩書千餘年卓然垂名者不過數十人不特古人以書自篤無求名之心而史法疏簡不具雖欲登記亦不可得至孔子所稱引則雖春秋之士亦班班焉頓以不泯故子貢為衛將言子不為其不然也夫博物而多能聖固不以是而孔子亦未嘗以自聖也然世俗輒喜傳之傳而謬妄久而不已則為學者之咎矣東野畢馬佚事的然無證按蘇厲喻養由基善射而不息余固以為非蓋世未有不善息而得善射者也若東野畢猶以窮馬致佚則安得稱善御乎余每患儒者不知以倫類之通開物所共有而好以億慮之私疑人所不能自知而愚物而不知己之愚自是始也一言而有益於仁莫如恕一言而有益於知莫如預恕可以攝仁孔子於論語固言之矣預不可以攝知論語未之言也預者流通事物之門户運動世俗之總會亦知之一偏非所以至道然中庸謂行與道皆當前定而預遂為成德則茫然廣逺而人莫知所從反以病知而不能益也子張問入官條答甚詳而散雜不倫按論語子張所問不一端而告之諄悉異於餘人則子張固好問者也此篇如臨之無抗民之惡勝之無犯民之言量之無佼民之辭養之無擾於其時愛之無寬於刑法天下積而本不寡女工必自擇絲麻良工必自擇完材賢君必自擇左右君子蒞民不可以不知民之性而逹諸民之情既知其性又習其情然後民乃從命矣君子蒞民不臨以髙不導以逺不責民之所不為不強民之所不能不因其情則民嚴而不迎不因其力則民引而不從民有小罪必求其善以赦其過民有大罪必原其故以仁輔化等語若身踐其域心精其意亦可以翼論語而行政可達身可隆也宰我問五帝德司馬遷據以為本紀書目按論語於堯舜禹既皆有品目而史自堯始書之記録已詳孔子有述無作皆本上世之舊堯舜以前雖有數聖人其傳而不信者蓋不敢言矣然則宰我雖有問孔子宜不答今所載者皆浮妄無實之詞而遷以為雅馴異於諸子者真孔子語也故欲因之嗚呼遷之不能擇言如此而欲變古法為後世文字之祖安得不日趨於下乎如民賴其利百年而死民畏其神百年而亡民用其教百年而移是何義子夏論人畜生育土地經緯山川牝牡及哀公孔子問答性命蓋自昔百家無不然者余嘗謂惟孔子之徒能免而執轡本命解猶盛稱之不疑然則使無孔氏人文何由著義理何由存其不遂為被髮左衽幾希殆天也非人也屈節解孔子在衛聞田常將為亂而憚鮑晏故移兵伐魯孔子使子貢説田常緩師請吳救魯伐齊遂至越吳因伐齊貶之子貢又北見晉君使承吳弊吳晉會于黃池越以襲吳而終滅之謂子貢一出亂齊存魯強晉弊吳霸越而孔子以為美言傷信按左氏吳自勝楚入越始專中國會盟哀公七年會于鄫徴百牢其秋魯入邾執其君茅夷鴻請救八年吳伐魯畏微虎反行成焉九年吳城𨝍溝以通江淮齊悼公為季姬請吳同伐魯季姬歸而嬖辭吳師吳怒告魯及邾郯十年同伐齊齊弒悼公以退吳十一年春齊國書髙無丕伐魯其夏公會吳伐齊國書是年越子率衆朝吳子胥諫不聽屬其子於齊鮑氏為王孫氏吳殺子胥十二年公又會吳于橐臯十三年而有黃池之會吳晉爭長是年越敗吳是魯本以入邾而致吳兵吳以齊辭而同魯伐齊怨同而伐魯魯怨伐而挾吳以報齊與家語無一合者蓋為辨士妄託而儒者反載於其書固不足計然儒者不信史智又不足以知聖賢而謂子貢之言語特辨士説客之雄則於大義極有所害非其他承訛襲謬之比也左氏載用田賦其説不詳但云斂從其薄而已按家語季康子欲以一井田出賦法云然則畝本籍而為稅井本稅而為賦丘本賦而為甲皆自田而增矣不言用井賦而言用田賦明田之為井井與田同稱也後世以畝為田又無井余既按家語季氏以一井田出賦法見增斂所由孔子不答而魯卒自用之昔舜禹始定貢賦傳至殷周孟子謂皆不過於什一其實儒者不能盡明也至漢人三十稅一輕於三代自後雖世有輕重不同然皆可增可損有斂有散國無甚乏之用民無甚病之輸不幸自唐天寶至於今日余於隋唐論之倍矣終身養兵加賦愈廣孔孟復起無所發藥蓋附贅懸疣之初為患尚微不急攻療及既擁腫遂與生俱則良醫不能措矣余注心凝想晝夜不暫捨積數十年方悟唐人時倉猝不知以田養兵而以稅養兵故流害相承至此之極夫以田養兵畝四十至百而養一通廂禁大軍寬約在內以稅養兵畝四百至千而養一亦通廂禁大軍在內以田養者可至百萬以稅養者過十萬則困竭矣所以自國初至熙豐前已不可為況熙豐後至靖康前乎熙豐至靖康前已往紹興至今如坐叢蝐中常與亂亡較早暮可為凛凛今若為民田者使州郡畝三十買一而自耕以養廂禁兵隨田所在買之聚於附郭買貴取之稅契錢自耕如民間田種法即用元客取元稅無所更易則春行之而秋可減州郡之稅矣凡沿江淮襄漢川蜀關外未耕之田或可種之山雖名民田而不能耕者皆是使總領取而自耕自種田一兵畝百山一兵以所種粟計以養屯駐大兵則今歲行之而來嵗可減總領之賦矣若行之數年民不耕之田盡取而自耕可種之山盡取而自種則天下之賦皆可減矣兵養至百萬而不飢稅減至三十取一而藏其餘以待凶年及國之侈用如此則天下始有蘇息之望矣然後聖賢在上育以道德經以仁義紀以禮樂而唐虞三代之治庶幾復見也惜乎余老且死徒能言之爾按家語歷世存之終不能明其於孔氏之言為正偽余既頗採次而怪孔子周旋當世五六十年所從之衆問對之多宜不特論語一書而止則其别為記集以輔世教如家語之類幾是也箕子曰會其有極歸其有極論語問對之極也論語所同家語所異極不會乎論語所有家語所無極不歸乎孔安國以論語為正實家語其虛乎以論語為切事家語其泛乎天地産百物工技藝能則有美惡大小之異精粗工拙之辨聖人之言豈若是乎余固歎論語左氏之外疑皆非孔子之言其論沒而不傳者殆不可為限量而安國所謂實夫子本旨者兹孔氏之道所由以不明也嗚呼豈獨安國而已孟軻蓋自謂捨顔閔遊夏伊尹伯夷拾宰我子貢有若之餘論以孔子為生民所未有而願學之者然其於論語左氏及家語之正偽亦未能有别也然則何以知之堯舜禹湯文武周公至於孔子一道也三子有髙下之殊者狂也迷於昔而眩於今非其中之實有也軻喜於自異而樂稱之豈孔子之所敢安哉不敢安則所學者皆意之而非真而孔氏之道逺矣孔叢子載萇𢎞言孔子淺矣誕矣至堯舜文武之道或弛而墮禮樂崩喪夫亦正其統紀而已統紀二字論語無之始見於此司馬遷遂言垂六藝之統紀孔氏子孫所謂統紀者或是用漢儒言語相承記之不知真所謂統紀者安在也孔子曰天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何又曰參乎吾道一以貫之賜也汝以豫為多學而識之者歟曰然非歟曰非也豫一以貫之夫斯文興喪之異由於一貫迷悟之殊或者統紀之學幾在是耶然非孔氏之髙弟不足以知之各因其質之所安而謂道止於如此況於後世不能言統紀者固非而能言者亦未必是也然則終安所明乎載子思歲月全不可考子思年十六適宋樂朔與之言尚書不悅而退曰孺子辱吾其徒請攻之遂圍子思宋君聞之不待駕而救子思子思既免曰文王厄於牗里作周易祖君厄於陳蔡作春秋吾困於宋可無作乎於是撰中庸之書四十九篇詳此則中庸之作逺在孔子殁後而子思往往不逮事王父矣然伯魚之死五十去其父不逺以年推之孔子殁時子思壯長矣又孔叢子自載子思從夫子於郯遇程子而謂十六著中庸此可憑乎子思與魯穆公同時穆公之薨子思在衛不為服亦連叢子所記孟子言子思穆公甚詳可以無疑矣然史記世家魯哀公二十七年薨悼公立三十七年薨元公立二十一年薨穆公立三十三年薨恭公立然則子思之年上距定哀下迄恭公按家語世次子思年六十二卒又左氏仲尼見郯子學官名在昭公十七年之後年二十八九矣所稱遇程子傾蓋當是異時往返不然則未有子思從行也當百餘歲矣然則世家之紀年又可信乎大抵堯舜以來史文不繼嵗月斷闕孔子以書詩次之存其大略惟春秋二百餘年是為明備所以尤惓惓於此書蓋問學統紀之大者孔子殁而春秋廢雖其子孫自記家事而於子思之歲月尚訛舛如此況其他乎子思之後子髙子順子魚皆守家法學者祖之叔孫通本學於子魚子魚使仕始皇陳餘儒者與子魚善陳勝首事餘薦子魚餘輕韓信以取敗亡鮒死陳下儒學幾絶獨通遺種僅存卒賴以有立司馬遷班固曽不能言其所自來乃為儒林傳自武帝始楚漢間辨士説客多妄言遷固一切信之反以陸賈為優於叔孫通余故深歎漢隋唐末之禍他書盡亡無以質證而惟遷固之信使學者不復識孔氏本末然則何止秦火為害也闕里無故荆棘叢生一旦自闢廣千數百步從舊講堂坦然至里門太守鮑永因之行饗禮禽滅董憲彭豐等此永設説也流傳既久其家信之遂筆於書使後世學者謂闕里神怪若此豈不害大義乎習學記言卷十七
