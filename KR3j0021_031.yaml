body:
  text: 習學記言卷三十一宋葉適撰南史宋書魏晉以後惟劉裕之取差或無愧盖晉已亡而裕非其叛臣也但力尚不足自得故必假晉為名爾取天下未論義得與篡盜而實欲有之甚難曹操司馬氏皆數十年劉裕亦然人以為不能致者須勤身苦力以致之不如是無以定名故也而王莽王敦桓温父子直以很抗陵上暴衆害物豪奪經有損身滅族流毒生民悲夫裕本劉牢之所拔習見百年經畧中原舊事勇智兼人宇量開絶若使息圗僣奪專意經綸其於恢復混一之功不難成矣裕非無此資故前取燕後取秦皆欲頓駕立足為逺大之基所以隨事淪胥既得復失終於割據分裂者乃劉穆之教誤之也取天下自蘓秦張儀説破蕭何張良做出後世相承盖有定説英傑之士必先識其大勢所歸運動開闔在本身材分之外而穆之乃欲以區區應用刀筆小能輒當豪傑佐時之目嗟夫彼謂如鄧禹荀彧者無以異於賈充鍾會耶江左之政以元嘉為首史言其綱維備舉條禁明宻爵有常科罰無濫品建武永平之後無及焉今考其最可見者責成郡縣及守宰以六朞為斷而已大抵上持其要而下姑以茍安爾若夫寛卹之政勸相之方先民後己之誠損上益下之術固未及也况於道徳文物使之知教而有禮乎自戎狄迭據北方所不論盖至唐僅以貞觀開元為稱然則善政不常有非特賢君難遇亦由任己以亂俗者多而識治以靖民者少故也豈不惜哉宋文帝雖勤苦求治不過獄訟而已武明滛侈猜酷殘民如不及兩廢主童孺極惡蕭氏遂刼而代之及於梁陳禍福欻忽學者以其微淺不能置論然於世教所係甚重古人之於天下固有常道故伊尹謂肇修人紀以至於有萬邦後世雖不足議此然周之諸侯大者秦楚小者魯衛傳世數十盖其為國尚皆有本末更仆迭起而維持制服之具與之並行所以久而能猶存不止是富貴自身一路也李斯首破壊此事君臣俱得富貴然亦相隨而亡兩漢雖皆李斯餘本但時作一二亦為有所慿藉故比其他享國者粗長久曹操之興荀彧本欲扶持接續漢事操不用又殺之陳羣王朗之流隨時好惡舊論盡矣此後無有知者只如劉表要依文按本作昔人様子雖未必是其徒不能櫽括與之共守反與共亡雖諸葛亮亦然然則管仲樂毅亮雖以自比恐未必及也故三國各不數十年而亡况劉穆之比以前人更隔數十重見識劉裕本有闊達意度而穆之以狹劣教之其君臣上下自富貴娛樂一身之外更無他説以致國祚短促皆其自取民生其間受禍迫數可勝歎哉然則居王導謝安王儉之地者安可不深念夕陽以為警戒歟若學者但誦習三代有道之長不知如此短促卻在甚䖏既無經通𢎞濟之念而波流風靡與世推移又或迂鈍疎野以古自絶則與江左人材何以異矣自蔡邕杜預用新術治歴至何承天祖沖之考索愈精承天以月蝕之衝推日躔次沖之言古術之作在漢初周末所謂求詳於未差之間盖劉歆班固所不能到也沖之與戴法興更相論難宋孝武殂不復施用然歴家傳之具存一作用之梁卒至陳沈約叙祓除引周禮女巫韓詩溱洧論語浴沂約固非知經然近世學者以浴沂舞雩為知道一大節目意料浮想遂為師傳執虚承誤無與進徳則其陋有甚於昔之傳注者不可不知也遷固為書志論述前代舊章以經緯當世而漢事自多闕畧蔡邕胡廣始有纂輯陳夀范曄廢不復著至沈約比次漢魏以來最為詳悉唐人取之以補晉記然後歴代故實可得而推雖去遷固本意已逺然古事既不能追則所當存者隨世有無而已但其體煩雜非復前比殆成會要矣學者立乎千載之後考見始末當使相承如一日若姑競遷固之華而不求其實則失之逺矣漢魏雜歌詞多曹氏父子所作昔文王周召皆自為文字褒功撰徳協俗訓民正聲入於人心百世賴之曹氏以俠氣動哀思激揚頓挫而千載之下文人才子奮其筆墨欲以名世嗟夫人材固繫於所祖耶若洛陽令羅敷行陳安隴上吟民俗之詞本乎風土自不可廢惜其零落僅存一二觀者詳之也魏文居諒闇之始便數出游獵體貌不重風尚通脱故戴凌以直諫抵罪鮑勛以忤㫖極刑天下化之咸賤守節此貌之不恭也按傅𤣥有慕通達之論而言之不詳此自魏晉相承記魏文云然宜得其實也晉志削不載今當復存乃正始𤣥虚本原所自也太康中天下為晉世寧之舞手接杯盤反覆之歌曰晉世寧舞杯盤史以為樂生人心所以觀事接杯盤於手而反覆之至危也晉世之士偷茍於酒食之間而知不及逺晉世之寧猶杯盤之在手切事中理盖亦君子之言也流傳至今猶有杯盤又云巾舞古公莫舞也宋元嘉末日蝕星辰畢見孝建初蝕列宿粲然前代之異未有巨此者也吁是時陽徳盡耶史稱地理參差其詳難舉實由名號驟易境土屢分或一郡一縣割成四五四五之中亟有離合千回百改巧歴不算尋校推求未易精悉盖以是時江淮以南為十九州矣時代遷換南北割裂而地之去畱無常是人事之不能免至於樂變慕廣不求於政而求於地則後世之通患也其後又不止此或州増復名郡累冗號無益而祗為異去古愈逺矣書地之法當存舊繫雅削浮没猥而已宋明帝畱心後房擬外百官備置内職有通尹列叙司儀司政女林侍御殿中祭酒之目史以為元嘉以降椒庭綺觀千門萬户滛粧恠飾變炫無窮自漢昭陽魏九華不能概其萬一昔衛靈公與南子駕雍渠乗招揺市過之孔子醜之曰吾未見好徳如好色者也古者后妃通稱本無内職儒生妄説文義承誤流轉後世遂無所不有何止好色哉漢魏以後天下共稱諸葛亮次則劉穆之亮雖用其民不息然民徳亮故不忘也穆之未可語此亮雖束縳豪貴使洗手聽法穆之安能亮任人能盡其器用所至材者知不見遺不材無所徼倖穆之亦未至此若夫佐裕大合英豪竭力經營使天下定於一尤非穆之所知也自曹操不能一天下余豈以空談責穆之盖裕實有可致之資其時亦易然卒以不就者既殺謝混除劉毅司馬休之自應止此規小意狹又再費日月故也沈約曰晉綱弛紊其漸有由孝武守文化不下及道子昬徳憲章墜矣重之以國寳加之以元顯祖宗遺典羣公舊章掃地盡矣主威不樹臣道專行國典人殊朝綱家異編户之命竭於豪門王府之蓄變為私藏由是禍基東妖難結天下蕩蕩然王道不絶若綫髙祖一朝創業事属横流改亂章布平道尊主卑臣之義定於馬捶之間威令一施内外從禁以建武永平之風變太元隆安之俗盖文宣公之為也此當時人稱穆之實録然尚有當論者孔子謂如有用我朞月而已豈聖人之智不及也詩云誰能烹魚溉之釡鬵然則何天下之亂而能治之者少耶史稱王𢎞博練治體畱心庶事斟酌時宜每存優允未知斟酌優允者何事當只指與八座丞郎疏議者耶當時政體此為大耶然後世又有不能如此而稱賢者矣故可歎也徐羡之傅亮受顧命事營陽廬陵皆當廢但不當殺爾既至於殺則文帝無以自䖏不待王曇首輩追促也然猶遲回不忍者累年盖亦難之所以致帝於有過乃三人自為觀其負荷大事亦秦漢以後所少至於二王之不當殺不待智者而後知然宋武禪代鴆毒舊君戕剥遺𦙍不翅如狐豚其臣習見方為新君地不暇為舊君計故蹉跌至此也或以晉惠公里克為比又言春秋之義不當殺皆非也人道所係豈可以禍福影響附合耶謝晦自知不反而猶舉兵犯闕為徐傅陳寃未審克捷之後又將何討其愚如此殺二王盖不足道也然以沈約所論則當時亦無以三人為非者豈託孤寄命之地古人遂無復令終歟劉徳願善御車嘗立兩柱使其中僅通車軸乃於百餘歩上振轡長驅未至數尺痛與牛杖奔從柱間直過其精如此徳願以此擅寵於時然則所謂東野畢者將空言而非實歟朱齡石取譙縱復從外水朱超石取姚泓奔卻月營智勇兼奮項籍曹操無以過之江左用兵如劉裕古今所未有也然及其意衰氣沮為勃勃所禽土梗之不若皆前日之人耳兵固無常勝而亦無常形也張興世於敵上流立營卒以破賊昔人以智使勇後世須有勇方有智耳曹操既得重位父子自作風流領接一世劉裕已有權任父子慕當時風流與兵力參用成魏晉之俗者操也不墜晉之遺風者裕也為國自有楨榦得之者興人主不知此難以言御物矣因謝景仁謝述謝𢎞微事書此然宋武又謂蔡廓自是蔡家佳兒何關人事竟以會稽與禇淡之悲夫若更透過功烈何止如此張永傳時將士休假年開三畨紛紜道路永請以一年為制從之乃孝建初也不知前此云何然外則萬里從征内則宿衛迭上自昔而然但有緩急耳謝方明傳數百字詳看後稱性尤愛惜未嘗有所是非承代前人不易其政有必宜改者則以漸移變使無迹可尋謝氏前一行人以風尚自髙實政疎闊而後輩乃精宻如此沈約論江南貧富元嘉大明盛衰及常平不興沈曇慶議謂籠以平價則官刻民優議屈當時盖由於此夫殘民百年之命以豐其國而不思立一日之法以庇其民故稱管氏輕重李悝平糴夀昌常平數千年間寥寥僅存而其終也又反為民患嗚呼必優官刻民而後可耶沈約言自黄初至晉末百餘年中儒教盡所記臧憙徐廣傅隆裴松之何承天雷次宗庾蔚之周野王周王子向琰賀道養雖未及古人然立名當世固不得而畧也時主茍不至如秦燒書殺士則學以人興傳之久近自係其道之精粗不以利祿盛衰也食貨以來罷錢專用穀帛者惟漢末魏初孔琳之議甚詳沈約謂覩其末而不統其本此自戯論無可言者然錢與物相權而行古今正法也後世窮於用錢不能思變流通路絶恐開壊亂之門又在建安黄初下矣蔡廓言營陽在吳宜厚加供奉不幸卿諸人有弑主之名欲立於世将何得耶傅亮使止徐羡之不及此與霍光説同耳不必便謂為有學術也若止殺廬陵元嘉亦自無屠戮之禍然廬陵要是可廢不可殺也史稱廓年位並輕而為時流所重每至嵗時皆束帯到門立人之朝通塞交戰惟無欲於其間者庶幾為人所信耳廓謂選事不悉見付不作吏部尚書盖魏晉吏部郎已專用人之柄况尚書乎宰相職業不在進用百官余固論之後世盡奪吏銓歸廟堂宰相事但有此一條不然則為落莫失權是其上者皆淪滅不復見君徳天道誰與助成極當考詳蔡興宗傳載爭選事尤詳悉盖散騎常侍中書令祕書監雖非要塗然皆三品與八座征鎮並列選曹所擬授也上二品公相都督主相所自用者殊少耳興宗幸死於廢帝初不然當末年之事未知何以處余每恨荀淑李膺之流師友言議不傳於後觀謝𢎞微傳載謝混烏衣之游益令人慨然如言阿逺剛躁負氣阿客博而無檢曜恃才而持操不篤晦自知而納善不周設復功濟三才終亦以此為恨又云微子異不傷物同不害正皆混語也混已如此况膺等乎晉懲魏失寵樹宗藩遂速亂亡末年道子元顯公卿不復措手足同歸於弊劉裕益甚子弟孩抱皆使驅駕士大夫既不足以鎮繫人心徒扇動同異反叛屢起上下猜防過於庶姓國祚長短竟何所較昔在禹湯維御之制無聞然亦能永世周雖以同姓至八百昭穆之後不絶幾何人主不以道徳囿天下而欲講自固之術雖文武周召吾未見其工也親禮國士友接佳流性之所滯其欲必行意所不在從物回改此最弊事應宜慨然至訊日虚懐博盡慎無以喜怒加人能擇善者而從之美自歸己不可專意自決以矜獨斷之明此宋文帝戒義恭往荆州書中語也宋文帝多恕人之言如慰勞孔熙先以卿之才而滯於習書省理應有異志乃我負卿此亦他人主所不能宜其致元嘉之治也佳流謂時之名勝然未必有榦用之實正人主勵精者所簡薄而帝能親接之盖加於人一等也王微與江湛辭吏部郎書及王僧綽何偃書雖不𢎞暢然無一㸃俗也惜其所知未逺而所立已過爾微言諸葛孔明云來敏亂羣過於孔文舉孔融竒逸天下歸心而亮之言如此盖秦漢以後執權當位者皆有一種操切裁制之習雖亮亦不能免也推亮此意未必逮管樂也鄭鮮之傳言劉裕少親戎旅不經講學及為宰相頗慕風流漢髙祖乃謂以馬上得之安事詩書然則絶學之後多士之餘氣習聞見自不同也按王景文傳伯父智少簡貴有髙名髙祖甚重之與劉穆之謀討劉毅而智在焉他日穆之白髙祖曰代國重事也公云何乃使王智知髙祖笑曰此人髙簡豈聞此輩議論故余謂穆之教誤劉裕也宋文帝既殺徐羡之等分遣大使巡行天下當時惟稱裴松之得奉使之義觀其奏文雅有意裁依事為書必有所考惜乎不傳也州縣監司雖已備列特遣使命有所觀省自足以新一時耳目况人主初即位天下無不想聞徳音乎誠有願治者必自此始往嵗光宗將内禪或勸宰相以赦文宜搜訪巖穴宰相色不怡答云此常談爾或者方爭論變色余笑解之以為今時在客店求差遣者尚不能疏理何暇論巖穴宜丞相以為常談也及既求言而有應詔論事者不特不能延納又從而竊誚之然則如宋文帝裴松之事盖常人所共嗤㸃矣親戚執權能以令終者周公之後惟東平王蒼慕容恪恪别論蒼亦為文而已且又速退所以兄弟無隙也宋文帝本無猜心而義康擅政十餘年威禍在手事㑹既逼生疑起釁致成大戮當是之時盖無所用力徒使巴陵王隨死悲夫何承天安邉論學者多遵用按沈約稱宋人綿河作守兵孤援闊盛衰既兆用啓戎心又分青置境無圉守之宜闕耕戰之略恃冦不來遂無其備周漢二策在宋頓亡故載此論以為博而篤承天亦自言和親事重逺征不可安邉固守其計為長如欲移逺就近浚復城隍固守邉之常經若纂耦車牛課計丁仗盡責之民則事既難從於守備之計亦不周徧矣此是昔人已行之粗説必須用之又當増益推廣而後可大抵謀邊規敵策貴因時有徑切的實用之即驗者如晁錯侯應揚雄江統之説是也施之異日則或不然只如趙充國屯田當時已不可盡用而後世欲拾其遺説歩武從之盖已疎矣若今世詳究此論則又大異古者和親不能專一自春秋至唐皆然而今二百餘年又更兩姓議和株守不變中外所同稍一渝改便致大禍身播國亡主謀者梟誅刋翦罪同叛逆一異也疆場之事一彼一此南北互属前代多有而昔者河東北今也淮漢限以溝壍分劃堅明無復犬牙相錯之形二異也漢文帝言和親之後漢過不先盖中國惟恐匃奴背約而今乃彼自執盟誓懼我移易聲彼之直歸曲於人三異也又承天所言正以和為未易故欲治守策若和親已定信如四時邊城晏然和樂萬里區區守禦何所用之過計私憂勞弊邊民貽笑多士而已頃者朝廷方舉復讐之義余深患之欲先擇沿淮漢十州郡臣牢做家計州以萬家為率國家大捐緡錢二千萬為之立廬舎具牛種置器仗耕織之外課習戰射計一州有二萬人勝兵通家丁得此數三數年間家計完實事藝精熟二十萬人聲勢聨合心力齊同敵雖百萬不得輕撓當是時我無渝約挑彼先動因其際㑹河南可復既復之後於已得之地仍作一重氣壮志強實力足恃雖無大戰敵當銷縮謀因力運戰亦無難如此則藩牆扞城堂奥不動矣今敵雖已復和尤當用此策且春秋戰國圗人之國與自守其國者皆數十百年單行一説世守不易雖三代以仁義致天下亦皆如此而後世乃施浮游嘗試之計朝責夕效後毁前功所以更無凑止䖏况今阻水為境山水寨忠義民兵自備器甲之類在承天四事中略皆施行然敵嘗一至則生聚以百萬計席卷渡江天下騷動竟亦何補故余謂策貴因時取其徑切的實者可也謝靈運撰征郊居賦雖體裁下而音韻髙視漢人規模前作者反當勝也沈約論詞賦之變謂𤣥黄律吕各識物宜欲使宫羽相變低昻互節若前有浮聲則後須切響一簡之内音韻盡殊兩句之中輕重頓異妙達此㫖始可言文余觀詩人之音節未有不順者至騷始逆之騷體既流詩人之順遂不可復自約以後其聲愈浮其節愈急百千年間天下靡然窮巧極妙而無當於義理之豪芒其能髙者不過以氣力振暴之暫稱雄傑而約方言靈均以來此秘未覩盖可歎也建國之道咸殊興王之道不一至於開諫致寧防口取禍固前王同軌後主共則秦殷之敗語戮刺亡周漢之盛謗升箴顯建平王𢎞獻語議也江左之文雕靡無實如此數十字簡矣而該切義理固無害於文也劉璡為建平王景素訟寃書叙事博雅引義切近可追漢人餘風雖間有琢刻少矣比齊梁間豪於一時者絶出倫類不可同稱然璡與兄瓛皆儒者不以文名也顔延之五君詠怨憤斥外而作耳栢舟簡兮君子陽陽丘中有麻等詩使其當時皆如此則亦何貴也夫髙人之思遺世之音尚病其偏况如此等後人不必擬也欲者性之煩濁氣之蒿蒸雖生必有之而生之徳猶火含煙桂懐蠧故性明者欲簡嗜繁者氣惽文士前稱潘陸後稱顔謝而延之頗存理義不獨以文也庭誥雜言會撮成篇卻煩累難讀顧覬之為山隂令務簡績修著名於世後世三萬户邑極衆而宋獨以山隂為最劇其言晝夜不得休事猶不舉誠古今同患至於理繁以約盡日垂簾門階閒寂惟覬之能之盖世之以身累事者不獨庸人汙吏為然而以政自喜者往往皆然也蔡興宗乃以覬之風節過峻豈其謙耶抑興宗猶有以自將耶覬之嘗謂秉命有定分非智力所移惟應恭己守道信天任運而闇者不達妄求僥倖徒虧雅道無關得喪乃以其意命弟子愿著定命論論猥駮無可觀不如此數十語也説到命䖏著語不得雖聖人難之覬之執命是實物故言愈多愈滯耳劉道産在雍州有惠化逺蠻悉歸縁沔而居故當時有襄陽樂之謠道産死而羣蠻大動栁元景宗慤沈慶之窮兵力取之僅克若後世之論則道産為姑息引冦遺患後人方為大罪不得有良吏之稱也慶之以為前後伐蠻皆山下安營蠻得據山為阻矢石有用乃斬山開道不與蠻戰鼓噪上山衝其腹心連營山中開門相通穿池於内以防蠻火竟以此困蠻恐後人或未用也余嘗論用智非勇不能成世固有有勇而以無智敗未有有智而能以無勇成者後世智謀短闕每事挫辱正坐膽力久喪不復生發耳顔師伯用寒人張竒事江左以為口實人主不能以道御臣下而與之爭職事以此為收攬威柄自韓昭侯漢武宣之流猶不能禁止况宋孝武昬徳耶學士大夫每於商論世故無不推墮如魏徴陸贄乃當免耳周朗所言雖未盡當世務然世主真欲論治必由此門要不自庸人出不可謂江東無人也王吉但汎指大概猶得廢棄朗觸忤多矣宜不免死真可歎也沈懐文持論正平亦復併命士君子居世若之何而可晏子叔向特幸耳宋明帝殺吳喜手詔二千四百餘稱其能將數十人降羣賊三百人平十郡妄竊善稱聲滿天下宻懐姦惡人莫之知吾夀百年世間無喜何所虧損疾患不治天下豈可有喜一人將之為用譬如藥餌羸冷資散熱動去堅豈憶始時之患不計後日之損宋人詔令多有此比可謂瑕不掩瑜殺人自生也昔楚子嚢諡君為共孔子謂楚昭王知大道盖自古人君能知君道者甚少而存亡延促更視其力之如何不以道有無為斷此尤可歎息也劉勔降夀陽約三軍不得妄動城内士民秋毫無所失百姓感悦咸曰來蘓生為立碑不惟江左纔有此一事載籍間自少見也理雖具在要須人與理會然後道義可行觀勔條答鄧元友事其自得土者多而䖏之若無惜其遭時愈下不得寘品於羊陸中也袁粲自待甚髙遺落世故其終能立節固宜然既已委權於前方欲作異於後自無可成之理此清談髙詠誤之耳龔穎蜀之辟吏全節故將九載不渝郭原平越之鄙人篤行事親三世無改晉宋以前至於堯舜居官無代但不為民計者更易頻耳故沈約稱宋文帝守宰以六朞為斷雖没世不徙未及曩時而民有所係吏無茍得止言非六朞不得去亦不言及六朞便當代也然是時如顔延之便已除代其後遂稱三周年一小滿而後世立為代法乃至前授未上後代已除甚至再三人欲其䖏殆將五六雖有志之君欲為民計不材者既不可禦而善於職者欲久而不可得古今之變如此可畏也王鎮之王氏衣冠家為廣州蕭然無所營去官之日無異始至能此自應杜慧度朱戴逺人文武兼著清節皎然可尚也陶潜卒於元嘉四年故宋書稱其弱年薄官不潔去就之迹自以曾祖晉世宰輔恥復屈身後代自髙祖王業漸隆不復肯仕所著文章皆題年月義熙以前則書晉年號永初以來維云甲子所載宜得其實而晉書不取彼謂逸民於存亡之義無關故耶沈約恩倖序稱魏立九品盖論人材優劣非為世族髙卑嵗月遷訛斯風漸篤凡厥衣冠莫非二品自此以還遂成卑庶周漢之道以智役愚臺𨽻參差用成等級魏晉以來以貴役賤士庶之科較然有辨自劉毅衛瓘李重論中正至約盡之矣此魏晉江左大事也不然則戴法興徐爰阮佃夫輩皆士大夫之選豈得尚為恩倖耶魏太武言彼常願欲共我一遇交戰我亦不癡復不是苻堅與彼交戰晝則遣騎圍繞夜則離彼百里宿又謂吳人止有斫營伎我亦知彼情離彼百里止宿彼軍三里安邏使首尾相次募人裁五十里天自明去此募人頭何得不輸我斫營者江南之所長大戰者北人之所畏故魏太武聲欲渡江而已其計正在虜掠殘壊爾夷狄之情古今一致然後世智慮變易既不知斫營尤畏大戰不論士大夫雖為將者皆不能言兵是以敵累數百年陸梁無所憚信天地間異事也約為索冦傳載事情精實與中國利害相接瞭然若身履其時班固匈奴傳不能及西南夷訶羅陁呵羅單姿達子師天竺迦毗黎所通表文皆與佛書之行於中國者不異盖魏晉前所未有然則今釋氏諸書是其國俗之常文中國人不曉轉相崇尚以為經爾微言妙義與夫鬼神之貫通誠無間於夷夏然彼可以施之於我而我不得以革之於彼其淺深之不同雅俗之不合孟子所謂未聞變於夷者也遷固相踵作諸志存上古大意於漢事猶多闕略後漢便失比次至約撰宋書粗完實而事多義少其後遂為㑹要矣然備一代之故使後人自擇其體亦只宜如此每見學者於史記漢唐之外往往遺忽既墮熟䖏又統紀不全極失典學之義按孔子自唐虞至魯春秋無不論叙距孔丘卒纔二嵗豈以為博正謂學之次第當如此學者不知遂多異説乖本㫖矣習學記言卷三十一
