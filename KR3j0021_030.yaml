body:
  text: 習學記言卷三十宋業適撰晉書列傳阮籍以酣縱逞人欲而以慎密防世患進不成顯退不成隱岌岌乎刑戮之間深昵權強粗免其身奚異乎羣蝨之裩處而所謂大人先生者烏在也史稱本有濟世志屬魏晉之際天下多故名士少有全者由是不預世事又言率意獨駕不由徑路車跡所窮輒慟哭而返又曰時無英雄使豎子成其名嗟夫世固未易濟而英雄亦多途未知籍所存意如何而不自容至此亦可哀也若稽康則一志陸沉性與道會信無求於世不幸龍章鳳姿驚衆衒俗世獨求之不已使不以正終蓋非其罪也昔孔子患世俗之多故其教必以厚人薄已逺慮近憂立則參前輿則倚衡凜然若兵之加頸而又曰鳥獸不可與同羣吾非斯人之徒而誰與蓋人道之難甚哉然則康雖欲采薇散髮以頤天年而不可得也悲夫悲夫竹林之賢過是無觀已秦秀𫝊史稱朝野以充位居人上智出人下僉以秀為知言夫以鯀歡兜之姦在朝所不能知而充之不肖野人何由知之其通於天下如此夫然則晉本與充共興其國而亡形己見矣賤者道之實退者命之實也朝貴致功之臣野美全德之士上有寬明之主下有聽意之人聖帝之創化也參德乎三皇齊風乎虞夏欲溫溫而和暢不欲察察而明切也欲混混若𤣥流不欲蕩蕩而名發也欲索索而條解不欲契契而繩結也欲藝藝而無垠不欲區區而分别也欲暗然而內章不欲示白若冰雪也欲醇醇而任德不欲瑣瑣而執法也故有獨定之計者不借謀於衆人守不動之安者不假慮於羣賔故能棄外親之華通內道之真去顯顯之明露入昧昧之埃塵宛轉萬情之形表排託虛寂以寄身居無事之宅交釋利之人輕若鴻毛重若泥沈損之不得測之愈深此皆謐道自分界中言語固非耀文華者所能至也自韓非賈誼枚乘東方朔揚雄班固張衡蔡雍韓愈之流作此一種自喻文字雖工拙不同然意足語貞無及皇甫謐者蓋推之使去異乎求之不得有望望戚戚之情也或謂晉無文章惟陶潜歸去來潜亦是道自分界者然恐當更詳爾謐生既不仕臨終薄葬尤可稱所謂一介不取與旅泊天地固無缺餘比之管寧更有職業爾自魏至隋唐曹植陸機為文士之冠植雖波瀾闊而工不逮機但植猶有漢餘體機則格卑氣弱雖杼軸自成遂與古人隔絶至使筆墨道廢數百年可嘆也然機於文字組織錯綜之間實有其功雖古今豪傑命世者亦有所不能預此不可不知觀其譏切曹冏以退為髙而託寄非所勳烈不就竟夷其族乃知文人能言者多能行者少固無取於智也江統徙戎論叙上世事雖略已得其理叙兩漢事極詳不獨漢魏人能為此議論者絶無而能知此本末者絶少也漢宣光魏武號為有識然皆身以戎狄之患遺後使其國尚未亡則子孫自當之蓋天下利害國家大體思患預防非聖人不能也統與郭欽論此事相去才一二十年間固不為深識然當時無一人知者是則雖一二十年正與數百年等矣江惇通道崇檢論今所存者才數十言通明簡暢足以針極時病裴頠雖數千言不能及也馬隆募限腰引弩三十六鈞弓四鈞立標簡試自旦至中得三千五百人蓋設厚賞取於諸軍所以得人速也戰國時兵無不募募者教之揵也三代兵制後世不復茍有倉猝之變求必勝之戰非募無由何者卒雖成列久不見敵安重畏事勢同市人此姦猾亡命之所侮易也小挫沮氣觀望怯心雖擁十萬之衆與棄師無異矣不特隆當以募成功也寡少奪衆勇奮倡行先登得勝後進慕之雖有敗兵可使復振矣漢光晉武銷兵本欲休息百姓而學者尤其以弛備致患然則左射貍首右射騶虞禆冕搢笏明堂耕藉此先儒言成周銷兵節次也然則銷兵未必非視其君思治進德如何耳不然則後世能不忘戰者豈少耶周扎開門王導加贈蓋怨劉隗刁協以及元帝也用心如此去王敦幾何然則晉雖欲中興可得乎按八王既皆專朝挾主甚者篡奪而成都始召王浚之亂東海終成石勒之禍晉史猶以琅邪復興為樹置藩屏之力不知元帝自立於江東乃諸侯之利於晉存亡何預周馥欲遷都華軼不從命皆致討滅使懷愍果南未必能委心推奉也成周以至公大義建侯尚止僅存名號而况後世此事殊未易論劉石雖並據北方而元帝勸進表河朔征鎮夷夏尚一百八十人是時晉亂十五年北方人材猶在國家名號未改但須思慮縝密者經緯其間爾故祖逖能取河南也若王敦不自欲作賊如逖輩計尚有十數人可任江東基址完牢為之著定諸鎮隨地以漸收復聲實相兼夷晉表裏石勒父子必不能雄張然則王導雖以匡弼自許恐未能望古人藩籬也桓溫幸自死且有淮淝之捷而晉祚竟亡事具司馬道子傳是時謝安自謂功盛畏讒至攬桓伊之鬚然晉世事柄悉在諸臣安亦未至於不可為大抵功成意衰衆人常情况又虛曠依違在有無之間者乃當時士大夫膏肓之疾耶然則周公留君奭於危疑已定之後雖非安輩所能知而忠臣慮國始終存亡所係不得不然亦非周公獨聖也王導東晉元臣然有合商量處王敦本司馬越用為揚州而元帝移鎮建業敦素不臣而導以兄弟遇合一時相推討華軼滅杜韜便為不世之勳中興甫建已著強僣之迹致元帝疑憚别用劉隗刁協之流以成大亂不知導初以敦為忠良故同心共輔成晉業耶當是時導之怨與王敦等敦攻下石頭隗協走死遂劫制人主導初不謂不然也使敦不死終肆其志晉必不能抗未知敦事成之後處導何地而導亦將何以自處乎導當事任之際簡逺無競以𢎞量鎮物自其所長至於總統衆務綱理細微又多以所長失之然則謂導賢於一時可矣謂之元臣則未有逆順不分強弱不辨委柄物外因事順心而可以任人家國者也溫嶠智以緯忠𢎞而能整再匡晉室量在功外取與伸縮一本至誠充其所能非東晉人材也一人而已郤鑒德素居正幹用不闕深見大體以德助人蓋其次也然則晉人雖欲以勝會自處超絶塵纍而無益於隱顯用捨之間者固不足進於此例矣明帝嘗獨引紀瞻於廣室慨然憂天下曰社稷之臣欲無復十人如何大哉斯言可以興惜其早亡也元帝於顧榮紀瞻賀循薛兼杜夷皆隆師友之義篤布衣之好劉隗刁協親信繾綣言聽計從戴淵周顗一顧如舊始終無改可謂得帝王用人之度矣不幸與王敦共造基業臣主之分不明凡敦兄弟所不便者皆指為朝廷刻薄之政以下陵上由外制內當陽始爾遂陷幽辱為天下笑皆王導之罪也余固言之矣然猶有一說當晉壞亂奸賊窺伺誰無此心若乃竊名人之目肆無君之暴非常理所能駕馭未有如王敦者蓋師昭以上人也導能於羣從中取其國以還司馬氏為之布腹心樹手足紀綱粗定名位既成凛然傾搖根本自立而敦至死不疑以此為社稷臣可也又不可以常理求矣蓋與蕭何鄧禹荀彧諸葛亮之流時有不同學者又須别看周顗答溫嶠君少年未更事人主自非堯舜何能無失人臣豈可得舉兵以脅主共相推戴未能數年一旦如此豈云非亂乎顗雖踈然此語足以定當時是非之實矣蓋王氏威勢所脅人不知有君嶠未免設語以觀人情也使導一反手則無晉矣傅𤣥言魏文慕通達而天下賤守節相承不已而虛無放蕩之論盈於朝野應詹言訓導之風宜慎所好魏正始之間蔚為文林元康以來賤經尚道以𤣥虛𢎞放為夷逺以儒術清儉為鄙俗然則虛無放蕩是魏末晉初之患而元康之俗正始之所不為也學者盡歸罪王弼何晏恐亦未考劉超為句容令常年賦稅主者常自四出詰評百姓家資超但作大函村别付之使各自書家産投函中訖送還縣百姓依實投上課輸所入有踰常年春秋有履畝秦有頭會箕斂漢不加賦或以算商鹽鐡足之皆令出於上今此聽吏自由隨其優劇疑喪亂後迫猝賦調無常制故也其後畝稅及布乃有定數可見隂陽之事有數無道政教之事有道無數京房劉向以道合數者非真能知之蓋意之也郭璞筮占明有證驗象數的然使由其術道自為無用而亦援房向之遺說引義訓以救災乃士人故步不敢忘爾然璞既以數術自亂遂終不得為士人可憐也庾亮欲廢王導郤鑒固拒乃止亮以方峻格物既不容蘇峻又不容王導耶然導無其德則不可受師保之禮無其材則不可任冢宰之重柄下移而尸其上取侮方鎮見嫉舊僚皆其力用所限而猶欲以無心處之蓋衍澄餘習不能自拔如是而謂之元臣去蕭何諸葛亮逺矣庾翼言偷石頭倉米百萬斛皆是豪將輩而直打殺倉督監以塞責云云雖皆前宰之惛謬江東事去實此之由正指王導也信如其言則陳夀所謂政不容姦人懷自厲路不拾遺強不侵弱風化肅然者誠不易致矣傴儛豪強法行寒劣雖末世政事之通患然改弦易轍使視聽一新蓋有甚難惟子産能行之叔向晏子徒能言之爾况王導謝安妄指𤣥逺空想清淨欲恃此以銷刻薄之習既不可得但為姦蠧之藪而亮翼兄弟及劉隗刁協之流未足整齊先致敗亂者矣王坦之著廢莊論文意大抵出於莊周猶後人以科舉論學滑泥而揚其波耶然當時能如此者便已自立於流俗士安可不振塵濯纓加於人一等哉范寧論太元弊政言選舉制有六年富足便退先起廨舍皆為私家後來新官復應修立方鎮去官皆割精兵器仗以為送故米布之屬不可稱計兵至千餘力入私門復資官廩布宜以三年為斷略見當時寬縱雖賦祿於公者狹而雜取於私者無算矣世事得失隨時不同叔向晏子言齊晉董仲舒貢禹言漢大要失於下而不能收於上者為亡國至秦上已盡收而無所失然亦恐不免於亡此當並論明帝與溫嶠書言謝鯤王廙雖當時君臣親故間上下不至隔絶情義自應有異然其英度包括不減漢光武而風致過之惜盛年不究不然東晉事不止如此也按王稜傳知從兄敦驕傲自負有罔上心日久諫諍以為宜自抑損推崇明主且羣從一門並相與服事應務相崇髙以隆勳業每言苦切稜此語得當時利害之實周瑜獨先盡敬便執臣節魯肅乞為鈴下督故孫權之事可就君臣上下惟立則成使有一人欲破壞則盡衆人之力不足以救矣此東晉之所以甫號中興而便致禍亂史謂恭儉有餘而明斷不足蓋非事實也陸玩蔡謨不敢為三公考當時居是官者亦未有以過二人也凡人操欲利之心往往視人以為無以逾已故援而求之又其甚者不復顧人直自厭其所欲而後止矣觀謨戲侮王導評量世事非自屈於人者蓋其本望有限任不過量雖至得罪而猶不悔更以為得也量力度能知難而退東晉惟蔡謨王羲之能為此論由後世而言以為明智之極然當時之人未聞以為賢者蓋舉一世皆囂然有欲進之心如二人之論乃其時所謂怯懦而不武者也夫置獨怯於衆勇之中要為有益若後世則其智愚賢不肖無不畏事而懼敵者有一二人不然方羣聚而攻之是置之於衆怯之中最為大害不可回轉也當時之人如殷浩者多就有負敗亦常數偶值桓溫摧折之故令不光明於後耳余每論東晉人一進一退乍卻乍前風俗所驅如在衝風駭浪中立身不自求定與諸葛亮鞠躬盡力死而後已是一種見識殆與浪戰無異若春秋戰國人先做一二十年工夫使出必有成者不獨東晉人不能辦雖亮亦未能也東晉以名用人而士大夫亦以名自用周顗戴淵庾亮阮孚阮裕劉惔謝尚殷浩王述父子王羲之謝安之流有遇有不遇或成或否獨謝安一人收用名之效蓋自何晏夏侯𤣥嵇康以來更變故翦伐而卒不為之衰息至是而安獨有成既成而後亦莫之繼也若有實者惟溫嶠一人但太明鋭爾以名用人纍世多歷年久心誠好之而不倦自是為國者大根本此事未易輕論要亦兩漢所無遷固裁量所不到也淮淝之役所以勝者苻堅既使卻陳而大衆已亂不復能整故𤣥等決進與其前鋒交戰而苻融被殺堅中流矢遂至崩潰也若堅部分無擾十陪之衆得用則𤣥等兵力有限雖極其精鋭亦難以必得志矣晉人積百年兵間之習敵人正以百萬來士心終不沮喪此為待敵之本而兩軍相交自非節制素定臨陳必有變態出於規慮之所不及者如堅因麾卻遂動陳面是也或者不講謂大衆難用固有自敗之勢且白起王翦皆用大衆本無敗形堅之兵要未練耳甚者至謂𤣥等特幸勝此又非也勝亦何可幸致乎殷浩之敗王羲之謂保淮非所復及莫如保江江外羈縻而已自今觀之其言深切存亡在目乃必驗之智也然浩雖以此廢而桓溫用之又甚於浩晉仍自持如故何哉余故謂晉人囂然欲進之心上下略同而浩與桓溫特以弱強為成敗爾桓伊撫箏謝安涕泣雖君臣有間然安驟得成功自處驕滿若童孩然平生之量至是窮矣朱序傳稱苻融以三十萬衆先至堅遣序說降謝石序謂石曰若堅百萬之衆悉到莫可與敵及其未會擊之可以得志此述淮淝勝負要語也古人論兵後世不可復及然能勇上也無怯次也謀慮變化皆出於不怯者也及其勝百萬之衆人或以為幸矣不怯而後幸可待也怯則無幸也東晉權歸王謝桓庾四族而四族亦人材所自出殆如齊諸田魯三桓晉六卿矣漢魏無是也材非偏聚也勢之所趨則激而為材其不得為樗櫟臃腫者亦勢也謝𤣥綺紈子弟克成雋功而諸葛瞻乃以敗辱殞身事固惟其時耶余觀陳夀論諸葛亮已實録不誣其美矣而當時乃謂夀毁亮報其私怨蓋亮名重於實不待史而有傳雖千載之後猶然也人心所歸不可以幸致此固學者之常語然亦有不盡然者如亮雖不至於名浮其實而世之有實而名不副者多矣可勝歎哉余嘗疑晉史言司馬懿託風痺辭辟殺婢曬書為非實及觀習鑿齒以越魏繼漢著論卓詭不常意此等叙事殆齒所為也又庾衮夏統辛憲英等傳皆浮誇往往一體裴松之謂王淩子廣論何晏丁畢為齒自造者略相類司馬元顯一日殺二士江績御史中丞也車𦙍吏部尚書也晉安得不亡士當此時猶立人之朝豈其得止而不止耶王雅當時號為佞幸而能測知王恭殷仲堪必為亂階士固未易論也然風俗既壞好惡相驅雖有清議竟未知孰是劉殷稱事君之法當務幾諫凡人尚不可斥其過而况萬乘此論往往已行於世按書木從繩則正君從諫則聖繩之於木未有以幾而見從者直削之而已孔子言勿欺也而犯之蓋諫則犯懼犯則不敢諫而君不免有過矣君之得失非止一身天下治亂繫焉然則臣諫不為犯君從不為怒者皆非一身計殷所言不可用也李皓言經史道德如采菽中原勤之者則功多此語當記然所謂勤者非漁獵搜取課勞計獲而後能也劉𢎞以徴士伍朝為零陵太守主者限以選例尚書郎胡濟奏從之而朝不就魏晉權在選曹所用即為例而未有方鎮如此用人者此古嶽牧事也天下愈亂才舉其一未足以還古道而王敦桓溫方襲跡而起以成專擅之勢開下比之門朝之不就自足以為法也劉毅抗論於朝謂范武威疾若不篤是為伯夷叔齊復存於今如其信篤益是聖主所宜哀矜毅以剛狷輒發不為一時通人所尚觀其語該涉甚多所存逺矣通人之識固未能至也魯褒錢神論史謂疾時者共傳其文而復不全惜哉惜哉易稱利者義之和孔子言小人喻於利體其所和聖賢之用也察其所喻小人之歸也信如褒之論則利固為實義者名而已矣而何以疾為易又稱理財正辭禁民為非其嚴如此而後世猶以利為義况此論乎此尤可歎爾中世之士或必於顯或必於隱必於顯者榮耀甚而不退必於隱者憔悴極而不行雖皆不概乎中道而以失己者較之其利害得喪固不同也陶潜非必於隱者也特見其不可而止爾其所利所得雖與必隱者無異其所守則通而當於義和而蹈於常所以為優也至於識趣言語足以髙世而詠歌陶然順於物理則不惟當於義而又有文詞之可觀焉蓋中世之士如潜者一二而已潜之所稱山林居處殆孔子所謂不堪顔子之憂者潜能樂之而後世乃欲以徇利不已之心過奢無制之物有羡於潜而庶幾之豈不誤哉或問子所謂中世之士若此上世如之何詩書所稱隱者皆有故非不顧其時而自必其身者也載記三代以後取天下者仁暴不一強者為雄石勒苻堅既有十分之八勒虎極其殘酷以力自斃固無可言者獨堅雅有並包之度綏懷之略雖暮年一敗亦古今常有而遂紛披摧折魚爛土崩不可救止者蓋堅所取者廣而所守者狹其所以並包綏懷者乃其所以失之也觀良平蕭何為漢髙計慮其補綻調柔者盡婦女箱篋之智決裂震服者皆市井屠儈之術然不得不出於此而光武身所戡滅雖多用兵雖久未嘗不隨事裁割使倥偬之時便享平寧之利二漢之所以取而成傳而久者臣以是道謀之於前君以是道行之於後也堅既廣大闊達事無正法而王猛復明鋭果決動欲必成君臣豪俊俱無堅凝之䇿此正後世取天下之深忌宜其一跌而不足以免身也學者皆謂猛臨沒勸堅勿以晉為圖堅不從故敗此為晉計可也若為堅計不過欲并天下爾雖圖晉何害乎崔浩言慕容恪之輔幼主慕容暐之霍光也浩蓋妄矣恪秦漢以後所未有霍光何足比乎又姚興以國用不足增關津之稅鹽竹山木皆有賦秦漢後加增稅賦皆為變政大事故其羣臣咸諫與桑𢎞羊朱暉同意以此知衰世之法古今一轍也苻堅在新平寺猶竒待尹緯以為王景略之儔自愧其不知念此令人酸楚雖云古之王者知命之不長並建聖哲此意當無極然後世人主茍計數定自足以守堅之不亡要不在此乃齊桓劉備一節常留胸次而然也李雄無事小出其丞相楊褒於後持矛馳馬過雄雄怪問之對曰夫統天下之重如臣乘惡馬而持矛也急之則慮自傷緩之則懼其失是以馬馳而不制也雄寤即還史稱雄為國無威儀人主方出丞相持矛馳馬過其前此無威儀之一事也然如褒所諫雄所聽乃春秋戰國間事秦漢以後固無之使君臣簡質而可以聞善改過區區之威儀又何足貴乎此為史者所不知也苻堅之遣慕容垂夙度不疑可也然百萬之衆一朝傾敗度雖不可改智自當及之矣至丕使垂討翟斌乃令苻飛龍為副又加以委節此尤疏謬石越言公父子好存小仁不顧大計吾屬終當為鮮卑虜矣夫大計有是有非若越此言真中堅病也晉有正始微言勝㑹韻士至於江左雖安民之道不足而扶世之志未衰學者未宜略也叙事雖煩猥無刋翦之功然成敗得失之際十亦得七八史臣語陋無一可採然豫奪亦不差信孟子所謂是非之心人皆有之也舊傳有少年見一長者問讀何書云晉書問晉書有幾個好亭子名少年惘然無以對方悟前輩讀書之法使其果然甚誤學者韓愈謂上規姚姒及誦其所學乃自云記事者必提其要纂言者必鈎其𤣥恐如此用功亦未足以規姚姒就能規之不過語言之不似近世者耳而况於亭子名耶習學記言卷三十
