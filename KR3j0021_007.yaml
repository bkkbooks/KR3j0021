body:
  text: 習學記言卷七宋葉適撰周禮儀禮周官獨藏於成周孔子未之言晚始出秦漢之際故學者疑信不一好之甚者以為周公所自為此固妄耳其極盡小大天與人等道與事等教與法等粗與細等文與質等無疏無密無始無卒其簡不失其繁不溢則雖不必周公所自為而非如周公者亦不能為也此書既成參以成康盛時董正治官及命君陳册畢公之詞猶若未足以盡行其道又商之傲民亦介於其中未知何以處之畢命謂既厯三紀世變風移旌别淑慝表厥宅里弗率訓典殊厥井疆豈其初固使之觀治而已不遽強以必從也及昭穆道衰而君牙伯冏之流愈不足以行其道又可見矣又上考詩七月周所以興正家人作苦之事又綿追稱太王乃召司空乃召司徒意是時官未必備官雖備而道未必備也又書康誥稱文王明德慎罰肇造區夏直以小心克己為天命所歸亦無如是之𢎞大蓋周召之徒因天下已定集成其書章明一代之典法殆堯舜禹湯所無有而古今事理之粹精特聚見於此如詩書則尚有興壞是非之粗迹存焉故也然余所疑者周都豐鎬而其書專治洛邑然則鄉遂郊野興賢勸氓凡國之政將一斷於是書而舊都莫之用耶或舊都固自有法而一畿之內可以兩治耶書之所不言不可得考而周之所以致盛治則猶有不盡具者此其為深可惜也其後宗周亡滅而東周之君臣世守此書然諸侯夷狄方迭為強雄家官巨列所職不過行於一城而微文縟典乃或凖於天下遂以是為共主四百餘年然則孔子豈以有其書而不能起其治故不言耶不然則所謂周監於二代郁郁乎文哉吾從周者豈即此書也嗚呼劉歆蘇綽王安石固此書之腥穢而鄭玄已下又其粳粃爾按六卿分職各以數字之微使歸統敘一職之內各有條目使就績用充其所行而三才之道無遺憾矣雖舜禹皋陶未能如此詳盡也其所以為異者舜典以人任官而周官以官任人爾余故謂自成康盛時其人已不足以盡行其道然學者於此觀之當知官有職業則道可行知人有職業則材可成愈於子思孟子猶未免以意言之豈其亦未見此書也舜命司徒止數語而周官諄悉至此然亦無在數語之外者堯舜三代教治皆出于一但記敘廣略不同耳學者耽味舜典便厭周官之煩及其於周官考驗則井田任土紛然百緒窮年白首而不足以有明視舜語殆成胡越矣周官言道則兼藝貴自國子弟賤及民庶皆教之其言儒以道得民至德以為道本最為要切而未嘗言其所以為道者雖書堯舜時亦已言道及孔子言道尤著明然終不的言道是何物豈古人所謂道者上下皆通知之但患所行不至耶老聃本周史官而其書盡遺萬事而特言道凡其形貌眹兆眇忽微妙無不悉具余嘗疑其非聃所著或隱者之詞也而易傳及子思孟子亦爭言道皆定為某物故後世之於道始有異説而益以莊列西方之學愈乖離矣今且當以儒以道得民至德以為道本二言為證庶學者無畔渙之患而不失古人之統也市所以交易百貨民生通塞之所由司市為之治教禁令甚詳其言曰國君過市則刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷蓋財之所聚非馳突之所加利之所在非觀視之所及也司徒以五禮防萬民之偽而教之中以六樂防萬民之情而教之和而宗伯以天産作陰德以中禮防之以地産作陽德以和樂防之是則民偽者天之屬也民情者地之屬也偽者動作文為辭讓度數之辨也情者耳目口鼻四肢之節也子産言人生始化曰魄陽曰魂而儒者因謂體魄則降知氣在上又舉季子之言謂骨肉歸復于土命也魂氣則無不之也易傳又謂精氣為物遊魂為變故後世皆以魂知為陽體魄為陰然以宗伯之言考之則魂知者固陰德也體魄者固陽德也偽不可見而能匿情故為陰情可見而能滅偽故為陽禮樂兼防而中和兼得則性正而身安此古人之微言篤論也若後世之師者教人抑情以徇偽禮不能中樂不能和則性枉而身病矣舜典言擊石拊石百獸率舞簫韶九成鳳凰來儀大司樂言八變而天神降六變而地示出古人皆指其實不想象而云也人鬼不言出鬼固依於人也古人不以致神示為難而以天地神明得其所安為難後世反之太卜掌三易之法一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四占人以八卦占簭人掌三易以辨九簭之名詳此則周易之為三易别卦之為六十四自舜禹以來用之矣而後世有伏羲始畫八卦文王重為六十四又謂紂囚文王於羑里始演周易又謂河出圖有自然之文學者因之有伏羲先天文王後天之論不知所本始按籥章之官掌土鼓豳籥吹豳詩擊土鼓以逆寒暑以樂田畯蓋周之舊樂也七月敘以陳王業而説者乃以為周公所作周公方制禮樂陳雅頌以昭先公先王之功德而自作土風之詩使籥章掌之可乎然則周易果文王所改作而後世臣子不以嚴宗廟參典謨顧乃藏之於太祝等之於卜筮何媟嫚其先君若是哉凡卦之辭文之繇筮史所測推數極象比物連類不差毫髮獨孔子以為不然故孔氏之繫易以為必如是而測之由其中正而不以禍福利害亂其心者此君子之所以為易也而學者既不能知反援孔子之易同歸於卜筮以為人更三聖世厯三古而後成書嗟夫學者之自聾瞽無足怪者而吾悲其轉相聾瞽於人而未有己也掌固造都邑則治其固與其守法國都之境有溝樹之固郊亦如之民皆有職焉司險設國之五溝五塗而樹之林以為阻固皆有守禁而逹其道路禹湯以前不知何如而周司馬之任如此故雖小侯陋國各有阻固不得輕侵而存者數百十年孔子亦言王公設險以守其國蓋不如是則無以國為也而孟子乃言域民不以封疆之界固國不以山溪之險此説既行儒者世祖之今長淮連漢荆襄犬牙錯處綿數千里無復阻隔敵之至我常蕩然而我之於敵尺寸不能至也此今世大議論有國者不知講以存亡為戲奈何職方辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九穀六畜之數要周知其利害余嘗疑召公在燕太公在齊唐叔在晉皆為邊逺與戎狄鄰接而江漢之間封建所不至則周之所自治者固甚狹而職方所辨乃若是之甚詳雖漢唐盛時不能何也豈姑具之圖籍而實未能統屬耶周召之政其必不然夫辨之詳而責之略治之狹而服之廣非德有餘於天下何以致之司冦以圜土聚教罷民其能改者反于中國以嘉石平罷民使州里任之則宥而舍之鄉遂縣士之有刑殺者欲免則王與公卿會其期司刺以三法求民情斷民中季康子曰如殺無道以就有道何如孔子曰子為政焉用殺子欲善而民善矣夫周召之用刑罪有餘而法不足孔子之論刑殺有窮而生無窮子思孟子未足以及此也而欲以建三典糾萬民難矣大小行人司儀所以親待諸侯邦國之禮學者徒謂其揖讓周旋之美都不知周召經紀天下精神會聚於此參之以詩書所記則唐虞三代之為國家豈有毫髮不盡於人心者哉蓋其得之未嘗以智力其守之未嘗不以禮義此意至周衰惟管仲知之故其言曰招攜以禮懷逺以德德禮不易無人不懷齊侯修禮於諸侯諸侯官受方物後世之學專以春秋逹王道詩書周官取具而已實自孟子始又孔子謂管仲身不由禮則禮不能行於天下故謂之小器而孟子考之不詳因亦併廢管仲然則周禮與詩書並立管仲識周禮尚存此恐孟子未知也學者承誤不思其中所蔽塞多矣大宰以九賦斂財賄一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦七曰關市之賦八曰山澤之賦九曰幣餘之賦載師以㕓里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任疆地太宰總其法載師專其任非二事也而鄭玄以為賦口率出泉今之算泉民或謂之賦此其舊名與堯舜三代之治法任民以地而不責其身故用民之力豐年無過三日其愛惜之如此且賦口率出泉後世之暴斂玄乃舉以為此玄雖博洽羣書訓釋經義而不知帝王大意隨文彼此輒形箋傳以誤後世其害甚矣又載師言任地國宅無征園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二惟其漆林之征二十而五蓋視其所任勞逸獲利厚薄而為之多少亦無定法此司徒之正文也而儒者爭言古稅法必出於十一又有貢助徹之異而其實皆不過十一夫以司徒教養其民起居飲食待官而具吉凶生死無不與偕則取之雖或不止於十一固非為過也後世芻狗百姓不教不養貧富憂樂茫然不知真因其自有而遂取之則就能止於十一而已不勝其過矣亦豈得為正中哉况合天下以奉一君地大稅廣上無前代封建之煩下無近世養兵之衆則雖二十而一可也三十而一可也豈得以孟子貉道之言為斷耶司徒建邦國諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者三之一諸伯之地封疆方三百里其食者三之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一又職方氏邦國千里封公以方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男兩言自五百里至百里此成周分土之定制也諸侯之國三五相因周之特封者可數齊晉魯衛陳蔡宋鄭往往皆自五百里以下而諸家之論謂諸侯必百里者妄説也孟子言周公封魯地非不足而儉於百里太公封齊地非不足而儉於百里孟子何得不知齊魯之始封而以百里限之乎封疆多而食者少地勢則然而鄭衆謂包以附庸鄭玄又謂一易再易必足其國之用而後貢其餘者尤妄説也且雖王畿千里亦不過舉封疆言安得盡可食之地哉儀禮所記有司之事以其所存逆其所不存當時舉一禮必有儀儀不勝記則何止於此顧命可見叔孫通朝十月儀後世有司亦皆如此只為不及古人然亦不可不知也文多而義少事淺而防深雖周召立制與後世共由之而儒者為學固宜有煩要博約之異故孔子謂子夏無為小人儒子貢不幸言而中曾子亦言君子所貴乎道者三而已學者之患在於不明統紀玩此忘彼守粗遺實或荒陋不知忽略不講既已失之其細碎太甚者又以為先王一微一小皆有精義錯陳午割必中法程然則官司所傳厯世所行聖人亦何由盡以為一己所紛更乎韓愈又言惜吾不及其時進退揖讓於其間以余觀儀禮所記與周官禮記左氏相出入詩書亦互見鄭玄最通博矣蓋春秋時周及魯行之尤詳而他諸侯國亦無不遵用不知者以相病不能者以相恥下至戰國尚存秦雖掃滅漢有諸博士所記鄉射鄉飲雅歌驪駒猶時見一二董卓敗曹操興始盡亡之矣劉表亦頗欲收拾而智計之士以為笑相率去之諸葛亮尤懲艾雖號名續漢統而不復考尋矣是愈之所欲進退揖讓者特衰周春秋諸侯事非文王周公盛時也椒舉曰夏啓有鈞臺之饗商湯有景亳之命周武有孟津之誓成有岐陽之搜康有鄷宫之朝齊桓有召陵之師晉文有踐土之盟君其何用楚子曰吾用齊桓如此等大朝會殷國遍巡天下記之至戰國固在也儀禮者士之禮通記大夫諸侯而天子無考焉何能及三代之彌文縟典乎為人後者為其父母報傳曰何以期也不二斬也何以不二斬也特重於大宗者降其小宗也歐陽氏濮議據此謂一世之人茍徇俚俗諱稱其父母按此傳專明大宗則固有昵比本親疏薄正統之防矣歐陽氏既以知禮自許則當明降詔旨言濮安懿王朕本生父大宗至重靡敢顧私敬不並隆義有由起濮國子孫世世嗣王奉祀之禮務極恭肅無有慢逺以稱朕念親親本之意然則士大夫豈有異論乎司馬氏亦不肯自謂不知禮欲救一時之失則當建議言濮安懿王宜稱皇帝本生親本生則降於為後矣爵命之隆子不加父宜於濮國建園立廟王其子孫世一人主奉祭祀極於嚴敬所須並有司為給如此則上無違背禮經之過下無蹈襲衰漢之失然則朝廷豈有不從乎今各以末世之行相猜互以鄙野之事相詆激成大悖貽譏百世猶為有君子乎且王圭戒吏以光草議為抵是名從同列而實畏宰相也曾鞏語修且無以其所議示人是內懼衆譁而外姑以諂修爾嗟夫茍且之弊如此欲禮教之明可得哉習學記言卷七
