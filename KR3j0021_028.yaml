body:
  text: 習學記言卷二十八宋葉適撰三國志吳志方漢帝在長安王允破敗而李傕郭汜等更相刦質闗東視人主如土梗未有知天下大勢所歸者獨荀彧以此勸曹操遂於兵少地狹之時首執其柄雖操雄詐過人然亦有以得之矣此外惟田豐劉備諸葛亮孫策爾備徒有意就復萬一僥倖何所能為策勁果明逹又已有事力使不死而究其志未可量也然則所謂深慮知化之士要自不多有古今所同也尹吉甫雖有江漢之詩而周人無征伐之實吳越但内爭三江五湖之利爾楚滅越秦滅楚江東尋即散壊以至項羽之亡兩漢之興皆未有以長江為險者及孫氏初割據曹操猶未與之競逐既敗赤壁建安十八年始攻濡須相繼十餘年魏凡五至江濱魏文帝見波濤洶湧歎曰嗟乎固天所以限南北也遂歸自是南北之論遂立大扺楚熊開拓荆蠻而孫權疏理揚越江東浸成家計魏因而力爭乃以不得踰越為限天固未嘗特為南北作限而亦非前代之所難取也故孫策謂舉江東之衆决機於兩陣之間與天下爭衡權不如我舉賢任能各盡其心以保江東我不如權然則雖䇿亦不以江東自足盖借為進取之資爾孰謂六代南唐皆局於此乎吳録又言孫韶遣髙夀率敢死士五百人於徑路夜要魏文帝帝大驚得其副車羽盖而還正與㣲虎事同近嵗滕宬偶建策而聞者怒甚以為激虜而敗和議然亦不足怪也孫權以黄龍元年即真魏明帝三四年也距策初得江東三十餘年矣以權之能自守衆人盡力輔之患難百罹方稱大號夫豈不急勢未可也而袁術袁紹未有髣髴遽自尊崇以亡其族實力之與虚意相去懸絶如此謀臣策士不可不知孫權用萬人報聘遼東舉朝以為不可權之謬不待論矣余獨怪權以區區江東違衆心行失䇿若此而猶無與於興亡之數後世或以天下之大行之一跌而遂不可復何也雖然亦幸公孫淵即改計不過為笑一時爾如再三牽綴未已權意盛竭國從之張昭輩皆當見殺真速亡矣按權遣軍十萬作堂邑涂塘以淹北道是時塘外皆敵境故也若棄淮不敢守於已腹内瀦水自淹而曰踵昔人之已行此余所不能知也李衡妻習氏不聽衡治生嘗稱大史公江陵千樹橘當封君家曰人患無徳義不患不富貴若貴而能貧方好耳此何為哉秦漢以後載婦人女子之賢者多不可信此語而果可信雖羔羊何以尚兹孫休即位始欲按古置學官立五經博士於是江東無學久矣人言州郡吏民及諸營兵皆浮船長江賈作上下良田漸廢見榖日少當孫權時上下力耕與戰相須兵可常用是以賈少而農多非真能務本也古人得百里之地便為不拔基業三國各方數千里但汲汲以殺人為事不能一朝安如此等詔令數十年纔一二見耳以古法凖之雖欲久存可得乎孫休武后劉龑别制名字為世所嗤固無足論者然自伏羲至堯舜文字皆已一成不變後世無復加損矣凡物號事名亘天極地無不皆然此人為之耶天設之耶莫知其然而然耶學者乃謂伏羲始畫八卦造書契以代結繩之政由是文籍生焉恐未可據也㑹稽功曹邵疇自殺置辭有天下重器匹夫横議含垢藏疾不彰翰筆鎮躁歸静使之自息等語皆未易及若果疇之言而殺身以明將輕用其死近乎匹夫匹婦之為諒者豈所謂梁王墮馬賈誼自傷殉人之義固應爾耶或勸劉繇可以太史慈為大將軍繇曰我若用子義許子將不當笑我耶但使偵視輕重而已由後人言之必謂許郭風流自命敗壊事功為此不切情實之論然當時所謂三君八俊之儔無不品局並濟榦雅兼遂者皆雍容鎮服於上而後進雁行奔走於下未有不肖惡子輒厠其間也劉備言孔北海乃復知天下有劉備耶然則漢中世人物可以想見學者自當深識孫權自作書疏數處其與孫皎書頗有文義可觀既知其能以謹細寛綽包受麤武之為難又涉厯經傳有益世用所以勸吕䝉讀書不虚語也曹操劉備皆能道語言操險薄著於詞章無可録備與禪書稱勉之勉之勿以惡小而為之勿以善小而不為汝與丞相徔事事之如父其自云周旋陳元方鄭康成間論治道多矣當亦有味其言之也諸孫多才武與䇿權共起曹劉盖孤弱矣興亡以道不在其宗曹氏以爽亡孫以峻綝敗張昭誦君子之事上章一時咸以為得所誦然如嚴畯止誦仲尼居則誠昭所謂鄙生者若昭之所誦要使其君知凡為人臣者進退開説之際皆當盡忠補過順美匡惡不徒燕談閒語汎論平生以是致為臣之義可也若真欲盡忠補過順美匡惡則亦非此所能盡何不贊其有至徳要道以順天下民用和睦上下無怨其於盡忠將順何以過此恐昭之君臣亦未能當爾古人以用才為難故曰在知人曰聿求曰籲俊曰旁招至季世始以才得自用為難烝民所誦仲山甫漢蕭張邴魏近之矣陳夀稱孫權不及孫策不能相張昭謂顧雍依仗素業而將之智局故能究極榮位如雍始終無玷國人上下所同敬而夀之論不盡其美盖亦有所見非偶然者正以其自用之也自是以後號為一世大臣當時所貴後人所尊大抵多雍之流皆人才之所以自用而人主用才之道不復見矣此意甚長要當細考孫權論魏明帝選用忠良寛刑罰布恩惠薄賦省役以為是衰證非興隆之漸由今觀之正坐不能如陸遜所言爾權以此為不足以致興隆未知權所謂興隆者竟何在享國久近在其人之心量廣狹權有地數千里立國數十年以力戰為强以獨任為能殘民以逞終無毫髪愛利之意身死而其後不復振操術使之然也張絃臨死語人情憚難而趨易好同而惡異與治道相反夫習於難易流於異同而不計其治亂固人情之同患然治之所在實難少而易多同衆而異寡亂之所生常冐行其所難故犯其所異若止以不憚難不惡異為合治道此特言治之麤者故伊尹教太甲有言逆於汝心必求諸道有言遜於汝志必求諸非道雖非上哲而志之順逆必與道之是非對立故人之所謂難者不知其難所謂異者不知其異以太甲之不明而終能思庸無禹湯之徳而致禹湯之治者由伊尹言之精也曹操乘荆州之捷徑取孫權此常人之所畏爾稍有意慮便自知不然况周瑜魯肅輩乎李左車勸韓信按甲以服燕操亦非不曉而急於席卷遂墜䇿士之所諱是事古今同律何止一赤壁也然張悌決版橋之戰亦與赤壁何逺而吳竟以滅盖興亡自有象操雖强而孫氏立國之初忠智畢力大勢既定實不可以虚聲下至晉兵將雖不如曹而吳亡形已成悌所謂無愚智皆知之其奮於一戰者不過欲與之同死耳此所以決䇿同而成敗異也孫權臨稱尊號謂人曰昔魯子敬嘗道此可謂明於事勢矣戰國以後浮薄之士妄稱非冀以干時偶成忽敗盖無所不有惟其實可以造事者彼固未嘗輕言而此亦不敢輕聽肅之於權其驗乃在數十年之後如諸葛亮答劉備止論形勢大要初不言當何所至豈孔子所謂古者言之不出恥躬之不逮歟然則如張昭之無言權自不當責也孫權與呂䝉論讀書及光武曹孟徳事并魯肅言䝉進學之益學者當詳看若光武庶幾能讀書者權及曹操未可言能讀書也權又謂不當治經為博士使博士中無此則經當有兩説不然則博士之説可廢歟虞翻東國俊才宦仕州郡上不及預天下廢興之義下不能為一身榮辱之防虚効忠勤輕招廢放惜哉惜哉曽不得比顧雍諸葛瑾之倫也虞聳抽引人物務在幽隠孤陋之中亦用意至到之一節其言所譽依已成所毁依已敗後世則又不然嫉其已成而設毁以敗之皆是也張温文識功用雖無𫝊於後觀顧雍張昭諸葛亮等所推與可謂顔出孔門參賜同譽賈登漢室絳灌不讒也自古負不世之才或為人主所知而其下共排笮之使不得志者有矣未有舉朝所服上下交願而人主反加忌惡羅致其罪而瀕於死亡也此但孫權自度已不足以用又從而傾之爾於温何損而注載虞俊謂其才多智少華而不實有覆家之禍吾見其兆豈其然乎駱統疏字字可考真使人三歎息也駱統區區獨知以民為重安得長者之言昆陽以後官渡周瑜闗羽陸遜皆大戰也劉備平生拙於用兵舉無不敗乃専師獨將以攖吳人方盛之鋒自無得勝之理然素有雄名而遜晩出陳夀所謂摧而克之罔不如志盖亦難事也按遜傳督五萬人拒備備𫝊不言幾人要須倍之魏書云四萬人恐不然備既不能取夷陵順流破竹而斜側傍入縁山列險衆無所施名為五六百里實不過數十里耳魏文帝笑備不曉兵豈有七百里營可以拒敵如據其要害雖苞桑原隰險阻亦何所忌乎陸抗討步闡軍營更築嚴圍自赤谿至故市内以圍闡外以拒冦晝夜催切如敵已至於徐晃解樊圍事已互見之盖智勇相遇各盡其力不恃敵之不敢救一旦遁退如諸葛恪自取喪敗也抗又言徳均則衆勝寡力侔則安制危庶政陵遲黎民未又而議者徒以長川峻山限帶封域此乃書𫝊之末事非智者之所先也善哉與司馬侯吳起合矣陸氏信才父子也孫登徳兼於能知人則哲深逹治要臨歿一疏不論三代以前三代以後世子藩王之賢少有及者同時曹子桓子建何足道哉然孫權暮年驕惰猜險禍成骨月登亦幸而早死未知父子之愛竟能始終否賀齊傳甚竒偉江東之有山越無異夷蠻盖秦漢所不得盡治孫氏既以吳越起事搜剔制服數十年間遂成平土矣今湖南尚有峒民而世無齊輩勇决誤揺手動足輒為大患雖非先王論治所尚然以彼視此猶有可言而後世因諱之不敢道如齊者殆不可及也吳範占驗存亡興廢無不審中使如其言無用人事矣將天定而人從耶將人為而天合耶將如物之形立而影隨耶自堯舜三代以道制命以徳聽天而禎祥數術猶未嘗不行乎其間獨未知秦漢之後或有聖賢事功者其天道先具又當如何爾諸葛恪先討山越後築東興功效不可掩矣然推此而遂欲施於天下大計則覆宗廢主傾辱其國曾不旋踵者天下之計自有定形不因事而就恪智小不足以知之慮近謀逺勢當然爾然當時議論徒能毁其已敗則亦無所取王蕃樓𤣥賀邵韋昭華覈吳之將亡孫皓酷暴尚有此人孔子稱殷有三仁殷聖賢數十世之天下其亡有此仁人固其宜也悲夫蜀志劉表當亂世雍容文義自保一方比於袁曹之殘民不猶愈乎劉璋雖闇懦然國富民盛守之以恩無所得罪也而縱横之士韓嵩張松之徒各思自逞不以其上為可安必欲與之偕亡而後已利口覆邦家真可惡哉劉備頗知天下大計所在但初起時名位㣲淺不及當諸人盟㑹之際既後起智勇短劣不能折羣雄勝敗之衝安有一二十年進取無成栖栖寄托而猶欲就功名者所以自負惟有謀誅曹操一事始終賴此僅立一隅大抵雖匹夫特起未有無揁榦而可偶然立事者如荆益固容身之地然圖之無名極覺勉强其誅不武其克不令諸葛亮龎統以此自見不如袖手寂寞終無所為也陳夀言及其舉國託孤於諸葛亮而心神無貳誠君臣之至公古今之盛軌道得出司馬遷不能過也周衰聖賢不作管仲相齊成匡濟之業春秋二百餘年載之余考次仲事與王道未有以異而處士權謀用為首稱諸葛亮治蜀雖不能復漢然千嵗間炳如丹青余撫亮所行實用霸政而論者乃以為幾於王道盖古今之世不同而人心見識亦隨以變也劉備與關羽張飛麋竺簡雍流轉南北自壯至老殆絶資身之策而亮教以取荆益然後卒成三分荆益雖可取然假力於孫權則借貸督索㑹盟於劉璋則欺侮攘奪計亮之始終存心行事不宜有此而號其名曰興漢則可悲也故余以為君子之於天下必使之無一不正而後從其君自伊呂不興而管樂之亡無復可為之時矣司馬徳操謂儒生俗士豈識時務識時務者在乎俊傑方公孫衍張儀開闔動揺天下聽命而孟子以為妾婦之道則極一世之智計而不足以當儒者之隠約東漢士貴風操家尚經學亦既知義矣然而勁勇林起豪俠雲萃而先生大人不足以鎮之散亂馳突鬭成末世之禍於是揣時變者負算畧語世事者極縱横而儒生稽古以俗士廢焉徳操所謂俊傑幸有亮在然猶未免於縱横若他人不足以語亮者法正之流勿數可也余嘗論漢髙無所能而蕭何與之以天下今觀諸葛亮之於劉備亦然若光武曹操劉裕唐太宗皆身自取其臣助之而已然漢髙猶是大勢已成何之與為易備漂流二十年未嘗得尺寸亮鑿空榦取以無為有比於蕭何其事倍難至於始終任責習坎心亨而行不尚以古人之資而用後世策士之術理不兩立所以盡力而少功也眉山蘇氏言出師表簡而盡直而不肆與伊訓説命表裏亮謀取益州日月之食也至是則人皆仰之不復論前事矣蘇氏之言雖過然大指亦近之亮自備死閉闗不出五年一出而不可敵可也一出而敗則其後錯落不復振乃理之必至矣湯文王百里而有天下孰謂益州之大不可以取患不行湯文王之道耳亮區區信賞必罰朝種暮穫雖號治辦而魏亦不至於亂則安得以一隅之地而収克復之勲如用魏延楊儀尚自不保其後是亦與魏何以相過非所謂以百而取一也臣死之日不使内有餘帛外有贏財以負陛下及卒如其所言其小心克畏與蕭何同此所以能服一世也然以上當更有事亮集荀朂和嶠令陳夀所定亮之言魏晉之人所不欲聞也然且存之而不敢沒非亮至誠孰能使之夀又言大晉光明至徳澤被無疆誠然其好善忘讎自是晉武及舉朝盛事故其後雖亂而尚延也夀評亮文集古語中贊述亮美皆當時親見實事所謂經事綜物公誠之心形於文墨是也至後世浮稱汎指失之矣嗟乎三代之下道逺世降本王心行霸政以儒道挾權術為申商韓非而不自知以亮始末考之厯厯可見所以使其功烈不能究者皆末俗餘論誤之也余故諄諄具之然則學者至是更須自拔乃可爾徽採桑於樹上坐統在樹下共語自晝至夜徽甚異之㣲行懿筐之間乃有王霸之畧足以樂而無憂然則貧賤誠不能為士累也唐人謂開筵面場圃舉酒話桑麻正是本色韻勝者閒吟而已劉備言每與曹操反事乃可成此未必當時真語然以詐取劉璋者備之所不安也備周旋陳元方鄭康成羣儒授記其説寛緩而諸葛亮龎統定計數於前必成敗於後司馬徳操所謂識時務者歟恐如此俊傑比之古人更當吉蠲以薦明徳觀璋之所以失備之所以得事之成敗真有計也法正既與備以益州又為之圖取漢中其策淵郃才畧不勝國之將帥乃審其必成而動非茍好謀者正忽死則智算已隠而備之業止矣如諸葛亮所謂鞠躬盡力死而後已至於成敗利鈍非臣之明所能逆覩此全不是議論湯武之仁義伊周輔之自知必勝桀紂之暴虐百全而不失後世無徳專用計數李斯張良以有勝無亦百全而不失也使成敗利鈍果不能逆覩但欲以身死為恭則何用勞師殘民為此不可知之舉髙不足為仁而下不足為智况三代之君臣未嘗有此法乎許靖以汝南勝士著名既嘗預漢謀議及其流播無所茍容其身者則臣役之晚嵗遂有翻成見薄之事然則如荀彧之出處殆未可以輕責也法正薄夫乃知靖為當敬發悟劉備用賢之機諸葛亮之親厚正有以哉諸葛亮不以英特表羣物而以懇惻來衆智參署之㫖敝屩珠玉之喻誠有味之言也用人固難而為人用者亦未易末世材質委喪萬人一律以横論為昌言以膚説為忠慮而欲求亮虚受之益吾見其多聽而終少成也廖立言關羽怙恃勇名作軍無法直以意突豈得不為中關羽病亮正以其攪事廢之爾至李平則法當廢矣罪功輕重曲折甚多上世未嘗以此為宰物之盛節亦霸政之餘務耳習鑿齒論甚淺未能究其義也毎念亮纔死魏延楊儀便敗國事自戰國秦漢以後為一勝一負之兵雖盡得天下皆以幸刦不幸耳獨亮欲節制而後用之然亦止能及其身武王既殁三監淮夷叛民猶罔不反曰艱大而况亮乎代漢者當塗髙是何語漢光武嘗以問公孫述謂君豈髙之身杜瓊乃以魏當塗而髙取類而言復是何類又謂始自漢名官言曹司馬當復何義譙周又言衆而大期之㑹具而授若何復天下㑹於晉豈㑹於魏乎詩云皇矣上帝臨下有赫監觀四方求民之莫維此二國其政不獲維彼四國爰究爰度上帝耆之憎其式廓乃眷西顧此惟與宅漢末諂附王莽者始有䜟緯先定之説光武尊之甚於經典班固父子希世論載而後世以能推析配合者為精㣲然則人才何由不陋乎孫盛論譙周盡降事特可録余觀諸葛亮奮惰媮之習厲其衆而用之戎車屢動邦域不聳至於一隅而抗天下理猶未盡比公孫述相去幾何而費禕譙周之流執愚儒之腐説逮其傾滅禍實由此然則秦楚之自强燕齊之必復其立國逺者數百十年當時謀臣碩相基事保業要亦未易可輕也彼實無箕子周公之徳者不過為譙周而已以陳夀史考之蔣琬費禕者畧能繼諸葛亮而於姜維亦無貶詞然維與諸葛恪所以敗亡則皆用亮意也勤兵無名勢自當傾亮本謂益州漢髙祖資以成帝業然髙祖資蜀纔數年爾今以曠世累積之久興無効未已之師隙開於内釁起於外則君無桀紂之暴而國被覆滅之禍矣惜亮之講亦有未至者也楊戲輔臣贊言諸葛亮賢愚競心僉亡其身張裔亦云又楊洪𫝊亦然蜀人之所以載亮者此一事尤著及廖立李平所以垂泣至死亦皆此意也古之稱官人者舜周公而已秦漢以後方有諸葛亮孔明然義利之際更當詳處若其義不深其效不逺尺寸之能竭命盡力以用為重使後之所見者止於是則材薄而功陋矣陳夀筆髙處逼司馬遷方之班固但少文義縁飾爾要終勝固也近世有謂三國志當更修定者盖見注所載尚有諸書不知夀已盡取而為書矣注之所載皆夀書之棄餘也士誦讀不詳輕立議論誤後生見聞最害事習學記言卷二十八
