body:
  text: 習學記言卷十四宋葉適撰孟子梁惠王問何以利吾國對王何必曰利問賢者亦樂此乎對賢者而後樂此言寡人之民不加多對王好戰請以戰喻言寡人願安承教對殺人以梃刃與政無異齊宣王若寡人者可以王對不忍殺牛之心足以王又言恩足以及禽獸而功不至於百姓又言與百姓同樂則王又言文王之囿民猶以為小又言王請無好小勇又言雪宫之樂不得而非其上與為上而不與民同樂者皆非又言公劉好貨太王好色孟子出而說齊梁之君幾得政於齊具見此十餘章大抵逆來順往無問其所從必得吾之所以言而後止故孟子自謂人不足與適政不足與間惟大人為能格君心之非君仁莫不仁君義莫不義君正莫不正一正君而國定夫指心術之公私於一二語之近而能判王霸之是非於千百世之逺迷復得路煥然昭蘇宜若不待堯舜禹湯而可以致唐虞三代之治矣當是時去孔子沒雖纔百餘年然齊韓趙魏皆已改物魯衛舊俗淪壊不反天下盡變不啻如夷狄孟子亦不暇顧但言以齊王猶反手也若宣王果因孟子顯示暫得警發一隙之明豈能破長夜之幽昏哉盖舜禹克艱伊尹一徳周公無逸聖賢常道怵惕兢畏不若是之易言也自孟子一新機括後之儒者無不益加討論而格心之功既終不驗反手之治亦不復興可為永歎矣按孔叢子載孟子年尚㓜見子思子思以其言稱堯舜性樂仁義甚說其志命子上侍坐禮敬甚崇其見梁惠王命以叟而孟子自言四十不動心於是年過五十矣盖樂其道而忘人之勢不以壯老易其守當士人波蕩縱横之時獨不見諸侯然而無環堵𨼆約之陋非布衣藜藿之㣲宜其豪傑自命於顔閔以下曰姑舍是而雖伯夷伊尹猶非所願學也加齊之卿相得行道焉雖由此霸王不異矣公孫丑特以世俗之意觀孟子故其告以不動心謂當自反守約又及於養浩然之氣謂集義所生非義襲而取之皆家户所有日用常行非如曽子惴惴至死子路惟恐有聞冉有限力不足者也不然孟子何以從容於進退之間始終生死由一道宏益開闡繼堯舜而有餘哉近世之學以不動心養氣為聖賢之難事孟子之極功詰論往反析理精粗有白首終老而不定者何敢言四十乎至其出處得䘮倒行錯施固無以庶幾古人之一二矣按孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬭及其老也血氣既衰戒之在得夫始終專以血氣為言雖曰與中人立法然義理本要調和一身使蹶趨者能為浩然耘鋤者不為助長若孟子化血氣從義理其易如彼而學者不察方揠義理就血氣其難如此盛衰頓異勇怯不同乃君子所甚畏也故必遵孔子之言致驗於一身之血氣始戒之終戒之戒於此者切進於彼者深則雖不待四十而可以無動矣人皆有不忍人之心先王有不忍人之心斯有不忍人之政矣孟子以戰國之人失其本心無能不忍人者故著此論然先王之政則不止為不忍人而發盖以聖人之道言之既為之君則有君職舜禹未嘗不勤心苦力以奉其民非為民賜也懼失職耳孟子雖欲陳善閉邪為可曉之語然後此亦未有能不忍人而為政者就其有之固不能推也若夫平居講明臨事背戾自謂為不忍人之學而不免於行忍人之政者不知其所底止矣以孟子答景丑語詳味之本仁義而同民利齊王盖已有動悟之益故為言受教不召之禮若又加尊信則君臣之遇自此始矣然齊王待之以賓位之以卿其禮異於他儒生欲無廢議論而已故孟子終不仕齊王猶欲授館賦祿以矜式其國人孟子以為不行其道而徒頼其廩是利之也故終不留按魯定公受女樂三日不朝孔子釋大夫出奔齊景公曰吾老矣不能用也孔子行衛靈公忽問陳仰視飛鴻孔子行遂有在陳之厄孔子之行速者去國常禮也齊王非不用孟子孟子以其非所用自決去之爾故其行遲遲而尹士淳于髠皆有詬病也孟子道性善言必稱堯舜按子思獨演堯舜之道顔曽以下為善有藝極者所不能也故自孟子少時則固已授之矣堯舜君道也孔子難言之其推以與天下共而以行之疾徐先後喻之明非不可為者自孟子始也周衰而天下之風俗漸壊齊晉以盟㑹相統率及田氏六卿吞滅非復成周之舊遂大壊而不可收戎夷之横猾不是過也當時往往以為人性自應如此告子謂性猶杞栁義猶桮棬猶是言其可以矯揉而善尚不為惡性者而孟子併非之直言人性無不善不幸失其所養使至於此牧民者之罪民非有罪也以此接堯舜禹湯之統雖論者乖離或以為有善有不善或以為無善無不善或直以為惡而人性之至善未嘗不𨼆然見於搏噬紾奪之中此孟子之功所以能使帝王之道幾絶復續不以毫釐杪忽之未備為限斷也余嘗疑湯若有恒性伊尹習與性成孔子性近習逺乃言性之正非止善字所能𢎞通而後世學者既不親履孟子之時莫得其所以言之要小則無見善之效大則無作聖之功則所謂性者姑以備論習之一焉而已與梁齊滕文公論治最孟子要切處惜無他書可以參看大抵民不能皆有田而盡力於農學校廢缺而上無教乃當時之大患故諄諄言之諸侯賦稅法獨魯屢變已見於春秋不知他國如何晏子為叔向言齊為季世及對景公皆病其專山澤之利故孟子舉文王治岐語略相應而齊王自以為好貨而不能行其言請野九一國中什一惟魯哀公謂二吾猶不足不知他國所以歛民者分數果如何然戴盈之言什一去闗市之征今兹未能請輕之以待來年然後已孟子又言當法而不㕓譏而不征助而不稅然則是時王政不行諸侯往往通用什二今之諸侯取之民猶禦恐不止什二而闗市山澤㕓屋皆自征之矣但輕重各不同耳其因滕侯問井地方論經界及治鄉治野之法雖與周官同此當時傳儒道者所共知然周官所言在建國之初而滕有國已數百餘年之後孟子乃使之如初建國時耶然勸其力行以新子之國則當時所謂因循茍且者誠欲其盡去不用而滕侯為善果決亦足以任此也至為梁齊言則又不然直欲其五畆之宅樹之以桑百畆之田可以無饑謹庠序之教申孝弟之義豈梁齊大國也井田學校固自有存者不必盡創為也如此類皆無他書參攷不能知孟子欲施置與其時合廢省之詳甚可惜也雖然經界井牧有司之小事周官固不備載後世以孟子嘗言故爭論不已又漢法什五稅一甚至三十稅一地大用寡取之輕正合事宜學者以孟子有大貉小貉之論諱避弗稱至於今世無所不取又倍戰國乃茫然無以救此徒講經界井地何益治亂哉孟子闢許行神農之學其言賢者與民並耕而食饔飱而治雖非中道比於刻薄之政不猶愈乎孟子力陳堯舜禹稷所以經營天下至謂其南蠻鴃舌之人非先王之道詞氣峻截不可嬰拂使見老子至治之俗民各甘其食美其服鄰國相望雞犬之音相聞民至老死不相往來之語又當如何余嘗疑孔安國稱伏羲神農黄帝之書謂之三墳言大道楚靈王指倚相能讀三墳五典八索九丘明他人不能讀意漢初尚有遺文而後世乃無所見然他書亦未嘗援引惟醫藥卜筮種樹皆藉其名然則許行之言或者三墳之舊歟不見諸侯大議論也或疑孟子因見梁齊之君故惠王以為不逺千里而來尹士謂識其不可然且至則是干澤按史載梁敗於秦楚恐懼招聘名士齊亦開稷下館以延諸儒孟子以此時往所謂迎之致敬以有禮聘禮之輕重雖不可知要為非招不至非徒歩干說甘冒憔悴於先而逆幾榮寵於後也此誠不足辨又彭更言後車數十乗從者數百人以傳食於諸侯或謂孟子不見其君而厚糜其粟非所謂饑餓免死而已者按彭更通論當時非專指孟子孟子以通功易事之義併曉之爾不然孟子道既不行非斯人之徒而誰與轉側於世可也而猶欲明通功易事之義則不亦㣲且勞矣然不見諸侯如孟子所言自有未精者按堯時用人皆素定特招者獨舜四岳同薦具載於書堯試以二女觀厥刑然後大任無往見舜之文孟子謂亦饗舜迭為賓主未知何所本未精一也湯時用人亦素定特招者獨伊尹書稱聿求元聖與之戮力又惟尹躬暨湯咸有一徳克享天心受天明命詳其君臣交相重如此則往見伊尹或不可知孟子雖言學而後臣又稱其囂囂然曰何以湯之聘幣為至三聘而後幡然就湯說之以伐夏救民恐此亦辨士之餘說未可據未精二也文王時用人亦素定特招者獨太公詩稱我有嘉賓鼔瑟吹笙吹笙鼔簧承筐是將人之好我示我周行又曰徳音孔昭示民不恌君子是則是傚夫文王之用太公雜書多異說而鹿鳴所詠盖百世君臣相與之法孟子言伯夷太公皆辟紂居海濱聞文王作興曰盍歸乎來是天下之父歸之疑此亦無明據未精三也至於孔子鳯鳥不至河不出圖招聘禮絶自知不用未嘗有求然其曲盡君臣之際為後世倫紀故曰事君盡禮人以為諂拜下禮也今拜乎上泰也雖違衆吾從下君命召不俟駕行矣然孟子謂孔子當仕有官職而以其官召之未知何官齊景魯哀皆不當仕而有問答豈必就見又若孔子未嘗不仕而孟子焉得獨不然疑亦未精四也盖不見諸侯本於子思子思本曽子彼以其富我以吾仁彼以其爵我以吾義以徳則子事我者也奚可以與我友摽使者出諸大門之外疑皆執徳之偏而孟子又稱孔子以㣲罪行不欲為茍去疑亦雜舉不純一理也然則不見諸侯於當時既未精而後世又為孤義恐更當别論子産惠而不知為政按道之以政孔子不以為是自管仲以下為政者多矣惟子産在春秋時政道獨異於人故孔子稱其養民惠使民義又特謂之惠人又謂其古之遺愛又言人謂子産不仁吾不信也然末世偏術視子産之所為皆謂之無政而不知其政固已多矣盖猶存古人之遺而已猶衆人之母能食不能教此固俗儒之妄而孟子何為亦有此言且以乗輿濟人於溱洧不知何所因十一月徒杠成十二月輿梁成民未病渉此為治橋梁常法言之雖下於子産者亦知行辟人也或雨暴至橋梁驟失倉猝而執政以已乗輿濟人則當時能如子産者少矣故為百姓所思傳誦不忘而反欲舉常法以病之恐此理亦未精也仲尼不為己甚者恐此語未當記孔子曰好勇疾貧亂也人而不仁疾之己甚亂也此語當記所言禹湯文武之道至周公思兼三王以施四事按堯曰篇所稱皆當時實語此語未知何所本或無所本而以測知者言之恐所舉之要不能盡所行之詳也詩亡然後春秋作按古春秋先於詩非詩亡而作也若謂孔子春秋在詩亡後恐亦當論詩雖未亡而可無春秋乎若謂歌詠之澤絶而後貶損之法行則是孔子以道之降者治後世終不能復先王之盛矣其文則史孔子曰其義則丘竊取之矣按舊史自有義孔子因之不能廢也是亦羿有罪焉子濯孺子可以取友言羿不可以取友言公明儀曰宜若無罪焉豈古之所謂賢者而不精於論耶禹稷顔囘同道按禹稷所憂以任不以道孔子所賢以道不以任禹稷雖憂而憂其所樂孔顔雖樂而樂其所憂以萬章所問舜象禹益伊尹百里奚事考之知昔人固多汨於所聞而不訂之理義豈惟昔人而後人亦莫不然然後人之謬妄則不如昔之甚者以後之史詳而昔之史略也然訂之理義亦必以史而後不為空言若孟子之論理義至矣以其無史而空言或有史不及見而遽言故其論雖至而亦非人之所安也如孔子事耳目最近然茍非載籍則壤地不殊而見聞各異者多矣然謂衛卿為有命疑非孔子語辨主癰疽瘠環之無義無命疑此語孟子亦未當發也孔子但言伯夷求仁而得仁餓于首陽之下而孟子乃言其不可與鄉人處則無故而廹切已甚伊尹果自任以天下之重而無亂亡之擇則曷為不度其君按書伊尹去亳適夏既醜有夏復歸于亳武王觀政之比而傳者以為五就而說之栁下惠孔子之言止於不枉道不去父母之邦而孟子遂以為與鄉人處不忍去則無故而誣辱已甚若夫孔子自言無可無不可而已孟子乃以為可以速而速可以久而久可以處而處可以仕而仕然則因人而可耶自我而可耶若是者果謂之集大成耶又有始終條理之異智聖功力之殊亦果然耶按中庸稱仲尼祖述堯舜憲章文武其說廣大閎深無所不備而孟子之言又卓異詭絶如此學者果何所用力耶夫孟子之稱伊尹不幾於所謂狂伯夷不幾於所謂狷而栁下惠疑若鄉原然者若三人以此成徳而學者必求所以入徳之門疑亦未精也耳目之官不思而蔽於物物交物則引之而已矣心之官則思思則得之不思則不得也此天之所以與我者先立乎其大者則小者弗能奪也此為大人而已矣按洪範耳目之官不思而為聰明自外入以成其内也思曰睿自内出以成其外也故聰入作哲明入作謀睿出作聖貎言亦自内出而成於外古人未有不内外交相成而至於聖賢故堯舜皆備諸徳而以聰明為首孔子告顔淵非禮勿視非禮勿聽學者事也然亦不言思故曰學而不思則罔思而不學則殆又曰吾嘗終日不食終夜不寢以思無益不如學也季文子三思而後行子聞之曰再斯可矣又物之是非邪正終未可定詩云有物有則子思稱不誠無物而孟子亦自言萬物皆備於我矣夫古人之耳目安得不官而蔽於物而思有是非邪正心有人道危㣲後人安能常官而得之舍四從一是謂不知天之所與而非天之與此而禁彼也盖以心為官出孔子之後以性為善獨自孟子始然後學者盡廢古人入徳之條目而專以心性為宗主虚意多實力少測知廣凝聚狹而堯舜以來内外交相成之道廢矣五霸者三王之罪人也按古自有五霸齊國佐所指是也孟子言五霸桓公為盛疑即春秋以來五霸也如昆吾為夏伯大彭豕韋為商伯天子衰不主令而諸侯之强大者專之不特周為然未知其徳何如也湯既改物固不論若文王不改物始終一道而已故孔子言三分天下有其二以服事殷周之徳其可謂至徳也已矣此最論王伯之凖的也學必守統紀不隨世推遷後學既訛伯而為霸而其道亦因以離孟子雖言五霸三王之罪人而但謂其摟諸侯以伐諸侯此猶未足以為罪至謂久假不歸烏知其非有霸者之民驩虞則輕進其君於道而管仲曽西所不為又重絶其臣於利而統紀疎矣習學記言卷十四
