body:
  text: 習學記言總目雜家類一雜學之屬卷一易乾至蠱卷二易臨至升卷三易困至總論卷四易上繫下繫卷五書卷六詩卷七二禮周禮儀禮卷八禮記卷九春秋卷十左傳杜預序隱至襄卷十一左傳襄至哀卷十二國語卷十三論語卷十四孟子卷十五老子卷十六子華子卷十七家語孔叢子卷十八戰國䇿卷十九史記紀表書世家卷二十史記列傳自序卷二十一前漢書紀表志卷二十二前漢書志列傳卷二十三前漢書列傳卷二十四後漢書紀志列傳卷二十五後漢書列傳卷二十六後漢書列傳卷二十七三國志魏志卷二十八三國志吳志蜀志卷二十九晉書紀志列傳卷三十晉書列傳載記卷三十一南史宋書卷三十二南史齊書梁書卷三十三南史梁書陳書卷三十四北史魏書卷三十五北史北齊書後周書卷三十六隋書卷三十七隋書卷三十八唐書紀卷三十九唐書表卷四十唐書列傳卷四十一唐書列傳卷四十二唐書列傳卷四十三唐書列傳史五代卷四十四荀子揚子卷四十五管子卷四十六孫子吳子司馬法六韜三略尉繚子太宗李靖問對卷四十七吕氏文鑑卷四十八吕氏文鑑卷四十九吕氏文鑑卷五十吕氏文鑑臣等謹案習學記言五十卷宋葉適撰適字正則自號水心居士永嘉人淳熙五年進士官至寶文閣學士諡忠定事迹具宋史儒林傳其書乃輯録經史百氏各為論述條列成編凡經十四卷諸子七卷史二十五卷文鑑四卷所論喜為新竒不屑托拾陳語故陳振孫謂其文刻峭精工而義理未得為純明正大劉克莊為趙虛齋作注莊子序亦稱其講學析理多異先儒蓋當時評論如此其間如謂太極生兩儀等語為文淺義陋謂檀弓膚率於義理而謇縮于文詞謂孟子子産不知為政仲尼不為已甚語皆未當此類誠不免于駭俗然如論讀詩者専溺舊文不得詩意盡去本序其失愈多言國語非左氏所作考子思生卒年月斥漢人言洪範五行災異之非皆能確有所見足與其雄辨之才相副至於論唐史諸條往往為宋事而發於治亂通變之源言之最悉其識尤未易及特當宋之末世方恪守洛閩之言而適獨不免于同異故振孫等多不滿之要其偏執固所不免而考核之精博議論之英偉實一時罕有其匹也乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
