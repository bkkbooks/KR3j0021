body:
  text: 習學記言卷三十五宋葉適撰北史齊書髙歡賤微給使所與奔走往來者皆胥徒下𨽻天下若此輩何可稱記時平則歌哭以盡有事則呌呼而起奮不顧命勝者得之自古皆然矣而史載其因張彛被害傾産結客自是乃有澄清天下之志不知歡衣食尚不自給産何所傾而天下清濁亦竟何在此蓋為文粉飾之過爾闕之至謂不可使四方豪傑窺朝廷是又可歎也髙歡素無資業赤身依人曾未飽食輒已投筯而反雖姦豪飛動不可以常理律然歡卒用此成事殆亦難曉李元忠所謂爾來寂寂更欲尋建義處也既得事柄四方聽其伸縮宇文泰甫萌芽尚可回轉而歡無禮自恣迫逐其君遽成中裂之禍生民流血者數十年然則歡徒見反之利未見反之害也東之比西土地甲兵十倍歡若持重養威以計縻敵自可從容全勝然十年間汲汲三大戰幾不免其身智勇俱困而秦與六國之形見矣是歡自反爾朱之外了無所能世或以為人雄者誤也魏自孝昌之末銅馬鐵脛黑山青犢梟張晉趙豕笑燕秦是使豪家大族鳩率鄉部託迹勤王規自署置或外家公主女謁內成昧利納財啓立州郡離大合小本逐時宜剖竹分符蓋不獲已百室之邑便立州名三户之民空張郡目譬諸木犬猶彼泥龍於是并省三州一百五十三郡五百八十九縣三鎮二十六戍此齊天保七年詔也又制刺史令盡行兼不給幹物自此以虛名為官者數百年彭城王浟作刺史問食雞羮推盜鹿脯市白毛牛皮書王老母菜葉有此明決自不以膏粱限斷也至言自殿下至來五載人不識吏吏不欺人百姓有識以來始逢今化殿下惟飲此鄉水未食此鄉食則士大夫所不能者而貴公子能之蓋為政不専恃術矣趙郡王睿六月不飲冰事為元帥而必與士卒同甘苦如此可以為難矣然以盛夏而領山東兵逺築長城若為人上者每每違天時涉長道致人於必死之地安得皆如睿者撫而用之使無叛且有成乎是則以仁人之心奉暴主之令固莫知其所終也漢明帝時西域以白馬負佛經送洛因立白馬寺其經函傳在此寺形制淳朴世以為古物厯代藏寶至是為刺史韓賢斫破豈洛中更漢晉以來喪亂而此寺及函能獨存何耶斛律光以兵五萬回未至鄴敕令便放兵散光以軍人勳功未得慰勞乃密表請使宣旨軍仍且進朝廷發使遲留軍還將至紫陌光仍駐營待使帝聞光軍營已逼心甚惡之急令舍人追光入見然後宣勞散兵光以此見疑遂致族滅前世散兵其易如此自唐中代以後則不然矣雖復昏童酣酗未有敢易其衆者昔以忽慢自棄多驟亡後以畏逼相持故僅存至於威令重輕事功合散之際當考慕容紹宗本髙歡腹心之疾歡疑不用爾以此待侯景固有餘也記蘇氏論紹宗李績事髙歡謂髙昻純將漢兒恐不濟事欲割鮮卑千餘共相參雜而敖不聽自晉衰亡一色胡人控制中夏二三百年歡本漢兒而以鮮卑篡魏宇文泰真鮮卑也乃欲行成周政術雖不盡然而氣勢回復隋唐因之然後南北合一復為諸華此蘇綽之力也王猛殆不足道矣髙氏之興李元忠逢迎於始陳元康楊愔輩營締於中元忠疏放淡薄推逺榮利猶有可採如元康崔暹莫能名其何等材品其志尚不及富貴况其上者歡父子氣類所號召如此自不足怪然自古立國長短厚薄要不徒然歡父子欲以此得其何以守宜其遂亡也國家龍飛朔野雄步中原五帝異儀三王殊制掩衣左右何足是非此王紘少年語也事到已壞爛處隨世起滅不可復振則雖以孔子之聖尚不得自立可畏也夷夏變遷何止一日安其固然無復有志而顧以微細者自營由賜之徒所不異於王紘者幾希矣薛琡於崔亮停年格後言義均行鴈次若貫魚執簿呼名一吏足矣數人而用何謂銓衡又言漢令三公舉賢良方正有道直言為長吏晉末此風遂替琡本非能言治道以是時方變行資格人心不平舊論猶在爾余初登科詣選侍郎李椿亦號佳士端笏遍問注者願授否皆應曰願授余面笑之椿莫測也自臯陶夔立選用法以人性質合其材之所宜萬不差失春秋以後始専論材十猶得四五後世遂捨材而論藝常違所貴取所賤又以年月斷之其偶合萬一雖所謂巨賢上德者皆古人品第所不及又况其下乎是直以夷狄之道治國家而欲興起大功安可得也魏孝文志慕諸華其效未見反成貪懦之俗及髙歡與惡少舉事淫縱橫流乃令子澄寵用崔暹施其控御彈壓之威昔曹操進崔琰毛玠迫蹙漢餘習使盡如暹何足算也楊愔以初從禪代議不力忌髙德政竟置之死地愔尚能爾如茍彧冝其未肯也至劉穆之禇淵范雲沈約汲汲自獻以後為羞蓋時促祚短執節不長人材愈降自當至此矣舉梁之士不足以敵侯景乃用道人陸法和妖術國之將亡固聽於神也髙洋暴狂以殺為戲而敬禮法和如此蓋畏𡨕禍耳余嘗論世人舍仁義忠信常道而趨於神怪必謂亡可為存敗可為成然神怪終坐視成敗存亡而不能加一毫智巧於其間而亡果能存敗果能成必仁義忠信常道而後可伊訓曰先王肇修人紀從諫弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至於有萬邦康誥曰惟乃丕顯考文王克明德慎罰庸庸祗祗威威顯民用肇造我區夏越我一二邦以修然則人力之所能為者決非神怪之所能知而謂天數為不可免者又非神怪之所能預真不足復顧也梁既亡使王僧辨有成終不篡逆王琳區區亦能義動凶鄰蓋梁武在位差久比江南諸姓立國粗有繩墨遂得致命之士亦其所長育者然也楊愔相齊史稱主昏於上政清於下固已太過王通遂謂有楊遵彥者實掌國命視民如傷奚為不終夫衛靈公淫荒而三人者任事不至於亡國則幸矣若齊文宣逞其凶虐嵗月不已愔將與之并斃尚安能芘之使終况視民如傷豈其所及耶見事不精以光影眩後學其患大矣夷狄之德於父母兄弟素不厚茍脫死禍人欲遂其所為愔於此時雖慕古人輔幼主之節而遲回選懦權失勢乖席不暇暖遽罹非命蓋其理當然無足悲慨也魏齊間溫子升邢邵魏收繼出文字稍與江南比隋唐以來能使南北同體蓋非特庾信江總之教也髙澄父子收拾士類厮𨽻用之其言尺書徵建鄴折簡召長安正依放曹氏本根不建而急於歌頌宣王小雅猶無救於亡摛辭奮筆湧波漲瀾愈速其崩壞耳遷鄴以後大選之職知名者數四文襄少年髙朗所弊者疏袁叔德沈密謹厚所傷者細楊愔風流辨給取士失於浮華惟辛術性尚貞明取士以材器循名責實新舊參舉管庫必擢門閥不遺考之前後銓衡在術最為折衷魏以停年格致亂髙氏反之觀此則奔走一時材用以赴功名自不繫君德也銓敘羣彥雖曰吏部之職然宰相知人能盡器使乃職業中一大事如諸葛亮何必更須尚書哉諫巡晉陽死者六人趙彥深唐雍等以未即署名僅免然則河隂之戮不待爾朱榮也昔趙盾奔逃趙穿作難盾未出山而復後世有以盾為弒君不復信三傳者審爾則靈公拒諫及殺盾事亦不當信也不信未足深計然于愛民保國之意輕極害義理祖珽既立文林館復欲增損政務沙汰人物推誠朝廷為致治之方是時人士相附從與王叔文栁宗元無異使叔文輩能首立廣陵王參決則大權歸已宦竪退伏矣元和諸人固不辨此論治不識幾微只以成敗為斷所蔽多矣唐雍白建自為外騎兵曹分掌兵馬史稱雍九州軍士四分勇募強弱多少畨代往還及器械精粗糧儲虛實精心勤事莫不諳知按兵數軍實前代大臣無以此職著名者蓋漢魏掾屬後代吏史之所掌也唐衰中官専兵柄五代移於武臣遂與中書分領至號稱兩府既轉吏職以歸朝廷但為養尊之地而於兵政損益實無所知求如唐白身任其能而後居位不復可得然則古人専以一事名家成材之要道也崔劼盧叔武齊世雅士劼言立身以來恥以一言自達今若進兒與身何異此語最可傳叔武忍貧餓死而能畫策謂輕兵野戰勝負難必是胡騎之法非深謀逺算萬全之道欲立重鎮於平陽與彼蒲州相對以羈縻之又請自居平陽成此謀略此齊周成敗之所由齊人未有能言之者亦當記也張雕謂賢家唐令處分極無所以若作數行兵帳雕不如雍若致主堯舜身居稷契則雍不如我當時惡其矜誕雍曹掾吏史之才國家大體豈其所知雕言非誕也然雕方勵精匪躬以國家為己任厚胡洪珍而薄韓長鸞遂以諫死孔子言泄冶曰民之多辟無自立辟非不幸也惟其臨死數十語尤可悲爾齊氏變風屬諸絃管梁時變雅在夫篇什絃管之亂時移則息篇什之變事往猶存絃管止誘閭巷淫人篇什能蠱山林正士害之大小固不同也自文林館設齊人風靡然不旋踵而亡其俊秀者盡為周隋之用士之離合豈與國之廢興相關哉詩殷士膚敏祼將于京論語殷有三仁兩節當參看祖鴻勳立身有本末與陽休之書文雖不髙視韓愈進學解送窮文以言語工拙比較官職豈不優劣相逺哉士不先定其所存正使探極原本追配雅頌只是馳騁於末流無益也顔之推學博文麗觀我生賦不失雅正之體敘梁齊末事可以考正非江南文士所能及也其言豫一生而三化備荼苦而蓼辛及自東晉之違難寓禮樂於江湘迄此幾於三百左袵浹於四方詠苦胡而永歎吟微管而增傷讀之差痛不能已昔人雖陋未有無其志者獨於今為不然哀哉宋世良宋世軌蘇珍之世良獄內穭生桃樹蓬蒿亦滿每日衙門虛寂無復訟者蘇瓊每蠶月預下綿絹度樣於部內其兵賦次第並立明式然則必不以廣量厚織病民故得循良之譽而今世謂有所疏薄檢柅不盡為失職無具之尤恐亦當論也和士開説齊王云自古帝王盡為灰燼堯舜桀紂竟復何異陛下宜及少壯恣意作樂縱橫行之即是一日快活敵千年李斯趙髙用此詐二世與士開智愚有異其詞意皆不約而同何也後周書稱宇文泰先出自炎帝神農氏為黃帝所滅子孫遁居朔野有葛烏菟者鮮卑奉為主由泰父肱至普回二十三世普回至烏菟不能紀也鮮卑何用世次史祖魏收收祖司馬遷遷以胸奴為禹後特記事推引之濫蓋無所媚附而收之稱舜臣令狐德棻之稱炎帝後則専以誑筆造諂語劉向班固言漢承堯運者耶髙歡宇文泰雖同於篡魏泰賀拔嶽所奬用嶽既見殺其下無主拔泰而歸之則近於勢之自至也魏孝武身落人手而不常其德先為髙歡所逐後為宇文泰所鴆夫敗孽亡孺自古皆為亂臣賊子之餌彼妄遇一無賴姦人即以伊周事責之哀哉古之帝王所以外建諸侯內立百官者非欲富貴其身而尊榮之蓋以天下至廣非一人所能獨治是以博訪賢才助己為治若知其賢也則以禮命之其人聞命之日則慘然曰凡受人之事任人之勞何捨已而從人又自勉曰天生雋士所以利時彼人主者欲以我為治安可茍辭於是降心而受命及居官也則晝不甘食夜不甘寢思所以上匡人主下安百姓不遑恤其私而憂其家故妻子或有飢寒之弊而不顧也於是人主賜之以俸祿尊之以軒冕而不以為惠也賢臣受之亦不以為德也位不虛加祿不妄賜為人君者誠能以此道授官為人臣者誠能以此情受位則天下之大可不言而治矣昔堯舜之為君稷契之為臣用此道也及後世衰微此道遂廢乃以官職為私恩爵祿為榮惠人君之命官也親則授之愛則任之人臣之受位也可以尊身而潤屋者則迂道而求之損身而利物者則巧言而辭之於是至公之道沒而姦詐之萌生天下不治正為此矣今聖主中興思去澆偽諸在朝之士當念職事之艱難負闕之招纍夙夜兢兢如臨深履薄才堪者則審已而當之不堪者則收短而避之使天官不妄加王爵不虛授則淳素之風庶幾可及觀此可驗蘇綽用事大意也然天下能為綽之言者不少拘於時而不敢言及其奮然言之而不獲用則多矣惜其不及君臣分定之時不為賢主之詔而徒為逆臣之令爾泰再行篡逆其史栁虬既執簡而書其咎泰又令盧辨作告以諭其過髙貴公謂司馬昭之心路人所知泰舉動如此欲以誰欺王莽篡而作大誥泰用周禮亦然豈從周之偽者固當爾耶石勒之於劉曜苻堅之於慕容暐周孝武之於髙緯皆以一取一孝武始自五年十月至六年正月馬足未遍而數千里地盡得雖乘羣愚自潰之機然不勤身苦力以赴之亦未能也及其輕鋭之念溢發不制欲以廓清混一之功取必於嵗年之頃嗚呼幸而遽得死不然將遂斃於鋒鏑為後世笑豈止其子之不肖足以亡國哉九尾妖狐也示亡之徵焉不知憂懼而猶欲求不受瑞之名其實以為瑞無大於此者爾五品時敘四海和平家識孝慈人知禮讓其君臣但摹倣十數板周官便自謂己能如此是真可笑也余論周武帝若史所言布德立行皆欲踰越古人正孟子謂齊王將以求吾所大欲也然孟子謂齊王以若所為不可以求若所欲使其見周武帝所為必謂可以求若所欲矣湯武既有截法而王道愈不可行於後世此開利門之大者而學者乃以為能閉之何也周武帝初行刑書要制持仗羣強盜一匹以上不持仗羣強盜五匹以上監臨主掌自盜二十匹以上小盜及詐偽請官物三十匹以上正長隱五户及十丁以上隱地三頃以上皆死至天元患其嚴重太甚且海內初平恐物情未附遂大醮告天而除之孟子言康誥殺越人於貨睯不畏死凡民罔弗憝是不待教而誅者也殷受夏周受殷所弗辭也魏周分田權在正長隱五户十丁與地三頃其罪及贓著矣設法禁姦由孟子之論要制所行適與罪稱爾非重也季康子患盜問於孔子曰如殺無道以就有道何如孔子曰子為政焉用殺子欲善而民善矣孟氏使陽膚為士師問於曽子曽子曰上失其道民散久矣如得其情則哀矜而勿喜善為政者當使民不為欺盜不當因其欺盜而遂殺之然則孟子之論孔子曾參之所不許也且周武帝廉節自勵用己律人故必行重刑而不疑其子奢縱任情推己恕人故以行重刑為不可後世據已定之法初不知奢儉之所在唯欲其重而不輕又當在二人之下矣固無暇考聖賢之異同也周武帝一舉平齊之功齊王憲十居八九方其正明君權以臣畜使之不以兄弟數也自謂如此能革纍世悍輔囚辱之弊使孺子封割孤豚於牢豢中與晉司馬攸魏元協禍出一軌而三國相隨為墟不然如齊孝昭武成挺刃而奪之矣悲夫本朝太祖監唐末五代幼君之敗不私其子根本既成祚命永延賈誼謂天下可以數術制御其言曰植遺腹朝委裘而天下不亂然則漢之衰亡豈非遺腹委裘耶爾朱破滅髙歡事已大諧而暴橫欲速粗有志節者遂皆驚散宇文泰寒逺窶子坐收其用如賀拔勝年位材豪決去江南死心為役他可知也賀拔嶽人微衆弱然經為其禆校者無不立功垂名豈必盡能而泰亦何足以使之特以魏孝武棄東就西輕重勢激而然主威既奪而成臣之威可不懼歟因于謹為三老稱木從繩則正后從諫則聖觀髙宗所言過於傅説之所知矣而不自規矩律度以先天下必委於臣之能言者以身從之得用九見羣龍無首之義蓋平世持盈守成之常道也古之聖人皆備道成德首庶物其行在前其諫在後獨髙宗處樂以憂恭默思道自疑弗類待諫而行百王未有此經生學士考論所不到也謹縱橫亂世甲裳馳逐墜典偶興曠官承乏膚習書句茍應其名然後世之效法先王未嘗不如此豈足啓悟也爾朱榮為柱國大將軍位在丞相上宇文泰等因之故號八柱國家二典有四嶽九官十二牧之等周官言惟王建國辨方正位體國經野設官分職以為民極今忽自稱柱國大將軍是何義蓋武人無藝妄以意造爾宇文泰與蘇綽盧辨依周禮設官而雜用元魏及秦漢以後名稱仲尼雖學官名於郯子然無所慕效也周本與戎狄雜居直以聖賢迭興法度最久故孔子從之後世茍以為從其實不從其名則漢晉之官同於任事姑從之可也使名實皆正必如成周則一字不可增損矣泰自貪柱國之號甘出爾朱榮後既不能改而綽方與之法象周公龜兹王禇煟所譏依然故在是真可笑矣栁慶關西文士蘇綽患近代華靡輕薄使為賀白鹿表以革之慶操筆立成辭兼文質綽笑曰枳橘猶自可移况才子也慶詞不傳無以驗其是非典謨訓誥固非筆墨之巧所能轉移而其體制亦各隨世不同綽作大誥令為文者皆依此體止是皮毛上模出一重粗俗使如此而便為堯舜三代之文則俚儒迂叟先極其工而豪俊之士反閣筆無措矣余頗記少時聞長老言有數士各效名人文字以相誇耀或為韓栁或為歐曾髙者為西漢其一人曰未也遂特為詩書之文以蓋之綽所欲革與此何異以為於變一世恐未可也栁宏死時年三十一楊素誄之曰山陽王弼風流長逝頴川荀粲零落無時修竹夾池永絶梁園之賦長楊映沼無復洛川之文是宏以清言而兼麗筆長槍大槊數十年間僅聞此爾得非所謂正始之音也自宇文泰起接隋唐百年中精神氣脈全在蘇綽一人三代既衰佐命之材不世出惟管仲樂毅蕭何諸葛亮王猛蘇綽爾亮地勢不足自立猛無堅凝之功而綽隨文守義仰取俯拾遵腐儒之常説據舊籍之陳言能使泰總已聽命粗細重輕惟其所裁不為新竒坐致實用豈特以其國強富兼并而已由晉以後南北判離中原不振至是自北而南文教復興使孔子復出微管仲之歎不付餘人矣然則學者豈以能言為貴哉顧其所行何如耳王通或問蘇綽曰俊人也其道何如行於戰國可以強行於太平則亂矣夫自許以英豪者用才無本自命為聖哲者窮理不盡行於太平而必亂行於戰國而不強古今皆是也奚綽之病哉且何俊之有六條平實無華諸葛亮王猛驅市人而用之不暇及也死而無繼澤不垂逺不亡何待自董仲舒蕭望之劉向崔實王符仲長統之流皆論治道而無一言之幾然則如綽者亦未易也獨孤信深入湘川百計拒敵相持經嵗竟以全歸自前世言之為大功乃坐失地除名史謂宇文護謬政至此然亦由當時望外成事者多矣不然何以能奮於至弱取天下之十九乎此又未可以賞罰常情論也郭賢䇿髙歡言賀拔嶽初死關中震駭不能乘時取雍州是無智魏孝武西遷寡弱毛鴻賔喪敗關門不守又不能并力要戰是無勇此髙歡所以失關隴之由誠是歡之黨人算畫未有及此者劉煜欲因降張魯取蜀而曹操不敢蓋從昔智計必有用之不敢盡者然歡趦趄放逸於狼狽洶洶之時而乃噤齡決死於安徐已定之後宜其屢進而屢郤哉耿豪言大丈夫見賊須右手拔刀左手把槊直刺直斫慎莫皺眉邙山之役大呼獨入奮力而還當其前者死傷相繼又謂左右吾豈樂殺人壯士除賊不得不爾若不能殺賊又不為人所傷何異逐坐人也豪雖凶粗不足取而以關張比之則又其細爾李穆蔡祐丞相臂膊耿豪王勇丞相咽項泰能得武夫之用如此安得不以弱為強乎宇文泰用韋孝寬法令諸州來道一里種一樹十里種三樹百里種五樹然則此法未行以前原野尤蕭瑟矣詩云有杕之杜生于道左彼君子兮噬肯適我又曰柞棫拔矣行道兊矣豈變墟莽為桑麻自古聖賢以為難事耶遷固以文采衒耀其人辭多而實寡如王羆韋孝寬傳正爾率拙然功名壯偉不可掩學者能詳看所長氣力不少矣只泥住藺相如趙充國等無復新意此讀書大病也薛慎傳載宇文泰於行臺置學取丞郎及府佐德行明敏者充生悉令旦理公務晚就講習先六經後子史又於諸生中簡淳懿者侍其讀書余嘗恨劉裕質可語上而劉穆之痼之然則蘇綽之力多矣漢髙祖言乃公馬上得之安事詩書至溺儒冠乃謂其不修文學而性明達嘻甚矣又安足述乎令狐整率鄉親二千餘人隨軍征討泰嘗從容謂整卿逺祖立忠而去卿今立忠而來可謂積善餘慶世濟其美史言整逺祖漢建威將軍邁不為王莽屈其子稱避地河右故泰稱之此事今粗見於姓家然則隋唐以前史記漢書之外别自有書李翺乃言讀前漢與後漢書生熟如何蓋屢更兵亂載籍焚毁他書多不存其存者又以非文句所資不暇熟讀如翺尚然是又可歎也司馬裔辭封闕趙肅傳元日行朝禮非有封爵者不得預不知用何典故蘇亮綽從兄綽文章稍不逮亮至於經畫進趣亮又減之故世稱二蘇栁虬論史謂漢魏以還密為記注徒聞後世無益當時故著漢魏者非一氏造晉史者至數家後代紛紜莫知準的請今記事者皆當朝顯言其狀然後付之史閣庶令是非明著得失無隱使聞善者日修有過者知懼事遂施行後漢李法但能言史官記事不實後不明信而已當時議論開張至此故泰廢立虬能執簡書過也虬死在魏恭帝元年之冬不然值宇文護行禪代事或有憚否耶天地之初皆夷狄也相攘相殺以力自雄蓋其常勢雖炎黃以道御之不能止也及堯舜以身為德感而化物逺近丕變功成治定擇賢退處不為己有而忠信禮讓之俗成矣夫先人後已徙義逺利必出於心之自然而明於理之不可悖故湯既放桀惟有慚德而其臣反作誥以諭解之若夫亂臣賊子則不然公為弒逆而惡大惡之聞崔杼所以殺太史將行篡奪而畏正論之禁曹操所以殺孔融至於彼自行之此自書之不殺不爭兩不相忌而天下易姓此又杼與操智慮之所未工而虬固不足以知及之也悲夫自元偉以下十四人皆有大位於周與髙氏相絶矣此末世之盛事也不可不記梁武但云我若依而行之誰謂不可又云少待自知我心而已王莽曹丕司馬炎皆不殺舊君殺舊君自劉裕始王軌宇文孝伯樂運貞良骨鯁蓋奕葉長養成就所有近似殷周世臣同存亡者非復偏方草創邂逅相遇可得也運言令宿衛之官有一人夜不直者罪至削除因而逃亡遂便籍沒此則大逆之罪與十杖同科先未經變法時立法何輕也當考又云雖為法愈嚴恐人情愈散一人心散尚或可止若天下皆散當如之何秦網密而國亡漢章疏而祚永可謂富哉之言矣泰言平吳之利二陸而已定楚之功諸賢畢至可謂過之又言吾即王氏甥卿等即吾舅當以親戚為情勿以去鄉介意其釋囚禮士齊桓公以上也泰本尚古文務救時弊如王褒庾信之淫靡非所好也特以其有江東盛名為文士宗伯故敬禮如不及宰物者能因人所長不以已好惡格之蓋難事也史敘次北方能文自杜廣徐光封奕朱彤胡義周劉延明以降而謂蘇綽務存質朴雖屬詞有師古之美矯枉非適時之用故莫能常行夫古之聖王教養天下之英才盡其性命之理使言語文字各極其致故能不約而自合綽既無所建明奈何以一人之勢徒取經訓之已傳者一切效之使庸鄙者易就頴秀者難立是反助徐庾之鋒激天下而從之也周武帝發詔遣使聘沈重踵門謁熊安生雖二人未足以當此禮而帝誠心好賢屈已忘勢干戈之際獨髙經師征塵未洗先驅陋巷在晉陽城下死而復生胡念及此心期卓越殆戰國以來所未有也漢武以安車蒲輪徴申公儒生尚夸之劉備為左將軍三詣諸葛亮後世尚以為難視此何區區哉帝不幸早殂功業不究未知真有佐王之才者遇之如何爾樂遜徐遵明諸生陳時宜五條其言有非俗儒所能道者如自非軍旅之中何用過為迫切申侯將奔楚子誨之曰無適小國政狹法峻將不汝容敬仲入齊稱曰幸若獲宥及於寬政國家雖強詳不受弱詩云德則不競何憚於病惟德可以芘民非恃強也及陳事上議之徒亦應不少當有上徹天聽者未聞是非陛下雖存物議欲盡天下之情猶為未盡等語是也泰﨑嶇關隴諸子相繼鞭撻宇內成其所欲雖大要不過強兵亦其國是所定立論常向上一著故如遜等輩亦能言之夫以國家天下之大而其言語迫促卑陋同出一律飲食嗜好不越酸鹹之則名號雖存而亡形具矣姚僧垣吳人而醫術行於關中伊婁穆病言自腰至臍似有三縳兩腳緩縱不復自持僧垣處湯三劑服其一上縳即解次服中縳復解又服悉除更合一劑足稍屈伸曰終待霜降此患當愈至九月乃能起行髙祖東伐至河隂遇疾口不能言臉垂覆目不復瞻視一足短縮又不得行僧垣以為諸藏俱病不可並治軍中之要莫先於語帝遂得言次又治目目便愈末乃治足足亦瘳史記方多矣不言其所以治之由而徒載其受驗之的亦多如此不可得而考也余頃嵗得病兩腹之間有縳或以為氣不升降而然服胃氣圎百餘劑縳愈急垂二十年不解醫終莫能名夫諱病不受治一二而已有病不能治羣醫皆是可歎也蕭察至子蘬以一城之地為周附庸而所用文武謀臣知名者數十人豈其地之多才耶抑才之偶聚耶昔魯衛宋鄭皆小國而人才卓然稱於後世至察始復見之惜其地不足也才有餘而地不足猶可言也地有餘而才不足不可言也習學記言卷三十五
