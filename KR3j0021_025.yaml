body:
  text: 習學記言卷二十五宋葉適撰後漢書傳讀桓譚𫝊諫光武吝爵賞以其行事考之良然此於人主常法當失而竟以得之豈光武别有其道抑俗儒所陳不中事情更須細論然觀光武規略大抵與前後人主不同論治者盖未深考也譚與揚雄劉歆並時低徊亂亡無所阿徇雖稍疏濶要為名世光武不能容於列大夫間而推折之致死可謂褊而嚴矣馮衍自言據位食祿二十餘年者三按衍為鮑永偏佐嵗月無㡬其誤如此殆不可曉况一時假號何足比數而衍稱述不置量亦狭矣以桓譚博通猶不得志衍區區文字間宜其見棄然在建武永平時不應有失士之名故可歎也若後有興王之君招致詞墨待以卿相流風所被遂為故實斯百世之一遇矣郅惲鄭敬同郡相友材品志節皆同惲不以出違道敬以不出全性皆人豪也申屠剛鍾離意𫝊載光武明帝有捶朴牽曳羣臣之患三代後以其國自治者稱韓昭侯秦孝公始皇至漢文帝時有所親及武帝分奪外朝别置私人宣帝繼之國政始移所謂尚書樞機人主躬聴斷者及光武明帝真若一吏乃代有司行事所以與羣臣日鬬其聰明也自是以後三公頓為虚器而尚書遂成朝廷不可復還矣光武父子雖役役煩勞然猶能與天下賢者共之當時小民得職天下欣欣頌聲興起不特小康而已但其本性察慧嚴急故取不優之誚耳盖異乎宣帝執定不通以為自有制度者也視六七聖人𢎞裕任下使物各自盡則不可望比其他人主忽寛驟猛任數猜刻則過之逺矣學者未可随聲譏議而不考其實也蘇竟傳所言鄧仲况據隂縣為冦劉龔為謀主竟説降之即班固贊董仲舒所謂篤論君子以歆之言為然者也龔問學論議深博予奪古今為班氏父子所敬而其出處蹤跡汩沒可憐盖天下喪亂賢者無地自容其南陽故人附随立功名者特際遇之幸耳豈可謂當時賢俊盡於是乎郎顗言今選舉皆歸三司非有周召之才而當則哲之重不如還屬尚書此實逺近之論當今之宜用人之柄不歸宰相誠非治世事也及專選舉又曰非周召之才然則必擇其人而後與之以是權耶茍非其人而姑任之則寧損其權而不與也此亦當細論也顗又言黄瓊李固雖伊尹傅説不足為比亦可以想見二人風流也蘇竟楊厚郎顗襄楷雖隂陽星文之學然貞固守道言不詭世急時之病惟賢是與而利心不存焉異乎京房谷永李尋之流矣杜詩欲辭南陽以處功臣而光武不許於是用兵十三年矣按光武以征討付將帥民事任文吏一定之規雖有齟齬未嘗更易夷難為効嵗月磨揉觀詩此疏可驗矣詩言將帥和睦士卒鳬藻知光武功臣能處親介胄而無觖望又其使材官騎士長休専以見兵督戰而不怨盖光武定天下賞薄衆整内外分明近於古人所謂以律者戰國秦漢所不能到也蘇不韋報仇郭泰論之為議者所貴泰臧否滿天下而析理不精如此等見識施之一時取悦俗人可也樊準述建武永平事言經術見優布在廊廟論難衎衎共求政化詳覽羣言響如振玉朝者進而思政罷者退而備問與申屠剛鍾離意諫語何其殊絶按光武明帝非茍以儒學飾吏事心誠好之要為本質克治不盡而然其一時臣佐才有所止未能迪徳過不專在人主也準又言今儒者競論浮麗文吏則去法律而學詆欺此語誠然俗之壊雖法吏用法亦不得其正所謂三尺安出也梁統言元哀二帝輕殊死刑東觀記稱手殺人減死者四十二事當如後世殺人無證情理可憫之類也統表其尤害於體者𫝊奏于左而史不𫝊無以考其是非若今𫝊所載但欲循舊重刑則固已謬妄矣自孝安昬徳漢業已衰順帝用梁商父子相繼秉政亡由此始及冀被誅而亡形遂成雖竇武賢戚救之不能反受大戮人主以位為樂而無志於天下則禍敗立至如幽王繼宣中興之後十年間遽亡周豈更論先徳亦不復有漸次也桓靈正賴衆賢共争之故尚延耳光武用張純朱浮議始自孝宣而下並列廟祭以代四親是時建武十九年也不然則不足為紹漢矣純不惟明習典禮而正論不諱自非西京諸儒所能及然光武能變知改不私其親盖有人主之道焉曹褒制漢禮雖不行然恨當時史官疎濶不能略序其所以制作之意後世無所質證如云雜以五經讖記之文則疑諸儒沮壊者固非而褒之自為亦未必是也每念堯舜三代間文字須不待訓義解説而自明方為得之然自周以来必設學而教而孔氏亦以教門人子弟故有起予興觀羣怨之論則所謂訓義解説殆不可已也若左氏所載固已蔓延逺于正道而公榖尤甚及漢初各守一師因師為門其説不勝其異後世乃以為遭秦而然誤矣盖訓義解説出於俗儒勢自當然爾鄭𤣥雖曰囊括大典網羅衆家刪裁繁誣刋改漏失然不過能折衷俗儒之是非爾何曽望見聖賢藩牆耶况更數十年無不如此就有髙下何所損益其不待訓義觧説者固粲如日星學者不以自明而輒以自蔽是真可歎也古文尚書左氏國語周官毛詩學者藉此數書以知古人統紀源流而西京湮塞不行至東漢乃卒𫝊之豈杜林鄭興陳元賈逵輩智識實能過於西京諸儒耶特其門户偶相承爾孟子所謂巫匠亦然也賈逵以左氏獨有明文證圖讖劉氏為堯後此尤可笑矣班彪言定哀之間左丘明作𫝊國語由是乗檮杌之事遂闇而左氏獨章不知彪此語何所本若止據孟子文遂為之説則不可孟子此言自未為準定緣楚語自稱以春秋教世子孟子盖未必見國語也韓宣子聘魯見易象與魯春秋不自言其國史當何名乗檮杌之是非固不足辨然言其所不存者未審則訂其所存者亦非的矣惟言司馬遷文重思煩刋落不盡尚有盈辭彪去遷時未逺其理或然今學者乃以為遷之文體如此反以其不盡不齊者為意義深逺之所寄則亦未必然也班彪仕不求達光武亦不用止於司徒掾固最寵幸位不過郎盖於時公卿貴人不由文墨登也自戰國以来無不然至唐始變矣彪静約得古人之節而固不免為竇憲死然則言果不可以信行也彪言司馬遷漢事止據陸賈無别書彪及固自著亦不言所承何書但云繼採前史遺事旁貫異聞而已今史家用官文書比次日月猶尚錯謬則遷固綴集所聞而成者安得𫝊信故余為李燾序以為春秋後才有燾書也固以相如封禪靡而不典揚雄美新典而不實故作典引其意言自兩儀分莫崇乎堯越成湯武股肱既周天乃歸功元首將授漢劉先命孔子撰赤制而髙祖光武興謂漢特承堯是何道理與今世塲屋架綴作經義者無異固又以此著之漢書而欲垂中正不刋之義可乎詳其始撰䜟者妄稱劉秀為天子光武宗室單寡援之立極如童謠幸中遂以自神正與王莽同耳故桓譚鄭興皆莫肯信而固希世傅㑹曽無慚恥盖自昔文士往往不足憑也第五倫以建武末年自淮陽醫工長得再三見通語至夕至道其行事為戲光武誘進人才之度固無窮矣如倫亷正寛厚得百姓心立朝盡言遂相肅宗其貽謀子孫多矣鍾離意疏百姓可以徳勝難以力服鹿鳴之詩必言宴樂者以人神之心洽然後天氣和有味哉其言之也推其所行措之三代不難矣兩世雖不盡用然未嘗不知敬也馬援擊武陵蠻乗髙守隘兵不能進遂以獲罪然援既死宋均即矯制降之訖無後患以均事觀之援但志於翦滅而已自負鑒識而賈勇奮鋭乃與臧宫馬武等同不逮均矣均馴虎禁巫其言吏能𢎞厚雖貪汙放縦猶無所害至於苛察之人身或亷法而巧黥刻削毒加百姓災害流亡所由而作㫖意宏雅如援固不足望也援𫝊稱遣梁松乗驛責問因代監軍當是均還代之耳明帝始終獨楚獄一事可恨與始皇坑戮孝武巫蠱武后羅織略不相逺矣然明帝處兄弟間大抵天性不失無淮南陳思猜暴之禍英母妻子猶在楚殿悲泣相對豈必遷怒天下士大夫耶明徳后寒朗納説感動夜起傍徨出於至誠然則明帝固以褊憤自損而治獄者亦不肖甚矣郭后太子疆之廢盖亦有説隂后本嫡也光武特以河北艱危畏憚劉揚之故别納其甥出於權宜非緣色奪事㑹遷改遂有更易終歸於正而無愛憎之嫌故夫婦父子兄弟情愛不至破壊視前後帝王差為愈耳朱暉為東平王蒼取隂就璧蒼既罷謂暉屬諸掾自視孰與藺相如蒼傳稱蒼多智思觀此語可以想見光武父子皆博學多雅言一時士大夫不能及而蒼之寛博過顯宗矣暉與張林争議均輸𣙜鹽按漢世取於民薄遇天災或用侈輒闕經費至東京而其患屢見如肅宗欲加賦盖非得已也故仲長統歸於斂輕以為二十取一猶曰貉道况三十而取一乎夫三十取一雖非中道不猶愈於後世既苛取本税復盡較末利錙算銖計常竭天下以為市而猶不足哉然則昔人據正駮論如暉之以死守而猶以為易後人雖通經學古思欲輕賦予民而暴征横斂其説已成徒悲傷歎息不敢出口而自信其難也杜安罷宛令家居因章帝過潁川上書得御史遷巴郡守與樂恢書恢不答而告吏口謝且誚之曰為宛令不合志病去可也干人主以闚踰非也違平生操故不報闚踰二字孟子所謂龍斷穿窬以利心希世而不以正進退者也自孟子已後至西漢未有達此理者漢末節士始漸知之王良之友所謂往来屑屑不憚煩所以成東漢之俗有貞退之風三代以還不能及也何敞言異鳥翔於殿屋怪草生于庭際自有鳳凰芝草以来未有為此言者盖天下自有逈脱議論不必待聖賢而後能之然敞固不可謂非聖者也古人以徳言物不以物為徳故九成致鳳凰麟趾如公子騶虞離罝弋皆以徳言物也若後世所謂瑞則以物為徳矣敞傳稱臘賜自郎官以上公卿王侯以下空竭帑蔵耗損國資注載其目今漢官儀不存按東方朔𫝊亦有伏日受賜之文若節輒有賜則過正祿矣是於人臣不為薄國家待遇之義亦當然也後世事當更考楚獄用馬后寒朗言理出千餘人及袁安覆考得出者四百餘家是終於昭雪而不至寃死視淮南衡山巫蠱之濫殺者有間矣然以天下四方之逺顔忠王平二人之妄一旦無故陷而入者數千人豈不為大異明帝以欽䘏自許而謬誤至此豈先王明徳慎罰之義歟然本無殺心則學者不可不知袁氏貴盛不以道而基隗遇夷滅之禍紹術為叛亂之宗閎及忠𢎞恥之至於避名匿跡佯狂逺遁其畏禍審而潔身至矣孟子謂於陵仲子齊士之巨擘而不能充其類然則必充其類而後可則三人者無異於常公子而世論所不貴矣此中庸所以難行也郭泰嘗從閎不宿而去以為譬諸汎濫雖清而易挹豈亦有孟子之意乎按奉髙袁閬字非閎也恐誤張酺為東郡初不願出而自列歸去十五年章帝雖遇之厚而終不召復外遷亦不屑意然則是時君臣之間樸質不事形迹盖有古風與蕭望之數月復徴入者差不同也况以後世視之益難言矣漢世尚書掌詔令陳忠謂臣等既愚闇而諸郎多文俗吏鮮有雅材每為詔文轉相求請或以不能而專己自由辭多鄙固古今之敝未嘗不同也然則其存於䇿者尚多可稱而末世專以詞命取貴仕乃反不及豈惟不及而失其㫖歸僅在俳優之下又不止於鄙固而已是真可歎也郭躬論秦彭得專殺孫章為誤詔且言周道如砥君子不逆詐躬習小杜律杜周以深刻著而其學乃與經同意何也豈延年行寛厚能改父説乎漢儒用春秋甚於法吏如躬父子所言雖未及臯陶周公視董仲舒公孫𢎞則賢矣明帝以人主之尊而疑人為故遂以察察成名此孟子所以慎擇術也酬如幻人之奏二俱無用名實隳損未知安所戾止李法譏史官紀事不實後世尋功計徳必不明信漢初無史明章之後記錄漸布而法之言如此然則為史者未嘗不佞而所稱建武永平事盖未可憑也若是而詩書之𫝊亦何可遽信當以其心平而理明耳王符潜夫論其愛日篇言化國之日舒以長亂國之日促以短長舒者非謂羲和安行乃君明民静而力有餘也促短者非謂分度損減乃上闇下亂力不足也此語誠然夫上有明闇之殊而下有勞佚之異甚者死生存亡係焉余在金陵每聞民間語謂待辨於庭者歸可及朝飯盖上下紛紜務為昬惰以自煩苦而不知日月之失未嘗不安之以為當然也何暇及禮義乎化本治字唐人避諱改之爾仲長統二詩放棄規檢以適已情視漢末拘士曲儒與夫瑣瑣自縳者有異矣然自是風雅大壊而建安黄初之體出曹氏父子為之倡文士相與効之而韋孟張衡之作蕩為灰塵不可復求也統言君子居位為士民之長固宜重肉累帛朱輪駟馬今反謂薄屋者為髙藿食者為清又言善士富者少而貧者多此與董仲舒公孫𢎞指意不同又言賈誼開自裁之端遂以成俗是所謂右手刎其喉人主所以處士大夫與士大夫所以自處不同統之言施之人主可也賈誼仲舒之言施之士大夫可也子思曰敬大臣則不眩體羣臣則士之報禮重又曰官盛任使所以勸大臣也忠信重祿所以勸士也然則董仲舒之薄仲長統之放當考而不當法也崔寔政論絶無義漢人以為能言莫曉其故其大意不過病季世寛弛欲以威刑肅之不知亂亡之證元不在此正坐易置之耳盖威刑未嘗不加于君子寛弛未嘗不行於小人是時李固杜喬已死梁冀主斷更無救法寔立此論欲以何施天下本無治世亦無壊俗寔謂孝文重刑非輕刑以嚴致平非以寛致平是何等見識又謂刑罰者亂世之藥石徳教者興平之梁肉不知亂世何嘗有不可食粱肉之理寔以此論誤當時其禍猶小遂誤後世其禍大也習學記言卷二十五
