body:
  text: 習學記言卷三十六宋葉適撰隋書余嘗論宇文泰初起異於髙歡及武帝躬任數略化弱為强盡有北方五世數十年矣雖樹德不深置嗣無狀然於楊堅非有罪也乃倚女后之勢挾輕薄無賴子行詐逼取如懷䄂中才半歲戕殺宇文無遺種故臣宿將駢首拜伏莫敢違忤視王莽何足道也堅少年以相表自矜言其異者固非一人而史又述其始生時頭上角出遍體鱗起嗟夫是直變怪不祥之物爾豈天不愛民假之富貴而使其相屠戮耶史法之壞始於司馬遷甚矣外戚雖處逼奪之地而古今滅族者皆是竇武天下重名與衆賢之心陳力尚不能誅宦官反父子俱斃何堅取之易哉髙熲李德林從亂如流韋孝寬李穆皆謂天命已改彼其奮袂直前徑肆剪覆者真足以扼天下之喉而制其命歟孟子言不仁而得天下未之有也蘇氏謂特未見司馬懿楊堅而然孟子尊立仁義欲扶救一時不幸其語不驗此堯舜湯武之道所以遂絶而無傳也且箕子以紂為天所棄故不忍援商終不與周並立士茍有志於道而力不能拯如孔子順義不入秦可也若為之回論易說以自容則家法盡矣易周氏官儀依漢魏之舊慕位第一事也雖庸諂相遇志在掃滅前迹亦由茍慕虛名人情不順有以使之矣周官再壞於此學者以為口實安用談經耶弛山澤之禁由後世言之非小事也所散者何止一利所免者何止一刑昔能之而後不能何也竊位之明年即營新都其詞自謂殷之五遷恐人盡死後人以市不易肆為受命之難然則强民遷於新造之日人心不特不以為難而反勸之又何易耶賜百僚錢帛任其自取盡力而出可謂無禮無義矣然以利啖人使捨人而從已所得者雖皆貪冒無恥之臣而合交聚黨盜賊師師為衆不少矣故終其一世行賞極厚而死生榮辱在呼吸之間亦前代所未有也唐太宗亦賜三品以上帛任其輕重三年遣使巡省民間情僞咸欲備聞揚鑣分路將遍四海逺近官司遐邇風俗巨細必紀還日奏聞庶使不出户庭坐知萬里此革命常行之事也然天子居深宫百司守常職耳目之近壅隔勢成人主茍有志於治時一遣使訪知下情利害之間足以變置昭發蒙昧消釋黨偏蓋新起天下之要道也其與獨任臺諫恣其專執日朘月削表裏欺蔽使風俗日降而不自知者相百矣十年詔魏末喪亂寓縣瓜分役車歲動未遑休息兵士軍人權置坊府南征北伐居處無定家無完堵室罕包桑恆為流寓之人竟無鄉里之號朕甚愍之凡是軍人可悉屬州縣墾田籍帳一與民同軍府統領宜依舊式按李繁家傳載蘇綽初置府兵與此利害優劣殊不同然詔文乃當時實事也蓋綽雖創始而地狹民寡加以長征不歸故未得盡行其說至是平陳後乃修完成法爾李泌見其近不見其逺遂謂三代之後無及此者後人從而信之至言其能斂千載已散之兵復還之民嗚呼孰知其籍千載已齊之民釐而為兵也哉十一年平陳所得古器多為妖怪悉毁之不知何等器北方所傳三代秦漢之舊物至是皆盡惜哉隋文力足以有天下而德不足以有古人之物變而為妖淪於壞滅速亡之兆見矣隋以海內既平功成作樂君臣詳議復雅禁繁自以為治世和氣之所致矣而萬寶常謂其淫厲而哀亡國之聲天下不久相殺將盡然竟如其言何哉夫由其粗者而觀數之已成者雖不可改事之必然者亦不可變固未有凶聲而應善政美德而召乖音者也隋文弒君竊國影響報效理不徒然鄙詐朋淫聚而富貴宜其不見輿薪而寶常特以技通之爾雖然數與事相為低昻其間甚微聖智猶不能辨舜所以欲聞六律五聲八音察其治亂以驗所行有象之道參於無形執契而舉莫能先後此又非寶常區區技術之工所能測也仁夀元年減國子學生止留七十人太學四門州縣學並廢當時國子千數則所散遣者數千萬人矣豈不駭動雖有諫者皆不聽史臣以為其暮年精華銷竭致然時方遣十六使巡省風俗而詔以為徒有名録空度歲時未有德為代範才任國用良由設學之理多而未精至三年七月下詔令州縣搜揚賢哲則云雖求傅巖莫見幽人徒想崆峒未聞至道惟恐商歌於長夜抱關於夷門㫖意懇切且限以三旬咸令進路徵召將送必須以禮則所謂精華將竭有所厭怠者亦未然蓋其心實謂空設學校未足以得人耳古之為教使材者必由學舜周公之論是也漢以後傳經師章句而已材者由於學則枉以壞不材者由於學則揠以成教之無本而不行取之雖驟而不獲則學之盛衰興廢蓋未易言也遺詔言王公卿士每日闕庭可見前此人主不常見群臣也史亦言每日一臨朝夫以和樂之道御其臣一日見之可也殺戮行於殿庭使之凜凜不自保可乎焬帝以巡遊亡天下周昭穆秦始皇漢武帝禍皆坐此然則人主不可輕出審矣孟子乃載晏子告齊景公事王通則謂兵衛少徴求寡可以數行夫皆無求於民則安得自挾而行皆使民有求於己則諸侯有司安用之書稱堯光被四表格於上下使其果後已而先人致其所利去其所患則裔夷窮髮之民皆延頸而望之而况於中國乎不然則令未出於户庭而害已形於天下矣隋文篡周恐羣情未愜多說符瑞以耀之造作而進者不可勝計仁夀元年祠南郊具前後符瑞數十百事於祝板王莾且死猶隨斗柄而坐與此蓋無異情也世雖下愚小人無不能言昧心則速禍欺天則受罰蓋懼其非純者必與天為二故也今行僞於天而又挽天以自同既挾天以欺人而又謂天為可欺下愚小人之不若何耶梁禮雩不為常祀四月後旱則以七事祈雨一理寃獄失職者二振鰥寡孤獨者三省繇輕賦四舉進賢良五黜退貪邪六命㑹男女恤怨曠七撤膳羞弛樂懸而不作郡國則五事同時並行為國命之通塞者莫如政為人命之通塞者莫如食至是足以有變矣此亦制禮之善也魯欲焚巫尫臧文仲以為當修城郭貶食省用務穡勸分至檀弓又言徙市而董仲舒乃修閉縱隂陽之術自以行之一國無不得所欲蓋雖儒者號知經及其施之於用則達禮而通政者少矣煬帝在榆林以古禮行狩在薊城用宜社類祭祖禡無不備舉遂發衆軍伐遼親授節度亘一千四十里可謂甚矣古人之於兵嚴始所以慎終也其出之部分先後不可亂所以為戰之坐作進退不可犯也若始而整終而潰則奚用矣夫教兵行師置陳安營自昔皆以為甚難司馬懿按行諸葛亮營壘處所歎其天下竒材然勝負尚不在此誠得其大可以兼其細矣不然則昆陽淝水安得以寡勝衆乎後魏天興儀曹郎董謐始制軒冕未知古式多違舊章孝文時儀曹令李韶更奏詳定奪論經籍猶未能正熙平九年明帝令催光元延明催瓚更造車服自後條章漸備北齊之後咸取用焉開國之始自應缺略其後制度備而國已敗亡古人論禮之興廢而國存亡不在焉以為為國而無禮不如亡此非不及存亡之論也李德林嘗言周魏輿輦乖制請皆廢毁開皇三年既更造九年平陳後又不用十四年又更制其後又言太和更造衣冠熙平元年懌定五時朝服是北方輿服能變夷從華皆本於孝文故王通謂太和之政近雅通知其近雅而不知其近亡也禮雖不以存亡為限然未有有禮而亡者若戰國秦漢以後當論其所以存亡而已不責禮之興廢使如孝文者而以禮許之則是禮為取亡之具而聖賢不貴矣焬帝大業二年始制軒冕大備文物之盛冠於古今三年突厥染干見而慕之請襲冠𢃄而牛𢎞何稠等皆受厚賞及師旅旋興則前日已定者皆棄不用而羣臣戎服袴褶反效胡人矣孔子歎禹惡衣服而致美於黻冕賈誼謂文帝自衣皂綈而庶人牆屋被文繡蓋必有所屈而後有所伸文質兼舉自古聖賢難之焬帝不足道也梁武帝著鍾律緯論主京房學言班固夾鍾中吕過於無調鄭𤣥有升陽而無降陽且自制四器名之為通轉推月氣悉無差忒旋相得中臣下莫得措意可謂精且能矣君明樂官不明樂音後世之論也由舜之言人主必知樂而後可以致治武帝知樂矣不足以致治而反至於亡者以樂為伎而不以樂為道故也使其以樂為道則先之以音而知其所以為治先之以治而知其所以為音均和齊中物召氣應而夔龍之功可復見也雖然聖人猶畏之故禹戒以無若丹朱傲而梁既廢牲牢則但為五音相和引而無復用律其率情背理如此信禹所謂傲者宜其終於殺身亡國哉周武帝圜丘降神辭王城七里通天臺紫微斜照影徘徊連珠合璧重光來天䇿暫轉鈎陳開雖非雅頌之詞亦後世佳語也鄭譯所言蘇祗婆七調五旦與中國七聲五均合譯雖輕狡小失然音律乃天地之正理固無華夷之間使誠知之不可掩也而何妥以儒自命至其隔礙不通自為胡越則人心之可畏如此而牛𢎞識不逮理又相與附益之曽夷狄之不若矣三龜茲新變聲隋文帝以為不祥言公等家家自有風俗聲不正何可使兒女聞其言是也孔子稱移風易俗莫善於樂若上之所好者正風俗自然移改矣然隋之羣臣其智又不能及其君所以然者其臣無不茍於利祿俯仰操竊之餘其所得者固將以充其一時耳目之所徇而止耳豈此十數語所能救哉百戲始於齊武成習於周天元盛極於隋焬帝自是以為常行唐髙祖初以五月即位而太常借民裙襦充妓衣擬端午日𤣥武門觀戲孫伏伽所諫者也毛爽蔡子元等候氣之術氣應有早晚灰飛有多少或初入月氣即應或中下旬氣始應或灰飛出三五夜而盡或終一月才飛少許者夫氣之必應灰之必飛隂陽之情天地之理當然也應有早晚飛有多少其差忒而不能盡齊者人道之厚薄時政之寬猛固使之也古人所以貴於和隂陽合天地也隋文徒出旁議而不知身為人道之主牛𢎞志在規諷而未極理事之精彼技術者又安能測之其效止於能飛能應而已扣之愈急則其說愈謬矣且使尺稍下而能悉飛則安取人道子律寄母而應殊則是應律而非應氣也因隋志略諸代尺十五等異同之說杜夔尺長荀勗尺下及近世以律生尺之論夫律之清濁度之長短量之多少衡之輕重自有生民以來未有知其所由然者而所以為律度量衡亦自有生民以來未有知其所由然者也以律生度量衡起於漢人古蓋無有昔之聖賢能和均四物使之相通而不相害則有之矣若必以為從律而生而以黍起律黍之地産不定肥瘠大小不齊執一異以廢衆同則樂之興無日矣厯自李業興後周有甄鸞隋有馬顯張賔張胃𤣥劉焯焯為胃𤣥袁充所排而術家服其精然方其時君蔽臣諂往往誣天席寵以售其術如厯差日長之類固不足憑而焯為儒者乃與之較是非耶自太初厯以來數十家其術多在按書先言厯象日月星辰後列其驗上世厯術既不存而以律及易大衍春秋為本起者皆出於後人私智鑿空務新一時之耳目於術非能有損益也蓋天宣夜既皆折而歸於渾天獨劉焯欲立術改正舊渾又以二至之影定去極晷漏并天地髙逺星辰運周請一水工并解算術士取河南平地之所可量數百里南北使正審時以漏平地以繩隨氣至分同日度影得其差率里即可知則天地無所匿其形辰象無所逃其數超前顯聖效象除疑使時行其說或得新義可以補前人之未至也蓋天地隂陽之密理最患於以空言窺測古人所以置羲和於四方之極豈固欲以地凖天以實定虛耶昔之言月者謂其形圓其質清日光照之則見其明日光所不照則謂之魄後人相承遂謂月無光因日而有光月果無光安用與日並明萬物無不因日而後成色惟月星不然近日則光奪為日所臨則奄而不明易云日月得天而能久照必若月不能自明而待日以為明使孔子之論亦如此則月不得言久照也數術之士昧理而迷源學者不能知其淺深反以為窮理之極致遂至乖異於道體甚有害隋志所載雜占氣候詳於司馬遷所記蓋後人又推言之也其言天子氣自戰國秦漢已言天子氣矣唐虞三代言其德而不言其氣然則光被四表者文士之虛稱也有氣而無德將為不祥以禍天下而何述焉天文五行志凡星文之變五行之異五代事皆具南北之間可參而觀也寶志陶𢎞景當時號達者陸法和已下矣然所歌詠皆驗列禦冦謂壺丘子示巫咸以太冲莫勝故自失而走禦冦不為有道而其言已如此余嘗謂人主自修不至遂以形迹象數之末竟墮術士之口若聖人御世則彼烏得而䜟之自晉至梁陳都畿民皆為王公貴人佃客典計衣食客之類無課役佃穀與大家量分自四十户至五户止既役其力又食其租按司馬元顯傳稱王公以下日廩七升而范寧亦言起廨舍割兵仗之弊蓋雖賦祿少而得占多比後世自為優也志又言魏晉二十一帝宋齊十五主雖用度有衆寡賦祿有重輕大抵不能傾人産業然則取於民不厚而其臣足以自完未可謂非善法也貨利之柄上失之而私於下猶未有害王莽謂漢常有更賦疲癃咸出豪民侵凌分田劫假欲盡收於上故不旋踵而大亂以亡後世為國多有此等議論以此知理財正辭禁民為非須作三兩段看方明古人之意不然反為後人患矣魏至髙歡方收鹽利宇文泰亦置掌鹽然關市邸店之稅乃顔之推鄧長顒於北齊垂亡時所立而隋初罷酒坊通鹽池鹽井與民共之然則極後世第一好議論曾未足以望前世之十一而不知求其故也齊自河清始有受田之制蓋其君驕粗甚矣然尚如此周亦有司均掌田里之政令以其時田皆在官故也今田不在官久矣往事無復論然遂以為皆不當在官必以民自買為正雖官偶有者亦效民賣之此又偏也隋文以儉致富百姓給復免租與漢文景同蓋時無與散雖欲斂之而不可不必三代仁義之主而後能也財貨盡斂於上却散於下雖前代衰亂蓋無此法斂即無散散則不斂矣及本朝承唐之弊以斂為散以散為斂故取之最苛而民猶未潰以為不得不然也然敝極不變上無以自寬斂散不相容如馬馳不得息弓彀不得止終必歸於大亂而後已爾自髙睿等上齊律當時稱其法令明審科條簡要而齊人多曉法律者至髙熲造隋律蘇威牛𢎞再定然皆本於齊也由唐及今雖有增損然皆出於隋也子産鑄刑書叔向非之而曰吾以救世今觀律文與事情輕重相稱况子産尤為精當言救世信矣然自秦漢以後稍號平時者法無不寬其君之薄德者刑無不苛推而至於堯舜湯武君臣各躬行以靖民而法自為無用則叔向所謂不為刑辟固非髙逺不切之論也世道之衰雖緣人材日下然其病根正以有已而忘人做下樣子令其不可回轉如子産是也習學記言卷三十六
