body:
  text: 習學記言卷十八宋葉適撰戰國䇿周春秋以後接秦之興無本書可考雖有司馬遷史記然皆雜取諸書及野語流傳㑹聚之所成也故戰國一節不敢使與左傳同便為成書直加據定而戰國䇿本遷所憑依粗有諸國事讀者以嵗月騐其先後因之以知得失或庶幾焉劉向叙此書上止文武最後謂詐偽不能比王徳大意雖不差尚淺而未䆒蓋道徳禮義學校自有天地聖人以来共之非文武之所獨為也及聖人不作積以廢壊極於亡秦而詐偽之弊遂不可復反向豈謂漢興亦能稍變秦俗乎且其設權立計有繫當時利害之大者學者將以觀事變固不宜略然十纔二三耳其餘纎碎反覆徒競錐刀之細市井小人之所羞稱所謂不足以封牙頰也又烏在乎亦可喜皆可觀哉夫習於儇陋淺妄之夸說使與道徳禮義相亂其為學者心術之巨蠹矣可不甚畏乎秦求九鼎顔率東西行說僅免王孫滿猶能言在徳不在鼎故尚可存至率但稱武王一鼎九萬人輓之詞窮語索無歸宿處然則鼎安得不淪没而周安得不亡謂辯士能以口舌存人之國者果非也忠臣令誹在下譽在上大臣得譽非國家之美君臣相忌之勢至是始成而秦習用之後世遵行焉古今固無人臣自賢以貶其君而可以致治然亦無自毁以成其君而可以不亂者魏絳謂愚㺯其民而虞羿于田晏嬰稱公厚斂陳氏厚施民歸之略皆此意然太康見距五子自怨夏禹有訓君臣克艱而已談客妄論能使人心術下移不可不審觀也普天之下莫非王土率土之濵莫非王臣孟子謂是詩也此莫非王事我獨賢勞也以温人之詞考之昔人學於詩書而不能知者固衆矣不然孔孟何以為先覺乎蘇厲喻養由基可教射謂當以善息非也楚共王怒由基曰詰朝爾射死藝蓋逞一夫之技而不足以為成敗此人君之言也養由基既知射矣安有氣力倦弓撥矢鈎而不中者乎後人多有此論是未能射而先求息也孟子亦喻百步之外其至爾力其中非爾力然則古人之道固不以息為射而教射者使之不怨勝己非教息也秦衛鞅相秦天下滅亡之始也自古帝王之外諸侯無大國雖更衰亂或相攻伐併吞然力不得盡肆而誅討之義已明矣桀紂皆以王者身欲為暴湯武尚滅除之況小國乎此諸侯所以能相恃而存也天下滅亡其漸有三周既東遷平王不君舉宗周而棄之秦人取奪無禁一朝而開地八百一也楚起荆山騁詐任力漢陽諸侯噬食皆盡東被舒徐北綿襄鄧自為大邦二也晉以殘滅肇基文公號名侯伯實兼土地以自封殖王畿之壤不免攻圍遂至數圻雄視天下三也然猶雜假禮義旁出文告互興迭廢乍存乍没未有全舉宇内之規也及鞅入相於秦盡壊帝王法程挈闗中而强諸夏天下之勢始偏重於一隅山東諸侯亦各自棄其國守典章法度無一存者朝從暮横第與秦相軒輊而已故鞅雖見殺於秦不百年而天下為秦矣是故非三國廣大土宇無以成戰國相雄强之勢非衛鞅破壊王制無以為暴秦一天下之資嗚呼豈天意耶抑聖人之不作其理自當然也孟子曰不仁而得天下未之有也鞅之不仁足以亡天下爾何足以得之古無力征天下之術以徳而天下自至則有之矣故康誥曰惟乃丕顯考文王克明徳慎罰庸庸祗祗威威顯民用肇造我區夏越我一二邦以脩我西土惟時怙冒聞於上帝帝休天乃大命文王殪戎殷也楚熊䖍詬天之辭曰余必自取之雖有此志固無此術也衛鞅之後蘇秦張儀造為從衡為從者抗秦以自存而已為衡者雖連諸侯以事秦然服之而未有以取之也既而謀詐鋒出至韓非李斯卒并山東而取天下於是論天下始有勢兼天下始有術秦之亡謀臣智士抵掌而議運宇宙如丸泥張良陳平之徒竟以空手輔佐其人而攫取天下無不如志自後相承說客處士捨是則不談然則王道之亡而人心轉易至此嗟夫甚哉學者貴於自反而已楚懐王信張儀絶齊取商於地此六國見破於秦最大之証蓋楚不失計則秦無自而施禽獵之䇿左足舉而右臂見縶矣是時楚蓋已亡坐視秦并諸侯已乃卒滅與取商於相去八十餘年始衛鞅欺公子卬得魏河西及張儀絶齊於楚秦之所以兼諸侯其要在此二事居彼欲其許我妻我欲其詈人賣僕妾售閭巷出婦嫁鄉曲誠思則將吳吟以上陳軫語也凡辨士必先設說為喻以發其所欲言皆此類然而徃徃不出於人情之所近是以詐諼横溢攪存為亡若軫語庶幾人情之所近矣故其所出計畫猶可以救敗一時不至有傾覆之禍然則戰國至漢數百年士以既失之情而揣方来之事變施於國家其敗何疑哀哉昔殷人自知將亡微子作誥父師少師人自獻於先王秦與六國未識孰存也而頓弱為請萬金間其君臣其後陳平之於項羽亦用之蓋失道而骨肉自知其不可合得利使君臣欲合不能四海雖廣何徃而非危地哉齊古以桀紂為監戰國藉口則有夫差智伯當時說士亦有欲以此禁制秦者非愛之也乃求利之一塗耳然秦人方極暴肆横陵蚩尤而出其上何論夫差智伯哉蓋至二世而後騐爾秦王使子楚誦辭以少棄捐無師傅不習於誦罷之雖秦與戎狄同俗其君亦未嘗不誦書至楚不習誦而始皇為之子李斯遂教以焚滅先聖典籍然則人主之學不學其利害之大闗乎百世也鄒忌自知不如徐公美因此勸其君受諫聞過古人君臣之相與言也以義理逺貪欲而治道立忌之言也以貪欲求義理而諫路開異矣豈治道義理固無徃而不在耶雖然其與幾何為蛇畫足之論世之庸人固多以為口實然戰勝而不知止謂之畫足可也如未為蛇則奚足之云故凡操此論者皆未嘗為蛇者也蘇秦留楚太子求下東國說士疏别其利十餘條春秋謂晏子一言齊侯省刑曰仁人之言其利溥哉自昔賢大夫綱舉目張而論國家之計固多矣傳說一見其言數十若夫揣摩利害無非傾覆他人以自便而筆之無媿色者學者讀之當以惡惡臭比也齊威宣靖郭孟嘗招致游士其言議風旨可見者自淳于髠夏侯章田瞀以下略在而馮煖事最著顔觸學兼孔老而能自持其說不屈其身趙成后所言於陵仲子蓋其人髙潔獨立塵垢富貴萬物不足以說之不惟嗜利行諼者以為無用亦自其所媿而惡也說齊湣王無姓名數千言其要謂明君察相五兵不動而諸侯從辭讓而重賂至大抵陳用兵之害雖雜亂然當是時能為此言者蓋少而湣王亦卒以窮兵亡國殺身非妄也田單立功不旋踵而有九人之䜛幾死自古功名之際無得免者可畏哉貂勃一說而殺九子單以復安誅佞臣何其易古今事不同或當信然未可知也楚趙智伯之難趙襄子問張孟談以為董安于世治晉陽而尹鐸脩之至行城郭按府庫視倉廩發矢於公宫之垣取兵於宫室之銅蓋其備豫積實如此而晉語乃言尹鐸為保障為繭絲損其户數故沈竈鼃而民不叛余固疑所載之非實蓋當是時茍得所以受敵之地上下相守以待變足矣烏有能寛民而後求其不叛者乎豫讓言為先知報後知為故君賊新君大亂君臣之義此春秋時餘論未衰息者故孔子以琴張為不當弔宗魯也中國者聰明睿智之所居也財用之所聚也聖人之所教也仁義之所施也詩書禮樂之所用也異敏技藝之所試也逺方之所觀赴也蠻夷之所儀行也戰國䇿之陋甚矣公子成不知何人乃能為此數十語然卒再拜而胡服又可笑也自荀吳變卒破狄其兆已見武靈王雖廣地闢國無救於殺身壊法亂紀卒與六王相隨而滅然則有國之要信不在此也魯仲連不肯帝秦是戰國一大節目事蓋當是時士莫知恥而仲連能恥之也孟子曰如恥之莫如師文王然則仲連之所恥有以處此乎趙魏韓魏文侯講韓趙而諸侯朝身罷獵而國强此戰國初事也其後不復有不惟戰國漢魏以後亦無矣周世宗近之田子方言審於音者聾於官魏文侯善之豈有在治忽之遺思乎而禹以為未然蓋古道逺矣自後無傳焉哀哉惠施妄稱文王出棺以弛葬日當時夸其說文王之義以示天下彼獨未知孟軻所謂文王者耶齊魏戰於馬陵齊大勝魏殺太子申覆十萬之軍魏王召惠施而告之曰夫齊寡人之讎也怨之至死不忘國雖小吾常欲悉起兵而攻之何如對曰不可臣聞王者得度而霸者知計今王之所以告臣者疏於度而逺於計王固先屬怨於趙而後與齊戰今戰不勝國無守戰之備王又欲悉起兵而攻齊此非臣之所謂也王若欲報齊乎則不如因變服折節而朝齊楚王必怒矣王游人而合其鬭則楚必伐齊以休楚而伐罷齊則必為楚擒矣是王以楚毁齊也魏王曰善乃使人報於齊願臣畜而朝田嬰許諾張丑曰不可戰不勝魏而得朝禮與魏和而下楚此可以大勝也今戰勝魏覆十萬之軍而擒太子申臣萬乗之魏而甲秦楚此其暴戾定矣且楚王之為人也好用兵而甚務名終為齊患者必楚也田嬰不聽遂内魏王而與之並朝齊侯再三趙氏醜之楚王怒自將而伐齊趙應之大敗齊於徐州按孟子梁惠王曰晉國天下莫强焉叟之所知也及寡人之身東敗於齊長子死焉西喪地於秦七百里南辱於楚寡人恥之願比死者壹洒之如之何則可孟子曰地方百里而可以王王如施仁政於民省刑罰薄稅斂深耕易耨壯者以暇日修其孝悌忠信入以事其父兄出以事其長上可使制梃以撻秦楚之堅甲利兵矣彼奪其民時使不得耕耨以養其父母父母凍餓兄弟妻子離散彼陷溺其民王徃而征之夫誰與王敵故曰仁者無敵王請勿疑梁惠王之所以告惠施悉起兵攻齊者即其所以告孟子願壹洒之者也而惠施之言如彼其效如彼孟子之言如此梁王迂之不聽也故具載之使學者擇焉范臺之宴請魯君舉觴魯君擇言四事自伯禽以来惟僖公稱賢君猶未能及此言也魯方百里者五其君之賢若此而不能興其國豈流傳之誤耶抑偪側於暴强之間雖為善而不足以自立耶范睢言人有徳於我不可忘吾有徳於人不可不忘此固人之常心當然進而至於不矜不伐徳之成名者也戰國之士聚於四豪故其言論時有可稱馮煖以下客市義而范睢能鉏信陵之驕亦各以其資之所近歟秦王言天子之怒伏屍百萬流血千里盡客氣也故唐睢得以客氣勝之曰伏尸二人流血五步天下縞素挺劒而起秦王色撓長跪而謝也然荆軻事言秦法群臣侍殿上者不得持尺寸兵或者他國使客不禁耶孟子謂文武一怒而安天下之民詩稱肆不殄厥愠亦不隕厥問當與秦王唐睢並㸔史疾治列禦冦之言曰貴正楚王疑正不可以治國不可以禦盜春秋之末此論已行故孔子曰子率以正孰敢不正又曰子為政焉用殺子欲善而民善矣時人亦疑之雖其髙弟固不盡信也郭隗以古道說燕昭王發其敬士之機築宫師事自其身始非不讓也四方聞風皆以類至非勝己也破齊之功樂毅專之已無與焉非無能也為人主立致士法以示後世非賴寵也書稱一个臣非好彦聖者能若是乎三代以上帝者之佐竒舉瑰行猶一二見於逸書如隗殆庶幾蓋非戰國䇿士所能為也荆軻論者多異揚雄言軻者謂孟軻若荆軻君子盜諸二軻名偶同奚因是進孟以黜荆雄陋甚矣孟子曰殘賊之人謂之一夫聞誅一夫紂矣未聞弑君也孟子特為戰國之君立此義蓋惡夫賊仁義者爾始皇為封豕長蛇荐食天下天下之人得同起而誅之軻功雖不成其志壯矣墨子卑己尊人以情媿之論技考實以能服之用此輔其君存其國孟子責以大義是矣然戰國之士固不及也中山君好士李庇請伐之以務名不存本耕者惰戰士懦此語本出於玩薄然如齊稷下四公子所禮士其間豈為無賢而致用之道雜乃受攻之本也淳于髠身無用姦人之雄反自曰無賢者有則髠必識之然則人主以好士為名而不知士之賢否無開治之實何救於亡戰國䇿國别必列蘇張從横且載代厲始末意其宗蘇氏學者所次輯也又韓趙魏皆載智伯求地為首而燕終之以髙漸離刺始皇使劉向未校以前已如此則此書蚤經釐正矣非殘缺也司馬遷史記有取於國語戰國䇿及他先秦書皆一切用舊文無竄定是則述之而已無作也不知劉向揚雄所謂善叙事理辨而不華質而不俚者安在豈指楚漢事言之乎論世有三皆以人心為本三代以上道徳仁義人心之所止也春秋以来人心漸失然猶有義理之餘焉至於戰國人心無復存矣先物而流造勢為傾綿蕝以出智巧架漏以成事機皆背心離性而行者也故其禍至於使天下盡亡而後已自漢及今學者欲求復於人心之所止則固有道矣然其質者不能論世觀變則常患於不知其浮者不能順徳軌行則撓而從之衆矣故有以戰國䇿為竒書者學之大禁也習學記言卷十八
