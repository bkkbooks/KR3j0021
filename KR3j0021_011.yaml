body:
  text: 習學記言卷十一宋葉適撰左氏襄二十二至三十臧武仲魯人以為聖其知孔子所稱立悼子事粗有識人已知其不可安得攘臂為之豈亂世忌材不如是無以自容耶雖是非無二理要當不免然亦可以見季孫猜暴不信賢者旬難立其朝也故孔子以為順事恕施必於已而不必於人可知矣叔孫豹以士丐所言唐虞傳祿不在不朽之數其於尊道尚賢固明甚然自古亦未有無功德而可以世其祿者學者要當知德義為無挾而存爾子産攻幣重直言無德與名而已若後世之論則當有委曲而好利之患已成亦無肯直受攻者蓋以義易利在春秋時猶未為難事也晏子不死不亡不歸不從崔慶歃從容去就之際有足觀者然自後世學春秋者論之要為有走作處而亦不足以沮折亂臣賊子之姦心故論事見微為難叔向非以私意進退人者為國事爾然師曠謂不心競而力爭不務德而爭善語意深長蓋橫流薄俗日益其間耳蘧伯玉衛所謂賢者孔子季札稱之惟有不得聞君之出敢聞其入二語古人於事變之際少干涉不惟功名之心薄誠恐雅道自此而壞若後世則不然晉士起語當時固無舊章管仲受下卿之禮百餘年前以為能讓矣失禮背義至於稱兵逞兵極鬭至於弭兵不幸而王者不作數百年成此禍變然則稱兵固無禮義弭兵之後禮義亦豈復可有而子罕乃以為晉楚以兵威之畏而後上下慈和所謂輿薪之中妄察秋毫也據叔孫豹言邾滕人之私我列國也何故視之宋衛吾匹乃受盟是豹初無辱命特魯史用季孫宿之意去其族爾若以為但稱公命便當從順二者安用史法孔子亦因其舊不復改也然則後之言春秋去事逺矣賦詩言志春秋時事也斷章取義經師之教則然孔孟亦不免而其義精矣其他諸儒雖子思不合者亦多當細考復歸無所是謂迷復以亡國亂君禍敗考之誠然所謂復者欲其不逺而可歸至於復歸而無所則安用復矣問崩日以甲寅告故書之以徵過是何義如此類左氏稱之抑姑存魯書法耶抑真以其書法為是耶巫以桃茢先祓殯檀弓亦載此蓋儒者所傳以為能用禮鉏荆人之桀也然亡禮之大在於始朝楚其次在於楚子卒而猶往國威已失患及君身然後用禮於祓則晚矣季孫宿取卞襄公幾不敢入公冶致邑終身不出君臣紛紛至此而不思以謀取正以禮已亂至昭公乃欲用一朝之喜怒勝之安得無失國乎城杞固晉人欲為私惠不足以服諸侯然使公義茍明王霸有統諸侯小大相維親踈如一安有宗周夏肄之分子太叔大叔文子皆魯衛賢大夫悲夫天下紀綱法度盡壞矣故各出此語也女叔齊謂以杞封魯猶可語尤異矣杞侯來盟書子以賤之亦魯人私意也伯夷叔齊與季札同為讓國之賢季子又稱願附于子臧則子臧者亦夷齊之倫也夷齊之言語豫奪不傳於世若季子者宜其外事物而不存矣然而憂患險阻皆究逹世故無異於有利名愛惡之交者蓋其不以讓自髙而常以德自考故也然則孟子之所以推論伯夷亦有未必然者矣季子之觀樂以音聲論義理子産相鄭若止是施政於民亦非難事大要國體不立如既壞之室扶東補西欲加修治使之完美自立以聽正令固非舊之可因亦非新之可革裁量張弛不用一法其曲折甚難故有思始成終如農有畔之論也雖然此子産之所能為也若夫虎帥以聽誰敢犯子非子産之所能為也古今之不得乎君又不得乎長雖孔孟無以行其一二也子産對壞館垣一節言晉文崇大諸侯之館後生不習知舊事如士丐徒見目前髙閎閈厚垣墉自以為盛矣此晉人所以辭屈而改築也叔向不分曲直但謂有辭諸侯賴之恐亦未然虛辭豈可恃耶北宫文子所謂有禮見相小國之難也襄三十一至昭六仲尼言人謂子産不仁吾不信蓋其意與古人同言之異耳古人以義子産以利我小人也衣服附在吾身我知而慎之大官大邑所以庇身也我逺而慢之子皮就自所知分際上言之自有地位故雖材智不如子産而子産為其所用也用人之𢎞乃多於其人之有用此理當深察也令尹圍之不終如何只無威儀見得又説到詩書甚於後人義疏之學也虢之會叔孫豹脫死權在楚是後晉存盟主之號耳趙武以弱為仁故至此也鄭伯髠頑楚子麋皆不書弒韓宣子所見易象魯春秋今亦不能灼知其旨安在蓋若止是易象及䇿書大事則非韓起倉卒所能究其義若併見講解凡例則其説不傳杜預遂謂即周之舊典禮經何可懸斷故余以為略用舊説傳之新意非其實也司馬侯諫晉侯修德以待其歸勿強爭諸侯固好議論然晉所以霸本用謀與力稍緣飾以義考舅犯先軫書舊語具在也自范燮有迸楚紓憂思深慮逺之説知瑩不肯力戰終能勝楚流風相承趙武遂再合晉楚以弭兵至是而為申之會然其時楚有吳患國無名佐而楚子以弒立驕侈自用危亡在目若晉君臣能自強勿許楚必不至為中國患今逆自退屈以柄授之自是霸統一散不可復回矣然則司馬侯所謂修德須真能力行仁義為王者之事方可若佚欲內肆昏惰求安借修德以為説而甘立於至弱之地殷隕周興何嘗如此乃後世俗儒常談之説不可與古人言德者並稱也鄭作丘賦不知如何改舊法當由人多於地爾若無故暴加重斂亦子産所不為也然君子以變古為難恐須更有商量子産未免矜材一向做下爾叔孫豹清言亮節意度髙邁所知甚逺當事可法非季孫行父所能及也止有任豎牛一事遂父子不相保而以餒終人之不幸有所溺其禍敗可畏若是哉叔孫婼始朝家衆便聲豎牛之罪不用寸刃而除大惡真後人所謂第一義者惜乎篡臣賊輔所立之童君不足以知此也説易者謂小貞吉大貞凶以此事觀之殊不然爾建大義立大事存乎其人有人然後有象豈限常繇耶子家羈天下蚤知其賢昭七至二十二鄭鑄刑書叔向譏之子産於扶補傾壞之中必欲翦裁比次自令新美冝其做到變古處先王之政遂不可復也治道固不能不與時遷移然亦有清靜寧民可以坐銷四國之患使古意自存者而徒為是紛紛此老聃所以有感於周之末造且欲併廢其初也師曠對石言微及虒祁而叔向以為信而有徵故怨逺於其身蓋取諷爾然屠蒯直入酌飲而晉侯為之徹酒荀躒為卿則諷固不如諌也古之置諌臣不主諷也古人之稱曰利義之和其次曰義利之本其後曰何必曰利然則雖和義猶不害其為純義也雖廢利猶不害其為専利也此古今之分也子服惠伯解黃裳元吉語太多孔子曰文在中也易不可占險義雖不深有警於世楚靈王乃欲取昆吾舊地管仲雖問昭王南征可也古也有志克己復禮仁也今世説此遊詞甚多而無克復之實蓋理本不虛立爾晉自平公積衰弱失霸楚既執柄而齊亦繼起平丘之盟幾不集叔向呌呼其間一時急不得不然然終亦何所就觀其臨事持平反不若荀吳矣晉居深山戎狄之與鄰王靈不及拜戎不暇何以獻器其時言語専對之臣如此國未亡而精神先逝矣子産不妄受規謂之狹亦可然善規者自當知事本若不量所聽而妄行之將反以諌受病所喪亦多矣韓起辭環事子産所較甚細然所較細而所禦大矣蓋自來積纍功夫能至此也小邾子賦菁菁者莪叔孫昭子曰不有其國其能久乎後儒謂以禮樂相示蓋指意所到便分髙卑也仲尼學郯子夏商以上遺事非左氏國語何由知之若司馬遷所載不足信也以晏子答齊侯問疾及梁丘據和同二義考之古之聽言者要是自己切近處易有所覺故進言者茍有動悟則於其政事反之不難後世人主本身去義理甚逺人臣止能就事開説至其身過則不復敢嚮邇就使於事有所正而其效固已薄矣晏子所陳猶是援證始末使文理可曉孔子但言君君臣臣父父子子簡淡無執捉處景公便深省解然則非獨晏子能言之功也蓋春秋以前據君位利勢者與戰國秦漢以後不同君臣之間差不甚逺無隆尊絶卑之異其身之喜怒哀樂尚可反求故也不然則孟子非不教人以格君心之非後世用之其驗殊少反被迂拙之誚曽不如就事開説者猶得一二也嗚呼君德不同若此欲盡為臣之義豈易言哉子産寬猛余既於論崔實發之觀子産為政三十年間弛張豫奪雖有芒鍔不可犯然委曲從物以待其定乃子産政體也蓋其以寬自命而憂子太叔無以繼之故將死之言如此鄙儒不知遂以尚猛為子産之言其流害有甚於崔實者後之人主又從而信之嗚呼言之難哉子産以寬教猛猶不可而况於後人以猛教猛乎孔子曰居上不寬吾何以觀政之所行行其德也未有無德之人而可任以政者然則子産捨德而言政寬猛交失矣昭二十四至哀公終晏子言陳氏厚施謂唯禮可以已之晏子知古道善論事而無益於救亂雖云禮家施不及國然國利既歸於臣則無以與民而欲出虛禮以節其私者民其能叛私而歸公臣其能懼君而自貶乎箕子謂臣無有作福作威而曰強弗友剛克當紂之時諸臣肆暴箕子將以威克之武王周公方明其德未暇用也於是而可用矣秉剛執禮奮其威怒以收陳氏之權取其所竊以豫民者而公施之則大夫削而公室強在一號令之間耳景公清談失君道晏子從容議論非濟世材齊遂以亡非不幸也司馬侯子太叔晏子所言禮春秋之君子皆以為善於知禮其後有六七君子謹於禮之論今考堯舜禹湯文武舊事皆以德為本而以禮義行之未有専一而言禮者専一言禮見于春秋其君臣上下不務德而以禮相緣飾相責望取足一時不厚其本難以長久如晏子子産之流雖為言禮之宗其去古人逺矣當是時獨老聃深知其敝故其言曰上德不德是以有德下德不失德是以無德上仁為之而無以為上義為之而有以為上禮為之而莫之應則攘臂而仍之故禮者忠信之薄而亂之首也孔子曰能以禮讓為國乎何有不能以禮讓為國如禮何然則春秋之君臣假禮讓以為國而已非能之也本不存而求多於禮其甚遂至於無而以亂易亂矣豈不悲哉成鱄説文王詩與馬鄭何逺所謂經生陋儒非人品樣如此者不少亦未可輕議當更詳考齊史書崔杼弒君死者三人以當時史法若竟無書者則諸侯不復登載於䇿矣學者於春秋亦安得易言子展子産入陳春秋伐人有禮者惟此一事可以想見先王之用兵然則血流漂杵宜孟子之不信也趙武為政語叔孫豹便作弭兵規模與管仲救邢侵楚意象絶異論者固歸之時變然管仲之事亦非趙武之所能知也古人只言若保赤子足矣然眀更增至誅不仁人以鷹鸇為比愛人嫉惡於政體本未有害然其流為抑強扶弱之病又其甚也但有逐鳥雀而已反為民害矣蓋孔子屢教人以為政其語未嘗偏者正己而不責人也子産言政如農功不過自為鄭國而止然此語却可小可大小則乘田委吏或一縣一邑大雖禹作十三載皆以是心求之而已仲尼聞魏子之舉以為義命賈辛以為忠春秋行事至是將盡猶有餘意存爾吳始用子胥之謀子胥之謀後世所稱孟子謂服上刑者此類也越國報仇以民命為莽巫臣子胥之流皆見棄於春秋者也春秋三叛人名於濫言之故為三杜預乃謂小邾射不在三人之數用此證者春秋起止何也名器不可假人蔡墨亦有此語晉之從政者新子姑受功歸吾視諸故府是時晉霸未改而其卿大夫不學無識乃欲以私意斷事以氣力雄長晉之亡形既兆而天下大勢從之三代之舊遂以淪胥哀哉傅説言王人求多聞而原伯魯不説學可並觀子家子從魯昭公本末輕重之義無一不合未知陸贄何如爾孔子之為司冦溝而合諸墓聖人之政必有所先子路所謂奚其正歟召陵之會春秋末年一大事蓋自鄧之會蔡鄭始懼楚陳蔡鄭南北之限齊晉楚之所必爭也陳蔡久沉溺于楚惟鄭去來無常中原被其害蕭魚以後子産為政専意中國然後南北獲安非獨弭兵合交之力也至是楚積失道而蔡自絶諸侯影附霸統再復百年一時不幸晉之君臣童昏貨賄轉而之吳楚既衰而夫差勾踐繼起矣故子産謂諸侯之賄藏於公室則諸侯二諸侯二則晉國壞不徒為文義常語乃晉霸得失之要也子産豈惟倡鄭從晉有功於中國而以亷律貪士丐韓起之徒皆受教故晉猶未失霸其有功於晉大矣所謂不有君子其能以國如斯人乃當之爾孔子謂不有祝鮀之佞而有宋朝之美觀其私萇𢎞之辭復而不厭博而不煩子産之流也惜乎士人特起不盡其用爾子貢觀二公朝孔子謂賜不幸言而中是使賜多言左氏所載如子貢言者衆矣皆孔子所謂不幸而中非有道者之所許也子胥勸夫差勿許越成而不從卒滅於越後世莫不恨其言之不用以余考之吳越相攻彼此常事各入國都互有勝負磨以嵗月或可得之固未能一舉而滅越也夫差虛內事外輕用民力驕侈不度貪冒無厭亡形已成而子胥不知救正其本將急於滅越以求霸且使越可滅霸可成不待二十年夫差要亦不免於亡又將安所歸罪闔閭之能入楚雖曰子胥之謀其無一獲而以困還為越所斃亦未聞更有䇿畫孔子謂智及之仁不能守之雖得之必失之子胥之不仁豈能存人之國哉微虎欲宵攻王舍卒三百人有若與焉頃嵗余守金陵與敵沿江上下謀劫其師以撓之宣司以為疑滕晟云有子尚劫寨何况他人余嘆曰如此讀書不枉有子傳孔子之道如此鄙暴事亦為之冉有用矛於齊師故能入其軍急病先難古人之義左氏特表出蓋有意也陳恆弒君孔子請伐齊左氏謂哀公使告季孫孔子辭論語謂之三子告不可參以二書左氏所載是也孔子修春秋正以政在大夫自陽虎季氏未嘗有欵曲故謂臧武仲作不順施不恕以是不容於魯二十年然則三子固無能伐齊之理孔子齋潔有請將以明正大義豈如後世欲急就事功者效其計謀於強臣乎魯衛自昭定以後人物風流都盡獨冉有季路子貢見稱若顔閔仲弓無事於時乃不得著春秋之末齊晉各務篡奪雖曰忠於其家然貨利所誘威勢所劫乃無一二可言者惟楚多賢故其國亡而復存存而復強非偶然也公穀春秋至獲麟而止左氏以孔丘卒為斷使無左氏則不知孔子之所終不知孔子之所終則春秋亦莫知其所終矣謂止於獲麟者𠞰之也鄙儒妄為訓傳不知實義害經大矣漢儒以左氏為不傳春秋劉歆緣此移書責讓以其書考之以理揆之史文與國始終者也今傳獨起惠公元妃以為書之始自孔子卒後畢哀公以為書之終其始終不以史文而以春秋則此書固為春秋而作耳謂之不傳春秋者漢儒守師説之陋也然左氏之取義廣敘事實兼新舊通簡䇿雖名曰傳其實史也春秋為孔子所修也故左氏之始終以之若必欲事事解釋如公穀而然後為之傳春秋但以傳聞親見而為之精粗得失之異此則劉歆草創不詳之過矣故作傳雖因於孔氏而為義不主于釋經何以言之左氏首篇發明之書法皆䇿書舊義其後雖因事著見大抵魯史本文如稱書不書先書故書不言不稱書曰之類杜預所謂變例者往往非孔子意也其卓然出于孔子者左氏必明載之如天王狩于河陽僑如以夫人婦薑至自齊盜殺衛侯之兄縶邾黑肱以濫來奔蓋數四而已鄭髠頑楚郟敖皆弒也而不得言弒趙盾非弒也而必言弒崔杼幾不為弒君天王之妄赴陳侯之再赴如此類者左氏亦皆明載舊史之實以示孔子之不復改也其他褒貶豫奪經孔氏者必以仲尼别之其出于當時史官或公論所在者皆以君子著之蓋二百四十二年新舊之史官不一是非不同彼皆自欲表章勸懲于一時而必曰待孔子而後定且孔子舉以前代之勸懲為非是而必曰由我而後可此後人之臆説相承之議論非聖人經世之學本然也左氏所傳重舉經文貫通本末自為經緯以孔丘卒後有傳無經者考之十七年楚滅陳晉伐衛十二月齊伐衛十八年巴伐楚衛石圃逐君十九年越晉楚叔青如京師二十年齊魯會廩丘越圍吳二十一年盟于顧二十二年越滅吳三十三年叔青如越越諸鞅來聘二十四年晉乞師公如越二十五年衛侯奔宋公至自越二十六年叔孫舒會納衛侯二十七年越后庸來聘與獲麟以前有傳有經者不為甚異也然則左氏雖釋經兼有其説而猶述傳各有其文亦安得謂其如公穀之專意釋經而特以實事分髙下乎然則所以有貴于左氏之書者以其足以質傳聞之謬訂轉易之訛循本以知末因事以明意而已彼公穀之妄為區區烏在乎較是非而角勝負哉曰必如子之言孔子不作經而左氏不為傳則春秋將焉用之是何言也自有文字以來凡不經孔氏者皆息滅矣雖堯舜猶賴之而况衰周之翦焉今將家至而日見之也豈非孔氏之力歟若夫托孔孟以駕浮説倚聖經以售私義窮思極慮而無當於道使孔氏之所以教者猶鬱而未伸則余所甚懼也故於其終復具論之習學記言卷十一
