body:
  text: 習學記言卷十宋葉適撰左傳杜預序隱至僖杜預言春秋魯史記之名凡例為周公垂法釐析經文以從五體及感麟而作止於所起大抵用舊語畧相附合就其新意非實義也然於左氏用力深乆故能使後世淺俗野誕之説十去七八使學者由此而進所造益深則於春秋大意差不逺矣不然非余所知也攝必有當立者桓非當立盖隠之意云爾故魯人不知以隠為不終君而簒弑之禍作古之譲者皆逃之隠猶據位其徳削其慮𥚹矣然則非譲之能殺身也壬戌天王崩赴以庚戌故書庚戌陳侯再赴併書甲戌己丑古人䇿書乃立此法盖察獄者以疑疑作史者以信信皆慎也信其所信慎也信其所疑慎之至也言必有所從受也其後書法稍失或因所聞遂記之矣交質色然大物其甚可畏左氏以澗毛行潦明之其理微矣平王之徳如此宜周之不復振也周任去惡之論盖謂自心與作事罪過處當力鋤治斷絶使善道増長後世反施之於人豈惟不能去惡又助惡矣義士非武王書惟三監淮夷雜説乃有伯夷叔齊不食周粟之事然周内史以為能諫君以徳則逺矣季梁宫之竒士㑹晏嬰語畧同所謂馨香無讒慝真古人之格言成周典刑未逺也周衰秦以力楚以詐始變三代之治為暴强之國自桓二年蔡鄧懼楚之後楚人經營次第可考頴考叔曹劌燭之武皆自草莽起以人材見於春秋左氏載劌皆忠信禮義之詞後世雜説始有盟柯刼齊桓事司馬遷遂列於刺客之首是時東遷未百年人材雖陋未至便為刺客遷考之不詳也然所以為逰士夸詡流傳則必有故宋御說一辭令之善臧文仲遽許以宜為君疑若過然古人有言必應行春秋時盖猶然耶然子産有辭則所頼者亦辭而已矣左氏於隠閔不即位曰不書莊僖曰不稱一字亦較計其釋經要處纔二字非茍作也學者何惜不細讀齊桓管仲但為情欲不制無正心誠意修身齊家之功喜怒用師無不殄厥愠不隕厥問之徳爾至於貪土地自封殖行詐謀逞威虐如晉文者盖皆無之故天下載其行事後世想其風烈司馬子魚曰齊桓存三亡國以屬諸侯晉寺人披曰齊桓公置射鈎而使管仲相筮史曰齊桓為㑹而封異姓齊國佐曰五伯之霸也勤而撫之楚靈王曰吾用齊桓至孟子時三百年矣所記者葵丘之盟而已孔孟方挈王道而卑桓文若夫周衰至於後世之君臣盖未有如齊桓管仲者宜孔子以為正而不譎如其仁也輕宫之竒曰懦而不能强諫又曰達心則其言畧憚汲黯曰好直諫然則伊傅周召不足以為亂君昏君之臣矣人材之等差亦世道之升降歟封建之時貢而不税享其禮不食其利奉上薄矣及徳衰則貢已不入是使唐虞三代之仁義不如後世之詐力也南征事更宣王不治而管仲問之固已迂濶處士諸生乃以仲為權謀之祖何歟荀息貞有餘而道不足併敗四君晉㡬亡去張良逺矣韓簡謂物生而後有象象而後有滋滋而後有數善敗先成於人而象數應之非龜筮自能為吉凶其理甚正不使術家之妄並行也鄧之㑹至是鄭始朝楚齊桓之力也伊川王城近地平王初遷周之禮教不行而辛有歸過於野人盖不切矣至是餘百年秦晉乃遷戎焉是周人終不能教不惟不能教且併棄其地而不能治也載事者反記辛有之言以為騐然則所謂見微知禮者固若是歟有大功無貴仕其人能靖者與有㡬按上世官人任賢皆無此論此令尹子文之新説也自後浸滛皆然而尚徳之風衰盡雖有以一二見意者終不能反矣嗚呼楚人用詐之敝為百世無窮之禍歟杞以夷為子其在東夷北狄西戎南蠻雖大者曰子其説與書法合范蠡曰昔吾先君固周室之不成子也然則呉越楚雖土地大而周未嘗加爵命但以夷裔之例子之故曰不成子也若匹夫單人以材自立者亦得為子則所謂子者盖進之也狐偃求諸侯莫如勤王晉侯辭秦伯納㐮王霸業實始於此與荀彧勸曹操拒袁紹事意略同盖詐謀日開假託日盛王道遂亡正孔子所惡而孟子猶與堯舜湯武同稱盖釋義不盡也展禽事僅一見無子産鋒鋭之氣純於義理與事相麗意順辭正冝齊侯不戰而自卻也孔子稱栁下惠三黜不去與降志辱身而孟子併伯夷明不屑去就之論又以制行清和各有所主而為百世之師然則孟子固推言之非若孔子指其實也教人以人而不使之安其實則徳浮而材不成不可不察也國語有爰居逆祀二事左氏叙晉文君臣求霸以信義禮行如醫用急藥療急病一病必應一藥孟子又分别驩虞皡皡不知王霸之道果然否説禮樂敦詩書不知竟如何抑以禮樂詩書為藩飾詐力之具抑禮樂詩書之道果可以滅詐力而立仁義耶城濮之戰宛然戰國楚漢間事與齊桓迥殊不謂時變如此之極至䇿命侯伯又不止楚漢莽操之事見矣譬之詐力如魚肉既成羮胾小小錯綜以禮義猶鹽梅醯醤調和之吁可畏哉晉侯驕肆不已又召王使狩孔子亦為諱之悲夫悲夫酖衞侯圍鄭皆在既盟之後與曹操司馬懿何異寗武子子家羈一等人秦穆公不知求霸委柄晉侯反為役使又不自克過計襲鄭晩矣卒以致敗雖能悔過未可語道也文至宣閏三月非禮歸餘於終嘗考漢志言閏當在十一月後晉責衞不朝先且居曰效尤禍也請君朝王是時猶能以責人者責己其後不然矣孤實貪以禍夫子秦穆公以為人之所以罪孟明者罪實在已其悔信矣然亦未能終不貪也使狼瞫知義果如此則安用怒君子如怒亂庶遄沮君子如祉亂庶遄已詩人本謂不當私喜怒爾非謂怒而不亂也垂隴之役士穀與盟晉方獎勵人材使當諸侯一時史法以為堪其事而多之豈知其後大夫専盟乎當與雞澤溴梁並觀躋僖公臧文仲曷為聽之其餘盖不足責也以是知末世雖君子立人之朝心知其非而事有不能盡正者矣魯頌曰皇皇后帝皇祖后稷是時史克作頌未乆當是後人所稱爾此事通國舉世皆以為非故陽虎以從祀祈福然則奚取於魯人之禮也卿不書為穆公故尊秦謂之崇徳殆孔子所修之法耶然素服悔誓終用孟明當時要自推重此事或者史家特表異之也哀三良事何用縷縷言之豈古人不以殉為非而獨以良為不可以殉耶然宋文公始用殉謂華元樂舉不臣則固未嘗許殉也日衞不睦故取其地遂及九功之徳皆可歌當春秋時詩書之教行而明其義者日益衆然畧用其淺者𫝊一時事而已管仲曰戎狄豺狼不可厭也諸夏親暱不可棄也宴安酖毒不可懐也詩曰豈不懐歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書前一行舉似言語終别頃王崩周公説與王孫蘇争政故不赴凡崩薨不赴則不書禍福不告亦不書懲不敬也天子崩雖不赴而諸侯無不書之理史立此法最横不義盖無周矣孔子因之不能改也杜預以此類遂為經國常制周公垂法史書舊章可乎宋華耦来盟其官皆從書曰宋司馬華孫貴之也孔氏之法大夫不備官故曰官事不攝焉得儉然則此特魯史所貴也史佚有言曰兄弟致美不如死喪之威兄弟孔懐季文子所謂舜舉十六相去四凶十六相即二十二人耶四凶即驩兜共工鯀之儔耶驩兜等雖姦慝害政然其不肖何至如此乃汙堯朝居大位而不能去哉盖𫝊習之誤聞聽之浮春秋時已然出秦火後者何怪也華元敗師見獲逃歸其材與節皆喪矣雖役人歌之而君子無貶辭將以所長盖其所短耶然則人材之所至要亦未易論也趙盾弑君事余既以經發之按盾在晉本末可考左氏具載董狐以故立法責之使受弑君之惡不特其事無疑而其理亦易見也後世乃以盾為真弑君者非惟不信傳又併盾本末皆不信矣如此則是古書無復可信學者將何所執守盖由不知春秋法本舊史法舊史之所嚴為春秋之所寛故也故再舉此庶學者深思之爾楚子伐陸渾觀兵周疆遂有問鼎之事周之既亡不待至赧矣徒以諸侯角立相持故僅存耳方周初遷自其王城數十百里外不復能有而秦晉共遷陸渾盖以拒塞楚道為己扞蔽棄周於外使坐受攻逼不亡何待然以楚人欲為不敢之心觀之使周之君日有一二人能舉威柄明舊典收四疆而正治之指麾諸侯以屏逐戎狄則齊晉安得迭霸而中原何至於日鬭哀哉洩冶之殺自後世而論以為忠諫被禍盖盛節也而非孔子所貴故曰民之多辟無自立辟然則聖人之所謂仁智𢎞矣荆尸事已見莊公盖通國大舉凡在役屬之民皆用之矣故鄧曼以為豈不知楚師之盡行其君雖卒而鬭祁屈重除道梁溠盛軍威以臨之隨人懼而行成而士㑹所言亦謂商農工賈不敗其業而卒乗輯睦大衆逺征最為難事而内外有紀如此故以為不可敵也右轅左追蓐前茅慮無中權後勁及晉車七百乗韅靷鞅靽詩小戎俴收五楘梁輈之類凡兵車宜備者皆備君行應有者皆有而士㑹以為能用典盖非倉猝求索臨事砌合也楚去國逺而整晉在内地而散以傳考之楚固以鄭餌晉晉甘其説而弗自定比其議論反覆之間馳突忽至遂不能支求為河曲之交綏豈可得也後世堕强敵之詐未嘗不如此真可歎爾投袂而起屨及於窒皇劍及於寝門之外車及於蒲胥之市遂圍宋古今未有此比是其國無一日不在兵其兵無一日不出也深味其時則民之窮於戰可知矣然不亡而卒成其霸盖自是以後世道當别論前志不復可接續也士㑹之所以能使晉盜奔秦者謂善人在上也沈猶氏不敢飲羊慎漬氏踰竟雖儒生夸説然或有是爾後世乃以敢擊斷誅殺為嚴能是暴人在上而欲求臯陶伊吕之功可得乎殽烝事周專為禮齊秦晉楚専為力然則是禮也可以已亂致治乎喜怒以類者鮮范武子庶㡬哉不遷怒之學不獨在洙泗矣春秋時敵國事無不通知者而晉楚尤纎悉若易國而處然不知何以能爾當時亦未嘗不禁諜也成至㐮十三年背盟欺大國周人以晉為大國矣陵夷之言不自覺也伯輿亦言惟大國圖之惟器與名不可以假人周不許晉隧而與之田豈非此意然地盡則禮亦不能守故卒為至弱之國其要在於無失君道而已失而後行者名實交病矣分謗後世所稱以為美然以偽為徳而世道愈失矣臣治煩去惑要到得蘇醒清明處伊傅周召事也非所以責華元樂舉然孟子以為欲為臣則當盡臣道故責難為恭陳善閉邪為敬申公巫臣取夏姬事何足詳載然通呉於上國實始於此人當為是本原之爾傾覆之士真可畏濟濟多士謂多賢也故文王以寧非衆也紂有億兆夷人離心離徳豈在衆乎春秋論三代事其淺陋多此類楚莊荆尸而舉已用大衆至是又悉師王卒盡行而當時之人遂以為衆不可已是何等見識其極遂為白起王翦矣蔡侯許男不書乗楚車也謂之失位二國從夷自相盟㑹已車人車春秋奚别焉此未必専魯史書法徃徃㑹他國書法矣讀是書者初未詳可惜大義蒙蔽也山有朽壌而崩固有息壌矣然天誠覆故不霣地誠載故不傾謂有朽壌隠士窺測之論也致禮於崩所以敬天明畏地察也謂其朽而禮之不誠於禮者也至穀梁謂伯宗攘善又陋矣欒書言善鈞從衆以善為衆之主斯知衆者也荀林父能如是不覆師于邲也晉侯使韓穿来言汶陽之田歸之於齊晉士匄帥師侵齊至穀聞齊侯卒乃還杜預所謂須數句以成言者耶史法經法孔子所加損焉者慎矣經師之傳學者亦慎焉可也武從姬氏畜於公宫雜説乃有程嬰杵臼事韓厥謂宣孟之忠可明當時不以盾為弑君也華元始合晉楚之成其後遂至於弭兵者方齊桓為兵車之㑹是欲討不庭合不一晉文以来全是用諸侯之力自封殖其國自此晉楚迭争無復寧嵗及兵亂既極則又從而弭之遂變天地之常經然則或用或弭皆以人而勝天也後世之論不知反以惡殺好生若是者為天道非也劉子論受脤此中字命字則字古人皆共之盖性命禍福之説未分也至子思孟子言性命禍福雖亦本於古人然稍分矣麻隧之役乞師諸侯王之卿士皆㑹可謂大舉騷動矣然但論秦晉恩怨曲直爾了無毫髪及公家也士㑹士燮家風不同流傳此一項意思到後人承接得去者為第一等人品矣立而不從將安用君器二不匱君二多難周子與陽生語何異然晉以之興齊以之亡然則簒盜之臣其勢已成固非空言所能令也况如髙貴鄉公以空手鬭之乎叙晉悼公復霸及叔向與晏子語國之興衰全在人主及一二賢智合徳之臣其餘只是隨大勢起倒謂之鄭志兄弟大倫固欲警百世謂之宋志且不登叛人但懲勸當時未能及後也王以一御九尾重首輕鄙强國弱正春秋所忌亂亡之勢也而以為足以驟致霸强必不然矣以束矢鈞金聽訟亦古義也輕罪移甲兵小罪讁金分是有罪者皆不刑非法治也凡拂戾之説皆不知古道而徒為異辭者也獨言其能厚施薄報隠武行文存亡繼絶則不得而異盖當時與後世所共知耳按左氏於晉楚稱霸立法定制皆明著其故及其他諸侯小小變政易令亦必載之此史家大事記註者之所重也烏有盡變周公太公之法自新其國而曽無一言及之乎以其書考之管仲猶能遵舊法而號令諸侯故從簡書修徳禮舉賜履索包茅問南征當時所謂義士後世所謂迂儒也若此者左氏之所記也若齊語管子之書非余所知也民生於三事之如一報生以死報賜以力真古語也然則後世師道乍存乍亡宜其成徳不及其惟哲人吿之話言順徳之行季孫于是為不哲此語有味徳之順逆易見而人之智愚難齊故人之所順為徳之所逆其求之甚難晉悼復霸雖君臣心競之功然亦以能通呉而分楚勢盖楚强而不可禦矣通呉事稍玩習卒於弭兵而權歸楚當是時也茍非明大義而重積徳何以回天下之勢一時糾合但為陵奪暴横之資耳祁奚能舉善善於世之通義也善之所在安有偏黨偏黨末世之論也末世以偏黨錮善和戎鑒后羿和戎利近鑒后羿義逺衡而委蛇必折後世之所謂委蛇者多衡也赤舄几几聖人之道也臨深履薄學者之事也穆姜所稱四徳古人説易有此論其義狹不足以當乾也孔子但存之耳孔子於彖推明其義乃乾徳也後世學者徒隨文立説未知所宗也知罃稱猶愈於戰委曲辛苦欲以避暴骨之慘亂世之仁也後世亦有一勞永逸暫廢永寧之論所謂暴骨以逞也譲善善也然而能有善争善亦善也然而無善不書為隨書為攝或隨或攝皆當時事也何預孔子書法乎㐮十三至二十一孟子舉尹公之佗端人取友必端左氏載庾公差為孫林父追衛侯知有友而不知有君處士記之戰國所謂仁義多如此孟子不暇辨也師曠言立君之義乃古人遺説孟子盖知之後世之論殊不同雖不可改然古義不可不知也孔子曰所謂大臣者以道事君不可則止然則後世之論亦不出於孔孟也子罕以不貪為寳古人之徳未嘗不兼物而言捨物舉徳春秋之論也孔子曰飯疏食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲亦欲徳兼物不能兼則寧捨物而自樂也夙沙衛唁臧堅堅以為刑臣禮士有死而已齊君之所厚節士之所棄也而以之託孤焉得不亡子罕抶築者不受徳與卻克分謗意同而義異盖自君言之則當先民而後君自民言之則當先公而後私理各有所正不茍自晦也晏子居喪如禮其老以為非大夫之禮叔向亦言三年之喪雖貴遂服王雖弗遂宴樂以早盖三年之喪自天子達於庶人庶人本非禮所及明以貴而教賤也以貴賤異其禮者始於人主不能行禮爾後世人主既不能行禮而以法制齊其下使之如禮是貴者滅法以廢禮賤者倚法而後行禮也俗何由成而教何由明乎公子燮求從先君以利蔡不能而死若以後世言春秋者求之安得書曰蔡殺其大夫言不與民同欲乎漆閭丘事觀臧武仲之對其辭甚嚴是則孔子未修春秋以前已有懲肆去貪之義但當時議論不經孔子者不能垂於後世爾有覺徳行四國順之叔向謂夫子覺者味極長惟自覺故能强為善强為善故能知人之為善不然總總而生林林而死善惡何所不同而况更以善為利己也所可痛者以善人之命而寄於暴庸人之手故祁奚以為多殺何為此語尤悲爾習學記言卷十
