body:
  text: 習學記言卷二十九宋葉適撰晉書帝紀史稱魏武辟懿懿知漢運方微不欲屈節曹氏辭以風痺不能起居魏武使夜刺之堅卧不動再辟敕使收之懼而就職及曬書殺婢事按懿是時齒少名微豈為異日雄豪之地而曹操遽憚之至此且言不欲屈節曹氏尤非其實史臣及當時佞諛者意在夸其素美而無辭以述亦可笑也諸葛恪屯皖懿將攻之議者以賊據堅城積榖欲引致官兵今懸軍逺攻其救必至按吳畫江而守魏人尚憂其越險致師近世乃委淮與敵自有城堡亦預毁棄雖古今之變勇怯不同亦由謀國者未嘗考論故也曹操盜漢三世四十年諸將未有擅兵於外者蓋人主自執其權也懿纍立大功位極將相年垂七十欲取其兵柄而不能忽值齊王童幼爽羲子弟晏揚之徒皆莫以為意故懿父子得募於外以逆行之然亦可謂危矣使晏等有一人知出於此第不至棄軍遊蕩懿父子何由肆其志正與呂須事同矣然則虛談無據逺於事情豈非自昔書生之戒也哉晉武禪代為陳留王之詞稱粵在魏室仍世多故幾於顛墜實賴有晉匡拯之德用獲保厥肆祀宏濟於艱難此則晉之有大造於魏也按桓玄已篡晉而劉裕起細微誅玄復存晉名號故恭帝云重為劉公所延將二十載今日之事本所甘心魏未嘗有內外之難司馬懿受遺作相一朝劫奪弒二君夷滅王陵母丘儉諸葛誕等皆決潰魏人膏肓做自家計以此反稱有大造於魏舉一世之亂臣賊子公肆誣罔是真以天為可欺與非我小國敢弋殷命何太懸逺耶秦漢之後人主自謂卓然英明身握大柄然猶亡徴亂本相尋如髮其餘平世守文之君往往以小善蓋其大惡者多矣如晉武寬雅平恕未為失君道也不幸佞后昏子孽婦相與參會禍如魚爛不可救拯是殆有天意歟而何曽乃謂上宴見惟説平生常事不及經國逺圖歿身而亡後嗣其後世因以為知言未知曽所謂經國逺圖又將安在哉周幽以昏虐致夷狄滅宗之禍惠帝所遭略相似矣然惠帝昏而不虐夷狄之禍非其所自致蓋戰國秦漢五六百年窮兵開邊惟御不以道至是橫流偶承其會爾干寶晉史名善論議言天下大器羣生重畜愛惡利害攻奪若積水燎火未嘗暫靜此語亦為見事機者考於載籍惟五帝相承治天下周之先世治其國用一道守一説民生其時安樂長久故勢雖不暫靜而靜之以人然施之晉事却為迂濶無用之語且後世駁雜粗相羈繫姑復弭定何暇逺證帝王耶按晉武末年憂惠帝恃皇孫慮賈后懲創魏氏尊任宗室付授乖謬開路殺戮轉側數四而盜賊敵國乘之此禍亂之要也譬如無病壯實之人既服毒藥自當致死所以猶未盡亡滅者帝業寬厚未至得罪於民爾而寶以為禮法刑政民風國勢皆已大壞於武帝之世也使武帝之世果已大壞則晉之餘號安得尚存斯蓋計數之失非體統之罪也元帝鎮建鄴十餘年遂躋位號若論昔之君臣相與鋤荒剗穢創立基本就令簡陋亦當微有規度可循不應數年便已大亂蓋初倚王敦共濟艱難而王導本一家弟兄意無同異但不反爾止於趨和目前何嘗却慮身後所以未能有成而遽破壞至此迄東晉之亡無復寧嵗時人方謂江左有管夷吾真尚名之弊也史譏元帝元戎屢動不出江畿經略區區僅全吳楚晉人之患如逆風行舟風不息舟不止雖破浪反風功如劉裕亦無止泊處而况於元帝乎其得免覆溺幸矣何忍誚之哉明帝改荆湘以分上流之勢蘇峻之難復以并陶侃昔孫權既得荆州則都武昌至孫皓猶然所以鎮壓上遊也坐受下流制命強藩召侮甚多成功甚少王導謂仲謀玄德俱稱王者之宅徒虛言耳蓋晉君非幼則弱不復知為國家計其勢然也升平三年王公已下十三户借一人一年助運此言運致敵境也咸平元年權停一年運此言運致京邑也不知晉運法如何觀此雖曰勞弊然尚有蘇息之時近世國內漕挽流通蓋皆舟楫之力而比年一用兵州縣配民以二十萬錢轉米一斛僅逾淮而止余在金陵與漕司力爭僅免再運為元帥而不先講運法豈惟棄軍并棄其民若再三用則化為盜賊矣志晉志敘天文經星甚詳後世皆從之蓋陳卓總甘石巫咸三家星圖推演義類附之人事最為易見故也按堯典稱厯象日月星辰止於晝夜四時之别四星殷正之名由上而驗於下天有是時則人必有是應其或差忒則人事為之不齊此古人所以有貴於知天也過是則皆人所自為而天不預焉至舜在璇璣玉衡而以齊七政為文則又不止於象之數蓋其始以人事必有待於天而其後以天道復有待於人然亦不過五星而已此可謂極天人之精者也然則凡二典之所不言而甘石巫咸之所具載者皆學古求是者之所當審不然則以天援人而以人誣天紛紛乎其不可合矣奈何反以古人為質略而後世為詳密乎舜稱肆類於上帝蓋言統天之最尊者天之運動大者日月其次星辰今術家乃以極星不動然後能役使羣動是以星而統天也夫上帝為統天之最尊聖人以德配之以象事之顧莫之敢名而術家以星統天與方士野人相為舉緣以證經説至於宮廟朝廷百官有司無所不備則又以天而從人故有本在地而上發于天之論此尤學者之所當審也正始八年日蝕詔問羣臣得失蔣濟言大舜佐治戒在比周周公輔政慎於其朋齊侯問災晏子對以布惠魯君問異臧孫答以緩役濟旨譬甚切而君臣不悟終至敗亡濟所陳謂敵國相圖可也今司馬懿以臣篡君由匹夫而奪其天下比周之戒其朋之慎孰大於此何丁謐鄧揚之有就如濟言則天曽不為弒逆不臣者示變何也莊周言昔者十日並出萬物皆照而况德之進於日者乎蓋周放辭云爾而晉世遂有三日相承出西行東日隕日光散日夜出他變交錯皆前此載書所無古稱神人雜擾不可方物乃命重黎絶地天通然則上世之神靈蓋夷狄之常然至五帝人道始明及三代不復見也春秋日食三十六地震五劉向以為增異若見晉事何以處之夷狄復變中國氣類所召至此自不足怪永寧元年自正月至閏月五星互經天縱橫無常是時天下之亂固大以理揆之抑人鬭於下星變於上而後使星不得安其次耶抑星先為變於上而後兆亂於下耶叔興既占齊魯宋事無不驗又言君失問吉凶由人蓋先王舊學天不勝人叔興尚有聞也然既已知天則占驗終勝而人道遂不可立故豫以為五星五經天雖變異最大茍人道有以消復猶不當預占也然則張華不去何以應天華欲以已無過為德不知當亂世據重位其過大矣嵗星犯天關占曰關梁當分是時石虎擾亂而江東安靖故庾翼以為天公憒憒無皂白夫取必於天猶不可而况取必於占以慢天乎典謨首言萬邦其後詩書循而稱之甚衆至禹弼成五服則曰至於五千是所謂萬者舉數而云爾孔子繫易亦曰地上有水比先王以建萬國親諸侯此直以象立義可也若禹會塗山既言執玉帛而至則宜有其實而猶曰萬國何也使果傾竭天下雜還並集禮文煩瑣交錯道塗殆不勝其亂矣傳者因此遂言黃帝方制萬里得百里之國萬區夏末止三千餘國以漸削損至於商周或言千八百國或言八百諸侯春秋時方稱無數十焉此可據乎封建雖上世明制不知聖人要以何法為凖將國國齊整抑姑示大綱已滅者有無復興始封者於何取地其禁令纎悉蓋不得而詳也後世徒見周官所立度數便以為封建成規然當時既無空天下以待建諸侯之理則此書已不可信而况夏商以前乎然則所謂萬邦者蓋區聚之衆名無地里之實制不可以周人封國言也按平州户萬六千而慕容廆用之建國當是倚部落自強猶可也涼州三萬七百而張軌世襲號稱大邦至李皓秃髮沮渠三方分割爭為雄霸人衆土地幾何按李皓傳中州江漢流徙者不過二萬家干戈日尋攘奪嵗異生齒不加益而餘民靡孑遺可悲也荀朂以漢魏尺長於古尺故舊樂不和阮咸復以朂尺短於古尺故新樂不和不知晉人謂咸為神解者於舊樂直是之而無所非耶抑舊樂自有不和而譏朂不知所以和之也古人分治亂亡國之音者謂音樂如故而世道感召不同非尺度長短能致之也故五子之歌曰關石和鈞王府則有彼物猶是而世已非豈求詳器數之間而後為存亡之所自哉然則朂固非而咸亦未為是也杜預論人主葬畢除喪諒暗以終三年按説命王宅憂諒隂三祀而無逸稱作其即位乃或亮隂三年不言古人皆喪三年而髙宗之居處獨有異於常蓋古人所不能行其謂之諒隂者後世不得而知其制矣然周公美之以訓成王使非人主之卓行加於人一等則曷為取之孔子謂何必髙宗古之人皆然者因冢宰總已有三年不預政之義故有此答且不敢以髙宗絶天下懼庸人將自安而不為爾是所謂諒隂者蓋特過於三年而預反謂不能三年既葬而除以心喪終何其戾也孔子言服美不安故不為之孟子言齊疏之服自天子逹孔孟所謂三年專以服指無服則無喪矣安有葬畢喪除服釋於外哀忘於內三年之久其何以終舜禹終喪皆避堯舜之子不得已而後受命雖非事實然推舜禹之心必不輕其喪而重天下也而預乃言天子位尊政大不同凡人則尤戾矣晉武泰始四年詔言巡狩述職及周典各為一書由其文則三國以來所無由其實則或過於兩漢矣武帝信不可謂無志於民者後世子孫之慿藉尚有此也晉志載置尚書本末甚詳中書亦見事始君相之職自前世無的切證據然君之所欲為必以命於相相之所得為必以歸於君此古今通義也按舜以股肱耳目命禹禹復戒舜而終以明良之歌古文簡質不能盡通於今考其大意似舜盡欲以其職委禹禹戒以亦自聽覽無専畀臣下安於縱逸也然臯陶以為元首叢脞股肱惰萬事隳則是君終當命其相不當自為也伊尹周公復子歸政不知人主所親者何政周官乃成王所自為六卿分職各帥其屬以倡九牧成王不過訓飭之而已春秋時方有立而不從政由寧氏之語靖郭君謂齊宣王曰五官之計不可不日聽而數覽也王徔之已而厭之悉以委靖郭君靖郭君由是得專齊之權夫六卿各自以職倡九牧相猶無所事而况於君收五官而自任已不能久又以與人權有所専而君相之職兼失矣若秦始皇程書決事蓋不足論漢髙惠事盡出蕭曹文景雖稍自親然陳平猶謂有主者則是時公卿各自分職丞相至欲斬鄧通朝錯尚循古義也孝武初年便用一項文士中外相應以分外朝之勢及趙禹張湯更進宰相束手遂置尚書列屬分曹都受外事與靖郭君所言意同自是人主宰相之職渙然離異君所欲為不復以命相相一切聽其君所為矣其後尚書權益重領録出宰相上往往奪國魏初别置祕書仍典尚書所奏尋改為中書劉放孫資傾動中外侍中給事黃門通掌門下最為禁密則尚書更是外朝而中書門下者乃天子之私人也然其後又有內尚書由外逹尚轉尚入中所行可否皆自內決人主之職十倍宰相已增者不可損已成者不可改也然則舜禹臯陶所論何事成王伊周所治何業必不疏略於秦漢而鹵莽於魏晉矣周官雖云六卿分職天官事最繁重皆體要所關而公孤職任甚簡故學者多云冢宰即宰相或云公孤兼行也按周官謂公不必備猶應一二有若孤宏化寅亮天地無不備官之理則所謂冢宰乃有司之長職自當然何必致重於一官而使公孤下兼若公孤闕則又將以冢宰上兼乎夫治其事以佐上者有司也明其道以弼上者宰相也以後世疑唐虞三代學者大患也曹操用衛覬議置使賣鹽買犂牛供給流人關中由此豐殖昔日上必有遺利可指為養民之具後世盡以為粥飯經費一朝有百姓之事資用無所安得徒手而止凡魏晉間所以強本制敵者自嗤為迂逺不經事之談而况其上者則何由行之是真可悲也杜預言分官牛付兖豫將士春耕榖登之後頭責三百斛三萬五千頭得運水次成榖七百萬斛一牛賣三百斛榖豈榖患太賤而牛貴乃爾耶又言留牛萬頭佃於牧地嵗當復入數千萬斛榖不可曉恐誤魏志黃初初復五銖錢榖貴罷太和乃卒行晉志乃言魏武罷董卓小錢還用五銖至魏文以榖賤罷以其言考之若自初平至黃初榖皆賤太和相去數年非因飢荒安得陡貴蓋晉志誤也不知漢末元不用五銖錢也夏侯后傳稱魏明帝世宣帝居上將之重諸子並有雄才大略后知帝非魏純臣而后既魏氏之甥帝深忌之青龍二年遂以鴆卒年二十四按青龍二年距魏明帝即祚八年去其殂五年長君在御國權未失而懿父子篡迹已萌舉魏國無知之者而其妻婦人獨知之是以朝廷之衆而一女子之不若故繞朝言子勿謂秦無人甚矣賢智之難得也后盛年計其房闥袵席幾微之見非一不屈而先遇鴆與死節者無異矣武帝未有失德而楊元后以市井庸婦人見識佐之以嫡立惠以妹繼室以賈為婦三哲同意亂本既成無可救者禍流生民數百載然則謂王化自后妃治道首二南古人常語信萬世不易也讀劉暾奏楊后事使人悲嘆幽王之詩稱周宗既滅靡所止戾正大夫離居莫知我勩三事大夫莫肯夙夜邦君諸侯莫肯朝夕蓋其時幽王見殺太子外遷而其羣公貴人首鼠自便莫以傾覆為念故其人怨刺之如此暾為留臺而能抗拒強臣存活廢后視是詩所稱過之逺矣荀藩周馥亦皆志士也傳王祥不拜而長揖世以為雅談此固無忤時之患也以為賢於何曽荀覬則可若遂以為名節未知只如此當得甚事亦學者所宜知也余於袁渙張範邴原已論此意王戎言祥在正始時不在能言之流王敦亦言不意永嘉之末復聞正始之音正始乃為人所慕若是耶石苞為司徒遣掾屬循行州郡殿最農桑蓋秦漢以來三公常事也後世但取帳狀腐積架上而以此等事為笑然而苞以忠勤見稱於時則如此舉動必是實有益國便民非虛文也羊祜舅也杜預壻也裴頠亦與賈后有屬雖其才德皆能自致然人情上下所以易於信服者以其在親戚之地故也預言立功立言可庶幾又言禹稷之功期於濟世秦漢以後儒者守師傳而遺實用號為通人又輒放蕩疏漏取辦一切道德滯固功名淺迫如預密而有意博而能成智立而不遺仁有功而不伐近戰國春秋時人材也衛恆等所著書勢自古文篆𨽻草書皆具文字之興蓋莫知其所從始而漢以來則謂伏羲始畫八卦造書契以代結繩後世學者信之至言沮誦蒼頡因鳥迹以興思其語不詳按易傳雖稱包犧氏觀鳥獸之文與地之宜始作八卦又稱其他卦義在八卦之外故周官太卜掌三易其經卦皆八其别皆六十有四夫易學者以為文字之初然上古之易卦義已備學者乃謂伏羲始畫文王始重是古人文字簡略未具方有待於後人而具也孔子序書起於唐虞今考典謨凡後世所謂文字義理是時皆已備盡不可復加人文乃自然之理聖賢得其精庸人併粗失之蓋有古人所能而後世不及未有古人不備而猶待後人備之者也至於字之形製隨世不同篆𨽻真草其體愈降華夷異用古今各行而工拙妍醜因以自見此則恆與崔瑗蔡雍輩之所以詠歌形容而遂欲以是論文字之源流失之逺矣衛玠雖少年未練世故不究其德而死然清逺沖約識過老成與黃憲何必逺也劉卞狂謀欲以子脅父而廢其母此非權道之所許張華拒之是也及愍懷既廢衆怒集於賈后華於是時以人主命廢后復子以安人情此權道之所許也猶且安常襲故既不能去復不能謀坐視倫秀成其逆節大柄外移身既夷滅而國亡遂不可救可哀也夫蓋倫事就而後篡篡而齊成都爭起然後晉勢陵夷至於南遷然則不明於常變而欲居大臣之位難哉安平獻王仁不遺親義不背君耄期稱道本末可考孰謂司馬氏之門乃有斯人乎至順族人子當化家為國之時光艷翕赫不以自喜執意求實非其所立以至困窮悲夫晉武帝時大議論有四惠帝定嗣一也賈后為冢婦二也賈充荀朂進退三也齊王攸去留四也晉之治亂存亡雖在此四者然不過一本昔周子有兄而無慧不能辨菽麥故不可立武帝二十五子惠之無慧帝自知之而終不決者恃愍懷爾又明見充女不可然竟納為婦以成愍懷之酷實朂輩彌縫其間末年恐攸挾衆望奪嫡又為逐去以速其死帝於一事不了故四事無不然遂至舉天下而棄之然則堯舜之所以不與其子者豈以為聖殆亦審慮定計當然耶史載項城失賈充周勤覩夢道事甚怪如懿與師昭既死之靈切切欲為其子孫慮而終不克彼不畏殷多先哲王在天耶王濬兩表自訴詞不可已所謂口不言平吳之事者自當在歸洛後也杜預謂濬既權西藩便當徑取秣陵討纍世之逋寇釋吳人於塗炭自江入淮逾於泗汴沂河而上振旅還都凡濬所未至者皆近以與之此亦節度之所得施也使皆如王渾制人以聽已功何時可成人之相逺乃至此乎魏晉之際以名用人加以親舊繾綣篤老不捨故得極其才任所至山濤魏舒鄭袤是也若人主本無其意而年至不去則但有減損無可稱矣史言濤與盧欽論用兵之本以為不宜去州郡武備其論甚精惜不存也王衍貴無裴頠崇有是非相攻終不能定凡天下義理始於堯舜禹臯陶使其見義不明析理不精安得致唐虞三代之治孔孟猶是祖述之爾老莊妄作晏衍隨和區區對起有無之間自不足論也然獨有一事秦漢以後學衍之所立皆人才之所趨所以好尚崇長門户師承大抵亦欲為進取地顧其品局髙下如何耳茍國家大計不與之共則興廢之責豈其所關正始中雖以虛無起義然諸名士即為司馬氏父子鋤剗及惠懷時雖以矜誕成俗然晉業已壞於武帝之世楊駿與諸宗室禍機交發如激矢轉輪正愎如張裴不能措手足而况衍輩後世乃以興亡事歸罪於彼夫始蒙其禍而終任其責不知人皆欲為進取地而世論何獨督過之深豈其以淟涊鄙陋安取榮逹者自為宜得而俊頴勝特之士終無以自容耶是真可憐憫而務為篤論者之所當識也史言樂廣每以約言析理厭人之心其所不知默如也孔子稱君子於其所不知蓋闕如也以此自修可也以此綜物可乎裴頠豐博廣不能屈王敦又謂樂彥輔短才若以有限之知而取不讓之名誠聖賢之所賤也恐史家所載亦有未必然者溫羡駮張華復官爵議引晏子里克陳乞不二百言而古今事節曲盡羡少以朗悟見稱觀此文定不虛也劉毅論九品稱所立品格還訪刁攸攸非州里之所歸非職分之所置莫曉此語似是為中正者私問之也又言劉良工攸之所下石公罪攸行尤不可解傅咸傳臣識石公前在殿上脫衣為荀愷所奏若非人主素所知名豈應但略疏而不析言也毅陳八損雖精詳然不如衛瓘瓘言魏氏承顛覆之運起喪亂之後人士流移考詳無地此九品始立有為為之也又言魏始造鄉邑清議不拘爵位褒貶所加足為勸勵猶有鄉論餘風中間漸染遂計資定品使天下觀望唯以居位為貴此論九品得失之要也李重又言九品始於喪亂軍中之政詳此是漢末用兵久人才自行伍雜進莫能考察故以中正鄉論品之使不得盡由軍功及其敝則反以位定品并門地子孫皆然而素行無施名實亂矣然則瓘之論又不如重之簡而可考也按操雖以百戰篡漢而能立中正九品清濁不雜仕進者賴之正始以後勝流爭出標宇離俗為國光華後世固不及逺矣史稱任愷有識量經國之幹以社稷為己任後為賈充所抑失職見武帝無復言惟泣而已竟以憂卒未知若此者為身耶為國耶與柏舟離騷同意不同耶劉頌當時謂其能辨物理論事有可採史家刋剪不精故後世諷讀無復氣勢此亦晉議論盛時未可輕也言武帝時為遇叔世他人固無此言至言五等封國謂聖王立相持之勢建邦茍盡其理則無向不可雖昔人之論多如此然未可謂辨物理也余於史記表已見之傅玄皇甫陶以諌官論事觀所下詔謂武帝無意於聽言可乎詞篤旨順過漢詔令矣玄言魏初課田不務多頃畝但務修功力故曰田收十餘斛水田數十斛自頃日增田頃畝然畝才數斛以還夫地力有限雖人功修治未有增損十倍者恐此言當更審傅咸言正始中任何晏以選舉內外衆識各得其材粲然之美於斯可觀按陳夀史習鑿齒書及王肅傅嘏等所論皆不如此然則成敗之毁譽好惡之是非蓋未足以為千載之凖的也而學者信之過矣習學記言卷二十九
