body:
  text: 習學記言卷二十三宋葉適撰漢書傳漢人對䇿稱鼂董公孫孝文之問義雖未至其意甚美非武帝比也錯對乃絶無義𢎞尤窘矣當時太常第𢎞居下是也而謂賈誼已死惟錯為髙第則是除誼無在錯上者才難自古然歟固於𢎞錯䇿自不足備載河間獻王得周官尚書儀禮禮記孟子老子經傳説記七十子之徒所論立毛詩左氏博士先王孔子之道賴以復傳於今其功大矣賈誼董仲舒之流不能望其十一也當時陋儒莫識其意已得之書不能講明使再有散失訛缺甚多尤可痛惜班固言王答詔䇿三十餘事推道術而對得事之中文約指明此亦過誼仲舒之流逺矣遷固曽不載其緒言以開後學徒區區於服鳥大人賦聖主得賢臣頌等何所損益哉寡人生深宫之中長婦人之手未嘗知憂未嘗知懼此非魯哀公語也哀公寄食三桓不能及死何喜樂足云儒生窶人以己推之殆當然爾而固援此褒美河間孟子謂東西夷之人得志行乎中國若合符節固以獻王所為賢於漢諸侯王而已可謂淺知之矣董仲舒首推明孔氏觀劉向一家之論其為儒者重輕可知矣後世學者指意亦多本之仲舒故略為分别精粗離合之際歸於統一毋由絶潢而自謂宗海也詔䇿欲聞大道之要至論之極此雖常語然大道必有要至論必有極詳觀堯舜禹湯文武由其身始以善天下豈非要道臯陶益伊尹傅説周召謀議規警語近事切常在目前豈非極論仲舒不知所能知者春秋災異而已凡此類者非要非極也當武帝世有二語申公曰治道不在多言顧力行如何爾一也汲黯曰陛下內多欲而外施仁義奈何欲效唐虞之治乎二也申公可以恥躬行不逮矣而不能中武帝之病帝所好者文也申公之言必使有文者不得過而或庶幾於行矣不然則未也汲黯雖中武帝之病然不能治武帝之病有以治之而不能受罪在病者可也無以治之而徒中之所謂戇矣仲舒負能言之智任治病之責今也前以災異禁之後以勉強開之所禁者為難信無用之迂説所開者為可喜還至之立效然則堯舜禹湯之所為兢惕畏懼者終於不存而唐虞商周之所以歆羡矜侈者四面而至矣是於武帝之病方將豢而深之豈能治哉武帝論治以韶勺為斷彼亦以其盛者推言之爾論治如此可也若求治而以樂為先則失之矣鐘鼓管絃之存何救于德之敗乎五百年之間其臣雖有欲則其法其君固未有能象其德者是以推之于大衰而後息而仲舒亦以樂為先則局于彌文困於虛論而躬行之實廢矣又終於祥瑞此尤躬行者之諱也三代受命見於詩書甚詳白魚流火怪妄之説古人未之言也災異之起其變雖殊人君必引而歸之於身益自改為以銷去之蓋惟治世而後能非待其衰微而後有也性命之情或夭或夀或仁或鄙洪範所謂隂隲下民五福六極皆君所為也如孝武動民于干戈習俗于姦詐去夀而夭去仁而鄙仲舒雖能泛然諷道其外固不能戚然救止其內也路溫舒言秦有十失其一尚存此意雖狹然宣帝入其語擇吏輕刑助成安民之治仲舒勸武帝以更化張而大之武帝之所欲也然其酷反甚於秦也舜未嘗逸勞者王道也周未嘗奢儉者王制也殷未嘗嚴寬者王政也耕藉勸孝使者四出茍非實有為民之意實任為民之臣民猶受其害也安得隂陽和而百姓安乎居君子位為庶人行誠後世通患然師友議論以此自責則可以此教人主責士大夫則不可蓋人主當化小人以有恥不當疑君子以無恥也疑君子以無恥則人材掃地不可振矣仲舒比鼂錯公孫𢎞雖無刻薄從諛之失然亦不見武帝受病處不統一聖人之道以切其身武帝非不能受盡言者亦非有人臣至論而不足以識之者惜其四顧無所聽受而卒以其自用耳仁人正誼不謀利明道不計功此語初看極好細看全疏濶古人以利與人而不自居其功故道義光明後世儒者行仲舒之論既無功利則道義者乃無用之虛語爾然舉者不能勝行者不能至而反以為詬於天下矣凡正言之理無不具而隱顯上下交相明者古人所以為經也旁言之必酌於理使是非得失有所考者後人所以為文也若夫窮慮殫詞以無為有自處于妄而後反之正此違於經而謬於文者也上林大人賦是也司馬遷之言殆不可解豈相如以文自溺其自許儻或在是乎先王用人以興天下之治武宣用人以赴一己之欲班固以版築為比未知説命當如何讀也是時人材品目須不逢君者方可稱其間不過一二數耳安得如此之多惟能治民者為庶幾也張湯推賢揚善自兒寬外他名士未聞因湯以進者其所排陷則有明證矣蓋湯造請結納以欺當世正監掾史大抵皆小人田甲魯謁居之流也湯本用此得名譽故遷表出之班固便謂緣此固宜有後而後世因其説遂使湯有薦賢名斯大誤矣邪正賢不肖要歸一塗未有小人酷吏而為君子之事既排陷人而又能薦進人者滔滔宇宙間若此類甚衆曷足數哉孝成委政外家而荒耽于色蓋其棄天下久矣杜欽乃欲依王氏以弼主違是借其斧柯而使之長養者也班固謂庶幾關睢見微更須細論髙惠文景時事歸宰相孝文雖欲自行其意孝景雖或任喜怒然皆不奪宰相權至孝武自用一種私人與宰相相抗衡而羣臣不問近進疏逺更進用事享國既久遂以成俗末年尤甚至宣帝魏丙號為名相不因左右近習不能有所為其後侍中待詔之流毁譽成敗在其口大臣束手退聽比其垂亡遂有王嘉之事而班固以為一簣障江河故孔光舉國而授王莽追觀陳平經營吕氏卒以存漢其衰乃如此習之移人可不畏哉終軍詰徐偃雖少年刻薄然異乎漢經生言春秋者董仲舒不能及也王褒聖主得賢臣頌宣帝本以俳優戲劇視之固無足論然可惜一好題目只作臣主相得説了舜臯陶賡歌君臣相遜明良之歌或敷暢此義未知宣帝能動心否不然亦足以警後世也世論畏于日下蓋謂此類孝武一生駕馭人材暮年文武皆盡而田千秋立談至丞相且以霍光為周公蓋自古無此法所謂誠不以富亦祇以異後世因之遂謂任重者須是不識字人此尤為異論何芻狗天下之甚耶趙充國方還春秋時將帥風槩出塞逺征雖秦漢始有此事然至是見聞已熟而罷兵屯田方為創制故會議者初未能從也蓋戰國以來率土地食人肉善戰服上刑孟子所言後世猶未深悟爾孝元召用王吉貢禹出于至誠後世人主能如此者極少二人在宣帝時擯不得進帝所任又不足以厭服人心故孝元首用之不可謂無意于天下以此益知蕭望之劉向疏率使治功不舉反成暗君可為恨惜也石顯傳言望之死顯事貢禹禮敬甚備然則禹雖年過八十亦未免迎承上下非止于直情徑行者也然禹言文景武宣間事皆有根柢與王吉不同貢禹匡衡郊廟議其禮可言而其時不可言何也事天與奉先有進而無退故先王之禮嚴於初既定則敬守而不敢易秦漢以來其始大抵草創茍且出於一時之意及後文物議論既盛方據禮以抑俗損其已隆而欲反之於古無怪其難也至劉歆阿徇人情多設疑慮依違其説破壞禮經以彌縫時好蓋猶在禹衡之下而班氏父子乃以為博而篤學者所當詳考也魏丙所以俱稱名相者蓋革去霍氏父子武吏專國事君臣俱自力以擇吏安民為本而吉又特寬厚人情所向故也相因許伯白去副封及言當與平昌樂昌平恩侯詳議皆其所深結者此固庸人然霍光初不與朝廷一體僅得其身不反爾遂致族滅是三人既非倚權利與漢為異將相間無獨立之理自宜和親學者可無疑也天地以順動故日月不過四時不忒聖王以順動故刑罰清而民服豈可如魏相粗解耶然猶足以致漢之治若能細解則治當不止此矣夏侯勝言武帝無德澤不宜立廟樂而劉歆以武帝有功德宜為宗勝經生固不可以望歆然每用文墨佐佑時論者亦奚取於通博也勝又能言堯言布天下此殊不類漢人語漢君臣相與語外人不得聞言之禁甚者至死今在史家者蓋有波聽流聞崇飾而成豈足信哉翼奉雖挾術而求進之心薄言當徙都以正禮雖不合事宜然無俯仰希世之病也賢於京房李尋矣李尋言闒茸佞讇抱虛求進及用殘賊酷虐聞者皆嫉善憎忠壞天文敗地理涌躍邪陰湛溺太陽為主結怨於民以理知之耶以術意之耶究觀古今無不一揆誠有味其語然怪尋為王根論此何也班固言根輔政數虛己問尋五侯亡國之臣猶知虛已後世興王之佐有不能矣漢世以術數操縱為吏有聲績者韓延夀張敞尹翁歸之流而趙廣漢尤獨為民所稱思然強家巨姓盜奪縱橫自古皆有必待有以勝之而後能使小民得職則周公之教康叔成王之命君陳皆無用矣若後世吏術不明妄以亷明自許但欲其下重足一迹而善惡顛倒者又廣漢之徒所不為論政者宜審詳也孝宣於儒生無所用獨用蕭望之觀其始終方拙非能自撓以求合者特以其與霍氏立同異故爾士君子之經世非曰委蛇曲從為始終牢固之術然而變化詘伸自當兼通義命望之當孝元初天下事在掌握既不能輔贊裁成同歸於道及其潰敗又不知推委興廢以禮而止隄壞防決無所措躬卒就死地而陷孝元為不辨菽麥之主班固乃哀其為便嬖宫豎所圖不知自古小人何嘗一日不欲勝君子豳詩歌周公固殆未之學也漢世每事必議王通因此續書有議遂謂議能盡天下之心然執論不回獨有夏侯勝廟樂事爾如議王嘉尤可痛心蓋庸衆人之情未有不視上所好惡即譁然為向背古今皆然安得盡常心而合公論乎為治顧道得失如何耳故孔子言天下有道庶人不議不以必議為是也揚雄自序默而好深沈之思庸人之思病乎浮淺故雄有此論然古人論理至思而止理之所不至者非思也更不計深淺今於思上更有深沈工用即是思之所不至者而後為理如太玄乃理之過學者不當法也又言不修亷隅以徼名當世雄清靜恬淡不汩沒於欲利則世俗淫夸垢汙之賤豈復有之固不待修飾矣然士之厲志操明好惡言必信行必果皎然以自號於世而為户庭者此其所謂亷隅而可以取名者也雖然止於是而已矣故子貢曰譬之宫牆賜之牆也及肩雄自以為不止於是故其言如此然學者或不解因雄之言而以為小亷小行皆不足修淫夸垢汙無害於道也則其誤大矣文詞之變始于屈原衍於相如文士之所慕效也至揚雄闢而廣之將一變至道故為反離騷然原之本指雄或未達也余既數言之矣自立于淺而不足以知人之深固學者之大患自處于深而不知人之未易以淺量也則其患蓋有甚矣王莽以文章制作成篡雄居其間既不為用復不見忌優遊散職終老其身著書立言名垂於後然世之論雄者多異説孔子不作而賢不肖莫知所定此豈足為雄重輕哉如其浮雲富貴敝屣廢興以莽賢為虛舟視尤歆如土梗伯夷之不降志栁下惠之不去蘧伯玉之愚顔淵之樂兼有之矣政平訟理四字是孝宣一生受用為治處三代以還人主有意于此不過十數而效成功立者一人而已民生其間豈不艱哉然是時已罷鹽鐵𣙜酤利門不開故擇吏安民政平訟理即受其賜雖不足以興禮樂行道化至於富而教之則庶幾矣後世所以終不能望孝宣者以求利既密人無為生之地雖輕刑息爭而劫假茍活僅救溝壑願為天子之齊民不可得也班固以司馬遷序遊俠述貨殖是非悖謬信如此便不合登載而仍用遷條例因其舊文無所更易是不知遷之所為傳者即固之所謂謬也固舉管子言四民不得雜處此非先王舊法亦非管仲治齊法也以左氏考之強宗大姓富民豪賈三代固已有之固所謂列其行事以傳世變自范蠡起者亦未然也遷之所以取于遊俠者止謂其布衣匹夫趨人之急以此立名樓護陳遵已為列侯二千石則安取于俠乎原涉二千石子閭里少年宗之因而睚眥殺人何足列也嚴尤稱獫狁內侵至于涇陽命將征之盡境而還其視戎狄之侵譬猶蚊虻之螫驅之而已班固言春秋內諸夏外夷狄政教不及其人正朔不加其國來則懲而禦之去則備而守之其慕義貢獻則接以禮讓羈縻不絶此謂三代以前制御夷狄之常文也堯舜雖屬士官亦皆常文至于三苗鬼方獫狁淮夷何嘗不以為大患又况胸奴之強乎舜禹治天下皆服獨以苖為終身憂髙宗代鬼方著于爻象自文王畏獫狁及淮夷橫南方一能征伐便作歌頌使更有如胸奴者侵寇宜何以待之安得持虛文空義自取困辱固徒知秦漢之難而未知堯舜三代之不易也孝文遺尉他書武帝罷輪臺詔萬里外作家人父子對面言語此心既發隨輒受驗雖古人責治不至如此之急然與夫隱蔽夸飾中外不相應者去治亂安危之機逺矣乃知盤庚所謂播告之修不匿厥指王用丕欽罔有逸言民用丕變雖先王臨下之道當如此然亦未嘗不以為難也李延年佳人歌漢武傷李夫人詩詞司馬相如詞賦郊祀樂章皆一體以此被于聲歌而欲慕韶勺之盛哀哉孔子曰吾未見好德如好色者也觀成帝采賢良方正之語以報後宫豈所謂側身修行欲銷去之者耶然適逢許班寵將衰遂以經義移其愛心至白玉階黃金釭藍田明珠翠羽為飾則不復計矣宜許后謂端遇竟寧前也成帝既無保家之心而谷永杜欽佐佑權臣徒使詩書格言流轉閨闥為宫妾宦女嗟怨詬病之本悲夫周衰之後秦人雖滅聖法長苛刻然猶是情性之流失者譬如染習緅玄蓋自素來也至王莽變天下以諂偽所謂加蘇合于糞丸好惡向背失本質矣如符命圖讖之類人心皆轉移而不自覺雖東漢有節義之俗然內而朝廷外而邑里千載相師莽習故在不復能自還可哀也至於文章亦是張竦餘筆珠珥在耳首飾猶存豈復漢語魏晉齊梁之體已見矣班嗣報桓生書班彪王命論卑隘淺俗遂成魏晉之文無復春秋秦漢髣佛蓋學者大患溺於耳目之所是而忘其宗則道德日以淪墜而不可反魯臧文仲漢董仲舒劉向父子是也至彪固無可言矣道之顯者謂之文故雖堯舜之盛必有典謨之篇然後揚名於後世冠德於百王此為文耶質耶固未知古人之質而徒以為文此文之所以益陋也自詩書之作皆有敘所以繫事紀變明去取也司馬遷變古法惟敘己意既失之然包括上古收拾遺散操縱在心猶時有髙逺之意常人所不能測知者及班固效之而淺近重復往往不過常人知識之所能及至其後史官則又甚矣是遷之法一傳而壞曽不足以行逺非復古史法不可也習學記言卷二十三
