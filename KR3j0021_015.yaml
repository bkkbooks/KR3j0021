body:
  text: 習學記言卷十五宋葉適撰老子言老子所自出莫著於孔子家語世家曽子問老子列傳盖二戴記孔子從老耼助祭於巷黨云云史佚子死下殤有墓禮家儒者所傳也司馬遷記孔子見老耼歎其猶龍遁周藏史至闗闗令尹喜强之著書乃著上下篇言道徳之意非禮家儒者所傳也以莊周言攷之謂闗尹老耼古之博大真人亦言孔子贊其為龍則是為黄老學者借孔子以重其師之辭也二說皆塗引巷授非有明據然遷謂世之學老子則絀儒學儒學亦絀老子稱指必類乃好惡之實情鳥得舉其所絀而亦謂孔子聞之哉且使耼果為周藏史當教孔子以故記雖心所不然而欲自明其說則今所著者豈無緒言一二辨析於其間而故為巖居川游素隠特出之語何耶然則教孔子者必非著書之老子而為此書者必非禮家所謂老耼妄人訛而合之爾自伏羲以來漸有文字三墳八索今不傳於世大抵多言變化戃慌非世教所用非人心所安故堯舜禹臯陶以至周公孔子損削弗稱管子尚權謀子華子言仁義其人與老子並時或相先後亦皆與道徳之意相首尾盖老子之學乃昔人之常至其能盡去謬悠不根之談而精於事物之情偽執其機要以御時變則他人之為書固莫能及也然遷既以為不知所終又以為夀百有六十嵗又其居目有鄉里又以為有子為魏將傳至漢而所謂教孔子之老耼著書之老子乃不能辨其本事而徒詳於末流則非余所知也道可道非常道名可名非常名無名天地之始有名萬物之母常無欲以觀其妙常有欲以觀其徼此兩者同出而異名同謂之𤣥𤣥之又𤣥衆妙之門昔之治方術者無不上推天地之初下及人物之化其言下俚夷貊如太始太素青寧程馬自列御寇莊周皆然獨老子為不然止於常非常有無徼妙而已𤣥亦衆方所常論今以徼妙同謂之𤣥於此求之則下於舊論數十等也盖老子雖為虚無之宗而皆有定理可騐逺不過有無之變近不過好惡之情而其術備矣然則其徒祖述之者於其指歸終不能識而以浮言爛熳於世自為區域上則凟天下則欺人然後知道術之難言而老子思慮之所未及也道曰可道則必有不可道者名曰可名則必有不可名者可道者非常道則不可道者常道也可名者非常名則不可名者常名也無名即天地之始也有名即萬物之母也常無之欲以觀其妙妙不在於他在他能無而已常有之欲以觀其徼天下物雖日陳於吾前皆其粗者也𤣥與妙方術家之所常言也而言之者輙浩渺不可屬老子之所謂𤣥者即有無同異之間也有而復無無而復有有無相轉而不已即所謂𤣥之又𤣥而衆妙之所由開闔出入也盖指人之所共知共見者示之以道之所在未嘗以難知難見者誣之也人之所美而以為惡人之所善而以為不善賢可尚懼其争也難得之貨可貴懼其盜也心有可欲懼其亂也凡人心實而腹虚骨弱而志强其有欲於物者勢也能使反之則其無欲於物者亦勢也聖人知天下之所欲而順道節文之使至於治而老氏以為抑遏泯絶之使不至於亂此有為無為之别也孔子曰無為而治者其舜也與夫何為哉恭已正南面而已盖美美善善尚賢貴貨見其可欲舜之有為而老氏之所病也然則孔子之言如此豈非舜雖有為而實未嘗為乎恐老氏未能知也道沖而用之或不盈淵兮似萬物之宗挫其銳解其紛和其光同其塵湛兮似若存吾不知其誰之子象帝之先此老子指其道以示人最切近處也人無智愚高下其於用也必泰而溢盖己之情物之變相激而然爾故能沖而不盈者即道也銳與光物之精華也紛與塵物之滓濁也人皆求其精華而忘其滓濁因精華以致滓濁其終以自敗而不能反也故曰挫其銳解其紛和其光同其塵使相均等不偏勝也沖而不盈淵者似為宗光銳塵紛無以相絶湛者似或存矣然而人所以不能行者惡其為子也老子曰非子也象帝也非獨帝也象帝之先也所以深言其道之可貴也余固謂老子之言有定理可驗至於私其道以自喜而於言天地則多失之其曰天地不仁以萬物為芻狗曰天地之間其猶槖籥乎虚而不屈動而愈出曰𤣥牝之門是謂天地根曰天長地久天地所以能長且久者以其不自生故能長生曰天乃道曰飄風不終朝驟雨不終日孰為此者天地天地尚不能久而況於人乎曰有物混成先天地生曰地法天天法道曰天得一以清地得一以寧曰天之道不争而善勝不言而善應不召而自來繟然而善謀天網恢恢疎而不失曰天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者補之天之道損有餘而補不足按古人言天地之道莫詳於易即其運行交接之著明者自畫而推順逆取之其察至於能見天地之心而其粗亦能通吉凶之變後世共由不可改也今老子徒以孤意妄為窺測而其說輙屢變不同夫天地以大用付於隂陽隂陽之氣運而成四時殺此生彼豈天地有不仁哉易稱乾元亨利貞孔子贊曰萬物資始乃統天雲行雨施品物流形大明終始六位時成時乗六龍以御天乾道變化各正性命保合太和乃利貞而其象以為天行健然則虚與動何足以盡之而謂為槖籥之比耶天道雖歸於静順而静順非所以言天地故言天徳為首則不可而以𤣥牝為天地根則是不以乾統天而天之行非健也且天長地久自古而然未有知其所由來者豈以其不自生而後能長生哉世之方士用老子言而求長生而其術未有不出於自生者又烏知天地之所以能長生非其自生乎飄風驟雨非天地之意也若其陵肆發達起於二氣之争至於過甚亦有天地所不能止者矣然君子象之為振民育徳赦過宥罪而區區血氣之鬭何敢擬於其間盖老子以人事言天而其不倫如此夫有天地與人而道行焉未知其孰先後也老子私其道以自喜故曰先天地生又曰天法道又曰天得一以清且道果混成而在天地之先乎道法天乎天法道乎一得天乎天得一乎山林之學不稽於古聖賢以道言天而其慢侮如此及其以天道言人事則又忘之故曰不争而善勝不言而善應不召而自來又曰天道其猶張弓則是為天者常以機示物而未嘗法道之虚一無為也然則從古聖賢者畏天敬天而從老氏者疑天慢天妄窺而屢變玩狎而不忌其不可也必矣上善若水水善利萬物而不争處衆人之所惡故幾於道按諸子論水多異說子産謂水弱民狎而玩之故多死焉以象寛難鄒衍則又不足稱盖易言習坎有孚維心亨行有尚孔子贊之以為流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也而老氏之言差合矣載營魄謂有此身也下言抱一專氣致柔滌除𤣥覽愛民治國天門開闔明白四達皆有此身而治之也人以此身載營魄而行血氣無殊而智愚絶異案劉子言民受天地之中以生所謂命也故有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍劉子不為無知者所謂載營魄而行其言治之之道如此豈惟劉子自堯舜禹湯以來無不如此故謂之人道而老子乃言當如嬰兒無為無知推之天下國家皆用此術夫各由其方各致其極不相為謀亦無怪矣然後之儒者智不足以達反遵奉之曰彼道也此禮也彼天也此人也彼妙也此徼也不兼明而兩蔽者也三十輻共一轂當其無有車之用埏埴以為器當其無有器之用鑿户牗以為室當其無有室之用老子之為是言也所以明無也然適見其無者而已天下之物當其有而用者皆是也何未之思乎然則有無不足以相明而道之所不在也盖老子之所操者雖㣲而狹矣視之不見名曰夷聽之不聞名曰希搏之不得名曰㣲此三者不可致詰故復混而為一其上不皦其下不昩繩繩兮不可名復歸於無物是謂無狀之狀無物之象是謂惚恍迎之不見其首隨之不見其後執古之道以御今之有能知古始是謂道紀視之不見非逺也聽之不聞非寂也搏之不得非空也其說以為可見可聞可得者皆物也不見不聞不得者非物也雖然既已在見聞搏執之内矣雖不可致詰而既已受詰矣此其所以復混而為一一者道之别名也老氏謂道生一一者道之子也其上雖不皦其下亦不昩散在萬物而復歸於無物也故曰無狀之狀無物之象是謂惚恍惚恍者有而不有無而不無也必有以迎然而莫為首必有以隨然而莫為後有者非道而御有者道自古而然也老子極思研精模寫夫道其勞若此按舜命禹道心惟㣲周官儒以道得民孔子何莫由斯道皆前無本根後無枝葉老子未之聞爾古之善為士者㣲妙𤣥通深不可識夫唯不可識故强為之容豫兮若冬渉川猶兮若畏四隣儼兮其若客渙兮若氷將釋敦兮其若樸曠兮其若谷渾兮其若濁孰能濁以静之徐清孰能安以動之徐生保此道者不欲盈夫唯不盈故能敝不新成老子取於人情物理以為體道之驗可謂巧矣冬之渉川無敢驟犯者四隣雖不吾禁吾之所為恐其聞而見也主為政而客不為政自嚴以待而已氷之將釋融浹而不流也樸者不制割也谷者虚而深也若濁者非濁非清也此皆人情物理之自然不待智者而知至於取以為體道之驗則雖智者不知不能也老子之於道豈不察而近乎濁之徐清安之徐生此亦人情物理之自然而非智者不能待也然其大㫖則欲沖不欲盈欲能敝不新成爾嗟夫老子之道偏矣其行之勞矣然而可以寡怨逺罪也按易勞謙君子有終其象以為萬民服盖以功與人而已不居焉老子自為而已其於人也無功則雖勞而固以逸為利也萬物並作吾以觀其復夫物芸芸各復歸其根歸根曰静静曰復命按易物作而剥剥極而復復則還作矣故孔子以為見天地心者取其作也若老氏之根歸則以剥為復復則不作非余所知六親不和有孝慈國家昏亂有忠臣和則不待孝治則不待忠其道或然矣然其所以不和不治豈為忠孝者致之哉若舜父母箕子之君併以不和不治者集於其身又將奚咎老子謂因廢道有仁義因智慧有大偽而謂家國之亂亦因忠孝者致之故欲絶焉噫未有不察事而可以知道者是恣其私說而以亂益亂非亡滅不止悲夫衆人熙熙如享大牢如登春臺我獨泊兮其未兆若嬰兒之未孩衆人皆有餘而我獨若遺衆人皆有以而我獨頑似鄙此雖非道然欲己逺身道亦凝焉若學者但以為資質所安而無聞悟之獲則緩縱於瞬息之㣲而所遁逸者不啻千里之外矣君子終日行不離輜重物有輜重道亦有輜重人皆知致物之輜重以行其身而不知致道之輜重以行其身也使誠知之則千鈞在已而毫芒在物矣惜乎老子為一方之說而不足以教學者也老子論道猶可也何必及兵益贊禹以至諴感神自知其可以勝有苖而不用而苖亦知之故班師振旅而苖自至兵之上也出律不足以擬之矣若老子論兵不可以勝敵而欲以哀先之則左次輿尸而已佐人主者固無以兵强之道至於兵受弱而道亦亡則謂之以道佐人主不可也為國者不審觀而信處士之虚言亂曷已乎上禮為之而莫之應則攘臂而仍之夫禮者忠信之薄而亂之首世之陋儒謂失禮則入刑則老子宜有此論矣攘臂而仍之入刑之謂也老氏已先見自其時言之謂之救弊若通行於後則有徳其可以無禮乎道徳之於禮譬人身之有耳目手足也非是則無以為人故孔子曰安上治民莫善於禮道之以禮有恥且格正謂不攘臂而仍之也老子所講不詳而輕言治道誤後世莫大於此大道甚夷而民好徑朝甚除田甚蕪倉甚虚服文采帯利劒厭飲食貨財有餘是謂盜夸非道也哉老子與堯舜三代之聖人辨道於分釐杪忽之㣲而以衰末亡國之事併言之不知使彼出而為治又將何以處此盖老子之㣲言纔十數章其有見於道者以盈為冲以有為無以柔為剛以弱為强而已然而謂堯舜三代之聖人皆不知出此也遂欲盡廢之而以其說行天下嗚呼使其為藏史之老耼歟則執異學以亂王道罪不勝誅矣使其非藏史之老耼歟而處士山人乗王道衰闕之際妄作而不可述奇言而無所考學者放而絶之可也奈何俛首以聽而或者又助持矛焉然則學而不盡其統與不學同於是以自有之聰明而陷於人之聾瞽者百世之通患也習學記言卷十五
