body:
  text: 習學記言卷三宋葉適撰易坎下兊上巽下坎上按諸卦未有其物而言無者澤奚為而無水也澤亦水也澤之水以浸灌潤說為用坎之水以流行通達為用當澤上之時坎為所包而流行通達之用失矣故彖言剛掩而象言無水困也坎之正卦惟心亨其掩於剛也有言不信夫君子未嘗不以心亨及其掩於物而不自達憤不能平則有時而言矣故戒之曰尚口乃窮然則必反於心而後可也剛者我也命者天之所以命我也志者我之所以為我也見掩於物坐而受困致命遂志所以全我也困之於人大矣必若是而後亨不然則濟困者皆所以重困也反而為井所以明水之必通也水行於地而上於井雖十仞之深未有不上者也人實求水水非求人故邑可改以就井井不可改以就人也汲有喪得井無喪得汔至未繘井人之無功而非水之無功也羸其瓶者物之凶而非水之凶也易極言井之義至於勿幕有孚吉不在水而在物者皆心亨之餘功也蓋水不求人人求水而用之其勤勞至此夫豈惟水天下之物未有人不極其勞而可以致其用者也目之色耳之聲口之味四肢之安佚皆非一日之勤所能為也智者知之積一粒之萌芽一縷之滋長以教天下天下由之而不自知也皆勞民勸相之道也困乎上者必反下故受之以井按井上也非下也離下兊上巽下離上詳易諸卦自乾坤開義皆因其事之所當有而治之至於蠱幾變矣至於剝又幾變矣聖人以為物之自變者不足言也故其於革也非其事之所當有而示我之所以變以明乎易之不窮也其辭曰已日乃孚物之安於常者不知其為變而未有利之者也故其革也皆物之所不恱已革而後信之且天下之情固未有信於其未革者故彖以天地革而四時成不言四時革而言天地革四時之革人所易信天地難信湯武革命順乎天而應乎人又以治厯明時象之而爻又雜取變革之象以當之此易外新意非諸卦所得擬倫也序卦至未濟乃言易不可窮夫易巳窮於此則所謂不可窮者果孰從而求之雜卦又言革去故鼎取新夫謂革為去故則宜若其理然者而鼎無取新之義當革之時物情世故無不變易而有不可變者如鼎之烹飪有實人所資以生養蓋猶故也故以正位凝命繫於革之後以為知其有不可革者而正位凝命以待之則始終終始相為無窮而易之道常流通矣而傳易者方摘十三卦論易變通之利踈矣震下震上艮下艮上按畫陽在內為震其義曰震驚百里不喪匕鬯所以震驚百里者陽也所以不喪匕鬯者剛也陽所以為震也剛所以治震也恐懼修省治震之業也不喪匕鬯治震之德也學者知為震又當知治震也陽在外為艮其義曰不獲其身行其庭不見其人夫不喪匕鬯者不有其心也不獲其身者不有其身也內能不有其心外能不有其身皆是剛為之也學者於艮知止而已古人以震艮兼明內外內存則無外矣外遺則無內矣思不出其位非無思也位難知也不出其位無邪思也所以養思也艮下巽上兊下震上晉為進漸亦為進漸者進之序也晉漸升皆君子體而進其德之象也至於歸妹余有疑焉其彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也其象曰君子以永終知敝夫以歸妹為人之終始則人道之訖於此也審矣永終知敝則其當戒慎也明矣按屯在序卦為乾坤之次而其彖為剛柔始交至歸妹則曰天地不交而萬物不興以畫考之乾始變而為兊居內坤始變而為震居外在天則為天地交也在人則為所歸妹也然則艮巽合隂陽俱長者人之序震兊合少隂交長陽者人之敝也隨亦震兊合乾變不居內故也是其為卦義亦次乾坤蓋古之諸卦次第如革鼎漸歸妹往往與今序卦不同不然則彖安得獨以歸妹為人之終始而諸卦以取女為義者顧無此哉夫乾坤交而為震兊真有男女之象而過以相與者亦敝之所由生此其所以永終之為難也然則家人曷為亦以天地之大義言之曰家人無陽所謂大義者以位之外內為别爾非人之終始也離下震上艮下離上勿憂者有憂也時之在豐人情之所喜而何憂焉變而不流虧而不益常人之所玩而君子之所畏也王假之宜日中言非常人所能當也故又曰日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎言雖王亦不能當也聖人之戒豐如此而於旅則曰旅之時義大矣哉然則屯蹇困者君子之所用而豐豫大有者君子之所去也豐則噬嗑也旅則賁也皆施之於刑而不施之於德也巽下巽上兊下兊上巽於人無所用獨用之於命令以其順也命已順矣而又申之順之至也九五無初有終先庚三日後庚三日申命之主也命自我順而後下順之然惟聖人為能非聖人則皆以命令軋天下失巽道而用武人者也孔子曰君子之德風也小人之德草也草尚之風必偃而天下有風姤后以施命誥四方蓋居尊用柔而以巽出之申命之道也又曰不教而殺謂之虐不戒視成謂之暴慢令致期謂之賊此所謂不以巽道而用武人考末世之事皆然也故管仲之𫝊猶謂下令如流水之原而况聖人乎學者方以暴虐之意助指麾之威逆人以順己甚者至謂敕命一出違則有刑為得古人重命之義豈其以巽出之哉兊以說先民而尤貴於朋友講習之用故謂學時習而說乃古道也理本無形因潤澤浹洽而後見其始若可越其久乃不可測其大乃至於無能名皆自說來也坎下巽上兊下坎上序卦說而後散之故受之以渙渙者離也又雜卦渙雜也王弼因之遂以為乖散之象學者於渙無不以散為稱按剝稱落明夷稱傷其本故在也民散則國亡氣散則形離本則不存何以卦為詩稱繼猶判渙又曰判渙爾遊矣又曰溱與洧方渙渙兮蓋渙者融釋通達之義如以為散則萃以聚有廟渙可以散立廟乎渙汗其大號謂通達之盛者安得散汗其大號而又曰散王居無咎哉當是時剛來而柔得位乎外隂陽合和鬱滯者解凝止者通渙然發越王道之所㑹也故可以享帝立廟猶豫以作樂崇德也渙之反自當為節水之流行無窮澤上有水所行者止於澤而已數度可制而德行不可議子貢問何如斯可謂之士矣子曰行已有恥使於四方不辱君命可謂士矣敢問其次曰宗族稱孝焉鄉黨稱弟焉又問其次曰言必信行必果硜硜然小人哉抑亦可以為次矣夫議德而後能進德學者不考以小德加於大德終無自進之地矣兊下巽上艮下震上二剛之初為巽末為兊剛在中而說巽合不以令而行不待令而從者也捨中剛而言中孚者此剛之用而信之所由出也夫剛外旅而柔據其中其卦為噬嗑而至於用獄柔在外而剛在中其卦為中孚而至於及豚魚剛柔內外之間治物之功相去逺矣然則何以知其能及豚魚而言之卦之利牝馬畜牝牛飛鳥遺之音皆以其材立象尚有難知者若其中信於物如天地四時無所差忒則雖昆蟲之微草木之無情皆取節焉非難知也所以知其及於豚魚而後為信之至而人倫交際之道猶其粗者爾小者過謂柔過乎剛君子體其象以行過乎恭喪過乎哀用過乎儉凡在吾身若此類者可以過也所以變柔成為剛也茍以為不可過而棄之則是恣隂而剝陽也離下坎上坎下離上水欲下而火欲上人之情有所欲而不獲冒患出險求必遂而後已此人也非天也至比之輔萃之聚以人而得其天者也凡卦惟大亨而既濟舉小以明之言其志在於欲而不必於理也欲之未遂也無不用其極既遂則舉而棄之猶芻狗然是以止而亂也故君子之戒既濟以為無寧未濟之患而所欲既得則患之始而亂之所由生所當思而豫防也然則火已上水已下已濟矣猶曰未濟未濟者欲濟而未能也人之情於其本然者不自安而猶以為未也故君子之戒曰慎辨其物而居其方宜上者毋下也宜下者毋上也不然則物交錯而方亂矣日與人接最著而察者八物也因八物之交錯而象之者卦也此君子之所用非小人之所知也故乾以自强不息坤以厚德載物屯以經綸蒙以果行育德需以飲食宴樂訟以作事謀始師以容民畜衆小畜以懿文德履以辨上下定民志否以儉德避難同人以類族辨物大有以遏惡揚善順天休命謙以裒多益寡稱物平施隨以嚮晦入宴息蠱以振民育德臨以教思無窮容保民無疆賁以明庶政無敢折獄大畜象以多識前言往行以畜其德頥以慎言語節飲食大過以獨立不懼遁世無悶坎以常德行習教事咸以虛受人恆以立不易方遁以逺小人不惡而嚴大壯以非禮弗履晉以自昭明德明夷以蒞衆用晦而明家人以言有物而行有恆睽以同而異蹇以反身修德解以赦過宥罪損以懲忿窒欲益以見善則遷有過則改夬以施祿及下萃以除戎器戒不虞升以順德積小以高大困以致命遂志井以勞民勸相革以治厯明時鼎以正位凝命震以恐懼修省艮以思不出位漸以居賢德善俗歸妹以永終知敝豐以折獄致刑旅以明慎用刑而不留獄巽以申命行事兊以朋友講習節以制數度議德行中孚以議獄緩死小過以行過乎恭喪過乎哀用過乎儉既濟以思患豫防未濟以慎辨物居方皆因是象用是德修身應事致治消患之正條目也觀孔子與羣弟子分别君子小人甚詳而正條目於易乃明著之又當於其間擇其尤簡直切近者孟子所謂左右逢其原而近世亦有求端用力之說夫力則當用而端無事於他求也求諸此足矣此學者參前倚衡之要道也與夫意測聲隨而宛轉於枝葉之外者殊絶矣按易之初一畫對分而為十二二卦對立而為六十四書之始終具焉聖人非罔民以自神者而學者多異說不知之過也按班固用劉歆七略記易所起伏羲文王作卦重爻與周官不合蓋出於相傳浮說不可信言孔氏為之彖象繫辭文言序卦之屬亦無明據論語但言加我數年五十以學易而已易學之成與其講論問答乃無所見所謂彖象繫辭作於孔氏者亦未敢從也然論語既為羣弟子分别君子小人無所不盡而易之象為君子設者五十有四焉其詞意徑厲截然著明正與論語相出入然後信彖象繫辭為孔氏作無疑至所謂上下繫文言序卦文義重復淺深失中與彖象繫辭異而亦附之孔氏者妄也自顔曽而下訖於子思孟子所名義理萬端千緒然皆不若易象之示人簡而切確而易行學者誠有志於道以是為經而他書特緯之焉可也書文訓故莫知所起之時蓋義理由此而出以易考之有即其所稱不待解釋而明者如屯泰否謙臨觀賁復遁家人睽損益震歸妹旅巽渙節既濟未濟如此類者必當時人所通知故不復解釋止於核卦象而已有雖其所稱義不隨見必待訓釋而通者如山下有險險而止蒙上剛下險險而健訟柔得位而上下應之曰小畜柔得位得中而應乎乾曰同人柔得尊位大中而上下應之曰大有剛應而志行順以動豫剛來而下柔動而說隨剛上而柔下巽而止蠱頥中有物曰噬嗑無妄剛自外來而為主於內大畜剛健篤實輝光日新其德明入地中明夷解險而動動而免乎險解巽乎水而上水井水火相息二女同居其志不相得曰革柔在內而剛德中說而巽孚需之為須師之為衆比之為輔履為柔履剛剝之為剝頥之為養大過為大者過小過為小者過坎之為險離之為麗恆之為久大壯為大者壯晉之為進蹇之為難夬之為決姤之為遇萃之為聚困為剛掩鼎之為象艮之為止漸之為進豐之為大兊之為說必非其當時所通知或雖通知而字與義不偶故必以後字明前字轉相之而後著也又有義不止於卦名者如天為乾而象乃為健隨不止於隨而為天下隨時有雖卦所取名彖所訓義而後世猶不能從者如坤小畜大畜噬嗑坎離夬姤艮兊有雖卦所取名彖所訓義而義理終於微小不與諸卦並行者如屯需漸是也夫人之一身自仁義禮智信之外無餘理行於世故自六十四卦之外無餘義學者遡源而後循流則庶幾得之若沿流以求源則不勝其失也故余諄諄焉以卦象定入德之條目而略於爻又以卦名通世故之義訓而略於卦者懼沿流不足以求源也習學記言卷三
