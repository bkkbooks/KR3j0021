body:
  text: 習學記言卷四宋葉適撰易自有易以來說者不勝其多而淫誣恠幻亦不勝其衆孔子之學無所作也而於易獨有成書盖其憂患之者至矣不幸而與大𫝊以下並行學者於孔氏無所得而惟大𫝊以下之為信雖非昔之所謂淫誣恠幻者然而依於神以夸其表耀於文以逞其流於易之道猶曰出入焉而已余既條其大指稍釐柝之誠渙然於此則孔氏之成書翳而復明易之道其庶幾乎周官太卜掌三易之灋一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四連山歸藏雖不可得而見矣以其義推之非變則無以為易非經非别則無以盡變古人之所同考不知其安所從始也而後世之言易者乃曰伏羲始畫八卦又曰以代結繩之政神於野而誕於樸非學者所宜述也六爻之動三極之道也又曰有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也又曰兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章謂六爻之動則信有三極之道矣謂兼三才而兩之故六則非也六畫成卦畫之所自有六位成章亦畫之所自成謂隂陽剛柔天地所由立於此亦非也易之作也自畫而始不三之則無以為八也不六之則無以為六十四也故一以為天也六之以為乾二以為地也六之以為坤有一者無二也有二者無一也安得預計其為三哉且易之既成則固備乎天地與人矣而其始之所以作則不必備也原其始者莫著乎畫𫝊者徒雜而言之宜其晦而不明歟天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣是故剛柔相摩八卦相盪鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能此所以釋夫彖也按彖言大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乗六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧則皆乾徳也而天從之𫝊之所稱則皆天徳也而乾從之爾且易之始畫也獨乾而非坤故彖之贊乾也有乾而無坤及其贊坤也順承乎天而已然則乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能是非坤不足以配乾非乾坤不足以成易而獨乾非坤有乾無坤之義隠矣乾道變化各正性命統充滿覆載無非乾也乾道成男坤道成女則隂為無預乎陽陽必有待於隂而乾之功用褊矣震雖有不喪匕鬯咸雖有取女吉姤雖有勿用取女然而以乾坤為父母六卦為男女皆卜筮牽合之虚文非孔氏之書所道也故其彖曰出可以守宗廟社稷以為祭主又曰柔上而剛下二氣感應以相與又曰勿用取女不可以長也豈有瀆乎其間哉乾終始主乎健其象曰自强曰不息坤終始主乎順其象曰厚徳曰載物今變而曰易曰簡然則健順固所以為易簡乎抑健順不足以盡乾坤乎易不必强簡不必厚乎此皆與彖象之義異不可得而從也君子所居而安者易之序也不知指何序謂易有成序君子之所當居則泛濫而無擇謂君子於易有所當居之序則移徙而難常若朝困而暮升則俄約而忽泰非所以為安也夫卦無常而君子之徳有常孔氏之教也以有常之徳居無常之卦彼逆而我順不取必於易也易與天地準故能彌綸天地之道𫝊之為是言也将以大夫易也其意若曰天地至大也而易能準之又彌綸之爾按乾稱統天泰稱財成天地之道豫稱順以動故天地如之大壯稱正大而天地之情可見矣書詩之稱道未嘗不先天惟易不然盖其困變以明理而後知天地之不能違也然則天地固準易而易非準天地也且既已準而從之矣又安能彌綸之乎一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣後世以是為微言之極也一隂一陽氤氲而眇微至難明也善為之繼而綜統之機難執性所以成而歸全之本易離仁知皆道之偏也雖然聖人之於道盖難乎言其言之者有矣曰天道下濟而光明天道虧盈而益謙又曰剛浸而長說而順剛中而應大亨以正天之道也又曰觀天之神道而四時不忒又曰天地之道恒久而不已也夫天與人不相接而其好惡消長如影響符契之相答然此其所以有貴於聖人之言道也道者陽而不隂之謂也一隂一陽非所以謂道也仁者不憂知者不惑於見道莫察焉如使謂仁而非仁謂知而非知則豪芒之眊何止於㝷丈之迷而君子不貴也夫乾其靜也專其動也直是以大生焉夫坤其静也翕其動也闢是以廣生焉廣大配天地易於乾坤不並言盖因乾而後有坤也天地則並言之矣盖有天則必有地也彖稱坤厚載物徳合无疆先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶先後得喪之間作易者戒之則坤之廣宜若配地者至乾以元統天以六御天正性命合太和皆有待於乾而後能則乾之為大非配天者也考徳者不明乎此則隂陽錯行剛柔雜施何以首出萬物而用九乎鳴鶴在隂其子和之我有好爵吾與爾縻之子曰君子居其室出其言善則千里之外應之况其邇者乎出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎按中孚柔在内而剛得中至於豚魚吉而象以議獄緩死則其信乎已而恕乎人也至矣故鳴鶴在隂其子和之象曰中心願也夫茍中心之所願則其化服而感應者豈必以子言哉今方掲言行而表之皇皇乎所以動物者而致慎焉此上九之翰音登于天而不可長者也同人先號咷而後笑子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭按同人以門為无咎以郊為无悔而以宗為吝則二人同心者乃同人之狹者也雖其利斷金以師克之而天下之志不能通矣初六藉用白茅无咎子曰茍錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其无所失矣按大過所以為棟橈者以初上皆隂也及捨卦而論爻則以柔在下適當其位何咎之有而棟橈之責九三反任之以其繫應於六也至九四棟隆獲吉而以應初為吝夫應猶吝之而用何重焉且敬其物者必貴其藉藉之用茅死麕之包庶人之禮也茍免於地而已其薄如此非所以為慎也勞謙君子有終吉子曰勞而不伐有功而不徳厚之至也語以其功下人者也徳言盛禮言恭謙也者致恭以存其位者也按謙卦地體卑居上而艮以九三為衆隂所宗如地有山以高而藴於卑其終為地而以非成功之位而有成功之勞此萬民之所以服也若存位而為謙之道寡矣亢龍有悔子曰貴而无位高而无民賢人在下位而无輔是以動而有悔也乾為易之主非他卦交錯相成之比故其為初也潛而隠而非不可用也其為四也躍而進而非必求用也至於上則道成且革矣故爻以為亢而有悔而象以為盈不可久明其将變而之隂爾非若傳之所謂也且始終皆道奚位之擇獨乾御世奚民之求功則由己奚輔之待後世不知乾所以成易而指成易以論乾是以其言若此也不出户庭无咎子曰亂之所生也則言語以為階君不宻則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也按節君子以制數度議徳行非可密之事初九居節之始不出户庭惟始可節故象以為知通塞固宜明示節限安有密為閉絶也厯考書詩正文自堯舜至文武君臣相與造治成徳雖不為踈以致敗亦無依密以成功此論雜霸戰國之事可也去帝王逺矣大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閏故再扐而後掛天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也乾之䇿二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神徳行是故可與酬酢可與祐神矣按易之始有三而已自然而成八有六而已自然而成六十四一成一反象類曉然而名義出焉非四十九所能用非掛非歸非再扐所能通也然則自乾而至未濟皆已具矣已具則必有起數故筮人為是以起之云得某爻爻成當某卦某爻當變變當之某卦而已此易之淺事也易成在先卦起在後今傳之言若是是不知易之所以成而即以筮人之所起者為易無惑乎易道之不彰也又謂象三才四時一閏再閏愈淺末矣子曰知變化之道者其知神之所為乎易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占是以君子将有為也将有行也問焉而以言其受命也如嚮无有逺近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此易无思也无為也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也按易以彖釋卦皆即因其畫之剛柔逆順往來之情以明其吉凶得失之故無所謂无思无為寂然不動不疾而速不行而至者余嘗患浮屠氏之學至於中國而中國之人皆以其意言非其學能與中國相亂而中國之人實自亂之也今傳之言易如此則何以責夫異端者乎至於問焉而以言其受命也如嚮无有逺近幽深遂知來物則真卜筮之所為而聖人之所黜爾反以為有聖人之道可乎天一地二天三地四天五地六天七地八天九地十此言隂陽竒耦可也以為五行生成非也按洪範以凡舉五行鯀之所以汨陳者謂其以土捍水爾五行無所不在其曰天生而地成之是又傳之所無有而學者喜以異說佐之也且使其果然則於易之道曷損益乎以蓍求卦蓍非圓也吉凶在卦蓍非神也六十四卦皆因其象以成理非洗心也聖賢皆不殺獨謂為易者不殺亦非也易有太極近世學者以為宗論祕義按卦所象惟八物推八物之義為乾坤艮巽坎離震兊孔子以為未足也又因彖以明之其微妙往往卦義所未及故謂乾各正性命謂復見天地之心言神於觀言情於大壯言感於咸言久於恒言大義於歸妹無所不備矣獨無所謂太極者不知傳何以稱之也自老耼為虚無之祖然猶不敢放言曰無名天地之始有名萬物之母而已至莊列始妄為名字不勝其多故有太始太素未始有夫未始有無茫昧廣逺之説傳易者将以本原聖人扶立世教而亦為太極以駭異逺學鼔而從之失其㑹歸而道日以離矣又言太極生兩儀兩儀生四象則又淺而陋矣崇高莫大乎富貴是以富貴為至權與道徳並稱書詩何嘗有此義學者不可從也從之則富貴不足以成道徳而終至於滅道徳矣按卦比以五隂宗一陽大有以五陽宗一隂其象比曰先王以建萬國親諸侯象大有曰君子以遏惡揚善順天休命然則崇高富貴必如是而後可故顯比則失前禽交如則信以發志不然則以富貴高天下而其敝至於秦漢矣形而上者謂之道按一隂一陽之謂道兼隂説雖差猶可言也若夫形上則無下而道愈隠矣十三卦亦近世學者所標指而其說尤為不通包犧氏始為罔罟神農氏始為耒耨交易黄帝堯舜始為衣裳其後乃有舟楫牛馬臼杵弧矢宫室棟宇甚矣其不考於易也易十三卦義詳矣乃無毫釐形似之相近者學者誠能準義於易則凡本象所稱義類炳然誠得一二於此足以經世紀民律身而成徳矣不是之求而震於異說欲大而反小之其卒無所底止而已矣天下同歸而殊塗一致而百慮以為不足思不足慮也然言日月相推而明生者是不知明之所由生寒暑相推而嵗成者是不知嵗之所由成也因其往來之已然而遂欲利用安身於其間者是不知徳之所由崇也然則曽憧憧往來朋從爾思之未及而尚何以窮神而知化乎故傳之義多似於深而其實淺者亦學者之所不可不知也故象以為未光大而不以為不當思使其感人心而天下和平則雖憧憧而不為己私然烏有安其固然而不知所由來者哉困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危按卦以剛見揜於柔為困其為爻也則以柔乗剛為凶困于石為四也據于蒺藜謂二也皆剛也當困之時非大人不亨三為致困之主将施其不利於我而進退皆剛卒與禍㑹非大人實為之而理有不得不然者矣君子而變於小人危之辱之可也小人而乗君子其不勝天也其辱與危非不幸也不祥之招揜剛之報也又何戒焉君子藏器於身待時而動何不利之有當解之時痿者欲起瞑者欲視有小人焉諂上凌下身為戎首以捍通塗物情之所同惡也故以公射隼既獲而解解則無事矣如使過而用射反以致冦何利之有夫用之則行非待時也舎之則藏非藏器也傳有藏器待時之說而學者方沾沾焉抱其所有如賈之售物適以為悖而不足以解悖矣其亡其亡繫于苞桑按否以九五為大人吉有其亡其亡之戒必深固根本以為衆陽之主言朋來之隂未易當也所恃者位正而已此豈常道居尊之時而𫝊謂安不忘危存不忘亡治不忘亂故身安而國家可保嗚呼吾未見處危亂之世而自謂治安者也傳既謂包犧氏始作八卦神農黄帝堯舜續而成之又謂易興於中古當殷之末世周之盛徳於稽其類其衰世之意是易之或逺或近不能自必其時也皆以意言之而已韓宣子聘魯見易象與魯春秋然則當時國各為繇而周易之不見者多矣無恠乎學士諸生之紛紛也按上下繫說卦浮稱汎指去道雖逺猶時有所明惟序卦最淺鄙於易有害按諸卦之名以象取之與文字錯行於世者少聖人重復殷勤其詞以訓釋之多至數十百言而未已盖其難明如此今序卦不然以是為天地萬物之所常有也鱗次櫛比而言之以是為鉛槧篆籕之常文也嗟乎使其果若是則束而聫之一讀而盡矣奚以易為學者尺寸之不辨而謂能有見於無窮吾不知也習學記言卷四
